<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2a2a2a">
<title>Carnet — notes &amp; croquis</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
<style>
  :root{
    --bg-shop:#2a2a2a;
    --bg-shop-light:#383838;
    --bg-shop-lighter:#454545;
    --paper:#fbf9f4;
    --paper-line:#e8e2d5;
    --ink:#1d2b3a;
    --accent:#c1652f;
    --accent-soft:#e3a16d;
    --text-light:#f2ede3;
    --text-muted:#b8ae9c;
    --danger:#b6432f;
    --font-display:'Space Grotesk', sans-serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--bg-shop-light);font-family:var(--font-body);color:var(--text-light);overflow:hidden;user-select:none;-webkit-user-select:none;}
  .text-el.editing{user-select:text;-webkit-user-select:text;}

  #app{display:flex;height:100vh;width:100vw;}

  /* ---------- SIDEBAR ---------- */
  #sidebar{
    width:250px;min-width:0;
    background:var(--bg-shop);
    display:flex;flex-direction:column;
    border-right:1px solid #1c1815;
    overflow:hidden;
    transition:width .18s ease, min-width .18s ease;
    position:relative;
    flex-shrink:0;
  }
  #app.sidebar-collapsed #sidebar{width:0!important;border-right:none;}
  #sidebar-resize-handle{
    position:absolute;top:0;right:0;bottom:0;width:6px;cursor:col-resize;z-index:20;
    transform:translateX(50%);
  }
  #sidebar-resize-handle:hover, #sidebar-resize-handle.dragging{background:var(--accent);opacity:.5;}
  #brand{
    padding:14px 10px 12px 16px;
    font-family:var(--font-display);font-weight:700;font-size:15px;
    letter-spacing:0.06em;text-transform:uppercase;color:var(--text-light);
    border-bottom:1px solid var(--bg-shop-lighter);
    display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  }
  #brand .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}
  #brand #classeur-select{
    flex:1;min-width:80px;background:var(--bg-shop-lighter);color:var(--text-light);
    border:1px solid transparent;border-radius:6px;padding:6px 8px;font-family:var(--font-mono);
    font-size:12px;font-weight:600;letter-spacing:.02em;outline:none;cursor:pointer;
    text-transform:none;
  }
  #brand #classeur-select:hover{border-color:var(--accent);}
  #classeur-bar{
    display:flex;align-items:center;gap:4px;padding:8px 8px 4px 8px;
  }
  #sections{flex:1;overflow-y:auto;padding:6px 8px 10px 8px;}
  .section-block{margin-bottom:0;}
  .section-head{
    display:flex;align-items:center;gap:4px;padding:1px 6px;border-radius:4px;
    cursor:pointer;color:var(--text-muted);font-size:12px;font-weight:600;
    font-family:var(--font-mono);letter-spacing:0.02em;
  }
  .section-head:hover{background:var(--bg-shop-lighter);}
  .section-head .chev{flex-shrink:0;transition:transform .15s ease;font-size:18px;width:20px;height:20px;}
  .section-head.collapsed .chev{transform:rotate(-90deg);}
  .section-head .name{
    flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-light);
  }
  /* max-width:0 + overflow:hidden (au lieu du seul opacity:0) : un élément invisible mais encore
     display:flex réserve quand même sa place dans la ligne — ça grignotait la largeur dispo pour
     .name (flex:1) et coupait les noms de section en "…" même quand aucune icône n'était affichée.
     En le réduisant aussi à 0 de large tant qu'il est caché, .name récupère toute la largeur. */
  .section-actions{display:flex;gap:2px;opacity:0;pointer-events:none;max-width:0;overflow:hidden;transition:opacity .1s, max-width .1s;}
  /* Le survol ne concerne que les appareils avec une vraie souris : sur tactile, un simple appui
     déclenche aussi ":hover" dans la plupart des navigateurs, ce qui ferait apparaître ces icônes
     dès qu'on touche une section — on ne veut ça qu'après un appui long (voir plus bas, JS). */
  @media (hover:hover){ .section-head:hover .section-actions{opacity:1;pointer-events:auto;max-width:140px;} }
  .section-head.show-actions .section-actions{opacity:1;pointer-events:auto;max-width:140px;}
  .icon-btn{
    background:none;border:none;color:var(--text-muted);cursor:pointer;
    width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;
    font-size:13px;flex-shrink:0;
  }
  .icon-btn:hover{background:var(--bg-shop-lighter);color:var(--text-light);}
  .icon-btn.danger:hover{color:var(--danger);}
  .icon-btn:disabled{opacity:.35;cursor:not-allowed;}
  .icon-btn:disabled:hover{background:none;color:var(--text-muted);}
  #sort-sections-btn{width:auto;padding:0 6px;font-size:10px;font-family:var(--font-mono);}
  .pages-list{padding-left:14px;margin-top:2px;}
  .page-item{
    display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;
    cursor:pointer;font-size:13px;color:var(--text-muted);border-left:2px solid transparent;
  }
  .page-item:hover{background:var(--bg-shop-lighter);}
  .page-item.active{background:var(--bg-shop-lighter);color:var(--text-light);border-left-color:var(--accent);}
  .page-item .name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  /* Même correctif que .section-actions ci-dessus, mais ici les icônes de la page (renommer,
     exporter, déplacer, supprimer) sont maintenant regroupées dans .page-actions (voir le JS) au
     lieu d'être des boutons "nus" — sans ce regroupement, chaque bouton caché aurait quand même
     réservé sa largeur individuellement (même défaut que .section-actions plus haut). */
  .page-actions{display:flex;gap:2px;opacity:0;pointer-events:none;max-width:0;overflow:hidden;transition:opacity .1s, max-width .1s;}
  @media (hover:hover){ .page-item:hover .page-actions{opacity:1;pointer-events:auto;max-width:140px;} }
  .page-item.show-actions .page-actions{opacity:1;pointer-events:auto;max-width:140px;}
  .move-menu{
    position:fixed;z-index:50;background:var(--bg-shop);border:1px solid var(--bg-shop-lighter);
    border-radius:8px;padding:6px;box-shadow:0 10px 24px rgba(0,0,0,.4);max-height:260px;overflow-y:auto;
    min-width:190px;max-width:280px;
  }
  .move-menu-title{
    font-family:var(--font-mono);font-size:10px;color:var(--text-muted);padding:4px 8px 6px 8px;
    text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--bg-shop-lighter);margin-bottom:4px;
  }
  .move-menu-item{
    display:block;width:100%;text-align:left;background:none;border:none;color:var(--text-light);
    font-family:var(--font-body);font-size:13px;padding:7px 8px;border-radius:5px;cursor:pointer;
  }
  .move-menu-item:hover{background:var(--bg-shop-lighter);color:var(--accent-soft);}
  .move-menu-empty{padding:8px;font-size:12px;color:var(--text-muted);font-family:var(--font-mono);}

  #storage-note{
    padding:10px 16px;font-size:11px;color:var(--text-muted);font-family:var(--font-mono);
    border-top:1px solid var(--bg-shop-lighter);line-height:1.5;
  }
  #storage-note button{
    background:none;border:none;color:var(--accent-soft);cursor:pointer;font:inherit;padding:0;
    text-decoration:underline;text-underline-offset:2px;
  }
  #storage-note .icon-btn{
    text-decoration:none;width:18px;height:18px;font-size:11px;vertical-align:-3px;color:var(--text-muted);
  }
  #storage-note .storage-row{margin-top:6px;display:flex;align-items:center;flex-wrap:wrap;gap:2px;}
  #storage-note .storage-row:first-child{margin-top:0;}
  /* Grand espace demandé entre "Exporter" et "Importer", pour bien les distinguer visuellement
     l'un de l'autre (au lieu du petit espacement serré partagé par les autres lignes). */
  #storage-note .export-import-row{gap:28px;}
  #storage-note .storage-path{
    flex:1;min-width:0;font-size:10px;color:var(--accent-soft);opacity:.85;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  #storage-note .last-time{font-size:9px;color:var(--text-muted);margin-left:2px;}
  #sync-mini-status{margin-left:6px;font-size:8px;color:var(--text-muted);white-space:nowrap;}
  #sync-mini-icon{font-size:11px;opacity:.4;cursor:pointer;flex-shrink:0;}
  #sync-row{flex-wrap:nowrap!important;}
  /* Grand espace demandé entre "Envoyer" et "Récupérer" (l'icône de synchro garde son petit
     espacement normal avec "Envoyer", juste avant) */
  #sync-pull-btn{margin-left:24px;}
  #sync-mini-icon:hover{opacity:.9;}
  #sync-mini-icon.connecting{opacity:.8;color:#f5a623;}
  #sync-mini-icon.synced{opacity:1;color:#3bb54a;}
  #sync-mini-icon.error{opacity:1;color:var(--danger);}

  /* ---------- MAIN ---------- */
  #main{flex:1;display:flex;flex-direction:column;min-width:0;}
  #toolbar{
    display:flex;align-items:center;gap:14px;padding:10px 18px;
    background:var(--bg-shop);border-bottom:1px solid var(--bg-shop-lighter);
    flex-wrap:wrap;
  }
  #toolbar-row2{
    display:flex;align-items:center;gap:14px;padding:8px 18px;
    background:var(--bg-shop);border-bottom:1px solid var(--bg-shop-lighter);
    flex-wrap:wrap;
  }
  .tool-group{display:flex;align-items:center;gap:4px;padding:3px;background:var(--bg-shop-light);border-radius:8px;}
  .tool-btn{
    width:32px;height:32px;border:none;background:none;border-radius:6px;cursor:pointer;
    color:var(--text-muted);display:flex;align-items:center;justify-content:center;font-size:15px;
  }
  .tool-btn:hover{color:var(--text-light);background:var(--bg-shop-lighter);}
  .tool-btn.active{background:var(--accent);color:#fff;}
  .tool-btn:disabled{opacity:.3;cursor:not-allowed;}
  #stroke-delete-toolbar-btn{color:var(--danger);font-weight:700;}
  #stroke-delete-toolbar-btn:hover{background:var(--danger);color:#fff;}
  .tool-btn:disabled:hover{background:none;color:var(--text-muted);}
  /* Bouton de mise à jour manuelle : tout à droite de la barre du haut, uniquement une icône.
     Une rotation pendant la vérification donne un retour visuel qu'il se passe quelque chose. */
  #update-app-btn.checking{ animation: update-btn-spin 0.9s linear infinite; }
  @keyframes update-btn-spin{ from{ transform:rotate(0deg); } to{ transform:rotate(360deg); } }
  #eraser-mode-select{
    background:var(--bg-shop-lighter);color:var(--text-light);border:1px solid transparent;
    border-radius:6px;padding:5px 8px;font-family:var(--font-mono);font-size:11px;
    outline:none;cursor:pointer;
  }
  #eraser-mode-select:hover{border-color:var(--accent);}
  #eraser-size-select{display:flex;gap:4px;align-items:center;}
  #highlight-colors{display:flex;gap:4px;align-items:center;}
  #highlight-colors .swatch{width:20px;height:20px;}
  #text-highlight-toolbar{display:flex;gap:4px;align-items:center;}
  #text-highlight-toolbar .swatch{width:18px;height:18px;}
  #text-size-select, #text-font-select, #shape-select{display:flex;gap:4px;align-items:center;}
  .eraser-size-btn{
    width:28px;height:28px;border:none;border-radius:6px;background:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .eraser-size-btn:hover{background:var(--bg-shop-lighter);}
  .eraser-size-btn.active{background:var(--accent);}
  .eraser-size-btn .sq{border:2px solid var(--text-muted);border-radius:2px;}
  .eraser-size-btn.active .sq{border-color:#fff;}
  #eraser-cursor{
    position:fixed;pointer-events:none;border:1.5px solid var(--accent);background:rgba(197,90,17,.12);
    border-radius:2px;display:none;z-index:9999;transform:translate(-50%,-50%);
  }
  .zone-rect{
    position:absolute;border:1.5px dashed var(--accent);background:rgba(197,90,17,.10);
    pointer-events:none;z-index:6;
  }
  .lasso-shape, .lasso-preview{
    fill:rgba(197,90,17,.12);stroke:var(--accent);stroke-width:1.5;stroke-dasharray:5,4;
    pointer-events:none;
  }
  .zone-actions{
    position:absolute;display:flex;flex-wrap:nowrap;align-items:center;gap:5px;background:var(--bg-shop);border:1px solid var(--bg-shop-lighter);
    border-radius:10px;padding:7px;box-shadow:0 6px 16px rgba(0,0,0,.35);z-index:7;
    /* Toujours sur une seule ligne, croix "Fermer" comprise (voir demande utilisateur) : la
       feuille masque ce qui dépasse ses bords (overflow:hidden), mais le repositionnement fait
       plus bas (voir finalizeZoneSelection) recale déjà la barre en la ramenant dans les limites
       de la feuille une fois sa largeur réelle connue — pas besoin de la laisser passer à la
       ligne pour ça.
    */
    max-width:none;
  }
  .zone-actions button{
    font-family:var(--font-mono);font-size:13px;border:none;border-radius:7px;padding:9px 12px;
    cursor:pointer;background:var(--accent);color:#fff;white-space:nowrap;
  }
  .zone-actions button.secondary{background:none;color:var(--text-muted);}
  .zone-actions button.secondary:hover{color:var(--text-light);}
  /* Croix "Fermer" : plus grosse et bien distincte des autres boutons d'action, mais toujours
     compacte (juste un caractère) pour rester sur la même ligne que le reste de la barre. */
  .zone-actions button[data-act="clear"]{font-size:19px;font-weight:700;padding:6px 12px;line-height:1;}
  /* Fenêtre de confirmation avant un collage déclenché par un appui long au doigt. */
  .paste-confirm-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;
    display:flex;align-items:center;justify-content:center;
  }
  .paste-confirm-box{
    background:var(--bg-shop);border:1px solid var(--bg-shop-lighter);border-radius:12px;
    padding:18px;box-shadow:0 12px 30px rgba(0,0,0,.5);max-width:280px;width:88%;text-align:center;
  }
  .paste-confirm-box p{
    color:var(--text-light);font-family:var(--font-body);font-size:14px;margin:0 0 14px 0;
  }
  .paste-confirm-actions{display:flex;flex-direction:column;gap:8px;}
  .paste-confirm-actions button{
    font-family:var(--font-mono);font-size:13px;border:none;border-radius:8px;padding:11px 14px;
    cursor:pointer;background:var(--accent);color:#fff;
  }
  .paste-confirm-actions button.secondary{background:var(--bg-shop-light);color:var(--text-light);}
  /* Aperçu miniature à côté du nom, dans le menu "📚 Bibliothèque" (voir libraryItemPreviewSVG) */
  .paste-confirm-actions button.has-preview{display:flex;align-items:center;gap:10px;text-align:left;}
  .paste-confirm-actions button.has-preview .lib-preview-svg{
    width:40px;height:40px;flex-shrink:0;background:var(--paper);border-radius:6px;
    border:1px solid rgba(0,0,0,.15);
  }
  .paste-confirm-actions button.has-preview .lib-preview-label{
    flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .native-paste-field{
    min-height:64px;border:2px dashed var(--accent);border-radius:8px;background:rgba(255,255,255,.06);
    color:var(--text-light);font-family:var(--font-body);font-size:14px;padding:10px;margin:2px 0 14px 0;
    outline:none;text-align:left;
    /* Essentiel : toute l'appli a user-select:none sur html/body (pour ne pas sélectionner du
       texte par erreur en dessinant) — sans cette ligne, cette case en hérite malgré
       contentEditable="true", et Windows n'affiche alors JAMAIS sa bulle native "Coller" au
       toucher, même en appui long (déjà vu et corrigé ailleurs pour .text-el.editing, voir plus
       haut dans ce fichier — oublié ici à la première version). */
    user-select:text;-webkit-user-select:text;
  }
  .native-paste-field:empty::before{content:attr(data-placeholder);color:var(--text-muted);}
  .zone-actions button.danger{background:var(--danger);}
  .stroke-options{
    position:absolute;display:flex;align-items:center;gap:6px;background:var(--bg-shop);
    border:1px solid var(--bg-shop-lighter);border-radius:8px;padding:5px 7px;
    box-shadow:0 6px 16px rgba(0,0,0,.35);z-index:9;
  }
  .stroke-options-row{display:flex;gap:4px;align-items:center;}
  .stroke-options .swatch{width:16px;height:16px;}
  .stroke-resize-handle{
    position:absolute;width:9px;height:9px;background:var(--accent);border-radius:50%;
    border:1.5px solid var(--paper);cursor:se-resize;z-index:9;
  }
  .stroke-delete-btn{
    border:none;border-radius:5px;background:var(--danger);color:#fff;cursor:pointer;
    width:17px;height:17px;font-size:9px;
  }
  .tool-btn.labeled{
    width:auto;height:32px;padding:0 12px;gap:7px;font-family:var(--font-mono);font-size:12px;
    white-space:nowrap;
  }
  .sep{width:1px;height:24px;background:var(--bg-shop-lighter);}
  .swatch{
    width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;
  }
  .swatch.active{border-color:var(--text-light);}
  #width-select{display:flex;gap:4px;align-items:center;}
  .w-btn{width:26px;height:26px;border-radius:6px;border:none;background:var(--bg-shop-light);cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .w-btn .dot{background:var(--text-light);border-radius:50%;}
  .w-btn.active{background:var(--accent);}
  .spacer{flex:1;}
  #orientation-toggle{
    font-family:var(--font-mono);font-size:11px;color:var(--text-muted);
    background:var(--bg-shop-light);border:none;border-radius:6px;padding:6px 10px;cursor:pointer;
  }
  #orientation-toggle:hover{color:var(--text-light);}
  #print-btn{
    font-family:var(--font-display);font-weight:600;font-size:13px;
    background:var(--accent);color:#fff;border:none;border-radius:6px;
    padding:8px 16px;cursor:pointer;display:flex;align-items:center;gap:6px;
  }
  #print-btn:hover{background:var(--accent-soft);}
  #zoom-group{font-family:var(--font-mono);}
  #zoom-group button{width:26px;height:26px;font-size:14px;}
  #zoom-level{
    min-width:44px;text-align:center;font-size:11px;color:var(--text-muted);cursor:pointer;
    background:none;border:none;font-family:var(--font-mono);
  }
  #zoom-level:hover{color:var(--text-light);}

  #canvas-wrap{
    flex:1;overflow:auto;display:flex;flex-direction:column;align-items:center;align-items:safe center;padding:30px 30px 90px 30px;
    touch-action:pan-x pan-y; /* laisse le déplacement au doigt dans toutes les directions, désactive juste le zoom natif du navigateur */
    background:
      radial-gradient(circle at 1px 1px, var(--bg-shop-lighter) 1px, transparent 0) 0 0/22px 22px,
      var(--bg-shop-light);
  }
  #canvas-stack{display:flex;flex-direction:column;align-items:center;align-items:safe center;}
  .page-block{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
  .page-canvas{
    position:relative;background:var(--paper);box-shadow:0 12px 34px rgba(0,0,0,.45), 0 2px 6px rgba(0,0,0,.3);
    flex-shrink:0;cursor:crosshair;overflow:hidden;
    background-image: linear-gradient(var(--paper-line) 1px, transparent 1px);
    background-size: 100% 28px;
    background-position: 0 64px;
  }
  /* Outil Sélection : un doigt sert à se déplacer dans la vue (utile en particulier une fois zoomé).
     touch-action:none partout (pas juste pour Stylo/Gomme) : avec "pan-x pan-y", le navigateur
     fait défiler nativement dès qu'un doigt OU un stylet bouge, et preventDefault() en JS ne peut
     pas annuler ce défilement natif autorisé par le CSS — c'est ce qui permettait encore au
     stylet de déplacer la feuille. En désactivant tout défilement natif ici et en le recréant
     nous-mêmes en JS uniquement pour le doigt (voir startTouchPan), le stylet ne peut plus jamais
     faire défiler la feuille, quel que soit l'outil actif. */
  .page-canvas.tool-select{cursor:default;touch-action:none;}
  .page-canvas.tool-text{cursor:text;touch-action:none;}
  /* Stylo / Gomme : le doigt sert à dessiner, donc on désactive le déplacement natif ici */
  .page-canvas.tool-pen, .page-canvas.tool-eraser{touch-action:none;}
  .page-canvas.tool-eraser{cursor:cell;}
  .page-gap.drop-target::before{border-top:2px solid var(--accent);}
  .page-gap{
    width:100%;height:52px;display:flex;align-items:center;justify-content:center;gap:10px;
    position:relative;
  }
  .page-gap::before{
    content:'';position:absolute;left:0;right:0;top:50%;border-top:1px dashed var(--bg-shop-lighter);
  }
  .insert-page-btn{
    position:relative;z-index:1;background:var(--bg-shop-light);border:1px solid var(--bg-shop-lighter);
    color:var(--text-muted);font-family:var(--font-mono);font-size:11px;border-radius:20px;
    padding:5px 14px;cursor:pointer;opacity:0;transition:opacity .12s ease;
  }
  .page-gap:hover .insert-page-btn{opacity:1;}
  .insert-page-btn:hover{color:var(--accent-soft);border-color:var(--accent);}
  .insert-page-btn.danger:hover{color:#fff;border-color:var(--danger);background:var(--danger);}
  .safe-margin{
    position:absolute;inset:38px;border:1px dashed #d8d0be;pointer-events:none;
  }
  .page-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
  path[data-el-id].selected{
    filter: drop-shadow(0 0 0 var(--accent)) drop-shadow(0 0 2.5px var(--accent));
  }
  .page-svg path{pointer-events:stroke;touch-action:none;}
  .page-canvas.tool-eraser .page-svg path{pointer-events:stroke;cursor:cell;}
  .text-el{
    position:absolute;font-family:var(--font-body);font-size:16px;line-height:1.4;color:var(--ink);
    padding:4px 6px;min-width:40px;min-height:22px;outline:none;white-space:pre-wrap;word-break:break-word;
    border:1px solid transparent;border-radius:3px;cursor:move;touch-action:none;z-index:2;
  }
  .text-el:hover{border-color:#d8d0be;}
  .text-el.editing{cursor:text;border-color:var(--accent-soft);background:rgba(255,255,255,.5);}
  .text-el.selected{border-color:var(--accent);}
  /* Texte "ancré" : ne réagit plus au clic/glisser (le doigt peut défiler par-dessus),
     seul le petit point reste cliquable pour le déverrouiller. */
  .text-el.locked{pointer-events:none;cursor:default;touch-action:pan-x pan-y;}
  .text-el.locked .el-lock{pointer-events:auto;}
  .text-el:hover .el-lock, .text-el.selected .el-lock, .text-el.locked .el-lock{opacity:1;}
  .text-options{
    position:absolute;top:calc(100% + 5px);left:0;display:none;gap:6px;align-items:center;background:var(--bg-shop);
    border:1px solid var(--bg-shop-lighter);border-radius:8px;padding:5px 6px;
    box-shadow:0 6px 16px rgba(0,0,0,.35);z-index:8;white-space:nowrap;
  }
  .text-el.selected .text-options{display:flex;}
  .text-options .sep{width:1px;height:18px;background:var(--bg-shop-lighter);margin:0 2px;}
  .text-size-btn{
    width:22px;height:22px;border:none;border-radius:5px;background:none;color:var(--text-muted);
    cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);
  }
  .text-size-btn:hover{background:var(--bg-shop-lighter);color:var(--text-light);}
  .text-size-btn.active{background:var(--accent);color:#fff;}
  .text-font-btn{
    border:none;border-radius:5px;background:none;color:var(--text-muted);cursor:pointer;
    padding:3px 7px;font-size:11px;
  }
  .text-font-btn:hover{background:var(--bg-shop-lighter);color:var(--text-light);}
  .text-style-toggles{display:flex;gap:2px;}
  .text-style-btn{
    width:22px;height:22px;border:none;border-radius:5px;background:none;color:var(--text-muted);
    cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;
  }
  .text-style-btn:hover{background:var(--bg-shop-lighter);color:var(--text-light);}
  .text-style-btn.active{background:var(--accent);color:#fff;}
  .text-font-btn.active{background:var(--accent);color:#fff;}
  .text-options .swatch{width:16px;height:16px;}
  .el-handle{
    position:absolute;width:12px;height:12px;background:var(--accent);border-radius:50%;
    border:2px solid var(--paper);display:none;
  }
  .text-el.selected .el-handle{display:block;}
  .el-resize{right:-6px;bottom:-6px;cursor:se-resize;}
  .el-delete{
    right:-11px;top:-11px;cursor:pointer;background:var(--danger);display:none;
    align-items:center;justify-content:center;color:#fff;font-size:14px;
    width:24px;height:24px;
  }
  .text-el.selected .el-delete{display:flex;}

  .image-el{
    position:absolute;cursor:move;border:1px solid transparent;border-radius:3px;touch-action:none;
    z-index:0;
  }
  /* Image collée "en premier plan" : passe au-dessus des traits de stylo (z-index:1) et des
     textes (z-index:2), au lieu de rester derrière comme une image normale. */
  .image-el.layer-front{ z-index:3; }
  .image-el:hover{border-color:#d8d0be;}
  .image-el.selected{border-color:var(--accent);}
  .image-el.selected .el-handle{display:block;}
  .image-el .el-delete{display:none;}
  .image-el.selected .el-delete{display:flex;}
  /* Conteneur interne qui gère la rotation/symétrie (voir rotateZoneSelection/flipZoneSelection) :
     dimensionné et centré par JS (updateElContentBox, dans imageElDom) AVANT la rotation CSS, pour
     qu'une fois tournée, son empreinte visuelle corresponde exactement au bloc (el.w × el.h). */
  .image-el .el-content{position:absolute;pointer-events:none;}
  .image-el .el-content img{width:100%;height:100%;display:block;border-radius:2px;pointer-events:none;}
  /* Bloc de bibliothèque (voir groupElDom) : mêmes règles que .image-el (sélection, verrou,
     poignées...), le contenu interne (SVG des traits/texte/images d'origine) s'étire exactement
     comme le ferait une image lors d'un redimensionnement largeur/hauteur indépendant. */
  .image-el.group-el .el-content svg{width:100%;height:100%;display:block;pointer-events:none;border-radius:2px;}
  .group-explode-btn{
    position:absolute;left:50%;top:calc(100% + 4px);transform:translateX(-50%);
    display:none;white-space:nowrap;z-index:8;
    font-family:var(--font-mono);font-size:11px;cursor:pointer;
    background:var(--bg-shop);color:var(--text-light);border:1px solid var(--bg-shop-lighter);
    border-radius:8px;padding:5px 10px;box-shadow:0 6px 16px rgba(0,0,0,.35);
  }
  .group-explode-btn:hover{color:var(--accent-soft);}
  .image-el.group-el.selected .group-explode-btn{display:block;}
  /* En dehors du mode Sélection, les images sont transparentes aux événements → on peut dessiner/écrire dessus */
  .page-canvas:not(.tool-select) .image-el{pointer-events:none;}
  /* Image "ancrée" : ne réagit plus au clic/glisser (le doigt peut défiler par-dessus),
     seul le petit point reste cliquable pour la déverrouiller. */
  .image-el.locked{pointer-events:none;cursor:default;touch-action:pan-x pan-y;}
  .image-el.locked .el-lock{pointer-events:auto;}
  .el-lock{
    position:absolute;top:-5px;left:-5px;width:14px;height:14px;border-radius:50%;
    background:#3bb54a;border:2px solid var(--paper);cursor:pointer;
    opacity:.7;z-index:5;
  }
  .el-lock.locked{background:#e2483d;}
  .image-el:hover .el-lock, .image-el.selected .el-lock, .image-el.locked .el-lock{opacity:1;}
  .el-resize-e{right:-6px;top:50%;margin-top:-6px;cursor:e-resize;}
  .el-resize-s{bottom:-6px;left:50%;margin-left:-6px;cursor:s-resize;}
  /* SVG des traits au-dessus des images */
  .page-svg{z-index:1;}
  /* Textes au-dessus du SVG */
  .text-el{z-index:2;}

  /* ---------- EN-TÊTE PREMIÈRE FEUILLE ---------- */
  .sheet-page-header{
    position:absolute;
    top:0; left:0; right:0;
    height:78px;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 44px;
    pointer-events:none;
    z-index:4;
    border-bottom:2px solid var(--paper-line);
    background:var(--paper);
  }
  .header-left{ display:flex; flex-direction:column; justify-content:center; }
  .header-section{
    font-family:'Times New Roman', Times, serif;font-size:28px;font-weight:700;color:#000;
    letter-spacing:.01em;text-transform:uppercase;line-height:1;
  }
  .header-page{
    font-family:'Times New Roman', Times, serif;font-size:22px;font-weight:700;
    color:#8a8a8a;line-height:1.2;margin-top:2px;
  }
  .header-date{
    font-family:var(--font-mono);font-size:13px;color:#a89e8c;
    letter-spacing:.04em;
  }

  #empty-state{margin:auto;text-align:center;color:var(--text-muted);font-family:var(--font-mono);font-size:13px;}

  /* ---------- PRINT ---------- */
  #print-area{display:none;}
  .print-page-number{
    display:none;position:absolute;right:24px;bottom:16px;
    font-family:var(--font-mono);font-size:11px;color:#888;
  }
  @media print{
    body *{visibility:hidden;}
    #print-area, #print-area *{visibility:visible;}
    #print-area{display:block;position:absolute;top:0;left:0;margin:0;padding:0;}
    .print-page{position:relative;background:#fff;overflow:hidden;page-break-after:always;}
    .print-page:last-child{page-break-after:auto;}
    .print-page .safe-margin{display:none;}
    .print-page-number{display:block;}
  }
  @page{margin:0;}

  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:var(--bg-shop-lighter);border-radius:6px;}
  ::-webkit-scrollbar-track{background:transparent;}

  /* Masque le curseur système pendant le survol du stylet (voir le JS qui bascule cette classe
     sur <body>) — comme OneNote, qui ne montre rien tant que la pointe ne touche pas vraiment
     l'écran. Uniquement pour le stylet : la souris garde son curseur normal (croix, texte...). */
  body.pen-hover .page-canvas, body.pen-hover .page-canvas *{cursor:none!important;}
</style>
</head>
<body>

<div id="app">
  <div id="sidebar">

    <div id="brand">

      <div class="storage-row export-import-row">
        <button onclick="exportData()">Exporter</button>
        <button onclick="triggerImport()">Importer</button>
      </div>
      <div class="storage-row">
        <button class="icon-btn" id="set-export-folder-btn" title="Choisir le dossier de sauvegarde (utilisé pour la sauvegarde automatique toutes les 10 min, et pour la copie de sécurité avant chaque « Récupérer »)">📁</button>
        <div class="storage-path" id="export-path"></div>

        <span id="sync-mini-icon" title="Synchro : non connectée (clique pour configurer un code carnet)">🔗</span>
        <button id="sync-push-btn" title="Envoyer ce carnet vers le cloud (remplace la version en ligne par celle-ci)">⬆ Envoyer</button>
        <button id="sync-pull-btn" title="Récupérer la version en ligne et l'ajouter ici (ne supprime rien en local)">⬇ Récupérer</button>
        <button id="compact-images-btn" title="Recompresser les photos déjà présentes dans ce carnet pour libérer de la place (utile si le stockage local est plein)">🗜 Compacter</button>
      </div>
      <input type="file" id="import-input" accept="application/json" style="display:none" onchange="importData(event)">
    </div>
  </div>

  <div id="main">
    <div id="toolbar">
      <div class="tool-group">
        <button class="tool-btn" id="fullscreen-btn" title="Plein écran (masque aussi la barre du navigateur et les pages)">⛶</button>
      </div>
      <div class="tool-group">
        <button class="tool-btn" id="undo-btn" title="Annuler (Ctrl+Z)" disabled>↺</button>
        <button class="tool-btn" id="redo-btn" title="Rétablir (Ctrl+Maj+Z)" disabled>↻</button>
      </div>
      <div class="sep"></div>
      <div class="tool-group">
        <button class="tool-btn labeled" data-tool="select" title="Sélection / déplacement — clic-glisser sur une zone vide pour sélectionner et copier">↖ Sélection</button>
        <button class="tool-btn labeled" data-tool="pen" title="Stylo">✎ Stylo</button>
        <button class="tool-btn labeled" data-tool="text" title="Zone de texte">T Texte</button>
        <button class="tool-btn labeled" data-tool="eraser" title="Gomme">⌫ Gomme</button>
      </div>
      <div class="sep"></div>
      <div class="tool-group">
        <button class="tool-btn labeled" id="orientation-toggle" title="Basculer entre portrait et paysage (pour cette page)" onclick="toggleOrientation()">📄 Portrait</button>
        <button class="tool-btn labeled" title="Ajouter une feuille A4 après celle-ci, dans la même page" onclick="addSheetAfterCurrent()">＋ Feuille</button>
        <button class="tool-btn labeled" title="Colle une image copiée dans le presse-papier" onclick="pasteClipboard()">📋 Coller</button>
        <button class="tool-btn labeled" title="Insérer une image depuis un fichier" onclick="insertImageFromPicker()">🖼 Image</button>
        <input type="file" id="image-input" accept="image/*" style="display:none" onchange="insertImageFromInput(event)">
        <button class="tool-btn labeled" id="print-icon-btn" title="Imprimer la page active (A4 portrait par défaut)" onclick="openPrintMenu()">⎙ Imprimer</button>
      </div>

    </div>
    <div id="toolbar-row2" style="display:none">
      <div class="tool-group" id="selection-mode-group" style="display:none">

        <button class="text-font-btn" id="selection-rotate-cw-btn" title="Pivoter la sélection de 90° dans le sens horaire" onclick="rotateZoneSelection(1)">⟳ 90°</button>
        <button class="text-font-btn" id="selection-rotate-ccw-btn" title="Pivoter la sélection de 90° dans le sens anti-horaire" onclick="rotateZoneSelection(-1)">⟲ 90°</button>
        <button class="text-font-btn" id="selection-flip-btn" title="Symétrie (miroir) de la sélection" onclick="openFlipMenu()"><svg width="12" height="20" viewBox="0 0 88 160" style="vertical-align:-5px;margin-right:4px" aria-hidden="true"><path d="M36 8 L4 152 L36 152 Z" fill="none" stroke="currentColor" stroke-width="8" stroke-linejoin="round"/><path d="M52 8 L52 152 L84 152 Z" fill="currentColor" stroke="currentColor" stroke-width="8" stroke-linejoin="round"/></svg>Symétrie</button>
      </div>

      </div>

        <button class="tool-btn labeled" id="highlight-toggle-btn" title="Fluo — trace translucide et épais, comme un surligneur">🖊 Fluo</button>
        <div id="highlight-colors" style="display:none"></div>

<div id="print-area"></div>

<script>
/* ============ CONSTANTS ============ */
const PAGE_W = 794, PAGE_H = 1123; // A4 @ 96dpi, portrait
const COLORS = ['#000000','#e8491d','#16a34a','#2563eb','#dc2626','#9333ea','#f5a623','#0891b2'];
const HIGHLIGHT_COLORS = ['#fff176','#a5d6a7','#f48fb1','#90caf9','#ffb74d'];
const WIDTHS = [2,4,7];
const FONT_SIZES = [13,16,20,26,34];
const FONTS = [
  { key:'sans',  css:"'Inter', system-ui, sans-serif",        label:'Sans' },
  { key:'serif', css:"Georgia, 'Times New Roman', serif",     label:'Serif' },
  { key:'mono',  css:"'IBM Plex Mono', Consolas, monospace",  label:'Mono' },
  { key:'hand',  css:"'Segoe Print', 'Comic Sans MS', cursive", label:'Manuscrite' }
];
function fontCss(key){ return (FONTS.find(f=>f.key===key) || FONTS[0]).css; }
const STORAGE_KEY = 'carnet_atelier_data_v1';

/* ============ STATE ============ */
let data = migrate(load() || seedData());
let activeClasseurId = data.classeurs[0]?.id || null;
let activeSectionId = data.classeurs[0]?.sections[0]?.id || null;
let activePageId = data.classeurs[0]?.sections[0]?.pages[0]?.id || null;
let activeSheetId = data.classeurs[0]?.sections[0]?.pages[0]?.sheets[0]?.id || null;

// Rouvre le carnet exactement là où il a été fermé (dernier classeur/section/page/feuille
// consultés), plutôt que de toujours repartir du tout premier. saveLastPosition() est appelée à
// chaque changement de vue (voir renderCanvasStack) ; restoreLastPosition() ci-dessous ne
// s'exécute qu'une seule fois ici, au tout début, avant le premier rendu — elle vérifie que
// chaque id existe toujours (au cas où ce contenu aurait été supprimé entre-temps) avant de s'en
// servir, sinon elle retombe sur le niveau encore valide le plus proche.
const LAST_POSITION_KEY = 'carnet_last_position_v1';
function restoreLastPosition(){
  try{
    const raw = localStorage.getItem(LAST_POSITION_KEY);
    if(!raw) return;
    const pos = JSON.parse(raw);
    const c = data.classeurs.find(cl=>cl.id===pos.classeurId);
    if(!c) return;
    activeClasseurId = c.id;
    const s = c.sections.find(se=>se.id===pos.sectionId);
    if(!s) return;
    activeSectionId = s.id;
    const p = s.pages.find(pg=>pg.id===pos.pageId);
    if(!p) return;
    activePageId = p.id;
    const sh = p.sheets.find(sheet=>sheet.id===pos.sheetId);
    activeSheetId = sh ? sh.id : (p.sheets[0]?.id || null);
  }catch(e){}
}
restoreLastPosition();
function saveLastPosition(){
  try{
    localStorage.setItem(LAST_POSITION_KEY, JSON.stringify({
      classeurId: activeClasseurId, sectionId: activeSectionId, pageId: activePageId, sheetId: activeSheetId
    }));
  }catch(e){}
}

let tool = 'select';
let penColor = COLORS[0];
let penWidth = WIDTHS[0];
let eraserMode = 'area'; // 'area' (défaut) = gomme carrée qui découpe les traits, ne supprime que ce qu'elle touche · 'stroke' = supprime le trait entier touché
let shapeMode = 'free'; // 'free' = dessin libre · 'line'/'arrow'/'rect'/'circle'/'ellipse'/'cloud' = forme tracée par glisser
let selectionShapeMode = 'rect'; // 'rect' = zone rectangulaire (défaut) · 'lasso' = contour libre à main levée
let highlightMode = false; // true = trace au fluo (translucide, plus épais) au lieu de l'encre normale
let highlightColor = HIGHLIGHT_COLORS[0];
const ERASER_SIZES = [16,30,50];
let eraserSize = ERASER_SIZES[1]; // le carré du milieu, par défaut
let textFontSize = 16;       // taille utilisée pour les PROCHAINES zones de texte créées
let textFontFamily = 'hand'; // police utilisée pour les PROCHAINES zones de texte créées
let textBold = false, textItalic = false, textUnderline = false; // style utilisé pour les PROCHAINES zones de texte
let activeTextEdit = null;   // { el, div } — le texte en cours d'édition, pour appliquer les changements en direct
let activeStrokeEdit = null; // { el, pathEl } — le trait actuellement sélectionné, pour changer sa couleur/épaisseur depuis la barre d'outils
let selectedElId = null;

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

// Garde une trace d'une suppression (classeur/section/page/feuille) pour qu'elle se propage aux
// autres appareils lors de la prochaine synchro — sans ça, "Récupérer" ne fait jamais disparaître
// quoi que ce soit ailleurs (choix volontaire fait plus tôt pour ne jamais perdre de contenu par
// erreur), donc une suppression restait "coincée" sur l'appareil où elle avait été faite. Voir
// mergeIncoming, qui fusionne ces tombstones puis retire tout ce qui y correspond.
function recordTombstone(kind, id){
  data.tombstones.push({ id, kind, deletedAt: Date.now() });
}

function dateJour(){ return new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'}); }

function seedData(){
  return {
    classeurs: [{
      id: uid(), name: 'Mon carnet',
      sections: [{
        id: uid(), name: 'Section 1', orientation: 'portrait',
        pages: [{ id: uid(), name: 'Page 1', orientation: 'portrait', createdAt: dateJour(), sheets: [{ id: uid(), elements: [] }] }]
      }]
    }],
    library: [], // sélections enregistrées (voir saveZoneToLibrary / pasteWithConfirm)
    tombstones: [] // suppressions à propager via la synchro (voir recordTombstone / mergeIncoming)
  };
}
// Convertit les anciennes sauvegardes vers le modèle actuel :
// - une feuille = une page  ->  une page peut contenir plusieurs feuilles A4
// - sections à plat  ->  sections regroupées dans un ou plusieurs classeurs
function migrate(d){
  if(!d.classeurs){
    d = { classeurs: [{ id: uid(), name: 'Mon carnet', sections: d.sections || [] }] };
  }
  if(!Array.isArray(d.library)) d.library = []; // anciennes sauvegardes : pas encore de bibliothèque
  if(!Array.isArray(d.tombstones)) d.tombstones = []; // anciennes sauvegardes : pas encore de suivi des suppressions
  d.classeurs.forEach(c=>{
    c.sections.forEach(s=>{
      s.pages.forEach(p=>{
        if(!p.sheets){
          p.sheets = [{ id: uid(), elements: p.elements || [] }];
          delete p.elements;
        }
        // Sécurité : une page ne devrait jamais se retrouver sans aucune feuille (ça affichait
        // un écran vide auparavant) — si ça arrive malgré tout, on lui en recrée une vierge.
        if(p.sheets.length===0){
          p.sheets.push({ id: uid(), elements: [] });
        }
        // Firebase Realtime Database ne conserve pas les tableaux VIDES : une feuille blanche
        // (elements: []) envoyée au cloud revient de "Récupérer" avec elements carrément absent
        // (undefined) au lieu de []. Sans ce filet, le premier sheet.elements.filter(...) plantait
        // partout (rendu du canvas, gomme, zone...) avec "Cannot read properties of undefined
        // (reading 'filter')" — exactement l'erreur remontée après une synchro.
        p.sheets.forEach(sh=>{ if(!Array.isArray(sh.elements)) sh.elements = []; });
        // Répare les images/blocs déjà cassés par un ancien bug de collage (échelle négative ou
        // nulle calculée lors d'un collage bas sur une grande feuille, voir insertImageBlob) : ils
        // restaient invisibles sur la feuille, seul leur point de verrouillage se voyait encore.
        // On leur redonne une taille correcte pour qu'ils redeviennent visibles et manipulables.
        p.sheets.forEach(sh=>{
          sh.elements.forEach(el=>{
            if((el.type==='image' || el.type==='group') && (!(el.w>0) || !(el.h>0))){
              el.w = 160; el.h = 120;
            }
          });
        });
        // L'orientation était autrefois réglée par section (donc partagée par toutes ses pages) ;
        // elle est maintenant réglable page par page. On reprend l'ancienne valeur comme point de départ.
        if(!p.orientation) p.orientation = s.orientation || 'portrait';
      });
    });
  });
  return d;
}
function load(){
  try{ const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : null; }
  catch(e){ return null; }
}
/* ============ HISTORIQUE (Annuler / Rétablir) ============ */
// save() est déjà appelé après chaque action utilisateur significative (un trait, un texte,
// un déplacement, une suppression...). On s'en sert comme point d'ancrage : juste avant
// d'écraser la sauvegarde, on met de côté l'état précédent pour pouvoir y revenir.
const UNDO_LIMIT = 50;
let undoStack = [];
let redoStack = [];
let suspendHistory = false;

// Dernier contenu écrit dans localStorage par CET onglet — sert de repère dans
// syncFromLocalStorage() pour ne rien refaire quand rien n'a réellement changé (voir plus bas).
let lastSavedRaw = null;

// Le stockage local du navigateur (localStorage) a une capacite limitee par origine (souvent
// seulement 5 a 10 Mo au total, TOUTES les donnees du carnet confondues) -- et comme les photos y
// sont stockees encodees en base64 (environ +33% de poids par rapport au fichier d'origine), un
// carnet avec plusieurs photos peut finir par depasser ce plafond. Le navigateur refuse alors
// TOUTE nouvelle ecriture avec une erreur "QuotaExceededError", y compris pour un simple trait ou
// mot ajoute -- sans ce filet, cette erreur remontait telle quelle (et de facon peu claire, ex.
// "Verifie ta connexion" alors que ca n'a rien a voir) ou pouvait meme interrompre en plein milieu
// une action utilisateur (dessiner, ecrire, deplacer...). On centralise donc ici l'ecriture dans
// localStorage, avec un message clair (une seule fois par session, pour ne pas harceler) plutot
// que de laisser planter silencieusement ou avec un message trompeur.
let quotaWarningShown = false;
function trySetStorage(raw, opts){
  try{
    localStorage.setItem(STORAGE_KEY, raw);
    return true;
  }catch(err){
    console.error('Erreur de stockage local (quota depasse ?) :', err);
    const isQuota = err && (err.name==='QuotaExceededError' || err.code===22 || /quota/i.test(err.message||''));
    if(isQuota && !quotaWarningShown && !(opts && opts.silent)){
      quotaWarningShown = true;
      showInfoMessage("\u26a0\ufe0f Stockage plein : ce carnet (avec ses photos) est trop volumineux pour etre sauvegarde sur cet appareil. Les toutes dernieres modifications risquent de ne pas etre conservees si tu fermes l'appli maintenant. Utilise le bouton \"🗜 Compacter\" (barre laterale) pour reduire la taille des photos deja presentes, puis reessaie. (Les nouvelles photos inserees sont desormais compressees automatiquement pour limiter ce risque a l'avenir.)");
    }
    return false;
  }
}

function save(){
  if(!suspendHistory){
    const prev = localStorage.getItem(STORAGE_KEY);
    if(prev !== null){
      undoStack.push(prev);
      if(undoStack.length > UNDO_LIMIT) undoStack.shift();
      redoStack = [];
    }
  }
  lastSavedRaw = JSON.stringify(data);
  trySetStorage(lastSavedRaw);
  updateUndoRedoButtons();
  // Note : plus d'envoi automatique vers le cloud ici — voir "Envoyer" / "Récupérer"
  // dans la barre latérale (synchro manuelle, à la demande).
}

// Après un annuler/rétablir, les ids actifs (classeur/section/page/feuille) peuvent
// pointer vers quelque chose qui n'existe plus dans l'état restauré : on les recale.
function clampActiveRefs(){
  if(!getClasseur(activeClasseurId)) activeClasseurId = data.classeurs[0]?.id || null;
  const c = activeClasseur();
  if(!c){ activeSectionId=null; activePageId=null; activeSheetId=null; return; }
  if(!getSection(activeSectionId)) activeSectionId = c.sections[0]?.id || null;
  const s = activeSection();
  if(!s){ activePageId=null; activeSheetId=null; return; }
  if(!getPage(activeSectionId, activePageId)) activePageId = s.pages[0]?.id || null;
  const p = activePage();
  if(!p){ activeSheetId=null; return; }
  if(!p.sheets.find(sh=>sh.id===activeSheetId)) activeSheetId = p.sheets[0]?.id || null;
}

function undo(){
  if(undoStack.length===0) return;
  const current = localStorage.getItem(STORAGE_KEY);
  const prevState = undoStack.pop();
  redoStack.push(current);
  suspendHistory = true;
  data = migrate(JSON.parse(prevState));
  suspendHistory = false;
  lastSavedRaw = prevState;
  trySetStorage(prevState);
  selectedElId = null;
  clampActiveRefs();
  renderSidebar(); renderCanvasStack();
  updateUndoRedoButtons();
}

function redo(){
  if(redoStack.length===0) return;
  const current = localStorage.getItem(STORAGE_KEY);
  const nextState = redoStack.pop();
  undoStack.push(current);
  suspendHistory = true;
  data = migrate(JSON.parse(nextState));
  suspendHistory = false;
  lastSavedRaw = nextState;
  trySetStorage(nextState);
  selectedElId = null;
  clampActiveRefs();
  renderSidebar(); renderCanvasStack();
  updateUndoRedoButtons();
}

function updateUndoRedoButtons(){
  const u = document.getElementById('undo-btn');
  const r = document.getElementById('redo-btn');
  if(u) u.disabled = undoStack.length===0;
  if(r) r.disabled = redoStack.length===0;
}
document.getElementById('undo-btn').onclick = undo;
document.getElementById('redo-btn').onclick = redo;
document.addEventListener('keydown', (e)=>{
  if(!(e.ctrlKey || e.metaKey)) return;
  const active = document.activeElement;
  if(active && active.contentEditable==='true') return; // ne pas gêner l'édition de texte
  if(e.key.toLowerCase()==='z' && !e.shiftKey){ e.preventDefault(); undo(); }
  else if((e.key.toLowerCase()==='z' && e.shiftKey) || e.key.toLowerCase()==='y'){ e.preventDefault(); redo(); }
});
function getClasseur(id){ return data.classeurs.find(c=>c.id===id); }
function activeClasseur(){ return getClasseur(activeClasseurId); }
function getSection(id){ return activeClasseur()?.sections.find(s=>s.id===id); }
function getPage(sectionId, pageId){ return getSection(sectionId)?.pages.find(p=>p.id===pageId); }
function activeSection(){ return getSection(activeSectionId); }
function activePage(){ return activeSection() ? getPage(activeSectionId, activePageId) : null; }
function activeSheet(){
  const p = activePage();
  if(!p) return null;
  return p.sheets.find(sh=>sh.id===activeSheetId) || p.sheets[0] || null;
}

/* ============ SIDEBAR ============ */
const sectionsEl = document.getElementById('sections');
let collapsed = {};

function renderClasseurBar(){
  const select = document.getElementById('classeur-select');
  select.innerHTML = '';
  data.classeurs.forEach(c=>{
    const opt = document.createElement('option');
    opt.value = c.id; opt.textContent = c.name;
    if(c.id===activeClasseurId) opt.selected = true;
    select.appendChild(opt);
  });
  document.getElementById('delete-classeur-btn').disabled = data.classeurs.length<=1;
}

function renderSidebar(){
  renderClasseurBar();
  sectionsEl.innerHTML = '';
  const classeur = activeClasseur();
  if(!classeur) return;
  classeur.sections.forEach(section=>{
    const block = document.createElement('div');
    block.className = 'section-block';

    const head = document.createElement('div');
    head.className = 'section-head' + (collapsed[section.id] ? ' collapsed' : '');
    head.innerHTML = `
      <button class="icon-btn chev" data-action="toggle-collapse" title="Masquer / afficher les pages de cette section">▾</button>
      <span class="name">${escapeHtml(section.name)}</span>
      <div class="section-actions">
        <button class="icon-btn" data-action="rename-section" title="Renommer la section">✎</button>
        <button class="icon-btn" data-action="add-page" title="Ajouter une page">＋</button>
        <button class="icon-btn" data-action="move-section" title="Déplacer cette section vers un autre classeur">⇄</button>
        <button class="icon-btn danger" data-action="delete-section" title="Supprimer la section">✕</button>
      </div>`;
    head.querySelector('[data-action="toggle-collapse"]').onclick = (e)=>{ e.stopPropagation(); collapsed[section.id]=!collapsed[section.id]; renderSidebar(); };
    head.querySelector('[data-action="rename-section"]').onclick = (e)=>{
      e.stopPropagation();
      const name = prompt('Renommer la section :', section.name);
      if(name===null || !name.trim()) return;
      section.name = name.trim();
      // Range automatiquement par ordre alphabétique après un renommage (ex. "2025", "2026"...).
      activeClasseur().sections.sort((a,b)=> a.name.localeCompare(b.name, 'fr', {sensitivity:'base'}));
      save();
      document.querySelectorAll(`.sheet-page-header[data-section-id="${section.id}"] .header-section`)
        .forEach(el=>{ el.textContent = section.name; });
      renderSidebar();
    };
    head.querySelector('[data-action="add-page"]').onclick = (e)=>{ e.stopPropagation(); addPage(section.id); };
    head.querySelector('[data-action="move-section"]').onclick = (e)=>{
      e.stopPropagation();
      const others = data.classeurs.filter(c=>c.id!==activeClasseurId);
      openMoveMenu(e.currentTarget, 'Déplacer "' + section.name + '" vers…',
        others.map(c=>({ label: c.name, onPick: ()=> moveSectionToClasseur(section.id, c.id) })));
    };
    head.querySelector('[data-action="delete-section"]').onclick = (e)=>{ e.stopPropagation(); deleteSection(section.id); };
    head.onclick = ()=>{
      if(head._suppressNextClick){ head._suppressNextClick = false; return; }
      if(section.id===activeSectionId) return;
      activeSectionId = section.id; activePageId = section.pages[0]?.id || null;
      activeSheetId = section.pages[0]?.sheets[0]?.id || null;
      renderSidebar(); renderCanvasStack();
    };
    setupLongPressReveal(head);
    block.appendChild(head);

    if(!collapsed[section.id]){
      const list = document.createElement('div');
      list.className = 'pages-list';
      section.pages.forEach(page=>{
        const item = document.createElement('div');
        item.className = 'page-item' + (page.id===activePageId && section.id===activeSectionId ? ' active' : '');
        item.dataset.pageId = page.id;
        item.dataset.sectionId = section.id;
        item.innerHTML = `
          <span style="opacity:.6">▤</span>
          <span class="name">${escapeHtml(page.name)}</span>
          <div class="page-actions">
            <button class="icon-btn" data-action="rename-page" title="Renommer la page">✎</button>
            <button class="icon-btn" data-action="export-page" title="Exporter cette page en PDF">⭳</button>
            <button class="icon-btn" data-action="move-page" title="Déplacer cette page vers une autre section">⇄</button>
            <button class="icon-btn danger" data-action="delete-page" title="Supprimer la page">✕</button>
          </div>`;
        item.onclick = ()=>{
          if(item._suppressNextClick){ item._suppressNextClick = false; return; }
          if(page.id===activePageId && section.id===activeSectionId) return;
          activeSectionId = section.id; activePageId = page.id; activeSheetId = page.sheets[0]?.id; selectedElId = null;
          renderSidebar();
          renderCanvasStack();
        };
        item.querySelector('[data-action="rename-page"]').onclick = (e)=>{
          e.stopPropagation();
          const name = prompt('Renommer la page :', page.name);
          if(name===null || !name.trim()) return;
          page.name = name.trim();
          save();
          const label = document.querySelector(`.page-block[data-page-id="${page.id}"] .page-strip .name`);
          if(label) label.textContent = page.name;
          const hdrPage = document.querySelector(`.sheet-page-header[data-page-id="${page.id}"] .header-page`);
          if(hdrPage) hdrPage.textContent = page.name;
          renderSidebar();
        };
        item.querySelector('[data-action="export-page"]').onclick = (e)=>{ e.stopPropagation(); printSheets(page.sheets, page.orientation, `${section.name} - ${page.name}`, section.name, page.name); };
        item.querySelector('[data-action="move-page"]').onclick = (e)=>{
          e.stopPropagation();
          // Uniquement les autres sections DU MÊME CLASSEUR — une page ne peut plus être
          // déplacée vers un autre classeur (seule une section entière le peut, via ⇄ sur la
          // section elle-même).
          const items = classeur.sections
            .filter(s=>s.id!==section.id)
            .map(s=>({ label: s.name, onPick: ()=> movePageToSection(section.id, page.id, s.id) }));
          openMoveMenu(e.currentTarget, 'Déplacer "' + page.name + '" vers…', items);
        };
        item.querySelector('[data-action="delete-page"]').onclick = (e)=>{ e.stopPropagation(); deletePage(section.id, page.id); };
        setupLongPressReveal(item);
        list.appendChild(item);
      });
      block.appendChild(list);
    }
    sectionsEl.appendChild(block);
  });
}

function scrollToSheet(sheetId){
  const el = document.querySelector(`.page-canvas[data-sheet-id="${sheetId}"]`);
  if(el) el.scrollIntoView({ behavior:'smooth', block:'start' });
}
function scrollToPage(pageId){
  const p = getPage(activeSectionId, pageId);
  if(p && p.sheets[0]) scrollToSheet(p.sheets[0].id);
}

function escapeAttr(s){ return (s||'').replace(/"/g,'&quot;'); }
function escapeHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Sur souris, les icônes d'action d'une section/page apparaissent au survol (CSS). Sur tactile,
// il n'y a pas de vrai survol : un simple appui déclenche quand même ":hover" dans la plupart des
// navigateurs, ce qui ferait apparaître ces icônes dès qu'on touche l'élément — trop facile de
// supprimer/déplacer par erreur. On les révèle donc plutôt via un appui long (500ms sans bouger),
// en ajoutant la classe .show-actions (voir CSS), et on empêche le clic qui suit cet appui long de
// déclencher la navigation normale (ouvrir la section/page).
function setupLongPressReveal(el){
  el.addEventListener('pointerdown', (e)=>{
    if(e.pointerType !== 'touch') return; // la souris a déjà le survol
    const startX = e.clientX, startY = e.clientY;
    let moved = false, fired = false;
    const timer = setTimeout(()=>{
      if(moved) return;
      document.querySelectorAll('.show-actions').forEach(x=>{ if(x!==el) x.classList.remove('show-actions'); });
      el.classList.add('show-actions');
      el._suppressNextClick = true;
      fired = true;
    }, 500);
    function move(ev){ if(Math.hypot(ev.clientX-startX, ev.clientY-startY) > 12){ moved = true; clearTimeout(timer); } }
    function up(){ clearTimeout(timer); el.removeEventListener('pointermove', move); el.removeEventListener('pointerup', up); el.removeEventListener('pointercancel', up); }
    el.addEventListener('pointermove', move);
    el.addEventListener('pointerup', up);
    el.addEventListener('pointercancel', up);
  });
}
// Un appui ailleurs (sur une autre section/page, ou n'importe où hors du menu d'actions révélé)
// referme les icônes actuellement visibles.
document.addEventListener('pointerdown', (e)=>{
  if(e.target.closest('.section-head, .page-item')) return;
  document.querySelectorAll('.show-actions').forEach(x=> x.classList.remove('show-actions'));
}, true);

function addSection(){
  const classeur = activeClasseur();
  if(!classeur) return;
  const s = { id: uid(), name: 'Nouvelle section', orientation: 'portrait', pages: [{ id: uid(), name: 'Page 1', orientation: 'portrait', createdAt: dateJour(), sheets: [{ id: uid(), elements: [] }] }] };
  classeur.sections.push(s);
  activeSectionId = s.id; activePageId = s.pages[0].id; activeSheetId = s.pages[0].sheets[0].id;
  save(); renderSidebar(); renderCanvasStack();
}

/* ============ CLASSEURS ============ */
// Un classeur regroupe plusieurs sections — c'est le niveau au-dessus, pour séparer
// des carnets totalement indépendants (ex: chantiers différents) sans les mélanger.
function switchClasseur(id){
  if(id===activeClasseurId) return;
  const c = getClasseur(id);
  if(!c) return;
  activeClasseurId = id;
  activeSectionId = c.sections[0]?.id || null;
  activePageId = c.sections[0]?.pages[0]?.id || null;
  activeSheetId = c.sections[0]?.pages[0]?.sheets[0]?.id || null;
  renderSidebar(); renderCanvasStack();
}
document.getElementById('classeur-select').onchange = (e)=> switchClasseur(e.target.value);

function addClasseur(){
  const name = prompt('Nom du nouveau classeur :', 'Nouveau classeur');
  if(name===null) return;
  const s = { id: uid(), name: 'Section 1', orientation: 'portrait', pages: [{ id: uid(), name: 'Page 1', orientation: 'portrait', createdAt: dateJour(), sheets: [{ id: uid(), elements: [] }] }] };
  const c = { id: uid(), name: name.trim() || 'Nouveau classeur', sections: [s] };
  data.classeurs.push(c);
  // Range automatiquement par ordre alphabétique.
  data.classeurs.sort((a,b)=> a.name.localeCompare(b.name, 'fr', {sensitivity:'base'}));
  activeClasseurId = c.id; activeSectionId = s.id; activePageId = s.pages[0].id; activeSheetId = s.pages[0].sheets[0].id;
  save(); renderSidebar(); renderCanvasStack();
}
document.getElementById('add-classeur-btn').onclick = addClasseur;

function renameClasseur(){
  const c = activeClasseur();
  if(!c) return;
  const name = prompt('Renommer le classeur :', c.name);
  if(name===null || !name.trim()) return;
  c.name = name.trim();
  data.classeurs.sort((a,b)=> a.name.localeCompare(b.name, 'fr', {sensitivity:'base'}));
  save(); renderSidebar();
}
document.getElementById('rename-classeur-btn').onclick = renameClasseur;

function deleteClasseur(){
  if(data.classeurs.length<=1){ alert('Il faut garder au moins un classeur.'); return; }
  const c = activeClasseur();
  if(!c) return;
  if(!confirm(`Supprimer le classeur "${c.name}" et tout son contenu ?`)) return;
  recordTombstone('classeur', c.id);
  data.classeurs = data.classeurs.filter(x=>x.id!==c.id);
  activeClasseurId = data.classeurs[0].id;
  activeSectionId = data.classeurs[0].sections[0]?.id || null;
  activePageId = data.classeurs[0].sections[0]?.pages[0]?.id || null;
  activeSheetId = data.classeurs[0].sections[0]?.pages[0]?.sheets[0]?.id || null;
  save(); renderSidebar(); renderCanvasStack();
}
document.getElementById('delete-classeur-btn').onclick = deleteClasseur;

// Crée une NOUVELLE PAGE — un nouvel item dans la barre latérale — à l'index donné.
// Utilisé uniquement par les actions explicites de la barre latérale.
function insertPageAt(sectionId, index){
  const s = getSection(sectionId);
  if(!s) return;
  const inheritedOrientation = s.pages[s.pages.length-1]?.orientation || 'portrait';
  const p = { id: uid(), name: 'Page ' + (s.pages.length+1), orientation: inheritedOrientation, createdAt: dateJour(), sheets: [{ id: uid(), elements: [] }] };
  s.pages.splice(index, 0, p);
  activeSectionId = sectionId; activePageId = p.id; activeSheetId = p.sheets[0].id;
  save(); renderSidebar(); renderCanvasStack();
  requestAnimationFrame(()=> scrollToSheet(p.sheets[0].id) );
}

function addPage(sectionId){
  const s = getSection(sectionId);
  insertPageAt(sectionId, s.pages.length);
}

// Ajoute une feuille A4 à l'index donné, À L'INTÉRIEUR d'une page existante :
// aucun nouvel item n'apparaît dans la barre latérale, juste une feuille de plus sous la même page.
function addSheetAt(sectionId, pageId, index){
  const p = getPage(sectionId, pageId);
  if(!p) return;
  const sh = { id: uid(), elements: [] };
  p.sheets.splice(index, 0, sh);
  activeSectionId = sectionId; activePageId = pageId; activeSheetId = sh.id;
  save(); renderCanvasStack();
  requestAnimationFrame(()=> scrollToSheet(sh.id) );
}

// Utilisée par le bouton "+ Feuille" de la barre d'outils : ajoute une feuille A4
// juste après la feuille affichée, dans la même page — sans créer de nouvel item à gauche.
function addSheetAfterCurrent(){
  const p = activePage();
  if(!p) return;
  const idx = p.sheets.findIndex(sh=>sh.id===activeSheetId);
  addSheetAt(activeSectionId, p.id, idx===-1 ? p.sheets.length : idx+1);
}

// Supprime la dernière feuille insérée (ou une feuille donnée) sans toucher à la page elle-même.
function deleteSheet(sectionId, pageId, sheetId){
  const p = getPage(sectionId, pageId);
  if(!p) return;
  if(p.sheets.length<=1){
    alert("C'est la seule feuille de cette page. Pour la retirer, supprime plutôt la page depuis la barre latérale.");
    return;
  }
  if(!confirm('Supprimer cette feuille A4 ?')) return;
  recordTombstone('sheet', sheetId);
  p.sheets = p.sheets.filter(sh=>sh.id!==sheetId);
  if(activeSheetId===sheetId) activeSheetId = p.sheets[p.sheets.length-1].id;
  save(); renderCanvasStack();
}

function deleteSection(id){
  const classeur = activeClasseur();
  if(!classeur) return;
  if(classeur.sections.length <= 1){ alert("Il faut garder au moins une section par classeur."); return; }
  if(!confirm('Supprimer cette section et toutes ses pages ?')) return;
  recordTombstone('section', id);
  classeur.sections = classeur.sections.filter(s=>s.id!==id);
  if(activeSectionId===id){
    activeSectionId = classeur.sections[0].id;
    activePageId = classeur.sections[0].pages[0].id;
    activeSheetId = classeur.sections[0].pages[0].sheets[0].id;
  }
  save(); renderSidebar(); renderCanvasStack();
}

function deletePage(sectionId, pageId){
  const s = getSection(sectionId);
  if(s.pages.length<=1){ alert("Il faut garder au moins une page par section."); return; }
  if(!confirm('Supprimer cette page (et toutes ses feuilles) ?')) return;
  recordTombstone('page', pageId);
  s.pages = s.pages.filter(p=>p.id!==pageId);
  if(activePageId===pageId){
    activePageId = s.pages[0].id;
    activeSheetId = s.pages[0].sheets[0].id;
  }
  save(); renderSidebar(); renderCanvasStack();
}

/* ============ DÉPLACER SECTION / PAGE ============ */
// Petit menu flottant générique (liste de choix cliquables), utilisé pour choisir la
// destination d'un déplacement. Se ferme au choix ou au clic ailleurs.
let activeMoveMenu = null;
function closeMoveMenu(){
  if(activeMoveMenu){ activeMoveMenu.remove(); activeMoveMenu = null; }
  document.removeEventListener('pointerdown', onMoveMenuOutsideClick, true);
}
function onMoveMenuOutsideClick(e){
  if(activeMoveMenu && !activeMoveMenu.contains(e.target)) closeMoveMenu();
}
function openMoveMenu(anchorEl, title, items){
  closeMoveMenu();
  const menu = document.createElement('div');
  menu.className = 'move-menu';
  const head = document.createElement('div');
  head.className = 'move-menu-title';
  head.textContent = title;
  menu.appendChild(head);
  if(items.length===0){
    const empty = document.createElement('div');
    empty.className = 'move-menu-empty';
    empty.textContent = 'Aucune autre destination disponible.';
    menu.appendChild(empty);
  } else {
    items.forEach(it=>{
      const b = document.createElement('button');
      b.className = 'move-menu-item';
      b.textContent = it.label;
      b.onclick = ()=>{ closeMoveMenu(); it.onPick(); };
      menu.appendChild(b);
    });
  }
  document.body.appendChild(menu);
  const rect = anchorEl.getBoundingClientRect();
  const top = Math.min(rect.bottom+4, window.innerHeight - menu.offsetHeight - 8);
  const left = Math.min(rect.left, window.innerWidth - menu.offsetWidth - 8);
  menu.style.top = Math.max(8,top) + 'px';
  menu.style.left = Math.max(8,left) + 'px';
  activeMoveMenu = menu;
  setTimeout(()=> document.addEventListener('pointerdown', onMoveMenuOutsideClick, true), 0);
}

// Cherche une section par id dans TOUS les classeurs (pas seulement le classeur actif),
// nécessaire car une page peut être déplacée vers une section d'un autre classeur.
function findSectionAnywhere(sectionId){
  for(const c of data.classeurs){
    const s = c.sections.find(sec=>sec.id===sectionId);
    if(s) return { classeur:c, section:s };
  }
  return null;
}

// Déplace une section entière (avec toutes ses pages) vers un autre classeur.
function moveSectionToClasseur(sectionId, targetClasseurId){
  const classeur = activeClasseur();
  if(!classeur) return;
  if(classeur.sections.length<=1){
    alert("Il faut garder au moins une section par classeur. Crée d'abord une autre section ici avant de déplacer celle-ci.");
    return;
  }
  const target = getClasseur(targetClasseurId);
  if(!target) return;
  const idx = classeur.sections.findIndex(s=>s.id===sectionId);
  if(idx===-1) return;
  const [section] = classeur.sections.splice(idx,1);
  target.sections.push(section);
  target.sections.sort((a,b)=> a.name.localeCompare(b.name, 'fr', {sensitivity:'base'}));
  if(activeSectionId===sectionId){
    // On suit la section déplacée dans son nouveau classeur.
    activeClasseurId = target.id;
    activeSectionId = section.id;
    activePageId = section.pages[0]?.id || null;
    activeSheetId = section.pages[0]?.sheets[0]?.id || null;
  }
  save(); renderSidebar(); renderCanvasStack();
}

// Déplace une seule page vers une autre section (dans le même classeur ou un autre).
function movePageToSection(fromSectionId, pageId, targetSectionId){
  const fromSection = getSection(fromSectionId);
  if(!fromSection) return;
  if(fromSection.pages.length<=1){
    alert("Il faut garder au moins une page par section. Crée d'abord une autre page ici avant de déplacer celle-ci.");
    return;
  }
  const found = findSectionAnywhere(targetSectionId);
  if(!found) return;
  const idx = fromSection.pages.findIndex(p=>p.id===pageId);
  if(idx===-1) return;
  const [page] = fromSection.pages.splice(idx,1);
  found.section.pages.push(page);
  if(activeSectionId===fromSectionId && activePageId===pageId){
    // On suit la page déplacée dans sa nouvelle section (et son nouveau classeur si besoin).
    activeClasseurId = found.classeur.id;
    activeSectionId = found.section.id;
    activePageId = page.id;
    activeSheetId = page.sheets[0]?.id || null;
  }
  save(); renderSidebar(); renderCanvasStack();
}

/* ============ CANVAS (pile de pages empilées, façon carnet) ============ */
const canvasWrap = document.getElementById('canvas-wrap');

function pageSize(orientation){
  return orientation==='landscape' ? {w:PAGE_H,h:PAGE_W} : {w:PAGE_W,h:PAGE_H};
}

/* ---- Zoom (pincement 2 doigts sur écran tactile, pincement trackpad, ou boutons ＋/－) ---- */
let zoom = 0.88; // légèrement réduit à l'écran ; n'affecte pas la taille réelle A4 à l'impression
const MIN_ZOOM = 0.4, MAX_ZOOM = 2.5;
const touchPoints = new Map(); // pointerId -> {x,y}, uniquement pour pointerType 'touch'
let pinching = false;

function applyZoom(){
  const stack = document.getElementById('canvas-stack');
  if(stack) stack.style.zoom = zoom;
  const label = document.getElementById('zoom-level');
  if(label) label.textContent = Math.round(zoom*100) + '%';
}
function setZoom(z){ zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, z)); applyZoom(); }
function stepZoom(delta){ setZoom(zoom + delta); }

function touchDist(p1,p2){ return Math.hypot(p1.x-p2.x, p1.y-p2.y); }

// Capture phase : intercepte les touches AVANT qu'elles n'atteignent le dessin sur la feuille,
// pour distinguer "un doigt qui écrit/dessine" de "deux doigts qui zooment/déplacent".
canvasWrap.addEventListener('pointerdown', (e)=>{
  if(e.pointerType!=='touch') return;
  touchPoints.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if(touchPoints.size===2){
    pinching = true;
    document.dispatchEvent(new CustomEvent('pinch-start'));
    const pts = [...touchPoints.values()];
    canvasWrap._pinchStartDist = touchDist(pts[0], pts[1]);
    canvasWrap._pinchStartZoom = zoom;
    // Point du contenu (avant zoom/déplacement) situé sous le milieu des deux doigts —
    // on le garde fixe sous les doigts pendant tout le geste, que ce soit un zoom, un
    // déplacement, ou les deux en même temps (comme sur Google Maps).
    const midX = (pts[0].x+pts[1].x)/2, midY = (pts[0].y+pts[1].y)/2;
    const rect = canvasWrap.getBoundingClientRect();
    canvasWrap._pinchContentX = (midX - rect.left + canvasWrap.scrollLeft) / zoom;
    canvasWrap._pinchContentY = (midY - rect.top + canvasWrap.scrollTop) / zoom;
  }
}, {capture:true});

canvasWrap.addEventListener('pointermove', (e)=>{
  if(e.pointerType!=='touch' || !touchPoints.has(e.pointerId)) return;
  touchPoints.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if(pinching && touchPoints.size===2){
    e.preventDefault();
    const pts = [...touchPoints.values()];
    const newDist = touchDist(pts[0], pts[1]);
    setZoom(canvasWrap._pinchStartZoom * (newDist / canvasWrap._pinchStartDist));
    const midX = (pts[0].x+pts[1].x)/2, midY = (pts[0].y+pts[1].y)/2;
    const rect = canvasWrap.getBoundingClientRect();
    canvasWrap.scrollLeft = canvasWrap._pinchContentX*zoom - (midX - rect.left);
    canvasWrap.scrollTop = canvasWrap._pinchContentY*zoom - (midY - rect.top);
  }
}, {capture:true, passive:false});

function endTouchPoint(e){
  if(e.pointerType!=='touch') return;
  touchPoints.delete(e.pointerId);
  if(touchPoints.size<2) pinching = false;
}
canvasWrap.addEventListener('pointerup', endTouchPoint, {capture:true});
canvasWrap.addEventListener('pointercancel', endTouchPoint, {capture:true});

// Pincement au trackpad (Chrome/Firefox/Safari envoient un événement wheel avec ctrlKey=true).
canvasWrap.addEventListener('wheel', (e)=>{
  if(!e.ctrlKey) return;
  e.preventDefault();
  setZoom(zoom - e.deltaY*0.01*zoom);
}, {passive:false});

// Affiche toutes les pages de la section active. Chaque page peut contenir plusieurs
// feuilles A4 empilées ; ajouter une feuille ne crée jamais de nouvel item dans la barre latérale.
// Affiche UNIQUEMENT la page active (avec toutes ses feuilles A4 empilées) —
// chaque page est indépendante, pas de concaténation avec les autres pages de la section.
function renderCanvasStack(){
  saveLastPosition();
  const section = activeSection();
  const page = activePage();
  canvasWrap.innerHTML = '';
  updateOrientationLabel();

  if(!section || !page){
    const empty = document.createElement('div');
    empty.id = 'empty-state';
    empty.textContent = 'Crée une page pour commencer.';
    canvasWrap.appendChild(empty);
    return;
  }

  // Filet de sécurité supplémentaire : une page ne devrait jamais avoir zéro feuille
  // (ça affichait un écran vide) — on lui en recrée une vierge automatiquement si besoin.
  if(page.sheets.length===0){
    const newSheet = { id: uid(), elements: [] };
    page.sheets.push(newSheet);
    activeSheetId = newSheet.id;
    save();
  }

  const stack = document.createElement('div');
  stack.id = 'canvas-stack';
  const {w,h} = pageSize(page.orientation);
  stack.style.width = w+'px';
  stack.style.zoom = zoom;

  stack.appendChild(buildPageGroup(section, page, w, h));

  canvasWrap.appendChild(stack);
  // Force un recalcul de mise en page immédiat après avoir reconstruit toute la pile de feuilles :
  // sur certains navigateurs tablette, une feuille tout juste ajoutée pouvait rester invisible
  // (repeinte seulement après une interaction, ex. changer de page puis revenir) — lire
  // offsetHeight juste ici oblige le navigateur à calculer la mise en page tout de suite, sans
  // attendre une interaction ultérieure pour s'en apercevoir.
  void canvasWrap.offsetHeight;
}

// Bouton discret entre deux feuilles (ou après la dernière) pour insérer une feuille A4
// À CET ENDROIT PRÉCIS, dans la même page — pas un nouvel item de la barre latérale.
// prevSheet (optionnel) : si fourni, ajoute un bouton pour supprimer la feuille juste au-dessus.
function sheetGap(sectionId, pageId, index, w, prevSheet, showDelete){
  const gap = document.createElement('div');
  gap.className = 'page-gap';
  gap.style.width = w+'px';

  // Le bouton "＋ Ajouter une feuille A4 ici" (visible au survol, entre/après les feuilles) a été
  // retiré à la demande — pour ajouter une feuille, le bouton "＋ Feuille" de la barre d'outils
  // reste disponible.
  if(prevSheet && showDelete){
    const del = document.createElement('button');
    del.className = 'insert-page-btn danger';
    del.textContent = '🗑 Supprimer cette feuille';
    del.onclick = ()=> deleteSheet(sectionId, pageId, prevSheet.id);
    gap.appendChild(del);
  }
  return gap;
}

function buildPageGroup(section, page, w, h){
  const group = document.createElement('div');
  group.className = 'page-block';
  group.dataset.pageId = page.id;

  group.appendChild(sheetGap(section.id, page.id, 0, w, null, false));
  page.sheets.forEach((sheet, idx)=>{
    group.appendChild(buildSheetCanvas(section, page, sheet, w, h));
    group.appendChild(sheetGap(section.id, page.id, idx+1, w, sheet, page.sheets.length>1));
  });

  return group;
}


function buildSheetCanvas(section, page, sheet, w, h){
  const canvas = document.createElement('div');
  canvas.className = 'page-canvas tool-' + tool;
  canvas.dataset.sheetId = sheet.id;
  canvas.style.width = w+'px';
  canvas.style.height = h+'px';

  const margin = document.createElement('div');
  margin.className = 'safe-margin';
  canvas.appendChild(margin);

  /* En-tête section / page — uniquement sur la première feuille */
  const idx0 = page.sheets.indexOf(sheet);
  if(idx0 === 0){
    const hdr = document.createElement('div');
    hdr.className = 'sheet-page-header';
    hdr.dataset.sectionId = section.id;
    hdr.dataset.pageId = page.id;

    const left = document.createElement('div');
    left.className = 'header-left';
    const sSpan = document.createElement('span');
    sSpan.className = 'header-section';
    sSpan.textContent = section.name;
    const pSpan = document.createElement('span');
    pSpan.className = 'header-page';
    pSpan.textContent = page.name;
    left.appendChild(sSpan);
    left.appendChild(pSpan);

    const dSpan = document.createElement('span');
    dSpan.className = 'header-date';
    dSpan.textContent = page.createdAt || '';

    hdr.appendChild(left);
    hdr.appendChild(dSpan);
    canvas.appendChild(hdr);
  }

  /* Images en arrière-plan : insérées avant le SVG et les textes */
  sheet.elements.filter(el=>el.type==='image').forEach(el=>{
    canvas.appendChild(imageElDom(el, sheet));
  });

  /* Blocs de bibliothèque (voir insertLibraryItem / groupElDom) : mêmes règles d'affichage
     qu'une image (plan avant/arrière compris), tant qu'ils n'ont pas été "explosés". */
  sheet.elements.filter(el=>el.type==='group').forEach(el=>{
    canvas.appendChild(groupElDom(el, sheet));
  });

  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('class', 'page-svg');
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  canvas.appendChild(svg);

  sheet.elements.filter(el=>el.type==='stroke').forEach(el=>{
    svg.appendChild(strokePathEl(el));
  });

  sheet.elements.filter(el=>el.type==='text').forEach(el=>{
    canvas.appendChild(textElDom(el, sheet));
  });

  bindCanvasEvents(canvas, svg, sheet, section.id, page.id);
  return canvas;
}

function strokePathEl(el){
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d', el.d);
  path.setAttribute('stroke', el.color);
  path.setAttribute('stroke-width', el.width);
  path.setAttribute('fill','none');
  path.setAttribute('stroke-linecap', el.highlight ? 'square' : 'round');
  path.setAttribute('stroke-linejoin','round');
  if(el.highlight) path.setAttribute('stroke-opacity','0.4');
  path.dataset.elId = el.id;
  path.style.pointerEvents = 'stroke';
  return path;
}

// Un trait est enregistré comme "M x y L x y L x y ..." (voir endStroke) : on peut donc
// le relire comme une simple liste de points pour la gomme "zone".
function strokeDToPoints(d){
  const nums = d.replace(/[ML]/g,' ').trim().split(/\s+/).filter(Boolean).map(Number);
  const pts = [];
  for(let i=0;i+1<nums.length;i+=2) pts.push([nums[i], nums[i+1]]);
  return pts;
}
function pointsToStrokeD(pts){
  return 'M ' + pts.map(p=>p[0]+' '+p[1]).join(' L ');
}

// Génère le tracé (au format M/L uniquement, compatible avec la sélection/déplacement/gomme
// existants) d'une forme tracée par glisser, entre le point de départ et le point actuel.
// Silhouette du nuage : une "bosse" de base (aplatie vers le bas) + plusieurs cercles qui
// débordent dessus, comme un vrai nuage de bande dessinée — beaucoup plus joli qu'une simple
// onde sinusoïdale. On prend, pour chaque angle autour du centre, le contour le plus éloigné
// parmi toutes ces formes (union), ce qui donne des bosses irrégulières et naturelles.
const CLOUD_BUMPS = [
  {cx:-0.22, cy:-0.20, r:0.32},
  {cx:-0.02, cy:-0.32, r:0.36},
  {cx: 0.20, cy:-0.28, r:0.38},
  {cx: 0.38, cy:-0.06, r:0.30},
  {cx:-0.36, cy:-0.02, r:0.26},
];
function cloudRawRadius(angle){
  const dirx = Math.cos(angle), diry = Math.sin(angle);
  const rxBase = 0.46, ryBase = 0.42 - 0.12*Math.max(0, diry); // plus plat vers le bas
  let best = 1/Math.sqrt((dirx/rxBase)**2 + (diry/ryBase)**2);
  CLOUD_BUMPS.forEach(b=>{
    const dot = dirx*b.cx + diry*b.cy;
    const distSq = b.cx*b.cx + b.cy*b.cy;
    const disc = dot*dot - (distSq - b.r*b.r);
    if(disc>=0){
      const t = dot + Math.sqrt(disc);
      if(t>best) best = t;
    }
  });
  return best;
}
function cloudRadiusAt(angle){ return cloudRawRadius(angle); }
const CLOUD_SCALE = (()=>{
  let maxR = 0;
  for(let i=0;i<128;i++){ maxR = Math.max(maxR, cloudRawRadius((i/128)*2*Math.PI)); }
  return 0.5/maxR;
})();

function shapePathD(mode, x0, y0, x1, y1){
  const minX=Math.min(x0,x1), maxX=Math.max(x0,x1), minY=Math.min(y0,y1), maxY=Math.max(y0,y1);
  const w = Math.max(1, maxX-minX), h = Math.max(1, maxY-minY);
  const cx = (minX+maxX)/2, cy = (minY+maxY)/2;

  if(mode==='rect'){
    return `M ${minX} ${minY} L ${maxX} ${minY} L ${maxX} ${maxY} L ${minX} ${maxY} L ${minX} ${minY}`;
  }
  if(mode==='circle' || mode==='ellipse'){
    let rx = w/2, ry = h/2;
    if(mode==='circle'){ const r = Math.max(rx,ry); rx = r; ry = r; }
    const N = 48, pts = [];
    for(let i=0;i<=N;i++){
      const a = (i/N)*2*Math.PI;
      pts.push((cx+rx*Math.cos(a)).toFixed(1)+' '+(cy+ry*Math.sin(a)).toFixed(1));
    }
    return 'M ' + pts.join(' L ');
  }
  if(mode==='cloud'){
    const N = 64, pts = [];
    for(let i=0;i<=N;i++){
      const a = (i/N)*2*Math.PI;
      const r = cloudRadiusAt(a) * CLOUD_SCALE;
      const nx = 0.5 + r*Math.cos(a);
