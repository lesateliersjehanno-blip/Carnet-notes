      const ny = 0.5 + r*Math.sin(a);
      pts.push((minX+nx*w).toFixed(1)+' '+(minY+ny*h).toFixed(1));
    }
    return 'M ' + pts.join(' L ');
  }
  if(mode==='arrow'){
    const angle = Math.atan2(y1-y0, x1-x0);
    const len = Math.hypot(x1-x0, y1-y0);
    const headLen = Math.max(8, Math.min(18, len*0.2));
    const spread = Math.PI/8;
    const wx1 = x1 - headLen*Math.cos(angle-spread), wy1 = y1 - headLen*Math.sin(angle-spread);
    const wx2 = x1 - headLen*Math.cos(angle+spread), wy2 = y1 - headLen*Math.sin(angle+spread);
    return `M ${x0} ${y0} L ${x1} ${y1} L ${wx1.toFixed(1)} ${wy1.toFixed(1)} L ${wx2.toFixed(1)} ${wy2.toFixed(1)} L ${x1} ${y1}`;
  }
  return `M ${x0} ${y0} L ${x1} ${y1}`;
}

// Si une sélection de zone est active et que le clic tombe dedans, déplace TOUT son contenu
// (traits, textes, images) ensemble plutôt qu'un seul élément. Retourne true si pris en charge.
// Petite barre flottante (couleur + épaisseur) affichée au-dessus d'un trait/forme sélectionné,
// pour pouvoir changer sa couleur ou son épaisseur après coup — utile pour flèches, rectangles,
// cercles, ellipses, nuages, mais fonctionne pour n'importe quel trait.
function clearStrokeOptions(canvas){
  if(canvas._strokeOptionsEl){ canvas._strokeOptionsEl.remove(); canvas._strokeOptionsEl = null; }
  if(canvas._strokeResizeEls){ canvas._strokeResizeEls.forEach(h=>h.remove()); canvas._strokeResizeEls = null; }
  hideStrokeColorWidthFromToolbar();
}

// Affiche la couleur/épaisseur du trait sélectionné directement dans la barre d'outils (groupes
// #colors et #width-select, normalement réservés à l'outil Stylo) plutôt que dans une bulle
// flottante au-dessus du trait — demandé pour ne pas avoir une icône couleur qui surgit sur le
// dessin. Tant qu'un trait est ainsi "branché", les clics sur ces swatches/boutons modifient CE
// trait (voir activeStrokeEdit, utilisé dans les gestionnaires onclick définis plus haut).
function showStrokeColorWidthInToolbar(strokeEl, strokePath){
  activeStrokeEdit = { el: strokeEl, pathEl: strokePath };
  document.getElementById('colors').style.display = 'flex';
  document.getElementById('width-select').style.display = 'flex';
  document.getElementById('stroke-delete-group').style.display = 'flex';
  document.querySelectorAll('#colors .swatch').forEach(s=>{
    s.classList.toggle('active', s.style.background===strokeEl.color || rgbToHex(s.style.background)===strokeEl.color);
  });
  document.querySelectorAll('#width-select .w-btn').forEach((b,i)=>{
    b.classList.toggle('active', WIDTHS[i]===strokeEl.width);
  });
}
// Referme ce raccourci et remet la barre d'outils dans son état normal pour l'outil actif.
function hideStrokeColorWidthFromToolbar(){
  if(!activeStrokeEdit) return;
  activeStrokeEdit = null;
  document.getElementById('colors').style.display = (tool==='pen' || tool==='text') ? 'flex' : 'none';
  document.getElementById('width-select').style.display = tool==='pen' ? 'flex' : 'none';
  document.getElementById('stroke-delete-group').style.display = 'none';
  document.querySelectorAll('#colors .swatch').forEach(s=>{
    s.classList.toggle('active', s.style.background===penColor || rgbToHex(s.style.background)===penColor);
  });
  document.querySelectorAll('#width-select .w-btn').forEach((b,i)=>{
    b.classList.toggle('active', WIDTHS[i]===penWidth);
  });
}
// style.background renvoie souvent une valeur "rgb(r, g, b)" même quand on lui a assigné un
// hexadécimal — petit utilitaire pour comparer malgré tout avec les couleurs de COLORS (hex).
function rgbToHex(rgb){
  const m = /^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/.exec(rgb);
  if(!m) return rgb;
  return '#' + m.slice(1).map(n=> Number(n).toString(16).padStart(2,'0')).join('');
}
function showStrokeOptions(canvas, strokeEl, strokePath){
  clearStrokeOptions(canvas);
  let bbox;
  try{ bbox = strokePath.getBBox(); }catch(err){ return; }

  // Quatre poignées (une par coin) : chacune redimensionne depuis le coin OPPOSÉ,
  // comme dans un logiciel de dessin classique — fonctionne pour n'importe quelle forme.
  const origPts = strokeDToPoints(strokeEl.d);
  const xs = origPts.map(p=>p[0]), ys = origPts.map(p=>p[1]);
  const minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);

  function makeCornerHandle(cornerX, cornerY, anchorX, anchorY, cursor){
    const handle = document.createElement('div');
    handle.className = 'stroke-resize-handle';
    handle.style.cursor = cursor;
    handle.title = 'Redimensionner';
    handle.style.left = (cornerX-4.5)+'px';
    handle.style.top = (cornerY-4.5)+'px';
    handle.onpointerdown = (e)=>{
      // Le survol du stylet à quelques mm de l'écran (sans contact réel) peut déclencher un
      // pointerdown avec une pression nulle sur certains stylets/Surface — on l'ignore, comme
      // pour le dessin au stylo : ne modifier ce point que lors d'un vrai contact avec l'écran.
      if(e.pointerType==='pen' && e.pressure===0) return;
      e.stopPropagation(); e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const scale = rect.width / canvas.offsetWidth || 1;
      const origDX = cornerX - anchorX, origDY = cornerY - anchorY;
      canvas.setPointerCapture(e.pointerId);
      function move(ev){
        if(ev.pointerType==='pen' && ev.pressure===0) return; // survol, pas de contact réel
        const curX = (ev.clientX-rect.left)/scale, curY = (ev.clientY-rect.top)/scale;
        const sx = Math.abs(origDX)<1e-6 ? 1 : (curX-anchorX)/origDX;
        const sy = Math.abs(origDY)<1e-6 ? 1 : (curY-anchorY)/origDY;
        const newPts = origPts.map(p=>[anchorX+(p[0]-anchorX)*sx, anchorY+(p[1]-anchorY)*sy]);
        const newD = pointsToStrokeD(newPts);
        strokePath.setAttribute('d', newD);
        strokeEl.d = newD;
        handle.style.left = (curX-4.5)+'px';
        handle.style.top = (curY-4.5)+'px';
      }
      function up(){
        canvas.removeEventListener('pointermove', move);
        canvas.removeEventListener('pointerup', up);
        save();
        showStrokeOptions(canvas, strokeEl, strokePath);
      }
      canvas.addEventListener('pointermove', move);
      canvas.addEventListener('pointerup', up);
    };
    canvas.appendChild(handle);
    return handle;
  }

  const handles = [
    makeCornerHandle(minX, minY, maxX, maxY, 'nwse-resize'),
    makeCornerHandle(maxX, minY, minX, maxY, 'nesw-resize'),
    makeCornerHandle(minX, maxY, maxX, minY, 'nesw-resize'),
    makeCornerHandle(maxX, maxY, minX, minY, 'nwse-resize'),
  ];
  canvas._strokeResizeEls = handles;

  // La couleur, l'épaisseur ET la suppression de ce trait se règlent désormais depuis la barre
  // d'outils en haut (comme pour le Stylo) plutôt que dans une bulle flottante ici — voir
  // showStrokeColorWidthInToolbar. Seules les 4 poignées de redimensionnement restent sur la feuille.
  showStrokeColorWidthInToolbar(strokeEl, strokePath);
}

function tryStartZoneGroupMove(canvas, sheet, e){
  if(e.pointerType==='pen' && e.pressure===0) return false; // survol du stylet, pas de contact réel
  const zsel = canvas._zoneSelection;
  if(!zsel) return false;
  const rect = canvas.getBoundingClientRect();
  const scale = rect.width / canvas.offsetWidth || 1;
  const zx = (e.clientX-rect.left)/scale, zy = (e.clientY-rect.top)/scale;
  if(!(zx>=zsel.x && zx<=zsel.x+zsel.w && zy>=zsel.y && zy<=zsel.y+zsel.h)) return false;

  const els = getZoneElements(sheet, zsel);
  if(els.length===0) return false;
  e.stopPropagation(); e.preventDefault();

  const snapshot = els.map(el=> el.type==='stroke'
    ? { el, pts: strokeDToPoints(el.d) }
    : { el, x: el.x, y: el.y });
  const startX = e.clientX, startY = e.clientY;
  let dx = 0, dy = 0, moved = false;
  canvas.setPointerCapture(e.pointerId);

  function applyDelta(){
    snapshot.forEach(s=>{
      if(s.el.type==='stroke'){
        s.el.d = pointsToStrokeD(s.pts.map(p=>[p[0]+dx, p[1]+dy]));
        const path = canvas.querySelector(`path[data-el-id="${s.el.id}"]`);
        if(path) path.setAttribute('d', s.el.d);
      } else {
        s.el.x = s.x+dx; s.el.y = s.y+dy;
        const dom = canvas.querySelector(`[data-el-id="${s.el.id}"]`);
        if(dom){ dom.style.left = s.el.x+'px'; dom.style.top = s.el.y+'px'; }
      }
    });
    if(canvas._zoneRectEl){
      canvas._zoneRectEl.style.left = (zsel.x+dx)+'px';
      canvas._zoneRectEl.style.top = (zsel.y+dy)+'px';
    }
    if(canvas._zoneActionsEl){
      canvas._zoneActionsEl.style.left = Math.max(0, Math.min(zsel.x+dx, canvas.offsetWidth-360))+'px';
      canvas._zoneActionsEl.style.top = Math.min(zsel.y+dy+zsel.h+6, canvas.offsetHeight-36)+'px';
    }
  }
  function move(ev){
    if(ev.pointerType==='pen' && ev.pressure===0) return; // survol du stylet, pas de contact réel
    moved = true;
    dx = (ev.clientX-startX)/scale; dy = (ev.clientY-startY)/scale;
    applyDelta();
  }
  function up(){
    canvas.removeEventListener('pointermove', move);
    canvas.removeEventListener('pointerup', up);
    if(moved){
      zsel.x += dx; zsel.y += dy;
      save();
    }
  }
  canvas.addEventListener('pointermove', move);
  canvas.addEventListener('pointerup', up);
  return true;
}

function textElDom(el, page){
  const div = document.createElement('div');
  div.className = 'text-el' + (el.locked ? ' locked' : '');
  div.dataset.elId = el.id;
  div.style.left = el.x+'px';
  div.style.top = el.y+'px';
  if(el.wrap){
    div.style.width = el.w+'px';
    div.style.whiteSpace = 'pre-wrap';
    div.style.wordBreak = 'break-word';
  } else {
    div.style.width = 'auto';
    div.style.minWidth = '30px';
    div.style.whiteSpace = 'pre';
  }
  div.style.color = el.color || 'var(--ink)';
  div.style.fontSize = (el.fontSize || 16) + 'px';
  div.style.fontFamily = fontCss(el.fontFamily || 'sans');
  div.style.fontWeight = el.bold ? 'bold' : 'normal';
  div.style.fontStyle = el.italic ? 'italic' : 'normal';
  div.style.textDecoration = el.underline ? 'underline' : 'none';
  div.contentEditable = 'false';
  div.textContent = el.text || '';

  const lock = document.createElement('div');
  lock.className = 'el-lock' + (el.locked ? ' locked' : '');
  lock.contentEditable = 'false';
  lock.title = el.locked ? 'Verrouillé (point rouge) — clique pour déverrouiller' : 'Déverrouillé (point vert) — clique pour ancrer, empêche de le déplacer par erreur en faisant défiler au doigt';
  div.appendChild(lock);

  // Barre flottante : taille, couleur, police, style — visible quand ce texte est sélectionné.
  const opts = document.createElement('div');
  opts.className = 'text-options';
  opts.contentEditable = 'false';
  opts.innerHTML = `
    <div class="text-sizes"></div>
    <div class="sep"></div>
    <div class="text-colors"></div>
    <div class="sep"></div>
    <div class="text-fonts"></div>
    <div class="sep"></div>
    <div class="text-style-toggles">
      <button class="text-style-btn" data-style="bold" title="Gras"><b>G</b></button>
      <button class="text-style-btn" data-style="italic" title="Italique"><i>I</i></button>
      <button class="text-style-btn" data-style="underline" title="Souligné"><u>S</u></button>
    </div>
    <div class="sep"></div>
    <div class="text-highlight"></div>`;
  opts.onpointerdown = (e)=>e.stopPropagation();
  opts.onclick = (e)=>e.stopPropagation();

  const sizesEl = opts.querySelector('.text-sizes');
  FONT_SIZES.forEach(sz=>{
    const b = document.createElement('button');
    b.className = 'text-size-btn' + ((el.fontSize||16)===sz ? ' active' : '');
    b.textContent = 'A';
    b.style.fontSize = Math.min(16, 10+sz/6)+'px';
    b.title = sz+'px';
    b.onclick = ()=>{
      el.fontSize = sz; div.style.fontSize = sz+'px'; save();
      sizesEl.querySelectorAll('.text-size-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
    };
    sizesEl.appendChild(b);
  });

  const colorsEl2 = opts.querySelector('.text-colors');
  COLORS.forEach(c=>{
    const b = document.createElement('button');
    b.className = 'swatch' + ((el.color||COLORS[0])===c ? ' active' : '');
    b.style.background = c;
    b.onclick = ()=>{
      el.color = c; div.style.color = c; save();
      colorsEl2.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
    };
    colorsEl2.appendChild(b);
  });

  const fontsEl = opts.querySelector('.text-fonts');
  FONTS.forEach(f=>{
    const b = document.createElement('button');
    b.className = 'text-font-btn' + ((el.fontFamily||'sans')===f.key ? ' active' : '');
    b.textContent = f.label;
    b.style.fontFamily = f.css;
    b.onclick = ()=>{
      el.fontFamily = f.key; div.style.fontFamily = f.css; save();
      fontsEl.querySelectorAll('.text-font-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
    };
    fontsEl.appendChild(b);
  });

  const styleToggles = opts.querySelectorAll('.text-style-btn');
  const styleMap = { bold:'bold', italic:'italic', underline:'underline' };
  styleToggles.forEach(b=>{
    const key = b.dataset.style;
    if(el[key]) b.classList.add('active');
    b.onclick = ()=>{
      el[key] = !el[key];
      b.classList.toggle('active', el[key]);
      if(key==='bold') div.style.fontWeight = el.bold ? 'bold' : 'normal';
      if(key==='italic') div.style.fontStyle = el.italic ? 'italic' : 'normal';
      if(key==='underline') div.style.textDecoration = el.underline ? 'underline' : 'none';
      save();
    };
  });

  if(el.highlightColor) div.style.backgroundColor = el.highlightColor;
  const highlightEl = opts.querySelector('.text-highlight');
  HIGHLIGHT_COLORS.forEach(c=>{
    const sw = document.createElement('div');
    sw.className = 'swatch' + (el.highlightColor===c ? ' active' : '');
    sw.style.background = c;
    sw.title = 'Surligner ce texte';
    sw.onclick = ()=>{
      const turningOff = el.highlightColor===c;
      el.highlightColor = turningOff ? null : c;
      div.style.backgroundColor = el.highlightColor || 'transparent';
      highlightEl.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active'));
      if(!turningOff) sw.classList.add('active');
      save();
    };
    highlightEl.appendChild(sw);
  });

  div.appendChild(opts);

  const resize = document.createElement('div');
  resize.className = 'el-handle el-resize';
  resize.contentEditable = 'false';
  div.appendChild(resize);
  const del = document.createElement('div');
  del.className = 'el-handle el-delete';
  del.contentEditable = 'false';
  del.textContent = '✕';
  div.appendChild(del);

  lock.onpointerdown = (e)=>{ e.stopPropagation(); };
  lock.onclick = (e)=>{
    e.stopPropagation();
    el.locked = !el.locked;
    div.classList.toggle('locked', el.locked);
    lock.classList.toggle('locked', el.locked);
    lock.title = el.locked ? 'Verrouillé (point rouge) — clique pour déverrouiller' : 'Déverrouillé (point vert) — clique pour ancrer, empêche de le déplacer par erreur en faisant défiler au doigt';
    save();
  };

  del.onpointerdown = (e)=>{ if(tool!=='select') return; e.stopPropagation(); };
  del.onclick = (e)=>{ if(tool!=='select') return; e.stopPropagation(); deleteElement(el.id); };

  resize.onpointerdown = (e)=>{
    if(tool!=='select') return;
    if(e.pointerType==='pen' && e.pressure===0) return; // survol du stylet, pas de contact réel
    e.stopPropagation(); e.preventDefault();
    const startX = e.clientX, startW = el.w || div.getBoundingClientRect().width;
    if(!el.wrap){
      el.wrap = true;
      div.style.whiteSpace = 'pre-wrap';
      div.style.wordBreak = 'break-word';
    }
    function move(ev){
      if(ev.pointerType==='pen' && ev.pressure===0) return; // survol du stylet, pas de contact réel
      el.w = Math.max(50, startW + (ev.clientX-startX));
      div.style.width = el.w+'px';
    }
    function up(){ document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up); save(); }
    document.addEventListener('pointermove',move);
    document.addEventListener('pointerup',up);
  };

  div.ondblclick = (e)=>{
    e.stopPropagation();
    // Détache les boutons (verrou, options, poignées) pendant l'édition : seul le texte doit
    // être modifiable, sinon le navigateur peut mal interpréter ces blocs et casser la mise en page.
    lock.remove(); opts.remove(); resize.remove(); del.remove();
    div.contentEditable = 'true';
    div.classList.add('editing');
    div.focus();
    activeTextEdit = { el, div };
    document.execCommand('selectAll', false, null);
  };
  div.onblur = ()=>{
    div.contentEditable = 'false';
    div.classList.remove('editing');
    if(activeTextEdit && activeTextEdit.el===el) activeTextEdit = null;
    el.text = div.textContent;
    if(el.text.trim()===''){
      div.remove();
      page.elements = page.elements.filter(x=>x.id!==el.id);
    } else {
      // Verrouille automatiquement une fois la frappe terminée : évite de déplacer le texte
      // par erreur en faisant défiler au doigt juste après l'avoir écrit.
      el.locked = true;
      div.classList.add('locked');
      lock.classList.add('locked');
      lock.title = 'Verrouillé (point rouge) — clique pour déverrouiller';
      div.appendChild(lock);
      div.appendChild(opts);
      div.appendChild(resize);
      div.appendChild(del);
    }
    save();
  };
  div.onpointerdown = (e)=>{
    if(tool!=='select') return; // hors mode Sélection : laisser l'événement atteindre le canvas (dessin/gomme/zone)
    if(e.pointerType==='pen' && e.pressure===0) return; // survol du stylet, pas de contact réel
    if(div.contentEditable==='true') return;
    if(e.target===resize || e.target===del || e.target===lock) return;
    const canvas = div.closest('.page-canvas');
    if(canvas && tryStartZoneGroupMove(canvas, page, e)) return;
    e.stopPropagation();
    // Empêche le navigateur de faire défiler la feuille pendant ce glisser — sans ça, un stylet
    // (contrairement au doigt, réservé au défilement) pouvait aussi bien déplacer ce texte QUE
    // faire défiler la feuille en même temps.
    e.preventDefault();
    div.setPointerCapture(e.pointerId);
    selectEl(el.id);
    clearStrokeOptions(div.closest('.page-canvas'));
    const startX=e.clientX, startY=e.clientY, ox=el.x, oy=el.y;
    let moved=false;
    function move(ev){
      if(ev.pointerType==='pen' && ev.pressure===0) return; // survol du stylet, pas de contact réel
      moved=true;
      el.x = ox + (ev.clientX-startX);
      el.y = oy + (ev.clientY-startY);
      div.style.left = el.x+'px'; div.style.top = el.y+'px';
    }
    function up(){ document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up); if(moved) save(); }
    document.addEventListener('pointermove',move);
    document.addEventListener('pointerup',up);
  };

  if(el.id===selectedElId) div.classList.add('selected');
  return div;
}

// Un élément (image ou bloc) déplacé par glisser peut être relâché au-dessus d'une AUTRE feuille
// de la MÊME page (les feuilles d'une page sont empilées verticalement, voir buildPageGroup) :
// sans ceci, il restait toujours rattaché à sa feuille d'origine (juste déplacé visuellement dans
// SES coordonnées à elle), et donc invisible dès qu'on le faisait glisser au-delà du bord de cette
// feuille (chaque feuille masque son propre débordement) — ce qui donnait l'impression qu'il était
// impossible de déplacer une image d'une feuille à l'autre. On détecte ici, au relâchement, la
// feuille RÉELLEMENT sous le pointeur (en ignorant l'élément qu'on est justement en train de
// déplacer, sans quoi on ne détecterait toujours que sa feuille d'origine) et, si elle diffère,
// on transfère l'élément dans les données de cette nouvelle feuille, avec ses coordonnées
// recalculées dans le repère de CETTE feuille.
function retargetElementToSheetUnderPoint(el, sheet, clientX, clientY, draggedDom){
  // ATTENTION : malgré son nom historique, le 2e paramètre reçu par imageElDom (et relayé ici)
  // est en réalité la FEUILLE (sheet) contenant l'élément, pas la page entière (voir
  // buildSheetCanvas : "imageElDom(el, sheet)") — la toute première version de cette fonction
  // supposait par erreur un objet "page" avec un tableau .sheets, ce qui faisait échouer
  // silencieusement (page.sheets est undefined) CHAQUE relâchement d'image, y compris pour un
  // simple déplacement dans la MÊME feuille (la sauvegarde qui suit ne s'exécutait donc plus non
  // plus). On retrouve ici les feuilles soeurs uniquement via le DOM (le conteneur .page-block
  // commun à toutes les feuilles d'une même page), sans avoir besoin de l'objet page.
  const oldCanvas = (draggedDom && draggedDom.closest('.page-canvas')) || document.querySelector(`.page-canvas[data-sheet-id="${sheet.id}"]`);
  if(!oldCanvas) return false;
  const pageBlock = oldCanvas.closest('.page-block');
  if(!pageBlock) return false;
  const prevPE = draggedDom ? draggedDom.style.pointerEvents : '';
  if(draggedDom) draggedDom.style.pointerEvents = 'none';
  const under = document.elementFromPoint(clientX, clientY);
  if(draggedDom) draggedDom.style.pointerEvents = prevPE;
  const newCanvas = under && under.closest ? under.closest('.page-canvas') : null;
  if(!newCanvas || newCanvas===oldCanvas) return false;
  if(!pageBlock.contains(newCanvas)) return false; // seulement entre feuilles de la MÊME page
  const newSheet = findSheetById(newCanvas.dataset.sheetId);
  if(!newSheet || newSheet===sheet) return false;
  const newRect = newCanvas.getBoundingClientRect();
  const newScale = newRect.width / newCanvas.offsetWidth || 1;
  const oldRect = oldCanvas.getBoundingClientRect();
  const oldScale = oldRect.width / oldCanvas.offsetWidth || 1;
  const screenLeft = oldRect.left + el.x*oldScale;
  const screenTop = oldRect.top + el.y*oldScale;
  el.x = Math.round((screenLeft - newRect.left)/newScale);
  el.y = Math.round((screenTop - newRect.top)/newScale);
  sheet.elements = sheet.elements.filter(x=>x!==el);
  newSheet.elements.push(el);
  if(activeSheetId===sheet.id) activeSheetId = newSheet.id;
  return true;
}

function imageElDom(el, page){
  const div = document.createElement('div');
  div.className = 'image-el' + (el.locked ? ' locked' : '') + (el.layer==='front' ? ' layer-front' : '');
  div.dataset.elId = el.id;
  div.style.left = el.x+'px';
  div.style.top = el.y+'px';
  div.style.width = el.w+'px';
  div.style.height = el.h+'px';

  // Conteneur interne du contenu visuel (image, ou SVG reconstitué pour un bloc — voir
  // groupElDom) : dimensionné et centré ICI pour qu'une fois pivoté de 90°/270° (voir
  // rotateZoneSelection), son empreinte visuelle corresponde exactement au bloc (el.w × el.h) —
  // sans ça, une rotation de 90° d'une image non carrée l'écraserait au lieu de la faire pivoter.
  const content = document.createElement('div');
  content.className = 'el-content';
  updateElContentBox();
  function updateElContentBox(){
    const rot = el.rotation||0;
    const swapped = (rot===90 || rot===270);
    const cw = swapped ? el.h : el.w, ch = swapped ? el.w : el.h;
    content.style.width = cw+'px';
    content.style.height = ch+'px';
    content.style.left = ((el.w-cw)/2)+'px';
    content.style.top = ((el.h-ch)/2)+'px';
    content.style.transform = `rotate(${rot}deg)${el.flip ? ' scaleX(-1)' : ''}`;
  }

  const img = document.createElement('img');
  img.src = el.src;
  img.draggable = false;
  content.appendChild(img);
  div.appendChild(content);

  const lock = document.createElement('div');
  lock.className = 'el-lock' + (el.locked ? ' locked' : '');
  lock.title = el.locked ? 'Verrouillée (point rouge) — clique pour déverrouiller' : 'Déverrouillée (point vert) — clique pour ancrer, empêche de la déplacer par erreur en faisant défiler au doigt';
  div.appendChild(lock);

  const resizeCorner = document.createElement('div');
  resizeCorner.className = 'el-handle el-resize';
  resizeCorner.title = 'Redimensionner (largeur + hauteur)';
  div.appendChild(resizeCorner);
  const resizeE = document.createElement('div');
  resizeE.className = 'el-handle el-resize-e';
  resizeE.title = 'Étirer en largeur';
  div.appendChild(resizeE);
  const resizeS = document.createElement('div');
  resizeS.className = 'el-handle el-resize-s';
  resizeS.title = 'Étirer en hauteur';
  div.appendChild(resizeS);
  const del = document.createElement('div');
  del.className = 'el-handle el-delete';
  del.textContent = '✕';
  div.appendChild(del);

  lock.onpointerdown = (e)=>{ e.stopPropagation(); };
  lock.onclick = (e)=>{
    e.stopPropagation();
    el.locked = !el.locked;
    div.classList.toggle('locked', el.locked);
    lock.classList.toggle('locked', el.locked);
    lock.title = el.locked ? 'Verrouillée (point rouge) — clique pour déverrouiller' : 'Déverrouillée (point vert) — clique pour ancrer, empêche de la déplacer par erreur en faisant défiler au doigt';
    save();
  };

  del.onpointerdown = (e)=>{ if(tool!=='select') return; e.stopPropagation(); };
  del.onclick = (e)=>{ if(tool!=='select') return; e.stopPropagation(); deleteElement(el.id); };

  // Poignée du coin : redimensionne librement largeur ET hauteur (indépendamment, sans garder les proportions).
  resizeCorner.onpointerdown = (e)=>{
    if(tool!=='select') return;
    if(e.pointerType==='pen' && e.pressure===0) return; // survol du stylet, pas de contact réel
    e.stopPropagation(); e.preventDefault();
    const startX = e.clientX, startY = e.clientY, startW = el.w, startH = el.h;
    function move(ev){
      if(ev.pointerType==='pen' && ev.pressure===0) return; // survol du stylet, pas de contact réel
      el.w = Math.max(30, startW + (ev.clientX-startX));
      el.h = Math.max(30, startH + (ev.clientY-startY));
      div.style.width = el.w+'px'; div.style.height = el.h+'px';
      updateElContentBox();
    }
    function up(){ document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up); save(); }
    document.addEventListener('pointermove',move);
    document.addEventListener('pointerup',up);
  };
  // Poignée du bord droit : étire seulement en largeur.
  resizeE.onpointerdown = (e)=>{
    if(tool!=='select') return;
    if(e.pointerType==='pen' && e.pressure===0) return; // survol du stylet, pas de contact réel
    e.stopPropagation(); e.preventDefault();
    const startX = e.clientX, startW = el.w;
    function move(ev){
      if(ev.pointerType==='pen' && ev.pressure===0) return; // survol du stylet, pas de contact réel
      el.w = Math.max(30, startW + (ev.clientX-startX));
      div.style.width = el.w+'px';
      updateElContentBox();
    }
    function up(){ document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up); save(); }
    document.addEventListener('pointermove',move);
    document.addEventListener('pointerup',up);
  };
  // Poignée du bord bas : étire seulement en hauteur.
  resizeS.onpointerdown = (e)=>{
    if(tool!=='select') return;
    if(e.pointerType==='pen' && e.pressure===0) return; // survol du stylet, pas de contact réel
    e.stopPropagation(); e.preventDefault();
    const startY = e.clientY, startH = el.h;
    function move(ev){
      if(ev.pointerType==='pen' && ev.pressure===0) return; // survol du stylet, pas de contact réel
      el.h = Math.max(30, startH + (ev.clientY-startY));
      div.style.height = el.h+'px';
      updateElContentBox();
    }
    function up(){ document.removeEventListener('pointermove',move); document.removeEventListener('pointerup',up); save(); }
    document.addEventListener('pointermove',move);
    document.addEventListener('pointerup',up);
  };

  div.onpointerdown = (e)=>{
    if(tool!=='select') return; // hors mode Sélection : ne pas intercepter, l'événement doit atteindre le canvas (dessin/texte)
    if(e.pointerType==='pen' && e.pressure===0) return; // survol du stylet, pas de contact réel
    if(e.target===resizeCorner || e.target===resizeE || e.target===resizeS || e.target===del || e.target===lock) return;
    const canvas = div.closest('.page-canvas');
    if(canvas && tryStartZoneGroupMove(canvas, page, e)) return;
    e.stopPropagation();
    selectEl(el.id);
    clearStrokeOptions(div.closest('.page-canvas'));
    const startX=e.clientX, startY=e.clientY, ox=el.x, oy=el.y;
    let moved=false;

    if(e.pointerType==='touch'){
      // Au doigt : un appui SANS bouger propose de changer le plan (devant/derrière) de cette
      // image plutôt que de la déplacer — bouger avant la fin du délai la déplace normalement,
      // comme avec la souris/le stylet (voir plus bas).
      const longPressTimer = setTimeout(()=>{
        if(!moved){
          cleanup();
          showActionMenu('Cette image :', [
            { label:'🔝 Premier plan (devant)', onPick: ()=>{ el.layer='front'; div.classList.add('layer-front'); save(); } },
            { label:'🔙 Arrière-plan (derrière)', onPick: ()=>{ el.layer='back'; div.classList.remove('layer-front'); save(); } }
          ]);
        }
      }, 550);
      let lastClientX = startX, lastClientY = startY;
      function move(ev){
        if(Math.hypot(ev.clientX-startX, ev.clientY-startY) > 12) moved = true;
        if(moved){
          clearTimeout(longPressTimer);
          el.x = ox + (ev.clientX-startX);
          el.y = oy + (ev.clientY-startY);
          div.style.left = el.x+'px'; div.style.top = el.y+'px';
          lastClientX = ev.clientX; lastClientY = ev.clientY;
        }
      }
      function cleanup(){
        clearTimeout(longPressTimer);
        document.removeEventListener('pointermove', move);
        document.removeEventListener('pointerup', up);
      }
      function up(){
        cleanup();
        if(moved){
          // Relâchée au-dessus d'une AUTRE feuille (même page) : elle y déménage vraiment (voir
          // retargetElementToSheetUnderPoint) au lieu de rester coincée, invisible au-delà du bord
          // de son ancienne feuille (qui masque tout débordement).
          const retargeted = retargetElementToSheetUnderPoint(el, page, lastClientX, lastClientY, div);
          save();
          if(retargeted) renderCanvasStack();
        }
      }
      document.addEventListener('pointermove', move);
      document.addEventListener('pointerup', up);
      return;
    }

    // Souris / stylet : déplacement immédiat dès qu'on bouge. On empêche aussi le défilement
    // natif de la feuille pendant ce glisser — sans ça, le stylet (contrairement au doigt,
    // seul réservé au défilement) pouvait déplacer l'image ET faire défiler la feuille à la fois.
    e.preventDefault();
    div.setPointerCapture(e.pointerId);
    let lastClientX = startX, lastClientY = startY;
    function move(ev){
      if(ev.pointerType==='pen' && ev.pressure===0) return; // survol du stylet, pas de contact réel
      moved=true;
      el.x = ox + (ev.clientX-startX);
      el.y = oy + (ev.clientY-startY);
      div.style.left = el.x+'px'; div.style.top = el.y+'px';
      lastClientX = ev.clientX; lastClientY = ev.clientY;
    }
    function up(){
      document.removeEventListener('pointermove',move);
      document.removeEventListener('pointerup',up);
      if(moved){
        // Relâchée au-dessus d'une AUTRE feuille (même page) : elle y déménage vraiment (voir
        // retargetElementToSheetUnderPoint) au lieu de rester coincée, invisible au-delà du bord
        // de son ancienne feuille (qui masque tout débordement).
        const retargeted = retargetElementToSheetUnderPoint(el, page, lastClientX, lastClientY, div);
        save();
        if(retargeted) renderCanvasStack();
      }
    }
    document.addEventListener('pointermove',move);
    document.addEventListener('pointerup',up);
  };

  if(el.id===selectedElId) div.classList.add('selected');
  return div;
}

// Construit le SVG interne d'un bloc de bibliothèque (voir groupElDom) : traits, texte et images
// d'origine, positionnés dans un repère fixe (0,0,origW,origH) — le SVG s'étire ensuite tout
// seul pour remplir le bloc (width/height:100%, voir CSS), exactement comme le ferait une image
// lors d'un redimensionnement largeur/hauteur indépendant.
function groupContentSVG(el){
  const parts = [];
  (el.elements||[]).forEach(child=>{
    if(child.type==='stroke'){
      parts.push(`<path d="${escapeAttr(child.d)}" fill="none" stroke="${escapeAttr(child.color)}" stroke-width="${child.width}" stroke-linecap="round" stroke-linejoin="round"/>`);
    } else if(child.type==='image'){
      parts.push(`<image href="${escapeAttr(child.src)}" x="${child.x}" y="${child.y}" width="${child.w}" height="${child.h}" preserveAspectRatio="none"/>`);
    } else if(child.type==='text'){
      const b = textBBox(child);
      (child.text||'').split('\n').forEach((line, i)=>{
        parts.push(`<text x="${b.x+4}" y="${b.y+18+i*22}" font-size="16" font-family="'Segoe Print','Comic Sans MS',cursive" fill="${escapeAttr(child.color||'#1d2b3a')}">${escapeHtml(line)}</text>`);
      });
    }
  });
  return `<svg viewBox="0 0 ${el.origW} ${el.origH}" preserveAspectRatio="none">${parts.join('')}</svg>`;
}

// Transforme un bloc de bibliothèque en éléments individuels séparés (traits/texte/images),
// exploités et modifiables un par un comme s'ils avaient été dessinés/collés directement — pour
// pouvoir affiner un élément particulier une fois le bloc bien placé. Si le bloc a été redimensionné
// depuis son insertion (w/h différents de origW/origH), chaque élément est remis à l'échelle en
// conséquence pour rester visuellement identique à ce qui était affiché juste avant l'explosion.
// Applique n pas de 90° (sens horaire) à un vecteur (dx,dy) — n peut être négatif (anti-horaire).
function rotateVector90(dx, dy, steps){
  let x=dx, y=dy;
  const n = ((steps%4)+4)%4;
  for(let i=0;i<n;i++){ const nx=-y, ny=x; x=nx; y=ny; }
  return [x,y];
}
function explodeGroup(el, sheet){
  // Le bloc peut avoir été pivoté/symétrisé (voir rotateZoneSelection/flipZoneSelection) depuis
  // son insertion : on rejoue exactement la même transformation (symétrie D'ABORD, rotation
  // ENSUITE — même ordre que le CSS "rotate() scaleX(-1)" utilisé pour l'afficher, voir
  // updateElContentBox) sur chaque élément d'origine, pour qu'exploser reproduise fidèlement ce
  // qui est affiché à l'écran, quelle que soit son orientation actuelle.
  const rot = el.rotation||0;
  const flip = !!el.flip;
  const origW = el.origW||el.w, origH = el.origH||el.h;
  const steps = rot/90;
  const swapped = (rot===90 || rot===270);
  const natW = swapped ? origH : origW, natH = swapped ? origW : origH;
  const scaleX = el.w / (natW||1), scaleY = el.h / (natH||1);
  const worldCx = el.x + el.w/2, worldCy = el.y + el.h/2;
  const localCx = origW/2, localCy = origH/2;

  function toAbsolute(cx0, cy0){
    let dx = cx0-localCx, dy = cy0-localCy;
    if(flip) dx = -dx;
    [dx, dy] = rotateVector90(dx, dy, steps);
    return [worldCx + dx*scaleX, worldCy + dy*scaleY];
  }

  const news = [];
  (el.elements||[]).forEach(child=>{
    if(child.type==='stroke'){
      const pts = strokeDToPoints(child.d).map(p=> toAbsolute(p[0], p[1]));
      const avgScale = (scaleX+scaleY)/2;
      news.push({ id: uid(), type:'stroke', color: child.color, width: Math.max(1, child.width*avgScale), highlight: child.highlight, d: pointsToStrokeD(pts) });
    } else if(child.type==='text'){
      const b = textBBox(child);
      const [ncx,ncy] = toAbsolute(b.x+b.w/2, b.y+b.h/2);
      news.push({ id: uid(), type:'text', x: ncx-(b.w*scaleX)/2, y: ncy-(b.h*scaleY)/2, w: Math.max(30, child.w*scaleX), color: child.color, text: child.text });
    } else if(child.type==='image'){
      const [ncx,ncy] = toAbsolute(child.x+child.w/2, child.y+child.h/2);
      const newW = Math.max(10, child.w*scaleX), newH = Math.max(10, child.h*scaleY);
      news.push({ id: uid(), type:'image', x: ncx-newW/2, y: ncy-newH/2, w: newW, h: newH, src: child.src, layer: child.layer, rotation: rot, flip });
    }
  });
  sheet.elements = sheet.elements.filter(x=>x.id!==el.id);
  news.forEach(n=> sheet.elements.push(n));
  if(selectedElId===el.id) selectedElId = null;
  save();
  renderCanvasStack();
}

// Un bloc de bibliothèque (voir insertLibraryItem) se comporte à l'écran EXACTEMENT comme une
// image (déplacer, redimensionner largeur/hauteur, verrouiller, changer de plan, sélectionner) :
// on réutilise donc entièrement imageElDom, en ne remplaçant que le contenu interne (un <img>
// devient un <svg> reconstituant les traits/texte/images d'origine) et en ajoutant le bouton
// "Exploser" flottant sous le bloc quand il est sélectionné.
function groupElDom(el, page){
  // Un bloc n'a pas de "src" : on en fournit un minuscule pixel transparent en data URI (pas de
  // requête réseau, pas d'erreur console) le temps de générer la structure via imageElDom,
  // avant de remplacer l'<img> par notre <svg> reconstitué juste en dessous.
  const TRANSPARENT_PIXEL = 'data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==';
  const savedSrc = el.src;
  el.src = TRANSPARENT_PIXEL;
  const div = imageElDom(el, page);
  el.src = savedSrc;
  div.classList.add('group-el');
  const img = div.querySelector('img');
  if(img){
    const svgWrap = document.createElement('div');
    svgWrap.style.width = '100%'; svgWrap.style.height = '100%';
    svgWrap.innerHTML = groupContentSVG(el);
    img.replaceWith(svgWrap.firstElementChild);
  }
  const explodeBtn = document.createElement('button');
  explodeBtn.className = 'group-explode-btn';
  explodeBtn.textContent = '💥 Exploser en éléments';
  explodeBtn.title = "Transformer ce bloc en traits/texte/images individuels, modifiables séparément";
  explodeBtn.onpointerdown = (e)=> e.stopPropagation();
  explodeBtn.onclick = (e)=>{ e.stopPropagation(); explodeGroup(el, page); };
  div.appendChild(explodeBtn);
  return div;
}

function selectEl(id){
  selectedElId = id;
  document.querySelectorAll('.text-el, .image-el').forEach(d=>d.classList.toggle('selected', d.dataset.elId===id));
  document.querySelectorAll('path[data-el-id]').forEach(p=>p.classList.toggle('selected', p.dataset.elId===id));
}
function deselectEl(){
  selectedElId = null;
  document.querySelectorAll('.text-el, .image-el').forEach(d=>d.classList.remove('selected'));
  document.querySelectorAll('path[data-el-id]').forEach(p=>p.classList.remove('selected'));
  document.querySelectorAll('.stroke-options').forEach(p=>p.remove());
  // Les 4 poignées de redimensionnement d'un trait sélectionné (voir showStrokeOptions) ne sont
  // pas suivies ici via canvas._strokeResizeEls (on ne sait pas quel canvas les a) — on les
  // retire donc directement par leur classe, sinon elles restaient affichées après un appui à
  // côté, donnant l'impression que le trait n'était jamais vraiment désélectionné.
  document.querySelectorAll('.stroke-resize-handle').forEach(h=>h.remove());
  document.querySelectorAll('.page-canvas').forEach(pc=>{ pc._strokeResizeEls = null; });
  hideStrokeColorWidthFromToolbar();
}
function deleteElement(id){
  outer:
  for(const classeur of data.classeurs){
    for(const section of classeur.sections){
      for(const page of section.pages){
        let found = false;
        for(const sheet of page.sheets){
          const before = sheet.elements.length;
          sheet.elements = sheet.elements.filter(x=>x.id!==id);
          if(sheet.elements.length!==before){ found = true; break; }
        }
        if(found) break outer;
      }
    }
  }
  const dom = document.querySelector(`[data-el-id="${id}"]`);
  if(dom) dom.remove();
  if(selectedElId===id) selectedElId = null;
  save();
}

document.addEventListener('keydown', (e)=>{
  if((e.key==='Delete' || e.key==='Backspace') && selectedElId && tool==='select'){
    const active = document.activeElement;
    if(active && active.contentEditable==='true') return; // don't hijack text editing
    deleteElement(selectedElId);
  }
});

function bindCanvasEvents(canvas, svg, sheet, sectionId, pageId){
  let drawing = null;
  let erasing = false;
  let zoning = null;
  let shaping = null;

  // Un doigt sert à faire défiler la feuille (même en Stylo/Texte, où le geste est normalement
  // réservé au stylet) ; le stylet, lui, continue de dessiner/écrire normalement.
  function startTouchPan(e){
    e.preventDefault();
    const startX = e.clientX, startY = e.clientY;
    const startScrollLeft = canvasWrap.scrollLeft, startScrollTop = canvasWrap.scrollTop;
    try{ canvas.setPointerCapture(e.pointerId); }catch(err){}
    function move(ev){
      if(pinching) return; // un 2e doigt a posé entre-temps : le pincement prend le relais (voir 'pinch-start')
      canvasWrap.scrollLeft = startScrollLeft - (ev.clientX-startX);
      canvasWrap.scrollTop = startScrollTop - (ev.clientY-startY);
    }
    function up(){
      canvas.removeEventListener('pointermove', move);
      canvas.removeEventListener('pointerup', up);
      if(canvas._touchPanUp===up) canvas._touchPanUp = null;
    }
    canvas._touchPanUp = up;
    canvas.addEventListener('pointermove', move);
    canvas.addEventListener('pointerup', up);
  }

  // Un doigt fait défiler la feuille (comme startTouchPan) ; MAIS un appui long SANS bouger
  // propose de coller ici à la place — pratique sur tablette sans clavier, là où Ctrl+V n'existe
  // pas. Un mouvement avant la fin du délai bascule normalement sur le défilement. Partagé par
  // l'outil ↖ Sélection et l'outil ✎ Stylo (voir les deux appels plus bas), pour ne pas avoir à
  // changer d'outil juste pour coller une capture d'écran pendant qu'on écrit/dessine.
  function startTouchPanOrPaste(e, x, y){
    e.preventDefault();
    try{ canvas.setPointerCapture(e.pointerId); }catch(err){}
    const startX = e.clientX, startY = e.clientY;
    const startScrollLeft = canvasWrap.scrollLeft, startScrollTop = canvasWrap.scrollTop;
    let moved = false;
    const longPressTimer = setTimeout(()=>{
      // NB : un appui tombant sur une image/texte déjà là (notamment une image VERROUILLÉE, qui
      // laisse le doigt passer au travers pour pouvoir défiler par-dessus) propose quand même de
      // coller ici, dans tous les cas — sinon ça donnait juste l'impression que le collage ne
      // marchait pas du tout dès que la page avait déjà un peu de contenu.
      if(!moved) pasteWithConfirm(x, y);
    }, 550);
    function move(ev){
      if(pinching) return; // un 2e doigt a posé entre-temps : le pincement prend le relais (voir 'pinch-start')
      if(Math.hypot(ev.clientX-startX, ev.clientY-startY) > 12) moved = true;
      if(moved){
        canvasWrap.scrollLeft = startScrollLeft - (ev.clientX-startX);
        canvasWrap.scrollTop = startScrollTop - (ev.clientY-startY);
      }
    }
    function up(){
      clearTimeout(longPressTimer);
      canvas.removeEventListener('pointermove', move);
      canvas.removeEventListener('pointerup', up);
      if(canvas._touchPanUp===up) canvas._touchPanUp = null;
    }
    canvas._touchPanUp = up;
    canvas.addEventListener('pointermove', move);
    canvas.addEventListener('pointerup', up);
  }

  function clearZoneSelection(){
    if(canvas._zoneRectEl){ canvas._zoneRectEl.remove(); canvas._zoneRectEl=null; }
    if(canvas._zoneActionsEl){ canvas._zoneActionsEl.remove(); canvas._zoneActionsEl=null; }
    canvas._zoneSelection = null;
  }

  // Après avoir tracé le rectangle, on affiche une petite barre flottante "Copier" juste en dessous.
  function finalizeZoneSelection(x,y,w,h,points){
    clearZoneSelection();
    let rectEl;
    if(points){
      rectEl = document.createElementNS('http://www.w3.org/2000/svg','path');
      rectEl.setAttribute('d', 'M ' + points.map(p=>p[0]+' '+p[1]).join(' L ') + ' Z');
      rectEl.setAttribute('class', 'lasso-shape');
      svg.appendChild(rectEl);
    } else {
      rectEl = document.createElement('div');
      rectEl.className = 'zone-rect';
      rectEl.style.left=x+'px'; rectEl.style.top=y+'px'; rectEl.style.width=w+'px'; rectEl.style.height=h+'px';
      canvas.appendChild(rectEl);
    }
    canvas._zoneRectEl = rectEl;
    canvas._zoneSelection = {x,y,w,h,points};

    const actions = document.createElement('div');
    actions.className = 'zone-actions';
    actions.innerHTML = `
      <button data-act="copy-elements" title="Copier le texte et les traits, réutilisables et modifiables une fois collés">🗐 Copier</button>
      <button data-act="copy-image" title="Copier une image aplatie de la zone (pour coller ailleurs qu'ici, ex. Word, Excel)">🖼 Image</button>
      <button data-act="save-library" title="Enregistrer cette sélection dans la bibliothèque, pour la réinsérer plus tard (appui long sur une feuille)">📚 Biblio</button>
      <button data-act="paste" title="Coller ici le contenu du presse-papier">📋 Coller</button>
      <button class="danger" data-act="delete" title="Supprimer tout le contenu de la zone">🗑</button>
      <button class="secondary" data-act="clear" title="Fermer la sélection sans rien supprimer">✕</button>`;
    actions.onpointerdown = (e)=>e.stopPropagation();
    actions.querySelector('[data-act="save-library"]').onclick = (e)=>{
      e.stopPropagation();
      saveZoneToLibrary(sheet, x, y, w, h, points);
    };
    actions.querySelector('[data-act="copy-elements"]').onclick = async (e)=>{
      e.stopPropagation();
      const btn = e.currentTarget;
      const original = btn.textContent;
      btn.textContent = '…';
      try{
        await copyZoneAsElements(sheet, x, y, w, h, points);
        btn.textContent = '✓ Copié';
        setTimeout(()=>{ if(btn.isConnected) btn.textContent = original; }, 1200);
      }catch(err){
        alert(err.message || 'Impossible de copier cette zone.');
        btn.textContent = original;
      }
    };
    actions.querySelector('[data-act="copy-image"]').onclick = async (e)=>{
      e.stopPropagation();
      const btn = e.currentTarget;
      const original = btn.textContent;
      btn.textContent = '…';
      try{
        await copyZoneToClipboard(sheet, x, y, w, h);
        btn.textContent = '✓ Copié';
        setTimeout(()=>{ if(btn.isConnected) btn.textContent = original; }, 1200);
      }catch(err){
        alert('Impossible de copier dans le presse-papier. Vérifie les autorisations du navigateur, ou réessaie.');
        btn.textContent = original;
      }
    };
    actions.querySelector('[data-act="paste"]').onclick = async (e)=>{
      e.stopPropagation();
      const btn = e.currentTarget;
      const original = btn.textContent;
      btn.textContent = '…';
      try{
        await pasteClipboard(x, y);
        btn.textContent = '✓ Collé';
        setTimeout(()=>{ if(btn.isConnected) btn.textContent = original; }, 1200);
      }catch(err){
        alert('Impossible de coller. Vérifie les autorisations du navigateur, ou réessaie.');
        btn.textContent = original;
      }
    };
    actions.querySelector('[data-act="delete"]').onclick = (e)=>{
      e.stopPropagation();
      // Un élément verrouillé (point rouge — voir el-lock) est protégé contre les suppressions
      // accidentelles au clic/glisser ; il doit l'être tout autant contre "Supprimer la zone",
      // sinon le verrou ne sert à rien dès qu'un trait ou du texte se trouve par-dessus une photo
      // et qu'on sélectionne/supprime cette zone : la photo verrouillée disparaissait avec le reste.
      const zoneEls = getZoneElements(sheet, {x,y,w,h,points});
      const lockedCount = zoneEls.filter(el=>el.locked).length;
      const ids = new Set(zoneEls.filter(el=>!el.locked).map(el=>el.id));
      if(ids.size===0){
        if(lockedCount>0) alert("Cette zone ne contient qu'un ou des éléments verrouillés (point rouge) — déverrouille-les d'abord (clique sur le point) pour pouvoir les supprimer.");
        return;
      }
      sheet.elements = sheet.elements.filter(el=>!ids.has(el.id));
      save();
      renderCanvasStack();
      if(lockedCount>0){
        alert(lockedCount>1
          ? `${lockedCount} éléments verrouillés (point rouge) ont été conservés.`
          : "Un élément verrouillé (point rouge) a été conservé.");
      }
    };
    actions.querySelector('[data-act="clear"]').onclick = (e)=>{ e.stopPropagation(); clearZoneSelection(); };
    canvas.appendChild(actions);
    canvas._zoneActionsEl = actions;
    // Repositionnée APRÈS ajout au DOM, à partir de sa taille RÉELLE une fois rendue (elle peut
    // être plus ou moins large selon le nombre de boutons) — la feuille masque tout débordement
    // (overflow:hidden), donc un calcul basé sur une largeur fixe supposée pouvait couper la
    // barre hors champ dès qu'elle s'élargissait (ex. l'ajout du bouton "📚 Bibliothèque").
    actions.style.left = Math.max(0, Math.min(x, canvas.offsetWidth - actions.offsetWidth)) + 'px';
    actions.style.top = Math.max(0, Math.min(y+h+6, canvas.offsetHeight - actions.offsetHeight)) + 'px';
  }

  function markActive(){
    if(activeSectionId!==sectionId || activePageId!==pageId || activeSheetId!==sheet.id){
      activeSectionId = sectionId; activePageId = pageId; activeSheetId = sheet.id;
      document.querySelectorAll('.page-item').forEach(it=>{
        it.classList.toggle('active', it.dataset.pageId===pageId && it.dataset.sectionId===sectionId);
      });
    }
  }

  function eraseStrokeAt(clientX, clientY){
    const target = document.elementFromPoint(clientX, clientY);
    const path = target && target.closest ? target.closest('path[data-el-id]') : null;
    if(path){
      const id = path.dataset.elId;
      sheet.elements = sheet.elements.filter(x=>x.id!==id);
      path.remove();
    }
  }

  // Gomme "zone" : découpe les traits qui traversent le carré au lieu de les supprimer en entier.
  // Chaque trait est relu comme une suite de points ; les points tombant dans le carré sont retirés,
  // et les morceaux restants (s'il y en a) redeviennent des traits indépendants.
  function eraseAreaAt(x, y, half){
    const minX=x-half, maxX=x+half, minY=y-half, maxY=y+half;
    let changed = false;
    const kept = [];
    sheet.elements.forEach(el=>{
      if(el.type!=='stroke'){ kept.push(el); return; }
      const pts = strokeDToPoints(el.d);
      let removedAny = false;
      const runs = []; let current = [];
      pts.forEach(p=>{
        const inside = p[0]>=minX && p[0]<=maxX && p[1]>=minY && p[1]<=maxY;
        if(inside){
          removedAny = true;
          if(current.length>1) runs.push(current);
          current = [];
        } else {
          current.push(p);
        }
      });
      if(current.length>1) runs.push(current);
      if(!removedAny){ kept.push(el); return; }
      changed = true;
      runs.forEach(run=>{
        kept.push({ id: uid(), type:'stroke', color: el.color, width: el.width, d: pointsToStrokeD(run) });
      });
    });
    if(changed){
      sheet.elements = kept;
      svg.querySelectorAll('path[data-el-id]').forEach(p=>p.remove());
      sheet.elements.filter(e=>e.type==='stroke').forEach(e=> svg.appendChild(strokePathEl(e)));
    }
    return changed;
  }

  document.addEventListener('pinch-start', ()=>{
    if(drawing && canvas._livePath){ canvas._livePath.remove(); drawing = null; }
    erasing = false;
    // Le 1er doigt avait peut-être déjà démarré un défilement "à un seul doigt" (voir plus bas,
    // startTouchPan et la branche tactile de l'outil Sélection) avant que le 2e doigt ne pose et
    // ne transforme le geste en pincement. Sans l'arrêter ici, ses écouteurs pointermove restaient
    // actifs PENDANT le pincement et continuaient à modifier le défilement en même temps que le
    // calcul du pincement (basé sur le milieu des 2 doigts) — la zone zoomée n'était alors plus du
    // tout centrée entre les doigts, elle "sautait" au gré des deux calculs qui se marchaient dessus.
    if(canvas._touchPanUp){ canvas._touchPanUp(); canvas._touchPanUp = null; }
  });

  canvas.addEventListener('pointerdown', (e)=>{
    if(pinching || touchPoints.size>=2) return; // un pincement à 2 doigts est en cours : on ne dessine pas

    // Stylet en survol (à quelques mm de l'écran, sans contact réel) : certains stylets/Surface
    // déclenchent quand même un pointerdown, avec une pression nulle. On l'ignore complètement ici
    // pour qu'aucune action (dessiner, gommer, sélectionner un trait, déplacer une zone, coller...)
    // ne démarre sans un vrai contact avec l'écran.
    if(e.pointerType==='pen' && e.pressure===0) return;

    // Le défilement de la feuille ne doit être possible qu'au doigt, jamais au stylet (même sur
    // une zone vide, pas seulement en déplaçant un objet) — sinon la feuille défile toute seule
    // pendant qu'on dessine/déplace quelque chose avec le stylet.
    if(e.pointerType==='pen') e.preventDefault();

    // Filet de sécurité : si un trait (ou une forme) précédent n'a pas été proprement terminé
    // (un "pointerup" manqué, un changement d'outil pendant le tracé, etc.), il reste "coincé"
    // en mémoire avec son tracé toujours affiché — le prochain tracé semble alors repartir de ce
    // point resté en mémoire au lieu de commencer au nouveau point de contact. On nettoie donc
    // tout reste avant de commencer quoi que ce soit de nouveau (même filet que pour 'pinch-start').
    if(drawing){
      if(canvas._livePath) canvas._livePath.remove();
      drawing = null;
    }
    if(shaping){
      if(canvas._shapePath) canvas._shapePath.remove();
      shaping = null;
    }
    if(tool==='select' && (e.target.closest('.text-el') || e.target.closest('.image-el'))) return; // géré par l'élément lui-même
    markActive();

    // Dos du stylet = gomme, quel que soit l'outil actif.
    // Sur un stylet, l'appui sur l'extrémité "gomme" est signalé par buttons=32 (ou button=5).
    const isPenEraser = e.pointerType==='pen' && (e.buttons===32 || e.button===5);
    if(isPenEraser || tool==='eraser'){
      e.preventDefault();
      erasing = true;
      canvas.setPointerCapture(e.pointerId);
      if(eraserMode==='area'){
        const rect = canvas.getBoundingClientRect();
        const scale = rect.width / canvas.offsetWidth || 1;
        eraseAreaAt((e.clientX-rect.left)/scale, (e.clientY-rect.top)/scale, eraserSize/2);
      } else {
        eraseStrokeAt(e.clientX, e.clientY);
      }
      return;
    }

    const rect = canvas.getBoundingClientRect();
    const scale = rect.width / canvas.offsetWidth || 1;
    const x = (e.clientX - rect.left)/scale;
    const y = (e.clientY - rect.top)/scale;

    if(tool==='select'){
      if(e.target.closest('.zone-actions')) return;
      if(tryStartZoneGroupMove(canvas, sheet, e)) return;

      // Un trait de stylo se sélectionne au clic (comme une image ou un texte),
      // puis peut être déplacé par glisser, ou supprimé avec la touche Suppr.
      const strokePath = e.target.closest('path[data-el-id]');
      if(strokePath){
        e.stopPropagation();
        e.preventDefault();
        const strokeId = strokePath.dataset.elId;
        const strokeEl = sheet.elements.find(el=>el.id===strokeId);
        if(strokeEl){
          selectEl(strokeId);
          showStrokeOptions(canvas, strokeEl, strokePath);
          const origPts = strokeDToPoints(strokeEl.d);
          const startX = e.clientX, startY = e.clientY;
          let moved = false;
          canvas.setPointerCapture(e.pointerId);
          function move(ev){
            if(ev.pointerType==='pen' && ev.pressure===0) return; // survol du stylet, pas de contact réel
            moved = true;
            const dx = (ev.clientX-startX)/scale, dy = (ev.clientY-startY)/scale;
            strokeEl.d = pointsToStrokeD(origPts.map(p=>[p[0]+dx, p[1]+dy]));
            strokePath.setAttribute('d', strokeEl.d);
          }
          function up(){ canvas.removeEventListener('pointermove',move); canvas.removeEventListener('pointerup',up); if(moved){ save(); showStrokeOptions(canvas, strokeEl, strokePath); } }
          canvas.addEventListener('pointermove',move);
          canvas.addEventListener('pointerup',up);
          return;
        }
      }

      deselectEl();
      // Le doigt fait défiler la feuille — mais plus nativement (touch-action:none désormais,
      // voir le CSS) : on le refait nous-mêmes en JS ici, comme startTouchPan(), pour que ce
      // défilement reste strictement réservé au doigt et ne puisse plus jamais être déclenché
      // par le stylet. Le clic-glisser de sélection de zone, lui, ne se déclenche qu'à la souris
      // ou au stylet (branche plus bas).
      if(e.pointerType==='touch'){ startTouchPanOrPaste(e, x, y); return; }
      e.preventDefault();
      clearZoneSelection();

      // Stylet : comme au doigt (branche tactile ci-dessus), un appui long SANS bouger propose de
      // coller ici. C'est le seul moyen FIABLE de coller au stylet sur une tablette sans clavier :
      // le bouton "📋 Coller" de la barre d'outils repose sur navigator.clipboard.read(), qui reste
      // bloqué indéfiniment sur certains Chrome dès le 2e collage (voir le commentaire détaillé dans
      // pasteClipboard) — jusqu'ici, sans ce bloc, le stylet n'avait AUCUN moyen de contourner ce
      // blocage puisque cette branche ne s'appliquait qu'au doigt. Si le stylet bouge avant la fin
      // du délai, on bascule normalement sur la sélection par zone (comportement inchangé).
      if(e.pointerType==='pen'){
        canvas.setPointerCapture(e.pointerId);
        const startClientX = e.clientX, startClientY = e.clientY;
        let moved = false, started = false;
        const longPressTimer = setTimeout(()=>{
          if(!moved && !started) pasteWithConfirm(x, y);
        }, 550);
        function startDrag(){
          started = true;
          if(selectionShapeMode==='lasso'){
            const lassoPath = document.createElementNS('http://www.w3.org/2000/svg','path');
            lassoPath.setAttribute('class', 'lasso-preview');
            lassoPath.setAttribute('d', `M ${x} ${y}`);
            svg.appendChild(lassoPath);
            zoning = { lasso:true, points:[[x,y]], lassoPath };
          } else {
            const rectEl = document.createElement('div');
            rectEl.className = 'zone-rect';
            rectEl.style.left=x+'px'; rectEl.style.top=y+'px'; rectEl.style.width='0px'; rectEl.style.height='0px';
            canvas.appendChild(rectEl);
            zoning = { startX:x, startY:y, rectEl, current:{x,y,w:0,h:0} };
          }
        }
        function move(ev){
          if(ev.pointerType==='pen' && ev.pressure===0) return;
          if(!started && Math.hypot(ev.clientX-startClientX, ev.clientY-startClientY) > 8){
            moved = true;
            clearTimeout(longPressTimer);
            startDrag();
          }
        }
        function up(){
          clearTimeout(longPressTimer);
          canvas.removeEventListener('pointermove', move);
          canvas.removeEventListener('pointerup', up);
        }
        canvas.addEventListener('pointermove', move);
        canvas.addEventListener('pointerup', up);
        return;
      }

      canvas.setPointerCapture(e.pointerId);
      if(selectionShapeMode==='lasso'){
        const lassoPath = document.createElementNS('http://www.w3.org/2000/svg','path');
        lassoPath.setAttribute('class', 'lasso-preview');
        lassoPath.setAttribute('d', `M ${x} ${y}`);
        svg.appendChild(lassoPath);
        zoning = { lasso:true, points:[[x,y]], lassoPath };
      } else {
        const rectEl = document.createElement('div');
        rectEl.className = 'zone-rect';
        rectEl.style.left=x+'px'; rectEl.style.top=y+'px'; rectEl.style.width='0px'; rectEl.style.height='0px';
        canvas.appendChild(rectEl);
        zoning = { startX:x, startY:y, rectEl, current:{x,y,w:0,h:0} };
      }
      return;
    }
    if(tool==='text'){
      // Un doigt sert à faire défiler (même en Texte, normalement réservé au stylet/souris).
      if(e.pointerType==='touch'){ startTouchPan(e); return; }
      e.preventDefault();

      // Clic droit (bouton secondaire) maintenu : démarre une sélection de zone (rectangle ou
      // lasso selon le mode choisi), exactement comme le fait l'outil ↖ Sélection — pratique pour
      // copier un passage sans devoir changer d'outil en pleine prise de notes. Même logique
      // qu'au stylet en outil Sélection (voir plus haut) : un appui long SANS bouger démarre la
      // zone après un court délai, et si le pointeur bouge avant la fin de ce délai, la zone
      // démarre immédiatement au lieu d'attendre. Le relâchement (finalisation de la zone) est
      // déjà géré plus bas de façon générique via `zoning`, quel que soit l'outil actif.
      if(e.button===2){
        canvas.setPointerCapture(e.pointerId);
        const startClientX = e.clientX, startClientY = e.clientY;
        let moved = false, started = false;
        const longPressTimer = setTimeout(()=>{
          if(!moved && !started) startZoneDrag();
        }, 500);
        function startZoneDrag(){
          started = true;
          if(selectionShapeMode==='lasso'){
            const lassoPath = document.createElementNS('http://www.w3.org/2000/svg','path');
            lassoPath.setAttribute('class', 'lasso-preview');
            lassoPath.setAttribute('d', `M ${x} ${y}`);
            svg.appendChild(lassoPath);
            zoning = { lasso:true, points:[[x,y]], lassoPath };
          } else {
            const rectEl = document.createElement('div');
            rectEl.className = 'zone-rect';
            rectEl.style.left=x+'px'; rectEl.style.top=y+'px'; rectEl.style.width='0px'; rectEl.style.height='0px';
            canvas.appendChild(rectEl);
            zoning = { startX:x, startY:y, rectEl, current:{x,y,w:0,h:0} };
          }
        }
        function move(ev){
          if(!started && Math.hypot(ev.clientX-startClientX, ev.clientY-startClientY) > 8){
            moved = true;
            clearTimeout(longPressTimer);
            startZoneDrag();
          }
        }
        function up(){
          clearTimeout(longPressTimer);
          canvas.removeEventListener('pointermove', move);
          canvas.removeEventListener('pointerup', up);
        }
        canvas.addEventListener('pointermove', move);
        canvas.addEventListener('pointerup', up);
        return;
      }

      const el = { id: uid(), type:'text', x: x, y: y-12, w: 220, color: penColor, fontSize: textFontSize, fontFamily: textFontFamily, bold: textBold, italic: textItalic, underline: textUnderline, highlightColor: textHighlightColor, text: '' };
      sheet.elements.push(el);
      const dom = textElDom(el, sheet);
      canvas.appendChild(dom);
      // Ne laisser QUE le texte éditable : les boutons (verrou, options, poignées) sont
      // retirés en attendant, ils reviennent automatiquement à la fin de l'édition (onblur).
      Array.from(dom.children).forEach(child=>child.remove());
      dom.contentEditable='true';
      dom.classList.add('editing');
      dom.focus();
      activeTextEdit = { el, div: dom };
      save();
      return;
    }
    if(tool==='pen'){
      // Un doigt fait défiler (comme avant), mais un appui long SANS bouger propose maintenant
      // de coller ici, exactement comme en outil ↖ Sélection (voir startTouchPanOrPaste) — pour
      // pouvoir coller une capture d'écran sans devoir changer d'outil en pleine prise de notes.
      if(e.pointerType==='touch'){ startTouchPanOrPaste(e, x, y); return; }
      // Le survol du stylet (à quelques mm de l'écran, sans contact réel) déclenche parfois
      // un pointerdown avec une pression nulle sur certains stylets/Surface — on l'ignore.
      if(e.pointerType==='pen' && e.pressure===0) return;
      e.preventDefault();

      // Clic droit (bouton secondaire) maintenu : démarre une sélection de zone (rectangle ou
      // lasso selon le mode choisi), exactement comme en outil Texte ou ↖ Sélection — pratique
      // pour copier un passage sans devoir changer d'outil en pleine prise de notes. Un appui
      // long SANS bouger démarre la zone après un court délai ; si le pointeur bouge avant la fin
      // de ce délai, la zone démarre immédiatement. Le relâchement est déjà géré plus bas de
      // façon générique via `zoning`.
      if(e.button===2){
        canvas.setPointerCapture(e.pointerId);
        const startClientX = e.clientX, startClientY = e.clientY;
        let moved = false, started = false;
        const longPressTimer = setTimeout(()=>{
          if(!moved && !started) startZoneDrag();
        }, 500);
        function startZoneDrag(){
          started = true;
          if(selectionShapeMode==='lasso'){
            const lassoPath = document.createElementNS('http://www.w3.org/2000/svg','path');
            lassoPath.setAttribute('class', 'lasso-preview');
            lassoPath.setAttribute('d', `M ${x} ${y}`);
            svg.appendChild(lassoPath);
            zoning = { lasso:true, points:[[x,y]], lassoPath };
          } else {
            const rectEl = document.createElement('div');
            rectEl.className = 'zone-rect';
            rectEl.style.left=x+'px'; rectEl.style.top=y+'px'; rectEl.style.width='0px'; rectEl.style.height='0px';
            canvas.appendChild(rectEl);
            zoning = { startX:x, startY:y, rectEl, current:{x,y,w:0,h:0} };
          }
        }
        function move(ev){
          if(!started && Math.hypot(ev.clientX-startClientX, ev.clientY-startClientY) > 8){
            moved = true;
            clearTimeout(longPressTimer);
            startZoneDrag();
          }
        }
        function up(){
          clearTimeout(longPressTimer);
          canvas.removeEventListener('pointermove', move);
          canvas.removeEventListener('pointerup', up);
        }
        canvas.addEventListener('pointermove', move);
        canvas.addEventListener('pointerup', up);
        return;
      }

      const strokeColor = highlightMode ? highlightColor : penColor;
      const strokeWidth = highlightMode ? Math.max(14, penWidth*4) : penWidth;

      function startStroke(px, py){
        if(shapeMode==='free'){
          drawing = { id: uid(), type:'stroke', color: strokeColor, width: strokeWidth, highlight: highlightMode, points:[[px,py]], pointerType: e.pointerType, downAt: Date.now(), pointerId: e.pointerId };
          const path = strokePathEl({...drawing, d:`M ${px} ${py}`});
          path._live = drawing;
          svg.appendChild(path);
          canvas._livePath = path;
        } else {
          shaping = { startX:px, startY:py, mode:shapeMode, color:strokeColor, width:strokeWidth, highlight:highlightMode };
          const path = strokePathEl({ color:strokeColor, width:strokeWidth, highlight:highlightMode, d:`M ${px} ${py}` });
          svg.appendChild(path);
          canvas._shapePath = path;
        }
      }

      // Stylet posé sur une image NON verrouillée, en dessin libre : un appui long (sans bouger)
      // la déplace au lieu de dessiner, comme dans OneNote où déplacer un objet ne dépend pas de
      // l'outil actif. Un mouvement avant la fin du délai démarre un trait normal PAR-DESSUS
      // l'image à la place (l'image reste "transparente" au dessin, comme avant, sauf pendant un
      // vrai appui long). Une image verrouillée n'est jamais concernée : on dessine dessus tout
      // de suite, sans délai.
      const hitImage = (e.pointerType==='pen' && shapeMode==='free') ? findImageAt(sheet, x, y) : null;
      if(hitImage && !hitImage.locked){
        const imgDiv = canvas.querySelector(`.image-el[data-el-id="${hitImage.id}"]`);
        if(imgDiv){
          canvas.setPointerCapture(e.pointerId);
          const startClientX = e.clientX, startClientY = e.clientY;
          const ox = hitImage.x, oy = hitImage.y;
          let moved = false, dragging = false;
          const longPressTimer = setTimeout(()=>{ if(!moved) dragging = true; }, 550);
          function move(ev){
            if(ev.pointerType==='pen' && ev.pressure===0) return;
            if(!moved && !dragging && Math.hypot(ev.clientX-startClientX, ev.clientY-startClientY) > 8){
              moved = true;
              clearTimeout(longPressTimer);
              canvas.removeEventListener('pointermove', move);
              canvas.removeEventListener('pointerup', up);
              const rect = canvas.getBoundingClientRect();
              const scale = rect.width / canvas.offsetWidth || 1;
              startStroke((ev.clientX-rect.left)/scale, (ev.clientY-rect.top)/scale);
              return;
            }
            if(dragging){
              hitImage.x = ox + (ev.clientX-startClientX);
              hitImage.y = oy + (ev.clientY-startClientY);
              imgDiv.style.left = hitImage.x+'px'; imgDiv.style.top = hitImage.y+'px';
            }
          }
          function up(){
            clearTimeout(longPressTimer);
            canvas.removeEventListener('pointermove', move);
            canvas.removeEventListener('pointerup', up);
            if(dragging) save();
          }
          canvas.addEventListener('pointermove', move);
          canvas.addEventListener('pointerup', up);
          return;
        }
      }

      startStroke(x, y);
      canvas.setPointerCapture(e.pointerId);
    }
  });

  canvas.addEventListener('pointermove', (e)=>{
    if(e.pointerType==='pen' && e.pressure===0) return; // survol du stylet, pas de contact réel : aucune action ici
    if(zoning){
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const scale = rect.width / canvas.offsetWidth || 1;
      const cx = (e.clientX-rect.left)/scale, cy = (e.clientY-rect.top)/scale;
      if(zoning.lasso){
        zoning.points.push([cx,cy]);
        zoning.lassoPath.setAttribute('d', 'M ' + zoning.points.map(p=>p[0]+' '+p[1]).join(' L '));
        return;
      }
      const x = Math.min(zoning.startX, cx), y = Math.min(zoning.startY, cy);
      const w = Math.abs(cx-zoning.startX), h = Math.abs(cy-zoning.startY);
      zoning.rectEl.style.left=x+'px'; zoning.rectEl.style.top=y+'px';
      zoning.rectEl.style.width=w+'px'; zoning.rectEl.style.height=h+'px';
      zoning.current = {x,y,w,h};
      return;
    }
    if(erasing){
      e.preventDefault();
      const events = (typeof e.getCoalescedEvents === 'function' && e.getCoalescedEvents().length)
        ? e.getCoalescedEvents() : [e];
      if(eraserMode==='area'){
        const rect = canvas.getBoundingClientRect();
        const scale = rect.width / canvas.offsetWidth || 1;
        events.forEach(ev=>{
          if(ev.pointerType==='pen' && ev.pressure===0) return; // survol du stylet, pas de contact réel
          eraseAreaAt((ev.clientX-rect.left)/scale, (ev.clientY-rect.top)/scale, eraserSize/2);
        });
      } else {
        events.forEach(ev=>{
          if(ev.pointerType==='pen' && ev.pressure===0) return; // survol du stylet, pas de contact réel
          eraseStrokeAt(ev.clientX, ev.clientY);
        });
      }
      return;
    }
    if(shaping){
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const scale = rect.width / canvas.offsetWidth || 1;
      const x = (e.clientX-rect.left)/scale, y = (e.clientY-rect.top)/scale;
      canvas._shapePath.setAttribute('d', shapePathD(shaping.mode, shaping.startX, shaping.startY, x, y));
      return;
    }
    if(tool!=='pen' || !drawing) return;
    // Un AUTRE doigt (typiquement la paume qui repose sur l'écran pendant qu'on écrit au stylet)
    // peut générer ses propres événements pointermove pendant qu'un trait est en cours : sans
    // cette vérification, ses coordonnées se mélangeaient avec celles du stylet dans le MÊME
    // trait (drawing.points), produisant des sauts/traits aléatoires en pleine écriture. On
    // n'accepte donc ici que les mouvements du pointeur qui a réellement commencé ce trait.
    if(e.pointerId !== drawing.pointerId) return;
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const scale = rect.width / canvas.offsetWidth || 1;
    // getCoalescedEvents() recovers every intermediate point the stylus reported between
    // two animation frames — without this, fast strokes get sampled too coarsely and show gaps.
    const events = (typeof e.getCoalescedEvents === 'function' && e.getCoalescedEvents().length)
      ? e.getCoalescedEvents() : [e];
    events.forEach(ev=>{
      if(ev.pointerType==='pen' && ev.pressure===0) return; // survol, pas de contact réel
      const x = (ev.clientX - rect.left)/scale;
      const y = (ev.clientY - rect.top)/scale;
      drawing.points.push([x,y]);
    });
    const d = 'M ' + drawing.points.map(p=>p[0]+' '+p[1]).join(' L ');
    canvas._livePath.setAttribute('d', d);
  });

  function endStroke(e){
    // Même logique que dans pointermove ci-dessus : un AUTRE doigt (ex. la paume) qui se soulève
    // pendant qu'on écrit encore au stylet ne doit pas couper le trait en cours à sa place.
    if(tool==='pen' && drawing && e && e.pointerId!==undefined && drawing.pointerId!==undefined && e.pointerId!==drawing.pointerId){
      return;
    }
    if(erasing){ erasing = false; save(); }
    if(shaping){
      const path = canvas._shapePath;
      const d = path.getAttribute('d');
      const { color, width, highlight } = shaping;
      path.remove();
      canvas._shapePath = null;
      shaping = null;
      sheet.elements.push({ id: uid(), type:'stroke', color, width, highlight, d });
      save();
      renderCanvasStack();
      return;
    }
    if(zoning){
      if(zoning.lasso){
        zoning.lassoPath.remove();
        const pts = zoning.points;
        zoning = null;
        if(pts.length<3) return;
        const xs = pts.map(p=>p[0]), ys = pts.map(p=>p[1]);
        const x = Math.min(...xs), y = Math.min(...ys);
        const w = Math.max(...xs)-x, h = Math.max(...ys)-y;
        if(w>8 && h>8) finalizeZoneSelection(x,y,w,h,pts);
        return;
      }
      const {x,y,w,h} = zoning.current;
      zoning.rectEl.remove();
      zoning = null;
      if(w>8 && h>8) finalizeZoneSelection(x,y,w,h);
      return;
    }
    if(tool==='pen' && drawing){
      const d = 'M ' + drawing.points.map(p=>p[0]+' '+p[1]).join(' L ');
      const el = { id: drawing.id, type:'stroke', color: drawing.color, width: drawing.width, highlight: drawing.highlight, d };
      if(drawing.points.length>1){
        sheet.elements.push(el); save();
      } else {
        canvas._livePath.remove();
        // Un simple contact du stylet sans tracé (donc déjà sans aucun effet visible, comme avant)
        // : si le contact a assez duré pour être un VRAI appui long (pas un frôlement fugace), on
        // propose de coller ici. Ça évite d'avoir à basculer sur ↖ Sélection juste pour coller une
        // capture d'écran pendant qu'on est en train d'écrire/dessiner en Stylo — comme dans OneNote,
        // où coller ne dépend pas de l'outil actif. Un tracé normal (points.length>1) n'est jamais
        // affecté par ceci : cette branche ne s'exécute QUE quand il n'y a de toute façon rien à
        // dessiner.
        const [px, py] = drawing.points[0];
        if(drawing.pointerType==='pen' && Date.now()-drawing.downAt>=500){
          pasteWithConfirm(px, py);
        }
      }
      drawing = null;
    }
  }
  canvas.addEventListener('pointerup', endStroke);
  canvas.addEventListener('pointerleave', endStroke);
}

/* ============ PRINT ============ */
function openPrintMenu(){
  const section = activeSection();
  const page = activePage();
  if(!section || !page) return;
  printSheets(page.sheets, page.orientation, `${section.name} - ${page.name}`, section.name, page.name);
}

async function printSheets(sheets, orientation, title, sectionName, pageName){
  const {w,h} = pageSize(orientation);
  const area = document.getElementById('print-area');
  area.innerHTML = '';

  let styleTag = document.getElementById('print-page-size');
  if(!styleTag){ styleTag = document.createElement('style'); styleTag.id='print-page-size'; document.head.appendChild(styleTag); }
  styleTag.textContent = `@page{ size: ${orientation==='landscape' ? 'A4 landscape' : 'A4 portrait'}; margin:0; } .print-page{ width:${w}px; height:${h}px; }`;

  sheets.forEach((sheet, idx)=>{
    const div = document.createElement('div');
    div.className = 'print-page';
    div.style.width = w+'px'; div.style.height = h+'px';

    const pageNum = document.createElement('div');
    pageNum.className = 'print-page-number';
    pageNum.textContent = `${idx+1} / ${sheets.length}`;
    div.appendChild(pageNum);

    if(idx===0 && sectionName && pageName){
      const hdr = document.createElement('div');
      hdr.className = 'sheet-page-header';
      hdr.innerHTML = `
        <div class="header-left">
          <div class="header-section">${escapeHtml(sectionName)}</div>
          <div class="header-page">${escapeHtml(pageName)}</div>
        </div>
        <div class="header-date">${escapeHtml(dateJour())}</div>`;
      div.appendChild(hdr);
    }

    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    svg.style.position='absolute'; svg.style.top='0'; svg.style.left='0'; svg.style.width='100%'; svg.style.height='100%';
    sheet.elements.filter(el=>el.type==='stroke').forEach(el=> svg.appendChild(strokePathEl(el)) );
    div.appendChild(svg);

    sheet.elements.filter(el=>el.type==='text').forEach(el=>{
      const t = document.createElement('div');
      t.style.position='absolute'; t.style.left=el.x+'px'; t.style.top=el.y+'px';
      if(el.wrap){ t.style.width=el.w+'px'; t.style.whiteSpace='pre-wrap'; t.style.wordBreak='break-word'; }
      else { t.style.whiteSpace='pre'; }
      t.style.fontFamily = fontCss(el.fontFamily || 'sans'); t.style.fontSize=(el.fontSize||16)+'px'; t.style.lineHeight='1.4';
      t.style.color = el.color || '#1d2b3a';
      t.style.fontWeight = el.bold ? 'bold' : 'normal';
      t.style.fontStyle = el.italic ? 'italic' : 'normal';
      t.style.textDecoration = el.underline ? 'underline' : 'none';
      if(el.highlightColor) t.style.backgroundColor = el.highlightColor;
      t.textContent = el.text || '';
      div.appendChild(t);
    });
    sheet.elements.filter(el=>el.type==='image').forEach(el=>{
      const img = document.createElement('img');
      img.src = el.src;
      img.style.position='absolute'; img.style.left=el.x+'px'; img.style.top=el.y+'px';
      img.style.width=el.w+'px'; img.style.height=el.h+'px';
      div.appendChild(img);
    });
    // Blocs de bibliothèque ("Inser Biblio") : oubliés jusqu'ici à l'impression (seuls
    // 'stroke'/'text'/'image' étaient gérés ci-dessus) — ils ne sont pourtant pas de simples
    // images, mais un groupe reconstitué en SVG (voir groupContentSVG, déjà utilisé à l'écran par
    // groupElDom). On applique ici exactement la même géométrie (rotation/symétrie centrées) que
    // le rendu à l'écran, pour qu'un bloc pivoté/retourné s'imprime identique à ce qu'on voit.
    sheet.elements.filter(el=>el.type==='group').forEach(el=>{
      const rot = el.rotation||0;
      const swapped = (rot===90 || rot===270);
      const cw = swapped ? el.h : el.w, ch = swapped ? el.w : el.h;
      const wrap = document.createElement('div');
      wrap.style.position='absolute'; wrap.style.left=el.x+'px'; wrap.style.top=el.y+'px';
      wrap.style.width=el.w+'px'; wrap.style.height=el.h+'px'; wrap.style.overflow='hidden';
      const inner = document.createElement('div');
      inner.style.position='absolute';
      inner.style.width=cw+'px'; inner.style.height=ch+'px';
      inner.style.left=((el.w-cw)/2)+'px'; inner.style.top=((el.h-ch)/2)+'px';
      inner.style.transform = `rotate(${rot}deg)${el.flip ? ' scaleX(-1)' : ''}`;
      inner.innerHTML = groupContentSVG(el);
      wrap.appendChild(inner);
      div.appendChild(wrap);
    });
    area.appendChild(div);
  });
