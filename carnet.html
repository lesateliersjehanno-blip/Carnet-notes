  // Les <img> (photos, et maintenant blocs de bibliothèque contenant des <image> SVG) sont
  // chargées de façon asynchrone, même pour un data URI base64 déjà en mémoire — sans attendre
  // ici, window.print() pouvait capturer la page AVANT que certaines photos (surtout plusieurs à
  // la fois, sur une tablette moins puissante) aient fini de se décoder/peindre, ce qui les
  // faisait sortir vides à l'impression. On attend donc explicitement chaque image (avec un
  // filet de sécurité de 4s pour ne jamais bloquer indéfiniment si l'une d'elles échoue).
  const imgs = Array.from(area.querySelectorAll('img'));
  await Promise.all(imgs.map(img=> new Promise(resolve=>{
    if(img.complete) { resolve(); return; }
    img.addEventListener('load', resolve, {once:true});
    img.addEventListener('error', resolve, {once:true});
    setTimeout(resolve, 4000);
  })));

  if(title){
    const originalTitle = document.title;
    document.title = title;
    const restore = ()=>{ document.title = originalTitle; window.removeEventListener('afterprint', restore); };
    window.addEventListener('afterprint', restore);
    window.print();
    // Filet de sécurité : certains navigateurs ne déclenchent pas toujours 'afterprint' de façon fiable.
    setTimeout(restore, 3000);
  } else {
    window.print();
  }
}

/* ============ COLLER UNE IMAGE (presse-papier) ============ */
// Utilisée par l'icône "🖼 Image" de la barre d'outils : insère une image choisie depuis le
// disque, sur la feuille active. Se souvient du dernier dossier utilisé, comme Exporter/Importer.
async function insertImageFromPicker(){
  const sheet = activeSheet();
  if(!sheet){ alert("Sélectionne une page avant d'insérer une image."); return; }
  if(!('showOpenFilePicker' in window)){
    document.getElementById('image-input').click();
    return;
  }
  try{
    // showOpenFilePicker() doit être appelé en tout premier, sans AUCUN "await" avant — un
    // idbGet() avant lui fait perdre le geste de clic aux yeux de Chrome, qui refuse alors
    // d'ouvrir la fenêtre sans la moindre erreur (rien ne se passe au clic).
    const [fileHandle] = await window.showOpenFilePicker({
      types: [{ description: 'Image', accept: { 'image/*': ['.png','.jpg','.jpeg','.gif','.webp','.bmp'] } }],
      startIn: lastImageFileHandle || undefined
    });
    idbSet('lastImageFile', fileHandle).catch(()=>{});
    lastImageFileHandle = fileHandle;
    const file = await fileHandle.getFile();
    await insertImageBlob(file, sheet);
  }catch(err){
    if(err && err.name==='AbortError') return; // annulé par la personne
    console.warn('Sélecteur de fichier impossible, retour au sélecteur classique.', err);
    document.getElementById('image-input').click();
  }
}

function insertImageFromInput(e){
  const file = e.target.files[0];
  e.target.value = '';
  if(!file) return;
  const sheet = activeSheet();
  if(!sheet){ alert('Sélectionne une page avant d\'insérer une image.'); return; }
  insertImageBlob(file, sheet);
}

// Décale légèrement chaque collage successif (image ou élément) pour ne pas empiler les
// copies exactement au même endroit.
let pasteOffsetIndex = 0;
function insertImageBlob(blob, sheet, atX, atY, layer){
  return new Promise((resolve)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const src = reader.result;
      const probe = new Image();
      probe.onload = ()=>{
        const maxW = (794 - 80) / 2;  /* environ la moitié de la largeur utile de la page A4 */
        const maxH = (1123 - 180) / 2; /* environ la moitié de la hauteur utile */
        let startX = atX, startY = atY;
        if(startX==null || startY==null){
          // Décale chaque collage successif au même endroit par défaut (bouton "📋 Coller"
          // sans position précise) — sinon coller plusieurs fois la même image les empile
          // exactement au même endroit : la 2e, 3e... collent bien mais restent invisibles,
          // cachées sous la 1ère, ce qui donne l'impression que "coller" ne marche qu'une fois.
          startX = 60 + (pasteOffsetIndex%8)*18;
          startY = 90 + (pasteOffsetIndex%8)*18;
          pasteOffsetIndex++;
        }
        // Bug corrigé : si on colle assez bas sur une grande feuille (ex. via un appui long
        // près du bas), "maxH - (startY-90)" devenait négatif, ce qui rendait "scale" négatif —
        // et donc une image de largeur/hauteur négatives, invisible (juste son point de verrouillage
        // restait visible, ce qui donnait l'impression d'un collage "raté" alors que l'image était
        // bien là, juste réduite à une taille nulle). On impose maintenant un minimum de hauteur
        // disponible pour ne plus jamais tomber à zéro ni en négatif.
        const availableH = Math.max(80, maxH - Math.max(0, startY-90));
        const scale = Math.min(1, maxW/probe.width, availableH/probe.height);

        // Compression avant stockage : une photo d'appareil/tablette moderne peut peser plusieurs
        // Mo, et son encodage en base64 (~+33% de poids) peut vite remplir le stockage local du
        // navigateur (5 à 10 Mo au total pour TOUT le carnet) — c'est la cause des erreurs
        // "quota dépassée" rencontrées à la récupération cloud (voir trySetStorage). On limite donc
        // chaque photo à 1600px sur son plus grand côté et on la réencode en JPEG (qualité 0.82),
        // largement suffisant pour relire des mesures/annotations manuscrites, tout en réduisant la
        // taille typique d'un facteur de 5 à 10. Le calcul de placement ci-dessus reste basé sur les
        // dimensions D'ORIGINE (probe.width/height) : seul ce qui est ENREGISTRÉ change, pas la
        // taille affichée sur la feuille.
        const MAX_DIM = 1600;
        let finalSrc = src;
        if(probe.width > MAX_DIM || probe.height > MAX_DIM){
          try{
            const ratio = Math.min(MAX_DIM/probe.width, MAX_DIM/probe.height);
            const cw = Math.max(1, Math.round(probe.width*ratio)), ch = Math.max(1, Math.round(probe.height*ratio));
            const off = document.createElement('canvas');
            off.width = cw; off.height = ch;
            const octx = off.getContext('2d');
            octx.drawImage(probe, 0, 0, cw, ch);
            finalSrc = off.toDataURL('image/jpeg', 0.82);
          }catch(err){
            console.warn('Compression image impossible, on garde le fichier original :', err);
            finalSrc = src;
          }
        }

        const el = {
          id: uid(), type:'image', x: startX, y: startY,
          w: Math.max(20, Math.round(probe.width*scale)), h: Math.max(20, Math.round(probe.height*scale)), src: finalSrc,
          layer: layer==='front' ? 'front' : 'back' // 'back' (défaut) = derrière les traits/textes, comme avant
        };
        sheet.elements.push(el);
        save();
        renderCanvasStack();
        resolve();
      };
      probe.src = src;
    };
    reader.readAsDataURL(blob);
  });
}

// Redessine la zone sélectionnée (traits, images, textes) sur un canvas hors-écran
// puis l'envoie au presse-papier sous forme d'image PNG.
async function copyZoneToClipboard(sheet, x, y, w, h){
  if(!navigator.clipboard || !window.ClipboardItem){
    throw new Error('Presse-papier image non supporté par ce navigateur.');
  }
  const scale = 2; // export en haute résolution
  const canvas = document.createElement('canvas');
  canvas.width = Math.max(1, Math.round(w*scale));
  canvas.height = Math.max(1, Math.round(h*scale));
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);
  ctx.fillStyle = '#fbf9f4';
  ctx.fillRect(0, 0, w, h);
  ctx.translate(-x, -y);

  // Images (arrière-plan)
  const imageEls = sheet.elements.filter(e=>e.type==='image');
  await Promise.all(imageEls.map(el=> new Promise(resolve=>{
    const img = new Image();
    img.onload = ()=>{ ctx.drawImage(img, el.x, el.y, el.w, el.h); resolve(); };
    img.onerror = resolve;
    img.src = el.src;
  })));

  // Traits de stylo
  sheet.elements.filter(e=>e.type==='stroke').forEach(el=>{
    const pts = strokeDToPoints(el.d);
    if(pts.length<2) return;
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.strokeStyle = el.color;
    ctx.lineWidth = el.width;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
  });

  // Textes
  ctx.font = "16px 'Inter', sans-serif";
  ctx.textBaseline = 'alphabetic';
  sheet.elements.filter(e=>e.type==='text').forEach(el=>{
    ctx.fillStyle = el.color || '#1d2b3a';
    const lines = (el.text||'').split('\n');
    lines.forEach((line,i)=> ctx.fillText(line, el.x+4, el.y+20+i*22));
  });

  const blob = await new Promise(resolve=> canvas.toBlob(resolve, 'image/png'));
  if(!blob) throw new Error('Échec de la génération de l\'image.');
  await navigator.clipboard.write([ new ClipboardItem({ 'image/png': blob }) ]);
}


// ---- Copie "éléments" : garde le texte et les traits modifiables, au lieu d'aplatir en image ----
function textBBox(el){
  const lines = Math.max(1, (el.text||'').split('\n').length);
  return { x: el.x, y: el.y, w: el.w, h: lines*22 + 8 };
}
// Vrai si (x,y) tombe sur une image ou un texte déjà présent sur la feuille — utilisé pour ne
// pas proposer de coller par-dessus un élément existant (voir l'appui long au doigt plus haut).
function pointHitsExistingElement(sheet, x, y){
  return sheet.elements.some(el=>{
    if(el.type==='image'){
      return x>=el.x && x<=el.x+el.w && y>=el.y && y<=el.y+el.h;
    }
    if(el.type==='text'){
      const b = textBBox(el);
      return x>=b.x && x<=b.x+b.w && y>=b.y && y<=b.y+b.h;
    }
    return false;
  });
}
// Comme pointHitsExistingElement, mais renvoie l'IMAGE elle-même (la dernière qui correspond,
// donc la plus proche du dessus) au lieu d'un simple booléen — utilisé pour permettre de déplacer
// une image au stylet par un appui long, même en outil ✎ Stylo (voir bindCanvasEvents).
function findImageAt(sheet, x, y){
  let found = null;
  sheet.elements.forEach(el=>{
    if(el.type==='image' && x>=el.x && x<=el.x+el.w && y>=el.y && y<=el.y+el.h) found = el;
  });
  return found;
}
function strokeBBox(el){
  const pts = strokeDToPoints(el.d);
  const xs = pts.map(p=>p[0]), ys = pts.map(p=>p[1]);
  return { x: Math.min(...xs), y: Math.min(...ys), w: Math.max(...xs)-Math.min(...xs), h: Math.max(...ys)-Math.min(...ys) };
}
function rectsOverlap(a,b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}
function pointInPolygon(px, py, points){
  let inside = false;
  for(let i=0, j=points.length-1; i<points.length; j=i++){
    const xi=points[i][0], yi=points[i][1], xj=points[j][0], yj=points[j][1];
    const intersect = ((yi>py) !== (yj>py)) && (px < (xj-xi)*(py-yi)/((yj-yi)||1e-9)+xi);
    if(intersect) inside = !inside;
  }
  return inside;
}
function elementsInZone(sheet, x, y, w, h){
  const zone = {x,y,w,h};
  return sheet.elements.filter(el=>{
    let bbox;
    if(el.type==='stroke') bbox = strokeBBox(el);
    else if(el.type==='text') bbox = textBBox(el);
    else if(el.type==='image' || el.type==='group') bbox = {x:el.x, y:el.y, w:el.w, h:el.h};
    else return false;
    return rectsOverlap(bbox, zone);
  });
}
function elementsInLasso(sheet, points){
  return sheet.elements.filter(el=>{
    let bbox;
    if(el.type==='stroke') bbox = strokeBBox(el);
    else if(el.type==='text') bbox = textBBox(el);
    else if(el.type==='image' || el.type==='group') bbox = {x:el.x, y:el.y, w:el.w, h:el.h};
    else return false;
    return pointInPolygon(bbox.x+bbox.w/2, bbox.y+bbox.h/2, points);
  });
}
// Point d'entrée unique : marche pour une sélection rectangulaire ou au lasso.
// Retrouve le canvas (feuille affichée) qui a actuellement une sélection de zone active — utilisé
// par les boutons Rotation/Symétrie de la barre Sélection (voir plus bas), qui ne sont pas liés à
// un canvas particulier comme le sont les actions du petit menu flottant "Copier/Image/...".
function findActiveZoneCanvas(){
  return Array.from(document.querySelectorAll('.page-canvas')).find(c=>c._zoneSelection) || null;
}
function findSheetById(sheetId){
  for(const classeur of data.classeurs){
    for(const section of classeur.sections){
      for(const page of section.pages){
        const sheet = page.sheets.find(s=>s.id===sheetId);
        if(sheet) return sheet;
      }
    }
  }
  return null;
}
// Referme une sélection de zone depuis l'extérieur de bindCanvasEvents (voir clearZoneSelection,
// sa version interne utilisée pour le reste de la logique de sélection) — nécessaire ici car
// rotateZoneSelection/flipZoneSelection ne connaissent pas le canvas à l'avance.
function clearZoneSelectionOn(canvas){
  if(canvas._zoneRectEl){ canvas._zoneRectEl.remove(); canvas._zoneRectEl=null; }
  if(canvas._zoneActionsEl){ canvas._zoneActionsEl.remove(); canvas._zoneActionsEl=null; }
  canvas._zoneSelection = null;
}
// n pas de 90° sens horaire (n peut être négatif pour l'anti-horaire) appliqués à un vecteur.
function rotateVector90ForZone(dx, dy, steps){
  let x=dx, y=dy;
  const n = ((steps%4)+4)%4;
  for(let i=0;i<n;i++){ const nx=-y, ny=x; x=nx; y=ny; }
  return [x,y];
}
// Pivote de 90° (dir=+1 horaire, dir=-1 anti-horaire) tout le contenu de la sélection de zone
// actuellement tracée, autour du centre de cette zone. Les traits pivotent réellement (chaque
// point tourne) ; les images et les blocs bibliothèque pivotent comme un tout (voir
// updateElContentBox dans imageElDom) ; le texte, lui, garde son orientation lisible et se
// contente de changer de position autour du centre — pivoter les lettres elles-mêmes les
// rendrait illisibles pour un gain visuel minime.
function rotateZoneSelection(dir){
  const canvas = findActiveZoneCanvas();
  if(!canvas){ alert("Trace d'abord une sélection de zone (▭ Zone ou ➰ Lasso) avant de faire pivoter."); return; }
  const zsel = canvas._zoneSelection;
  const sheet = findSheetById(canvas.dataset.sheetId);
  if(!sheet) return;
  const els = getZoneElements(sheet, zsel);
  if(els.length===0){ alert('Rien à faire pivoter dans cette zone.'); return; }
  const cx = zsel.x + zsel.w/2, cy = zsel.y + zsel.h/2;
  els.forEach(el=>{
    if(el.type==='stroke'){
      const pts = strokeDToPoints(el.d).map(([x,y])=>{
        const [rdx,rdy] = rotateVector90ForZone(x-cx, y-cy, dir);
        return [cx+rdx, cy+rdy];
      });
      el.d = pointsToStrokeD(pts);
    } else if(el.type==='text'){
      const b = textBBox(el);
      const [rdx,rdy] = rotateVector90ForZone((b.x+b.w/2)-cx, (b.y+b.h/2)-cy, dir);
      el.x = cx+rdx-b.w/2; el.y = cy+rdy-b.h/2;
    } else if(el.type==='image' || el.type==='group'){
      const [rdx,rdy] = rotateVector90ForZone((el.x+el.w/2)-cx, (el.y+el.h/2)-cy, dir);
      const oldW = el.w, oldH = el.h;
      el.w = oldH; el.h = oldW;
      el.rotation = ((el.rotation||0) + (dir>0?90:270)) % 360;
      el.x = cx+rdx-el.w/2; el.y = cy+rdy-el.h/2;
    }
  });
  clearZoneSelectionOn(canvas);
  save();
  renderCanvasStack();
}
// Symétrie (miroir) de la sélection actuellement tracée, autour de son axe horizontal ('h',
// gauche ↔ droite) ou vertical ('v', haut ↕ bas). Même principe que rotateZoneSelection : traits
// réellement inversés point par point, images/blocs inversés comme un tout, texte simplement
// repositionné (reste lisible).
function flipZoneSelection(axis){
  const canvas = findActiveZoneCanvas();
  if(!canvas){ alert("Trace d'abord une sélection de zone (▭ Zone ou ➰ Lasso) avant d'appliquer une symétrie."); return; }
  const zsel = canvas._zoneSelection;
  const sheet = findSheetById(canvas.dataset.sheetId);
  if(!sheet) return;
  const els = getZoneElements(sheet, zsel);
  if(els.length===0){ alert('Rien à symétriser dans cette zone.'); return; }
  const cx = zsel.x + zsel.w/2, cy = zsel.y + zsel.h/2;
  els.forEach(el=>{
    if(el.type==='stroke'){
      const pts = strokeDToPoints(el.d).map(([x,y])=> axis==='h' ? [2*cx-x, y] : [x, 2*cy-y]);
      el.d = pointsToStrokeD(pts);
    } else if(el.type==='text'){
      const b = textBBox(el);
      const ocx = b.x+b.w/2, ocy = b.y+b.h/2;
      const ncx = axis==='h' ? 2*cx-ocx : ocx;
      const ncy = axis==='v' ? 2*cy-ocy : ocy;
      el.x = ncx-b.w/2; el.y = ncy-b.h/2;
    } else if(el.type==='image' || el.type==='group'){
      const ocx = el.x+el.w/2, ocy = el.y+el.h/2;
      const ncx = axis==='h' ? 2*cx-ocx : ocx;
      const ncy = axis==='v' ? 2*cy-ocy : ocy;
      const rot = el.rotation||0;
      el.rotation = axis==='h' ? (360-rot)%360 : (180-rot+360)%360;
      el.flip = !el.flip;
      el.x = ncx-el.w/2; el.y = ncy-el.h/2;
    }
  });
  clearZoneSelectionOn(canvas);
  save();
  renderCanvasStack();
}
function openFlipMenu(){
  showActionMenu('Sens de la symétrie :', [
    { label:'⇋ Horizontale (gauche ↔ droite)', onPick: ()=> flipZoneSelection('h') },
    { label:'⇅ Verticale (haut ↕ bas)', onPick: ()=> flipZoneSelection('v') }
  ]);
}

function getZoneElements(sheet, zsel){
  return zsel.points ? elementsInLasso(sheet, zsel.points) : elementsInZone(sheet, zsel.x, zsel.y, zsel.w, zsel.h);
}

const ELEMENTS_CLIP_PREFIX = 'CARNET_ELEMENTS_V1::';

// Traits/textes/images d'une zone, convertis en coordonnées RELATIVES au coin de la zone (x,y) —
// utilisé à la fois pour le copier-coller (presse-papier) et pour la bibliothèque, afin qu'un
// élément enregistré se recolle correctement où qu'on le pose ensuite.
function serializeZoneElements(sheet, x, y, w, h, points){
  const els = getZoneElements(sheet, {x,y,w,h,points});
  return els.map(el=>{
    if(el.type==='stroke'){
      const pts = strokeDToPoints(el.d).map(p=>[p[0]-x, p[1]-y]);
      return { type:'stroke', color: el.color, width: el.width, d: pointsToStrokeD(pts) };
    }
    if(el.type==='text'){
      return { type:'text', x: el.x-x, y: el.y-y, w: el.w, color: el.color, text: el.text };
    }
    if(el.type==='group'){
      // Conservé tel quel (avec ses propres éléments imbriqués) : un bloc copié/enregistré reste
      // un bloc, il ne s'"explose" pas tout seul en le recollant ou en le renvoyant en bibliothèque.
      return { type:'group', x: el.x-x, y: el.y-y, w: el.w, h: el.h, origW: el.origW, origH: el.origH, elements: el.elements };
    }
    return { type:'image', x: el.x-x, y: el.y-y, w: el.w, h: el.h, src: el.src, rotation: el.rotation, flip: el.flip };
  });
}

// Enregistre la sélection actuelle dans data.library (persistée comme le reste : export, synchro,
// sauvegarde locale). Redemande un nom à chaque fois plutôt que de compliquer l'interface avec un
// champ dédié — cohérent avec renameSection/renameClasseur qui utilisent déjà prompt().
function saveZoneToLibrary(sheet, x, y, w, h, points){
  const elements = serializeZoneElements(sheet, x, y, w, h, points);
  if(elements.length===0){ alert('Rien à enregistrer dans cette zone.'); return; }
  const name = prompt('Nom de cet élément de bibliothèque :', '');
  if(name===null) return; // annulé
  data.library.push({ id: uid(), name: name.trim() || 'Sans nom', elements });
  save();
  alert('Enregistré dans la bibliothèque. Pour le réutiliser : appui long sur une feuille → 📚 Bibliothèque.');
}

async function copyZoneAsElements(sheet, x, y, w, h, points){
  const elements = serializeZoneElements(sheet, x, y, w, h, points);
  if(elements.length===0) throw new Error('Rien à copier dans cette zone.');
  const payload = {
    magic: 'CARNET_ELEMENTS_V1',
    elements
  };
  await navigator.clipboard.writeText(ELEMENTS_CLIP_PREFIX + JSON.stringify(payload));
}

// Construit et insère un unique bloc "group" (voir groupElDom) à partir d'un tableau d'éléments
// (traits/texte/images/blocs), à (atX,atY) — ou à la position de collage par défaut si non
// précisé. Partagée par le collage presse-papier d'une sélection copiée au stylo/lasso (voir
// pasteElementsPayload) ET par la bibliothèque (insertLibraryItem) : dans les deux cas, même s'il
// y a du texte mélangé à des traits, le contenu arrive comme UN SEUL bloc déplaçable /
// redimensionnable, qu'on peut ensuite "💥 Exploser" pour retrouver les éléments d'origine séparés
// et modifiables individuellement.
function insertElementsAsGroup(elements, sheet, atX, atY){
  if(!elements || elements.length===0) return false;

  let baseX, baseY;
  if(atX!=null && atY!=null){ baseX = atX; baseY = atY; }
  else { baseX = 90 + (pasteOffsetIndex%8)*18; baseY = 130 + (pasteOffsetIndex%8)*18; pasteOffsetIndex++; }

  // Cas particulier : un seul élément qui est DÉJÀ un bloc (ex. on a copié un bloc déjà posé) —
  // pas besoin de l'emballer dans un bloc supplémentaire, on le repose simplement tel quel.
  if(elements.length===1 && elements[0].type==='group'){
    const g = elements[0];
    sheet.elements.push({ id: uid(), type:'group', x: baseX, y: baseY, w: g.w, h: g.h, origW: g.origW, origH: g.origH, rotation: g.rotation, flip: g.flip, elements: g.elements });
    save();
    renderCanvasStack();
    return true;
  }

  // Bbox englobant de tous les éléments, pour connaître la taille d'origine du bloc (mêmes
  // fonctions que pour l'affichage sur la feuille elle-même).
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  elements.forEach(el=>{
    let b;
    if(el.type==='stroke'){
      const pts = strokeDToPoints(el.d);
      const xs = pts.map(p=>p[0]), ys = pts.map(p=>p[1]);
      b = { x:Math.min(...xs), y:Math.min(...ys), w:Math.max(...xs)-Math.min(...xs), h:Math.max(...ys)-Math.min(...ys) };
    } else if(el.type==='text'){
      b = textBBox(el);
    } else {
      b = { x: el.x, y: el.y, w: el.w, h: el.h };
    }
    minX = Math.min(minX, b.x); minY = Math.min(minY, b.y);
    maxX = Math.max(maxX, b.x+b.w); maxY = Math.max(maxY, b.y+b.h);
  });
  if(!isFinite(minX)) return false;
  const origW = Math.max(1, maxX-minX), origH = Math.max(1, maxY-minY);

  // Éléments recalés relativement au coin (minX,minY) du bloc — c'est ce repère (0,0,origW,origH)
  // qu'utilise groupContentSVG pour les redessiner, et explodeGroup pour les reposer à l'identique.
  const relElements = elements.map(el=>{
    if(el.type==='stroke'){
      const pts = strokeDToPoints(el.d).map(p=>[p[0]-minX, p[1]-minY]);
      return { type:'stroke', color: el.color, width: el.width, highlight: el.highlight, d: pointsToStrokeD(pts) };
    }
    if(el.type==='text') return { type:'text', x: el.x-minX, y: el.y-minY, w: el.w, color: el.color, text: el.text };
    if(el.type==='group') return { type:'group', x: el.x-minX, y: el.y-minY, w: el.w, h: el.h, origW: el.origW, origH: el.origH, rotation: el.rotation, flip: el.flip, elements: el.elements };
    return { type:'image', x: el.x-minX, y: el.y-minY, w: el.w, h: el.h, src: el.src, layer: el.layer, rotation: el.rotation, flip: el.flip };
  });

  sheet.elements.push({
    id: uid(), type:'group', x: baseX, y: baseY, w: origW, h: origH,
    origW, origH, elements: relElements
  });
  save();
  renderCanvasStack();
  return true;
}

function pasteElementsPayload(jsonStr, sheet, atX, atY){
  let payload;
  try{ payload = JSON.parse(jsonStr); }catch(err){ return false; }
  if(!payload || payload.magic!=='CARNET_ELEMENTS_V1' || !Array.isArray(payload.elements)) return false;
  return insertElementsAsGroup(payload.elements, sheet, atX, atY);
}

// Insère un élément de bibliothèque (voir saveZoneToLibrary) sur la feuille active, à l'endroit
// de l'appui long ou du bouton "📚 Inser Biblio" — utilisé par le menu "📚 Bibliothèque" (voir
// pasteWithConfirm). Même mécanisme que le collage presse-papier ci-dessus (voir
// insertElementsAsGroup) : un seul bloc explosable, plutôt que des éléments épars.
function insertLibraryItem(item, atX, atY){
  const sheet = activeSheet();
  if(!sheet) return;
  insertElementsAsGroup(item.elements, sheet, atX, atY);
}

// Construit un aperçu SVG miniature d'un élément de bibliothèque (traits, texte, image), affiché
// à côté de son nom dans les menus ci-dessous — pour voir de quoi il s'agit sans avoir à
// l'insérer d'abord pour vérifier. Un simple viewBox centré sur l'ensemble des éléments suffit :
// pas besoin de recalculer une échelle nous-mêmes, le SVG s'en charge (preserveAspectRatio).
function libraryItemPreviewSVG(item){
  const els = (item && item.elements) || [];
  if(els.length===0) return '';
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  const bboxOf = (el)=>{
    if(el.type==='stroke'){
      const pts = strokeDToPoints(el.d);
      const xs = pts.map(p=>p[0]), ys = pts.map(p=>p[1]);
      return { x:Math.min(...xs), y:Math.min(...ys), w:Math.max(...xs)-Math.min(...xs), h:Math.max(...ys)-Math.min(...ys) };
    }
    if(el.type==='text') return textBBox(el);
    return { x:el.x, y:el.y, w:el.w, h:el.h };
  };
  els.forEach(el=>{
    const b = bboxOf(el);
    minX = Math.min(minX, b.x); minY = Math.min(minY, b.y);
    maxX = Math.max(maxX, b.x+b.w); maxY = Math.max(maxY, b.y+b.h);
  });
  if(!isFinite(minX)) return '';
  const pad = 6;
  const vx = minX-pad, vy = minY-pad, vw = Math.max(1,(maxX-minX)+pad*2), vh = Math.max(1,(maxY-minY)+pad*2);
  const parts = [];
  els.forEach(el=>{
    if(el.type==='stroke'){
      parts.push(`<path d="${escapeAttr(el.d)}" fill="none" stroke="${escapeAttr(el.color)}" stroke-width="${el.width}" stroke-linecap="round" stroke-linejoin="round"/>`);
    } else if(el.type==='image'){
      parts.push(`<image href="${escapeAttr(el.src)}" x="${el.x}" y="${el.y}" width="${el.w}" height="${el.h}" preserveAspectRatio="xMidYMid slice"/>`);
    } else if(el.type==='text'){
      const b = textBBox(el);
      const firstLine = (el.text||'').split('\n')[0].slice(0,40);
      parts.push(`<rect x="${b.x}" y="${b.y}" width="${b.w}" height="${b.h}" fill="rgba(255,255,255,.6)" stroke="#c8bfa8" stroke-width="1"/>`);
      parts.push(`<text x="${b.x+4}" y="${b.y+18}" font-size="15" font-family="monospace" fill="${escapeAttr(el.color||'#1d2b3a')}">${escapeHtml(firstLine)}</text>`);
    }
  });
  return `<svg viewBox="${vx} ${vy} ${vw} ${vh}" class="lib-preview-svg" preserveAspectRatio="xMidYMid meet">${parts.join('')}</svg>`;
}

// Menu "📚 Bibliothèque" : liste chaque élément enregistré (voir saveZoneToLibrary), avec une
// dernière option pour en supprimer si besoin. Utilise le même showActionMenu générique que le
// menu Coller/Insérer, donc fiable au clic même après un appui long (voir pasteWithConfirm).
function openLibraryMenu(atX, atY){
  if(!data.library || data.library.length===0){
    alert("La bibliothèque est vide. Pour y ajouter quelque chose : trace un rectangle ou un lasso de sélection (outil ▭ Zone), puis \"📚 Bibliothèque\".");
    return;
  }
  const options = data.library.map(item=>({
    label: item.name,
    previewHTML: libraryItemPreviewSVG(item),
    onPick: ()=> insertLibraryItem(item, atX, atY)
  }));
  options.push({ label: '🗑 Gérer / supprimer…', onPick: ()=> openLibraryManageMenu(atX, atY) });
  showActionMenu('Insérer depuis la bibliothèque :', options);
}
function openLibraryManageMenu(atX, atY){
  if(!data.library || data.library.length===0) return;
  const options = data.library.map(item=>({
    label: item.name,
    previewHTML: libraryItemPreviewSVG(item),
    onPick: ()=>{
      if(!confirm(`Supprimer "${item.name}" de la bibliothèque ?`)) return;
      data.library = data.library.filter(x=>x.id!==item.id);
      save();
    }
  }));
  showActionMenu('Supprimer quel élément ?', options);
}


// Petit menu générique (titre + boutons + "Annuler"), utilisé pour l'appui long au doigt —
// aussi bien pour proposer de coller/insérer une image sur une zone vide, que pour changer le
// plan (devant/derrière) d'une image déjà posée. Chaque bouton appelle son "onPick" en DIRECT
// depuis le clic réel (pas via une chaîne de promesses) : certaines actions (insérer une image)
// ouvrent un sélecteur de fichier qui exige un geste utilisateur tout frais — passer par un
// enchaînement de "await" avant risquerait de le faire échouer silencieusement (déjà vu ailleurs
// dans ce fichier avec le presse-papier et les sélecteurs de dossier).
function showActionMenu(title, options){
  const overlay = document.createElement('div');
  overlay.className = 'paste-confirm-overlay';
  const box = document.createElement('div');
  box.className = 'paste-confirm-box';
  const msg = document.createElement('p');

async function pasteClipboard(atX, atY){
  const sheet = activeSheet();
  if(!sheet){ alert('Sélectionne une page avant de coller.'); return; }
  // La lecture du presse-papier exige que le document ait le focus ; après une capture d'écran
  // (bascule vers l'outil de capture, une autre appli, une autre fenêtre…), ce focus n'est pas
  // toujours redonné à temps avant l'appel ci-dessous, ce qui déclenche justement le blocage de
  // 3s géré plus bas. On force donc explicitement le focus sur la fenêtre juste avant de lire,
  // avec une très courte pause pour lui laisser une chance de se rétablir.
  if(!document.hasFocus()){
    window.focus();
    await new Promise(r=> setTimeout(r, 60));
  }
  try{
    // Un seul appel au presse-papier (couvrant texte ET image) : enchaîner deux appels
    // séparés (readText() puis read()) faisait perdre le geste de clic entre les deux,
    // et Chrome bloquait silencieusement le second avec "Accès refusé".
    //
    // Filet de sécurité supplémentaire : sur certains Chrome, un 2e clic (ou un 2e appel
    // rapproché) sur "Coller" ne déclenche ni résultat ni erreur — la promesse reste bloquée
    // indéfiniment (bug connu du navigateur), ce qui donne l'impression que le bouton ne fait
    // plus rien du tout. On limite donc l'attente à 3s : passé ce délai, on prévient la
    // personne et on l'oriente vers Ctrl+V (clavier) ou vers l'appui long sur la feuille
    // (doigt ou stylet), qui utilisent un mécanisme de collage différent (événement navigateur
    // natif) non soumis à cette limitation.
    const items = await Promise.race([
      navigator.clipboard.read(),
      new Promise((_, reject)=> setTimeout(()=> reject(new Error('CLIPBOARD_TIMEOUT')), 3000))
    ]);
    for(const item of items){
      if(item.types.includes('text/plain')){
        const text = await (await item.getType('text/plain')).text();
        if(text && text.startsWith(ELEMENTS_CLIP_PREFIX)){
          if(pasteElementsPayload(text.slice(ELEMENTS_CLIP_PREFIX.length), sheet, atX, atY)) return;
        }
      }
    }
    for(const item of items){
      const type = item.types.find(t=>t.startsWith('image/'));
      if(type){ await insertImageBlob(await item.getType(type), sheet, atX, atY); return; }
    }
    alert('Rien à coller : ni image, ni élément copié depuis ce carnet, dans le presse-papier.');
  }catch(err){
    // Le presse-papier "rapide" (API asynchrone) n'a pas répondu à temps, ou l'accès a été
    // refusé — plutôt que de laisser la personne bloquée avec juste un message d'erreur, on
    // bascule automatiquement sur un collage "natif" garanti fiable (voir openNativePasteBox) :
    // il s'appuie sur EXACTEMENT le même mécanisme que Ctrl+V (déjà fiable à 100%, voir
    // l'écouteur 'paste' global plus bas), simplement déclenché depuis une case à l'écran au
    // lieu d'un raccourci clavier — utile sur tablette, sans clavier physique.
    openNativePasteBox(atX, atY);
  }
}

// Repli fiable à 100% quand le collage "rapide" (navigator.clipboard.read) ne répond pas : au
// lieu de dépendre de cette API asynchrone capricieuse, on affiche une case de texte bien réelle
// et on laisse le NAVIGATEUR gérer le collage lui-même (Ctrl+V, ou le bouton/bulle "Coller" que
// Windows affiche nativement sur une case de texte tenue appuyée) — exactement le mécanisme déjà
// utilisé par l'écouteur 'paste' global ci-dessous, qui a toujours fonctionné de façon fiable
// dans ce carnet, quel que soit le nombre de collages déjà faits.
let pendingPasteAt = null;
let activeNativePasteOverlay = null;
function closeNativePasteBox(){
  if(activeNativePasteOverlay){ activeNativePasteOverlay.remove(); activeNativePasteOverlay = null; }
  pendingPasteAt = null;
}
function openNativePasteBox(atX, atY){
  closeNativePasteBox();
  pendingPasteAt = (atX!=null && atY!=null) ? {x:atX, y:atY} : null;
  const overlay = document.createElement('div');
  overlay.className = 'paste-confirm-overlay';
  const box = document.createElement('div');
  box.className = 'paste-confirm-box';
  const msg = document.createElement('p');
  msg.textContent = 'Le collage rapide ne répond pas cette fois. Appuie dans la case ci-dessous, puis choisis "Coller" (ou fais Ctrl+V) :';
  const field = document.createElement('div');
  field.contentEditable = 'true';
  field.className = 'native-paste-field';
  field.setAttribute('data-placeholder', 'Zone de collage — appuie ici');
  const actions = document.createElement('div');
  actions.className = 'paste-confirm-actions';
  const cancel = document.createElement('button');
  cancel.className = 'secondary';
  cancel.textContent = 'Annuler';
  cancel.onclick = closeNativePasteBox;
  actions.appendChild(cancel);
  box.append(msg, field, actions);
  overlay.appendChild(box);
  overlay.onclick = (e)=>{ if(e.target===overlay) closeNativePasteBox(); };
  document.body.appendChild(overlay);
  activeNativePasteOverlay = overlay;
  field.focus();
}

document.addEventListener('paste', (e)=>{
  const sheet = activeSheet();
  if(!sheet) return;
  // Si ce collage vient de la case de secours (voir openNativePasteBox), on insère au même
  // endroit que ce qui avait été demandé au départ (appui long), au lieu du décalage par défaut.
  const atX = pendingPasteAt ? pendingPasteAt.x : undefined;
  const atY = pendingPasteAt ? pendingPasteAt.y : undefined;
  const text = e.clipboardData && e.clipboardData.getData('text/plain');
  if(text && text.startsWith(ELEMENTS_CLIP_PREFIX)){
    e.preventDefault();
    if(pasteElementsPayload(text.slice(ELEMENTS_CLIP_PREFIX.length), sheet, atX, atY)) closeNativePasteBox();
    return;
  }
  const items = e.clipboardData && e.clipboardData.items;
  if(!items) return;
  for(const item of items){
    if(item.type && item.type.startsWith('image/')){
      const blob = item.getAsFile();
      if(blob){ insertImageBlob(blob, sheet, atX, atY).then(closeNativePasteBox); e.preventDefault(); }
      break;
    }
  }
});

// L'API File System Access permet de choisir un dossier ou fichier UNE fois ; le
// navigateur retient ensuite la permission pour y écrire/lire directement, sans
// repasser par une boîte de dialogue "Enregistrer sous" à chaque fois.
// Non supporté par Firefox/Safari — dans ce cas on retombe sur le comportement classique.
const HANDLE_DB = 'carnet_handles_v1';
function openHandleDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(HANDLE_DB, 1);
    req.onupgradeneeded = ()=> req.result.createObjectStore('handles');
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
}
async function idbSet(key, value){
  const db = await openHandleDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction('handles','readwrite');
    tx.objectStore('handles').put(value, key);
    tx.oncomplete = ()=>resolve();
    tx.onerror = ()=>reject(tx.error);
  });
}
async function idbGet(key){
  const db = await openHandleDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction('handles','readonly');
    const req = tx.objectStore('handles').get(key);
    req.onsuccess = ()=>resolve(req.result || null);
    req.onerror = ()=>reject(req.error);
  });
}

// Caches en mémoire des derniers fichiers choisis (image / export / import) : servent de
// "startIn" pour rouvrir le sélecteur directement dans le même dossier la fois suivante, au lieu
// de retomber sur le dossier par défaut à chaque fois. Chargés en tâche de fond au démarrage —
// pas besoin de geste utilisateur pour un simple idbGet — puis tenus à jour à chaque nouveau choix.
let lastImageFileHandle = null, lastExportFileHandle = null, lastImportFileHandle = null;
Promise.all([
  idbGet('lastImageFile').catch(()=>null),
  idbGet('lastExportFile').catch(()=>null),
  idbGet('lastImportFile').catch(()=>null)
]).then(([img, exp, imp])=>{
  lastImageFileHandle = img; lastExportFileHandle = exp; lastImportFileHandle = imp;
});
async function verifyHandlePermission(handle, mode){
  const opts = { mode };
  if((await handle.queryPermission(opts))==='granted') return true;
  if((await handle.requestPermission(opts))==='granted') return true;
  return false;
}
// Un seul dossier de sauvegarde, utilisé à la fois pour la sauvegarde auto (toutes les 10 min)
// et pour la copie de sécurité avant chaque "Récupérer" (voir backupBeforePull) — plus simple
// qu'avoir deux dossiers séparés à configurer.
async function updateFsStatus(){
  const exportEl = document.getElementById('export-path');
  if(!exportEl) return;
  const [autoDir, lastExport] = await Promise.all([
    idbGet('exportDir'), idbGet('lastExportFile')
  ]);
  const exportParts = [];
  if(autoDir) exportParts.push(autoDir.name);
  else if(lastExport) exportParts.push(lastExport.name);
  exportEl.textContent = exportParts.join(' · ');
}

async function exportData(){
  if(!('showSaveFilePicker' in window)){
    // Solution de repli pour les navigateurs sans cette fonction (ex. Firefox, Safari) :
    // téléchargement classique, sans mémoire du dernier emplacement.
    const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'carnet-sauvegarde-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    recordLastAction('export');
    return;
  }
  try{
    // showSaveFilePicker() en tout premier, sans AUCUN "await" avant (voir insertImageFromPicker
    // plus haut pour l'explication) — sinon la fenêtre ne s'ouvre pas, silencieusement.
    const fileHandle = await window.showSaveFilePicker({
      suggestedName: 'carnet-sauvegarde.json',
      types: [{ description: 'Sauvegarde carnet (JSON)', accept: {'application/json': ['.json']} }],
      startIn: lastExportFileHandle || undefined
    });
    const writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify(data, null, 2));
    await writable.close();
    idbSet('lastExportFile', fileHandle).catch(()=>{});
    lastExportFileHandle = fileHandle;
    recordLastAction('export');
    const el = document.getElementById('export-path');
    if(el){ el.textContent = `✓ Exporté vers ${fileHandle.name}`; setTimeout(updateFsStatus, 2500); }
  }catch(err){
    if(err && err.name==='AbortError') return; // annulé par la personne
    console.error('Export impossible :', err);
    alert("L'export a échoué. Réessaie, et si ça persiste, dis-le-moi avec le message d'erreur affiché dans la console (F12).");
  }
}

function applyImportedJson(text){
  try{
    const parsed = JSON.parse(text);
    if(!parsed.sections && !parsed.classeurs) throw new Error('format invalide');
    if(!confirm('Importer ce fichier remplacera toutes les notes actuelles. Continuer ?')) return;
    data = migrate(parsed);
    activeClasseurId = data.classeurs[0]?.id;
    activeSectionId = data.classeurs[0]?.sections[0]?.id;
    activePageId = data.classeurs[0]?.sections[0]?.pages[0]?.id;
    activeSheetId = data.classeurs[0]?.sections[0]?.pages[0]?.sheets[0]?.id;
    save(); renderSidebar(); renderCanvasStack();
    recordLastAction('import');
  }catch(err){ alert('Fichier invalide.'); }
}

async function triggerImport(){
  if(!('showOpenFilePicker' in window)){
    document.getElementById('import-input').click();
    return;
  }
  try{
    // showOpenFilePicker() en tout premier, sans AUCUN "await" avant (même raison que
    // insertImageFromPicker plus haut) — sinon la fenêtre ne s'ouvre pas, silencieusement.
    const [fileHandle] = await window.showOpenFilePicker({
      types: [{ description: 'Sauvegarde carnet (JSON)', accept: {'application/json': ['.json']} }],
      startIn: lastImportFileHandle || undefined
    });
    idbSet('lastImportFile', fileHandle).catch(()=>{});
    lastImportFileHandle = fileHandle;
    const file = await fileHandle.getFile();
    applyImportedJson(await file.text());
    updateFsStatus();
  }catch(err){
    if(err && err.name==='AbortError') return; // annulé par la personne
    console.warn('Sélecteur de fichier impossible, retour au sélecteur classique.', err);
    document.getElementById('import-input').click();
  }
}

function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=> applyImportedJson(reader.result);
  reader.readAsText(file);
  e.target.value = '';
}

// tout classeur/section/page/feuille qui n'existe qu'en local est conservé tel quel ; tout ce qui
// existe des deux côtés est remplacé par le contenu distant (plus récent) ; tout ce qui n'existe
// que côté distant est ajouté. Ainsi une page créée hors-ligne (ou juste avant qu'un autre appareil
// synchronise) ne peut plus disparaître silencieusement — au pire elle attend le prochain envoi.
// Contrepartie assumée : une suppression faite sur un autre appareil ne se propage plus toute seule
// ici ; il faut supprimer la page/section/classeur sur chaque appareil pour qu'elle disparaisse partout.
//
// Important : une section ou une page peut avoir été DÉPLACÉE localement (bouton ⇄) vers un autre
// classeur/section juste avant qu'une synchro plus ancienne n'arrive (elle ne connaît pas encore ce
// déplacement). On repère donc les sections et les pages existantes n'importe où dans le carnet local
// (pas seulement à l'intérieur de leur ancien parent) pour mettre à jour leur contenu là où elles se
// trouvent actuellement, au lieu de les re-créer en double à leur ancien emplacement distant.
function mergeIncoming(local, remote){
  local.classeurs = local.classeurs || [];
  local.library = local.library || [];
  // Bibliothèque : fusion additive comme le reste — un élément ajouté sur un autre appareil
  // apparaît ici, mais rien n'est jamais supprimé localement par la synchro.
  const localLibraryIds = new Set(local.library.map(it=>it.id));
  (remote.library||[]).forEach(rit=>{
    if(!localLibraryIds.has(rit.id)){ local.library.push(rit); localLibraryIds.add(rit.id); }
  });

  // Suppressions (tombstones) : fusion additive de la LISTE elle-même (on garde toujours la
  // trace de tout ce qui a été supprimé quelque part), puis appliquées à la toute fin de la
  // fusion — après avoir ajouté ce qui vient de l'autre appareil — pour que ce qui a été
  // supprimé là-bas disparaisse ici aussi, sans jamais ressusciter par erreur.
  local.tombstones = local.tombstones || [];
  const localTombstoneIds = new Set(local.tombstones.map(t=>t.id));
  (remote.tombstones||[]).forEach(rt=>{
    if(!localTombstoneIds.has(rt.id)){ local.tombstones.push(rt); localTombstoneIds.add(rt.id); }
  });

  const localSections = new Map(); // sectionId -> objet section, où qu'il vive en local
  const localPages = new Map();    // pageId -> objet page, où qu'il vive en local
  local.classeurs.forEach(c=> (c.sections||[]).forEach(s=>{
    localSections.set(s.id, s);
    (s.pages||[]).forEach(p=> localPages.set(p.id, p));
  }));

  (remote.classeurs||[]).forEach(rc=>{
    let lc = local.classeurs.find(c=>c.id===rc.id);
    if(!lc){
      local.classeurs.push(rc);
      (rc.sections||[]).forEach(s=>{
        localSections.set(s.id, s);
        (s.pages||[]).forEach(p=> localPages.set(p.id, p));
      });
      return;
    }
    lc.name = rc.name;
    lc.sections = lc.sections || [];
    (rc.sections||[]).forEach(rs=>{
      const existingSection = localSections.get(rs.id);
      if(!existingSection){
        // Vraiment nouvelle : on l'ajoute dans ce classeur.
        lc.sections.push(rs);
        localSections.set(rs.id, rs);
        (rs.pages||[]).forEach(p=> localPages.set(p.id, p));
        return;
      }
      // Existe déjà quelque part en local (peut-être déplacée entre-temps vers un autre
      // classeur) : on met à jour son contenu là où elle se trouve réellement, sans la dupliquer.
      existingSection.name = rs.name;
      if(rs.orientation) existingSection.orientation = rs.orientation;
      existingSection.pages = existingSection.pages || [];
      (rs.pages||[]).forEach(rp=>{
        const existingPage = localPages.get(rp.id);
        if(!existingPage){
          existingSection.pages.push(rp);
          localPages.set(rp.id, rp);
          return;
        }
        // Idem pour la page : peut-être déplacée vers une autre section entre-temps.
        existingPage.name = rp.name;
        if(rp.orientation) existingPage.orientation = rp.orientation;
        if(rp.createdAt) existingPage.createdAt = rp.createdAt;
        existingPage.sheets = existingPage.sheets || [];
        (rp.sheets||[]).forEach(rsh=>{
          let lsh = existingPage.sheets.find(sh=>sh.id===rsh.id);
          if(!lsh){ existingPage.sheets.push(rsh); }
          else{ lsh.elements = rsh.elements; }
        });
      });
    });
  });

  applyTombstones(local);
  return local;
}

// Retire du carnet local tout classeur/section/page/feuille présent dans la liste des
// suppressions (voir recordTombstone) — qu'il ait été là depuis toujours ou tout juste ajouté par
// la fusion ci-dessus. Recrée un contenu minimal si une suppression viderait complètement un
// niveau (ex. plus aucune section dans un classeur), pour ne jamais se retrouver avec un carnet
// cassé — même filet de sécurité que dans migrate().
function applyTombstones(local){
  const tomb = new Set((local.tombstones||[]).map(t=>t.id));
  if(tomb.size===0) return;
  local.classeurs = (local.classeurs||[]).filter(c=>!tomb.has(c.id));
  local.classeurs.forEach(c=>{
    c.sections = (c.sections||[]).filter(s=>!tomb.has(s.id));
    c.sections.forEach(s=>{
      s.pages = (s.pages||[]).filter(p=>!tomb.has(p.id));
      s.pages.forEach(p=>{
        p.sheets = (p.sheets||[]).filter(sh=>!tomb.has(sh.id));
        if(p.sheets.length===0) p.sheets.push({ id: uid(), elements: [] });
      });
      if(s.pages.length===0){
        s.pages.push({ id: uid(), name: 'Page 1', orientation: s.orientation || 'portrait', createdAt: dateJour(), sheets: [{ id: uid(), elements: [] }] });
      }
    });
    if(c.sections.length===0){
      c.sections.push({ id: uid(), name: 'Section 1', orientation: 'portrait', pages: [{ id: uid(), name: 'Page 1', orientation: 'portrait', createdAt: dateJour(), sheets: [{ id: uid(), elements: [] }] }] });
    }
  });
  if(local.classeurs.length===0){
    local.classeurs.push(seedData().classeurs[0]);
  }
}

function formatSyncTime(ts){
  if(!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('fr-FR') + ' ' + d.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
}
function updateSyncStatus(state, ts){
  const icon = document.getElementById('sync-mini-icon');
  const statusEl = document.getElementById('sync-mini-status');

  if(state==='off'){
    if(icon){ icon.className = ''; icon.title = 'Synchro : non connectée (clique pour configurer)'; }
    return;
  }

  if(icon){
    if(state==='off'){ icon.className = ''; icon.title = 'Synchro : non connectée (clique pour configurer un code carnet)'; }
    else if(state==='ready'){ icon.className = 'synced'; icon.title = 'Synchro prête — utilise "Envoyer" / "Récupérer"'; }
    else if(state==='busy'){ icon.className = 'connecting'; icon.title = '🔄 En cours…'; }
    else if(state==='synced'){ icon.className = 'synced'; icon.title = '✓ Envoyé ' + formatSyncTime(ts); }
    else if(state==='received'){ icon.className = 'synced'; icon.title = '↓ Récupéré ' + formatSyncTime(ts); }
    else if(state==='error'){ icon.className = 'error'; icon.title = '⚠ Échec de la dernière opération'; }
  }
  if(statusEl && (state==='synced' || state==='received')){
    statusEl.textContent = (state==='synced' ? 'Envoyé le ' : 'Récupéré le ') + formatSyncTime(ts);
  }
}

// Synchro 100% manuelle et explicite (deux boutons "Envoyer" / "Récupérer") — plus de synchro
// automatique en arrière-plan. C'est volontaire : l'ancienne version essayait de tout
// synchroniser en temps réel toute seule, ce qui provoquait des conflits difficiles à prévoir
// entre appareils (une version plus ancienne pouvait arriver au mauvais moment). Avec des
// boutons explicites, c'est toi qui décides quand envoyer ta version et quand aller chercher
// celle d'un autre appareil — plus prévisible, plus sûr.
function initFirebaseSync(){
  if(!syncCode){ updateSyncStatus('off'); fbRef = null; return; }
  if(typeof firebase === 'undefined'){
    // Le SDK Firebase (chargé depuis gstatic.com, voir les <script> tout en haut du fichier)
    // n'a pas pu se charger — pas de réseau au chargement de la page, CDN bloqué par le
    // navigateur/un bloqueur de pub, etc. Sans ce message, la synchro semblait juste "ne rien
    // faire" : l'icône passait discrètement en rouge, sans aucune explication.
    console.error('Synchro Firebase : le SDK (firebase-app-compat.js / firebase-database-compat.js) ne s\'est pas chargé.');
    updateSyncStatus('error');
    showInfoMessage("La synchro ne peut pas démarrer : les fichiers Firebase n'ont pas pu se charger (pas de réseau à l'ouverture de l'appli, ou bloqués par le navigateur). Recharge la page avec une connexion active, puis réessaie.");
    return;
  }
  try{
    if(!fbApp){
      fbApp = firebase.initializeApp(firebaseConfig);
      fbDb = firebase.database();
    }
    fbRef = fbDb.ref('carnets/' + syncCode);
    updateSyncStatus('ready');
  }catch(err){
    console.error('Erreur de connexion à la synchro Firebase :', err);
    updateSyncStatus('error');
    showInfoMessage("Impossible de préparer la synchro avec ce code (" + (err && err.message ? err.message : 'erreur inconnue') + "). Vérifie que le code ne contient pas de caractères comme . # $ [ ] et réessaie.");
  }
}

// Avant un "Récupérer", on garde une copie de secours du carnet actuel sur le disque — au cas
// où la fusion ramènerait quelque chose d'inattendu, on peut toujours revenir en arrière
// manuellement en réimportant ce fichier. Utilise le même dossier que la sauvegarde automatique
// (bouton 📁), configuré une seule fois via chooseExportFolder(). Cette fonction ne fait QUE lire
// ce dossier déjà choisi (jamais d'appel à showDirectoryPicker ici) : l'ouvrir au milieu d'un
// enchaînement de "await" est justement ce qui empêchait la fenêtre de s'afficher auparavant.
async function backupBeforePull(){
  if(!('showDirectoryPicker' in window)) return false; // Firefox / Safari : pas de copie de secours automatique possible
  try{
    let dirHandle = await idbGet('exportDir');
    if(!dirHandle){
      alert('Choisis d\'abord un dossier de sauvegarde avec le bouton 📁 (par exemple un dossier "Sauv carnet" sur ton disque C:), puis réessaie "Récupérer".');
      return false;
    }
    if(!(await verifyHandlePermission(dirHandle, 'readwrite').catch(()=>false))){
      alert('L\'accès au dossier de sauvegarde a été perdu (autorisation à renouveler). Reclique sur le bouton 📁 pour le reconfigurer, puis réessaie.');
      return false;
    }
    const d = new Date();
    const pad = n=> String(n).padStart(2,'0');
    const stamp = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}_${pad(d.getHours())}h${pad(d.getMinutes())}m${pad(d.getSeconds())}`;
    const fileHandle = await dirHandle.getFileHandle(`carnet_${stamp}.json`, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify(data));
    await writable.close();
    return true;
  }catch(err){
    console.warn('Copie de sauvegarde avant récupération impossible :', err);
    return false;
  }
}

// Fait échouer une promesse Firebase qui ne répond jamais (mauvaise connexion, règles de
// sécurité qui bloquent silencieusement...) au bout de 15s, plutôt que de laisser "Envoyer" /
// "Récupérer" tourner indéfiniment sans le moindre message — c'est ce qui donnait l'impression
// que "rien ne se passe" : le bouton restait en "busy" pour toujours, sans succès NI erreur.
function withSyncTimeout(promise){
  return Promise.race([
    promise,
    new Promise((_,reject)=> setTimeout(()=> reject(new Error('TIMEOUT')), 15000))
  ]);
}

// Bouton "⬆ Envoyer" : remplace la version en ligne par le contenu local actuel.
// Utilise showConfirmMessage/showInfoMessage (boîtes de dialogue maison) plutôt que
// confirm()/alert() natifs : ces derniers sont purement et simplement ignorés par certains
// navigateurs en mode application (PWA à l'écran d'accueil), ce qui donnait l'impression que
// rien ne se passait, aussi bien en cas de succès que d'erreur.
function manualPushSync(){
  if(!syncCode || !fbRef){ showInfoMessage("Configure d'abord un code de synchro (icône 🔗) avant d'envoyer."); return; }
  showConfirmMessage("Envoyer ce carnet vers le cloud ? Ça va REMPLACER la version en ligne actuelle (celle des autres appareils) par ton carnet tel qu'il est ici, maintenant.", ()=>{
    updateSyncStatus('busy');
    const ts = Date.now();
    try{
      // Firebase REFUSE tout objet contenant une valeur "undefined" n'importe où dans l'arbre
      // (ex. le champ "rotation" d'une image jamais pivotée) — et le fait de façon SYNCHRONE,
      // avant même de renvoyer une promesse : sans ce nettoyage, .set() plantait immédiatement,
      // en dehors de tout .catch(), donc sans le moindre message (« rien ne se passe » à l'envoi).
      // Le passage par JSON supprime proprement ces valeurs "undefined", exactement comme le
      // fait déjà save() pour la sauvegarde locale.
      const cleanData = JSON.parse(JSON.stringify(data));
      withSyncTimeout(fbRef.set({ data: cleanData, updatedAt: ts })).then(()=>{
        setLastSyncTs(ts);
        updateSyncStatus('synced', ts);
        // Confirmation explicite : avant, un envoi réussi ne changeait QUE la petite icône de
        // synchro (facile à manquer) — sans ce message, ça peut donner l'impression que rien ne
        // s'est passé alors que l'envoi a en fait fonctionné.
        showInfoMessage('✓ Carnet envoyé vers le cloud (' + formatSyncTime(ts) + ').');
      }).catch((err)=>{
        console.error('Erreur Firebase (envoi) — vérifie ta connexion et les règles de sécurité (F12) :', err);
        updateSyncStatus('error');
        if(err && err.message==='TIMEOUT'){
          showInfoMessage("L'envoi ne répond pas depuis 15 secondes (connexion trop lente, ou bloquée par les règles de sécurité Firebase). Vérifie ta connexion et réessaie.");
        } else if(err && err.code==='PERMISSION_DENIED'){
          showInfoMessage("Échec de l'envoi : accès refusé par les règles de sécurité de la base Firebase (PERMISSION_DENIED). Il faut autoriser la lecture/écriture sur le chemin \"carnets/\" dans la console Firebase (Realtime Database → Règles) — ce n'est pas réglable depuis le carnet lui-même.");
        } else {
          showInfoMessage("Échec de l'envoi vers le cloud (" + (err && err.message ? err.message : 'erreur inconnue') + "). Vérifie ta connexion et réessaie.");
        }
      });
    }catch(err){
      // Filet de sécurité : capture aussi toute erreur SYNCHRONE inattendue (comme celle
      // décrite ci-dessus), pour ne plus jamais échouer en silence.
      console.error('Erreur immédiate lors de la préparation de l\'envoi :', err);
      updateSyncStatus('error');
      showInfoMessage("Échec de l'envoi (" + (err && err.message ? err.message : 'erreur inconnue') + "). Vérifie ta connexion et réessaie.");
    }
  });
}

// Bouton "⬇ Récupérer" : va chercher la version en ligne UNE fois et REMPLACE ENTIÈREMENT le
// carnet local par celle-ci (choix assumé : plus simple et plus prévisible qu'une fusion, quitte
// à perdre du contenu local pas encore envoyé — d'où la copie de sauvegarde automatique juste
// avant, voir backupBeforePull, qui permet de tout récupérer manuellement si besoin).
// Voir manualPushSync ci-dessus pour la raison du passage à showConfirmMessage/showInfoMessage.
function manualPullSync(){
  if(!syncCode || !fbRef){ showInfoMessage("Configure d'abord un code de synchro (icône 🔗) avant de récupérer."); return; }
  showConfirmMessage("Récupérer la version en ligne ? Elle va REMPLACER ENTIÈREMENT ton carnet actuel (tout ce qui n'a pas encore été envoyé sera perdu ici, mais une copie de sauvegarde de ton carnet actuel sera d'abord enregistrée sur ton disque, par précaution).", async ()=>{
    updateSyncStatus('busy');
    await backupBeforePull(); // on continue même si la sauvegarde échoue ou est annulée — c'est une sécurité en plus, pas un blocage
    try{
    withSyncTimeout(fbRef.once('value')).then((snap)=>{
      const remote = snap.val();
      if(!remote || !remote.data){
        showInfoMessage("Aucune donnée trouvée en ligne pour ce code de synchro (personne n'a encore envoyé de carnet avec ce code).");
        updateSyncStatus('ready');
        return;
      }
      const before = JSON.stringify(data);
      suspendHistory = true;
      data = migrate(remote.data);
      suspendHistory = false;
      lastSavedRaw = JSON.stringify(data);
      const savedOk = trySetStorage(lastSavedRaw, {silent:true});
      selectedElId = null;
      clampActiveRefs();
      renderSidebar(); renderCanvasStack();
      setLastSyncTs(remote.updatedAt || Date.now());
      updateSyncStatus(savedOk ? 'received' : 'error', remote.updatedAt);
      // Confirmation explicite, avec une précision utile : si le contenu récupéré était déjà
      // identique au tien (rien de nouveau à fusionner), le dire clairement plutôt que de laisser
      // croire que la récupération n'a rien fait. Si la sauvegarde locale échoue (stockage plein —
      // voir trySetStorage), le dire clairement aussi : ce qui est affiché à l'écran est bien la
      // version en ligne, mais elle ne survivra pas à une fermeture de l'appli tant que le carnet
      // dépasse la capacité de stockage de l'appareil.
      if(!savedOk){
        showInfoMessage("Récupéré, mais impossible de sauvegarder localement : ce carnet (avec ses photos) dépasse la capacité de stockage de cet appareil. Ce que tu vois à l'écran est bien la version en ligne — utilise le bouton \"🗜 Compacter\" juste en dessous pour réduire la taille des photos, puis réessaie d'enregistrer (sinon, si tu fermes l'appli maintenant, tu retrouveras l'ancienne version au prochain lancement).");
      } else {
        showInfoMessage(lastSavedRaw===before
          ? 'Récupéré — mais ton carnet était déjà identique à la version en ligne.'
          : '✓ Carnet remplacé par la version en ligne.');
      }
    }).catch((err)=>{
      console.error('Erreur Firebase (récupération) — vérifie ta connexion et les règles de sécurité (F12) :', err);
      updateSyncStatus('error');
      if(err && err.message==='TIMEOUT'){
        showInfoMessage("La récupération ne répond pas depuis 15 secondes (connexion trop lente, ou bloquée par les règles de sécurité Firebase). Vérifie ta connexion et réessaie.");
      } else if(err && err.code==='PERMISSION_DENIED'){
        showInfoMessage("Échec de la récupération : accès refusé par les règles de sécurité de la base Firebase (PERMISSION_DENIED). Il faut autoriser la lecture/écriture sur le chemin \"carnets/\" dans la console Firebase (Realtime Database → Règles) — ce n'est pas réglable depuis le carnet lui-même.");
      } else {
        showInfoMessage('Échec de la récupération depuis le cloud (' + (err && err.message ? err.message : 'erreur inconnue') + '). Vérifie ta connexion et réessaie.');
      }
    });
    }catch(err){
      // Filet de sécurité : capture aussi toute erreur SYNCHRONE inattendue, pour ne plus jamais
      // échouer en silence (voir manualPushSync ci-dessus pour un exemple concret).
      console.error('Erreur immédiate lors de la préparation de la récupération :', err);
      updateSyncStatus('error');
      showInfoMessage("Échec de la récupération (" + (err && err.message ? err.message : 'erreur inconnue') + "). Vérifie ta connexion et réessaie.");
    }
  });
}

document.getElementById('sync-push-btn').onclick = manualPushSync;
document.getElementById('sync-pull-btn').onclick = manualPullSync;

// Recompresse une image déjà enregistrée (base64) : ne fait rien si elle est déjà assez petite.
// Réutilise la même limite (1600px / JPEG 0.82) que l'insertion d'une nouvelle photo — voir
// insertImageBlob — pour rester cohérent avec ce qu'on obtiendrait en la collant à nouveau.
function compressDataUrl(src, maxDim, quality){
  return new Promise((resolve)=>{
    const img = new Image();
    img.onload = ()=>{
      if(img.width<=maxDim && img.height<=maxDim){ resolve(null); return; } // déjà assez petite
      try{
        const ratio = Math.min(maxDim/img.width, maxDim/img.height);
        const cw = Math.max(1, Math.round(img.width*ratio)), ch = Math.max(1, Math.round(img.height*ratio));
        const off = document.createElement('canvas');
        off.width = cw; off.height = ch;
        off.getContext('2d').drawImage(img, 0, 0, cw, ch);
        resolve(off.toDataURL('image/jpeg', quality));
      }catch(err){ resolve(null); }
    };
    img.onerror = ()=> resolve(null);
    img.src = src;
  });
}

// Outil "🗜 Compacter" : recompresse TOUTES les photos déjà présentes dans le carnet (y compris
// celles insérées avant l'ajout de la compression automatique à l'insertion — voir insertImageBlob),
// pour libérer de la place dans le stockage local du navigateur. Sert en particulier quand
// "Récupérer" a réussi à charger la version en ligne mais échoue à la sauvegarder localement
// faute de place (voir trySetStorage/manualPullSync) : compacter puis réessayer d'enregistrer.
async function compactAllImages(){
  const targets = [];
  data.classeurs.forEach(c=> (c.sections||[]).forEach(s=> (s.pages||[]).forEach(p=> (p.sheets||[]).forEach(sh=>{
    (sh.elements||[]).forEach(el=>{
      if(el.type==='image') targets.push(el);
      if(el.type==='group') (el.elements||[]).forEach(child=>{ if(child.type==='image') targets.push(child); });
    });
  }))));
  if(targets.length===0){ showInfoMessage("Ce carnet ne contient aucune photo à compacter."); return; }
  const btn = document.getElementById('compact-images-btn');
  const originalLabel = btn ? btn.textContent : null;
  if(btn){ btn.disabled = true; btn.textContent = '…'; }
  const beforeLen = JSON.stringify(data).length;
  let changed = 0;
  for(const el of targets){
    const compressed = await compressDataUrl(el.src, 1600, 0.82);
    if(compressed && compressed.length < el.src.length){ el.src = compressed; changed++; }
  }
  const afterLen = JSON.stringify(data).length;
  if(btn){ btn.disabled = false; btn.textContent = originalLabel; }
  if(changed===0){
    showInfoMessage("Toutes les photos de ce carnet sont déjà compactes — rien à réduire de plus.");
    return;
  }
  save();
  renderCanvasStack();
  const savedMB = Math.max(0, (beforeLen-afterLen)/1024/1024).toFixed(1);
  showInfoMessage(`✓ ${changed} photo(s) recompressée(s), environ ${savedMB} Mo libérés. Pense à "⬆ Envoyer" si tu veux que les autres appareils profitent aussi de cette réduction.`);
}
document.getElementById('compact-images-btn').onclick = compactAllImages;

document.getElementById('sync-mini-icon').onclick = ()=>{
  const message = syncCode
    ? `Code carnet actuel : "${syncCode}". Tape un nouveau code pour changer, laisse tel quel pour ne rien changer, ou efface tout pour te déconnecter.`
    : 'Choisis un code pour synchroniser ce carnet entre tes appareils (le même code partout). Laisse vide pour ne pas activer la synchro.';
  showPromptDialog(message, syncCode, (val)=>{
    const trimmed = (val||'').trim();
    if(!trimmed){
      syncCode = '';
      localStorage.removeItem('carnet_sync_code');
      fbRef = null;
      updateSyncStatus('off');
      return;
    }
    if(trimmed === syncCode) return; // rien de changé
    syncCode = trimmed;
    localStorage.setItem('carnet_sync_code', syncCode);
    initFirebaseSync();
  });
};
if(syncCode) initFirebaseSync();

/* ============ SAUVEGARDE AUTOMATIQUE (toutes les 10 minutes) ============ */
// Discrète, silencieuse : ne fait rien tant qu'un dossier d'export n'a pas été choisi (icône 📁
// à côté d'Exporter), pour éviter de faire apparaître une fenêtre "Enregistrer sous" toute seule.
// Écrit dans un fichier séparé ("carnet-sauvegarde-auto.json") pour ne jamais toucher à tes exports manuels.
const AUTO_BACKUP_INTERVAL = 10 * 60 * 1000;
let lastAutoBackupSnapshot = null;

async function autoBackup(){
  const dirHandle = await idbGet('exportDir').catch(()=>null);
  if(!dirHandle) return;
  const ok = await verifyHandlePermission(dirHandle, 'readwrite').catch(()=>false);
  if(!ok) return;
  const snapshot = JSON.stringify(data);
  if(snapshot === lastAutoBackupSnapshot) return; // rien de nouveau depuis la dernière sauvegarde auto
  try{
    const fileHandle = await dirHandle.getFileHandle('carnet-sauvegarde-auto.json', { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(snapshot);
    await writable.close();
    lastAutoBackupSnapshot = snapshot;
    const el = document.getElementById('export-path');
    if(el){
      const prevText = el.textContent;
      el.textContent = `✓ Sauvegarde auto ${new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}`;
      setTimeout(()=>{ if(el.isConnected) updateFsStatus(); }, 2500);
    }
  }catch(err){
    console.warn('Sauvegarde automatique impossible :', err);
  }
}
setInterval(autoBackup, AUTO_BACKUP_INTERVAL);

/* ============ COORDINATION ENTRE ONGLETS ============ */
// Si ce carnet est ouvert dans plusieurs onglets/fenêtres du même navigateur en même temps
// (même sans synchro Firebase), chaque onglet garde sa propre copie de `data` en mémoire.
// Sans ceci, le premier onglet qui appelle save() après coup écrase silencieusement dans
// localStorage tout ce que l'autre onglet avait ajouté entre-temps (nouvelle section, nouvelle
// feuille...) — c'est ce qui fait "disparaître" du contenu créé juste avant. L'événement
// "storage" prévient les AUTRES onglets dès qu'un onglet sauvegarde ; on fusionne alors
// (jamais de suppression, comme pour la synchro Firebase) au lieu de laisser un onglet plus
// vieux tout écraser.
// Fusionne le contenu de localStorage dans `data` en mémoire (jamais de suppression), et ne
// redessine que si quelque chose a réellement changé. Utilisée à la fois quand un AUTRE onglet
// vient de sauvegarder (événement "storage"), et quand CET onglet redevient actif après avoir
// été mis en arrière-plan (voir plus bas) — un onglet/appli mobile mis en veille peut manquer
// l'événement "storage" pendant qu'il est suspendu ; sans ce second déclencheur, une section ou
// une page créée pendant ce temps-là (dans un autre onglet, ou avant une mise en veille) ne
// s'affiche qu'après une fermeture/réouverture complète au lieu d'apparaître tout de suite.
function syncFromLocalStorage(){
  try{
    // Ne jamais reconstruire toute la feuille (renderSidebar/renderCanvasStack, plus bas) pendant
    // qu'un texte est en cours de frappe : ça détruit et recrée le champ en cours d'édition avec
    // l'ancien contenu (celui d'avant la frappe, puisque le texte tapé n'est enregistré dans
    // el.text qu'au moment de refermer le champ — voir textElDom/onblur), ce qui donnait
    // l'impression que le texte "s'effaçait tout seul" en écrivant. On retente simplement au
    // prochain déclenchement (focus/visibilitychange suivant), une fois l'édition terminée.
    if(activeTextEdit) return;
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw === null) return;
    // Rien à faire si localStorage contient exactement ce que CET onglet y a lui-même écrit en
    // dernier : on évite de reconstruire `data` (et donc de casser les références en cours d'usage,
    // ex. une insertion d'image en cours pendant que la fenêtre "Choisir un fichier" a le focus,
    // ce qui la faisait échouer silencieusement) quand il n'y a en réalité rien à fusionner.
    if(raw === lastSavedRaw) return;
    const before = JSON.stringify(data);
    const incoming = migrate(JSON.parse(raw));
    suspendHistory = true;
    data = migrate(mergeIncoming(data, incoming));
    suspendHistory = false;
    const after = JSON.stringify(data);
    if(after !== before){
      lastSavedRaw = after;
      localStorage.setItem(STORAGE_KEY, after);
      selectedElId = null;
      clampActiveRefs();
      renderSidebar(); renderCanvasStack();
      // Note : la synchro cloud reste manuelle (boutons "Envoyer" / "Récupérer") — on ne
      // déclenche plus rien vers Firebase automatiquement ici.
    } else {
      lastSavedRaw = raw;
    }
  }catch(err){
    console.warn('Resynchronisation locale impossible :', err);
  }
}

window.addEventListener('storage', (e)=>{
  if(e.key !== STORAGE_KEY || e.newValue === null) return;
  syncFromLocalStorage();
});

// Un onglet ou l'appli (PWA) mise en arrière-plan peut être suspendu par le système : à la
// reprise, on force une resynchro immédiate depuis localStorage plutôt que d'attendre que
// l'utilisateur ferme/rouvre complètement pour voir le contenu à jour.
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState === 'visible') syncFromLocalStorage(); });
window.addEventListener('focus', syncFromLocalStorage);
window.addEventListener('pageshow', syncFromLocalStorage);

/* ============ INIT ============ */
if(localStorage.getItem(STORAGE_KEY)===null){ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
lastSavedRaw = localStorage.getItem(STORAGE_KEY);
setTool('select');
renderSidebar();
renderCanvasStack();
updateUndoRedoButtons();
// Ramène la feuille restaurée (voir restoreLastPosition) dans la vue, sans animation (behavior:
// 'auto') pour ne pas voir un défilement se dérouler à chaque ouverture de l'appli.
if(activeSheetId){
  requestAnimationFrame(()=>{
    const el = document.querySelector(`.page-canvas[data-sheet-id="${activeSheetId}"]`);
    if(el) el.scrollIntoView({ behavior:'auto', block:'start' });
  });
}
</script>
<script>
// Active le mode hors-ligne (voir sw.js) : une fois ce script exécuté au moins une fois avec une
// connexion, le carnet reste utilisable sans internet ensuite — et surtout, ça permet de garder
// un accès fiable au presse-papier même hors-ligne (voir le commentaire détaillé dans sw.js).
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

// Bouton "🔄" de la barre du haut : demande au service worker d'aller chercher la toute
// dernière version de carnet.html sur GitHub et d'écraser celle en cache, puis recharge la
// page. Contrairement à la mise à jour automatique en tâche de fond, celle-ci est déclenchée
// explicitement par un clic, et ne dépend pas d'un numéro de version à changer à chaque publication.
(function(){
  const btn = document.getElementById('update-app-btn');
  if(!btn) return;
  btn.onclick = ()=>{
    if(!('serviceWorker' in navigator) || !navigator.serviceWorker.controller){
      // Pas de service worker actif (première visite, ou hors-ligne) : un simple rechargement suffit.
      location.reload();
      return;
    }
    btn.disabled = true;
    btn.classList.add('checking');
    const channel = new MessageChannel();
    const timeout = setTimeout(()=>{
      btn.disabled = false;
      btn.classList.remove('checking');
      alert("Pas de réponse du service worker — vérifie ta connexion et réessaie.");
    }, 12000);
    channel.port1.onmessage = (e)=>{
      clearTimeout(timeout);
      if(e.data && e.data.ok){
        location.reload();
      } else {
        btn.disabled = false;
        btn.classList.remove('checking');
        alert("Impossible de vérifier une mise à jour (pas de connexion ?). La version actuelle reste utilisable hors-ligne.");
      }
    };
    navigator.serviceWorker.controller.postMessage('FORCE_UPDATE', [channel.port2]);
  };
})();
</script>
