    <div id="canvas-wrap">
      <div id="empty-state" style="display:none">Crée une section pour commencer.</div>
    </div>
    <div id="eraser-cursor"></div>
  </div>
</div>

<div id="print-area"></div>

<script>
/* ============ CONSTANTS ============ */
const PAGE_W = 794, PAGE_H = 1123; // A4 @ 96dpi, portrait
const COLORS = ['#000000','#dc2626','#16a34a','#2563eb','#e8491d','#9333ea','#f5a623','#0891b2'];
const HIGHLIGHT_COLORS = ['#fff176','#a5d6a7','#f48fb1','#90caf9','#ffb74d'];
const WIDTHS = [1,2,4,7]; // 1 = nouveau point plus petit, ajouté en plus des tailles existantes
const FONT_SIZES = [13,16,20,26,34];
const FONTS = [
  { key:'sans',  css:"'Inter', system-ui, sans-serif",        label:'Sans' },
  { key:'serif', css:"Georgia, 'Times New Roman', serif",     label:'Serif' },
  { key:'mono',  css:"'IBM Plex Mono', Consolas, monospace",  label:'Mono' },
  { key:'hand',  css:"'Segoe Print', 'Comic Sans MS', cursive", label:'Manuscrite' }
];
function fontCss(key){ return (FONTS.find(f=>f.key===key) || FONTS[0]).css; }
const STORAGE_KEY = 'carnet_atelier_data_v1';

/* ============ STATE ============ */
// Le vrai contenu du carnet vit désormais uniquement dans IndexedDB (voir plus bas), qui ne se lit
// que de façon asynchrone — impossible donc de l'avoir déjà en main ici, tout en haut du fichier,
// de façon synchrone comme avant (quand tout venait de localStorage). On démarre donc avec un
// classeur vide tout à fait temporaire, remplacé par le vrai contenu dans la section INIT tout en
// bas du fichier, avant le tout premier affichage (aucun clignotement : rien n'est encore dessiné
// à ce stade).
let data = seedData();
let activeClasseurId = data.classeurs[0]?.id || null;
let activeSectionId = data.classeurs[0]?.sections[0]?.id || null;
let activePageId = data.classeurs[0]?.sections[0]?.pages[0]?.id || null;
let activeSheetId = data.classeurs[0]?.sections[0]?.pages[0]?.sheets[0]?.id || null;

// Rouvre le carnet exactement là où il a été fermé (dernier classeur/section/page/feuille
// consultés), plutôt que de toujours repartir du tout premier. saveLastPosition() est appelée à
// chaque changement de vue (voir renderCanvasStack) ; restoreLastPosition() est appelée UNE SEULE
// fois, dans la section INIT tout en bas du fichier, une fois le vrai contenu chargé depuis
// IndexedDB (l'appeler ici, tout de suite, n'aurait aucun effet : le classeur temporaire ci-dessus
// n'a jamais les mêmes identifiants que celui réellement sauvegardé).
const LAST_POSITION_KEY = 'carnet_last_position_v1';
function restoreLastPosition(){
  try{
    const raw = localStorage.getItem(LAST_POSITION_KEY);
    if(!raw) return;
    const pos = JSON.parse(raw);
    const c = data.classeurs.find(cl=>cl.id===pos.classeurId);
    if(!c) return;
    activeClasseurId = c.id;
    const s = c.sections.find(se=>se.id===pos.sectionId);
    if(!s) return;
    activeSectionId = s.id;
    const p = s.pages.find(pg=>pg.id===pos.pageId);
    if(!p) return;
    activePageId = p.id;
    const sh = p.sheets.find(sheet=>sheet.id===pos.sheetId);
    activeSheetId = sh ? sh.id : (p.sheets[0]?.id || null);
  }catch(e){}
}
function saveLastPosition(){
  try{
    localStorage.setItem(LAST_POSITION_KEY, JSON.stringify({
      classeurId: activeClasseurId, sectionId: activeSectionId, pageId: activePageId, sheetId: activeSheetId
    }));
  }catch(e){}
}

let tool = 'select';
let penColor = COLORS[0];
let penWidth = 2; // valeur par défaut inchangée (avant l'ajout du point plus petit, WIDTHS[0] valait déjà 2)
let eraserMode = 'area'; // 'area' (défaut) = gomme carrée qui découpe les traits, ne supprime que ce qu'elle touche · 'stroke' = supprime le trait entier touché
let shapeMode = 'free'; // 'free' = dessin libre · 'line'/'arrow'/'rect'/'circle'/'ellipse'/'cloud' = forme tracée par glisser
let selectionShapeMode = 'rect'; // 'rect' = zone rectangulaire (défaut) · 'lasso' = contour libre à main levée
let highlightMode = false; // true = trace au fluo (translucide, plus épais) au lieu de l'encre normale
let highlightColor = HIGHLIGHT_COLORS[0];
const ERASER_SIZES = [16,30,50];
let eraserSize = ERASER_SIZES[1]; // le carré du milieu, par défaut
let textFontSize = 16;       // taille utilisée pour les PROCHAINES zones de texte créées
let textFontFamily = 'hand'; // police utilisée pour les PROCHAINES zones de texte créées
let textBold = false, textItalic = false, textUnderline = false; // style utilisé pour les PROCHAINES zones de texte
let activeTextEdit = null;   // { el, div } — le texte en cours d'édition, pour appliquer les changements en direct
let activeStrokeEdit = null; // { el, pathEl } — le trait actuellement sélectionné, pour changer sa couleur/épaisseur depuis la barre d'outils
let selectedElId = null;

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

// Garde une trace d'une suppression (classeur/section/page/feuille). Historiquement consommée
// par la fusion entre onglets (mergeIncoming, retirée avec le passage à IndexedDB comme stockage
// unique — voir la section INIT) ; conservée telle quelle (inoffensive) au cas où une fusion
// multi-appareils plus fine serait réintroduite plus tard.
function recordTombstone(kind, id){
  data.tombstones.push({ id, kind, deletedAt: Date.now() });
}

function dateJour(){ return new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'}); }

function seedData(){
  return {
    classeurs: [{
      id: uid(), name: 'Mon carnet',
      sections: [{
        id: uid(), name: 'Section 1', orientation: 'portrait',
        pages: [{ id: uid(), name: 'Page 1', orientation: 'portrait', createdAt: dateJour(), sheets: [{ id: uid(), elements: [] }] }]
      }]
    }],
    library: [], // sélections enregistrées (voir saveZoneToLibrary / pasteWithConfirm)
    tombstones: [] // voir recordTombstone — actuellement non consommé (voir ce commentaire)
  };
}
// Convertit les anciennes sauvegardes vers le modèle actuel :
// - une feuille = une page  ->  une page peut contenir plusieurs feuilles A4
// - sections à plat  ->  sections regroupées dans un ou plusieurs classeurs
function migrate(d){
  if(!d.classeurs){
    d = { classeurs: [{ id: uid(), name: 'Mon carnet', sections: d.sections || [] }] };
  }
  if(!Array.isArray(d.library)) d.library = []; // anciennes sauvegardes : pas encore de bibliothèque
  if(!Array.isArray(d.tombstones)) d.tombstones = []; // anciennes sauvegardes : pas encore de suivi des suppressions
  d.classeurs.forEach(c=>{
    // Un classeur "archivé" (voir toggleArchiveClasseur) reste consultable/modifiable en LOCAL
    // comme n'importe quel autre, mais n'est plus jamais envoyé au serveur de synchro (et sa copie
    // en ligne existante est supprimée au prochain "⬆ Envoyer") — sert à contrôler la taille
    // cumulée stockée sur ce serveur (ton propre disque, voir carnet-sync-server) en excluant les
    // classeurs "terminés" qu'on n'a plus besoin de synchroniser entre appareils.
    if(typeof c.archived !== 'boolean') c.archived = false;
    c.sections.forEach(s=>{
      s.pages.forEach(p=>{
        if(!p.sheets){
          p.sheets = [{ id: uid(), elements: p.elements || [] }];
          delete p.elements;
        }
        // Sécurité : une page ne devrait jamais se retrouver sans aucune feuille (ça affichait
        // un écran vide auparavant) — si ça arrive malgré tout, on lui en recrée une vierge.
        if(p.sheets.length===0){
          p.sheets.push({ id: uid(), elements: [] });
        }
        // Filet de sécurité historique : Firebase Realtime Database (backend utilisé avant le
        // passage à un serveur perso, voir carnet-sync-server) ne conservait pas les tableaux
        // VIDES, ce qui faisait revenir "elements" carrément absent (undefined) au lieu de [] après
        // une synchro, et plantait le premier sheet.elements.filter(...) rencontré. Le serveur
        // perso actuel n'a pas cette limite, mais on garde ce filet pour les vieux carnets
        // importés/restaurés qui pourraient encore avoir ce trou.
        p.sheets.forEach(sh=>{ if(!Array.isArray(sh.elements)) sh.elements = []; });
        // Répare les images/blocs déjà cassés par un ancien bug de collage (échelle négative ou
        // nulle calculée lors d'un collage bas sur une grande feuille, voir insertImageBlob) : ils
        // restaient invisibles sur la feuille, seul leur point de verrouillage se voyait encore.
        // On leur redonne une taille correcte pour qu'ils redeviennent visibles et manipulables.
        p.sheets.forEach(sh=>{
          sh.elements.forEach(el=>{
            if((el.type==='image' || el.type==='group') && (!(el.w>0) || !(el.h>0))){
              el.w = 160; el.h = 120;
            }
          });
        });
        // L'orientation était autrefois réglée par section (donc partagée par toutes ses pages) ;
        // elle est maintenant réglable page par page. On reprend l'ancienne valeur comme point de départ.
        if(!p.orientation) p.orientation = s.orientation || 'portrait';
      });
    });
  });
  return d;
}
// Ne sert plus qu'UNE SEULE fois, au tout premier démarrage après cette mise à jour (voir INIT
// tout en bas) : reprend l'ancien contenu de localStorage (là où vivait tout le carnet avant le
// passage à IndexedDB) pour ne rien perdre à la mise à jour. Plus jamais relue ensuite.
function loadLegacyLocalStorage(){
  try{ const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : null; }
  catch(e){ return null; }
}
/* ============ HISTORIQUE (Annuler / Rétablir) ============ */
// save() est déjà appelé après chaque action utilisateur significative (un trait, un texte,
// un déplacement, une suppression...). On s'en sert comme point d'ancrage : juste avant
// d'écraser la sauvegarde, on met de côté l'état précédent pour pouvoir y revenir.
const UNDO_LIMIT = 50;
let undoStack = [];
let redoStack = [];
let suspendHistory = false;

// Dernier contenu JSON réellement construit ici (voir save()) — sert à la fois de repère pour
// l'historique annuler/rétablir et pour éviter d'écrire deux fois la même chose dans IndexedDB.
let lastSavedRaw = null;

// Le stockage (IndexedDB, voir plus bas) a beau avoir une capacité largement supérieure à
// l'ancien localStorage, il n'est pas illimité pour autant : un message reste possible en cas
// d'échec (carnet énorme, appareil presque plein...). Un simple drapeau en mémoire reviendrait à
// false à chaque rechargement de la page — or l'app en PWA peut être rechargée par le système
// plus souvent qu'on ne le croit (mise en arrière-plan prolongée, gestion mémoire de la
// tablette...), ce qui ferait réapparaître ce message bien plus souvent que "une fois par
// session" comme prévu. On mémorise donc plutôt un horodatage dans une petite clé localStorage
// dédiée (sans rapport avec la taille du carnet lui-même), pour n'afficher ce message qu'au plus
// une fois par heure, quel que soit le nombre de rechargements entre-temps.
const QUOTA_INFO_COOLDOWN_MS = 60 * 60 * 1000; // 1h
function shouldShowQuotaInfo(key){
  try{
    const last = Number(localStorage.getItem(key) || 0);
    if(Date.now() - last < QUOTA_INFO_COOLDOWN_MS) return false;
    localStorage.setItem(key, String(Date.now()));
    return true;
  }catch(e){ return false; } // par prudence : si même cette petite clé échoue, ne pas insister
}

// Stockage du carnet : IndexedDB, avec une capacité largement supérieure à l'ancien localStorage
// (souvent des centaines de Mo, selon l'espace disque disponible, au lieu de 5-10 Mo) — ce qui
// repousse durablement la limite de stockage à mesure que le carnet grossit (davantage de
// photos). Voir trySetStorage ci-dessous pour l'écriture, et la section INIT tout en bas du
// fichier pour le chargement (forcément asynchrone) au démarrage, avec reprise ponctuelle de
// l'ancien contenu localStorage pour les personnes qui mettent à jour depuis une version
// antérieure du carnet.
const NOTEBOOK_IDB_NAME = 'carnet_notebook_db';
const NOTEBOOK_IDB_STORE = 'kv';
function openNotebookIdb(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open(NOTEBOOK_IDB_NAME, 1);
    req.onupgradeneeded = ()=> req.result.createObjectStore(NOTEBOOK_IDB_STORE);
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
}
function notebookIdbSet(raw){
  return openNotebookIdb().then(db=> new Promise((resolve, reject)=>{
    const tx = db.transaction(NOTEBOOK_IDB_STORE, 'readwrite');
    tx.objectStore(NOTEBOOK_IDB_STORE).put(raw, STORAGE_KEY);
    tx.oncomplete = ()=> resolve();
    tx.onerror = ()=> reject(tx.error);
  }));
}
function notebookIdbGet(){
  return openNotebookIdb().then(db=> new Promise((resolve, reject)=>{
    const tx = db.transaction(NOTEBOOK_IDB_STORE, 'readonly');
    const req = tx.objectStore(NOTEBOOK_IDB_STORE).get(STORAGE_KEY);
    req.onsuccess = ()=> resolve(req.result || null);
    req.onerror = ()=> reject(req.error);
  }));
}

// IndexedDB est désormais l'UNIQUE stockage du carnet (voir la discussion : garder localStorage
// EN PLUS, comme filet de secours, obligeait à savoir en permanence lequel des deux était le plus
// à jour — une source de bugs sournois, dont celui qui effaçait du contenu après une capture
// d'écran). Un seul stockage, une seule source de vérité, plus de risque d'incohérence entre eux.
function trySetStorage(raw, opts){
  return notebookIdbSet(raw).then(()=> true).catch(err=>{
    // Très rare : IndexedDB a une capacité largement supérieure à localStorage (souvent des
    // centaines de Mo), donc l'atteindre suppose un carnet vraiment énorme ou un appareil presque
    // plein — mais si ça arrive, il faut le dire clairement plutôt que planter en silence.
    console.error('Erreur IndexedDB (stockage plein ?) :', err);
    if(!(opts && opts.silent) && shouldShowQuotaInfo('carnet_quota_fail_last_shown')){
      showInfoMessage("\u26a0\ufe0f Stockage plein : impossible de sauvegarder ce carnet sur cet appareil. Utilise le bouton \"🗜 Compacter\" (barre latérale) pour réduire la taille des photos, ou libère de la place sur cet appareil, puis réessaie — sinon les dernières modifications seront perdues si tu fermes l'appli maintenant.");
    }
    return false;
  });
}

function save(){
  if(!suspendHistory){
    // Utilise directement lastSavedRaw (suivi en mémoire) plutôt qu'une relecture de localStorage :
    // plus simple, et plus fiable maintenant qu'il n'y a plus qu'un seul stockage (IndexedDB,
    // asynchrone) — lastSavedRaw reflète toujours exactement le dernier JSON réellement construit
    // ici, sans dépendre du succès d'une écriture externe.
    if(lastSavedRaw !== null){
      undoStack.push(lastSavedRaw);
      if(undoStack.length > UNDO_LIMIT) undoStack.shift();
      redoStack = [];
    }
  }
  lastSavedRaw = JSON.stringify(data);
  trySetStorage(lastSavedRaw);
  updateUndoRedoButtons();
  // Note : plus d'envoi automatique vers le cloud ici — voir "Envoyer" / "Récupérer"
  // dans la barre latérale (synchro manuelle, à la demande).
}

// Après un annuler/rétablir, les ids actifs (classeur/section/page/feuille) peuvent
// pointer vers quelque chose qui n'existe plus dans l'état restauré : on les recale.
function clampActiveRefs(){
  if(!getClasseur(activeClasseurId)) activeClasseurId = data.classeurs[0]?.id || null;
  const c = activeClasseur();
  if(!c){ activeSectionId=null; activePageId=null; activeSheetId=null; return; }
  if(!getSection(activeSectionId)) activeSectionId = c.sections[0]?.id || null;
  const s = activeSection();
  if(!s){ activePageId=null; activeSheetId=null; return; }
  if(!getPage(activeSectionId, activePageId)) activePageId = s.pages[0]?.id || null;
  const p = activePage();
  if(!p){ activeSheetId=null; return; }
  if(!p.sheets.find(sh=>sh.id===activeSheetId)) activeSheetId = p.sheets[0]?.id || null;
}

function undo(){
  if(undoStack.length===0) return;
  const current = lastSavedRaw;
  const prevState = undoStack.pop();
  redoStack.push(current);
  suspendHistory = true;
  data = migrate(JSON.parse(prevState));
  suspendHistory = false;
  lastSavedRaw = prevState;
  trySetStorage(prevState);
  selectedElId = null;
  clampActiveRefs();
  renderSidebar(); renderCanvasStack();
  updateUndoRedoButtons();
}

function redo(){
  if(redoStack.length===0) return;
  const current = lastSavedRaw;
  const nextState = redoStack.pop();
  undoStack.push(current);
  suspendHistory = true;
  data = migrate(JSON.parse(nextState));
  suspendHistory = false;
  lastSavedRaw = nextState;
  trySetStorage(nextState);
  selectedElId = null;
  clampActiveRefs();
  renderSidebar(); renderCanvasStack();
  updateUndoRedoButtons();
}

function updateUndoRedoButtons(){
  const u = document.getElementById('undo-btn');
  const r = document.getElementById('redo-btn');
  if(u) u.disabled = undoStack.length===0;
  if(r) r.disabled = redoStack.length===0;
}
document.getElementById('undo-btn').onclick = undo;
document.getElementById('redo-btn').onclick = redo;
document.addEventListener('keydown', (e)=>{
  if(!(e.ctrlKey || e.metaKey)) return;
  const active = document.activeElement;
  if(active && active.contentEditable==='true') return; // ne pas gêner l'édition de texte
  if(e.key.toLowerCase()==='z' && !e.shiftKey){ e.preventDefault(); undo(); }
  else if((e.key.toLowerCase()==='z' && e.shiftKey) || e.key.toLowerCase()==='y'){ e.preventDefault(); redo(); }
});
function getClasseur(id){ return data.classeurs.find(c=>c.id===id); }
function activeClasseur(){ return getClasseur(activeClasseurId); }
function getSection(id){ return activeClasseur()?.sections.find(s=>s.id===id); }
function getPage(sectionId, pageId){ return getSection(sectionId)?.pages.find(p=>p.id===pageId); }
function activeSection(){ return getSection(activeSectionId); }
function activePage(){ return activeSection() ? getPage(activeSectionId, activePageId) : null; }
function activeSheet(){
  const p = activePage();
  if(!p) return null;
  return p.sheets.find(sh=>sh.id===activeSheetId) || p.sheets[0] || null;
}

/* ============ SIDEBAR ============ */
const sectionsEl = document.getElementById('sections');
let collapsed = {};

function renderClasseurBar(){
  const select = document.getElementById('classeur-select');
  select.innerHTML = '';
  data.classeurs.forEach(c=>{
    const opt = document.createElement('option');
    opt.value = c.id; opt.textContent = (c.archived ? '📦 ' : '') + c.name;
    if(c.id===activeClasseurId) opt.selected = true;
    select.appendChild(opt);
  });
  document.getElementById('delete-classeur-btn').disabled = data.classeurs.length<=1;
  const archiveBtn = document.getElementById('archive-classeur-btn');
  if(archiveBtn){
    // Le menu ouvert par ce bouton (voir openArchiveMenu) propose toujours les 3 mêmes choix, quel
    // que soit l'état du classeur — l'icône/titre n'ont donc plus besoin de changer selon isArchived.
    archiveBtn.textContent = '📦';
    archiveBtn.title = 'Archiver, exporter, restaurer ou supprimer un classeur...';
  }
}

// Nom de fichier lisible pour l'export d'un classeur : lettres/chiffres seulement, le reste
// devient un tiret, pour rester valide comme nom de fichier sur tous les systemes (Windows compris).
function slugifyForFilename(name){
  return (name || 'classeur').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // enleve les accents
    .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'classeur';
}

// Enregistre un classeur dans un fichier JSON choisi par la personne (vraie fenetre "Enregistrer
// sous" si le navigateur la supporte -- Chrome/Edge -- sinon simple telechargement classique, meme
// repli que insertImageFromPicker/manualExport plus haut dans ce fichier). Retourne true si le
// fichier a bien ete ecrit, false si annule ou en echec (dans ce cas l'appelant NE DOIT PAS
// continuer -- ex: ne pas supprimer le classeur si son export a echoue ou ete annule).
// showSaveFilePicker() DOIT rester le tout premier appel asynchrone de cette fonction, sans aucun
// await avant -- meme raison que documentee ailleurs dans ce fichier (insertImageFromPicker,
// manualExport...) : le geste utilisateur qui autorise l'ouverture du selecteur doit etre "frais".
async function exportClasseurToFile(c){
  const fileName = `classeur-${slugifyForFilename(c.name)}-${new Date().toISOString().slice(0,10)}.json`;
  if('showSaveFilePicker' in window){
    try{
      const fileHandle = await window.showSaveFilePicker({
        suggestedName: fileName,
        types: [{ description: 'Classeur (JSON)', accept: {'application/json': ['.json']} }]
      });
      const writable = await fileHandle.createWritable();
      await writable.write(JSON.stringify(c, null, 2));
      await writable.close();
      return true;
    }catch(err){
      if(err && err.name==='AbortError') return false; // annule par la personne
      console.error('Export du classeur impossible :', err);
      showInfoMessage("L'enregistrement du fichier a échoué — le classeur n'a pas été modifié. Réessaie.");
      return false;
    }
  }
  // Solution de repli pour les navigateurs sans cette fonction (Firefox, Safari/iPad) :
  // telechargement classique dans le dossier "Telechargements", sans choix de dossier possible.
  const blob = new Blob([JSON.stringify(c, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = fileName;
  a.click();
  setTimeout(()=> URL.revokeObjectURL(a.href), 2000);
  return true;
}

// Relit un fichier JSON de classeur exporte par exportClasseurToFile ci-dessus, et le rajoute dans
// le carnet comme un classeur NORMAL (actif, non archive) -- utilise a la fois pour ramener un
// classeur qui avait ete supprime apres export, et pour simplement dupliquer/rapatrier un export
// depuis un autre appareil. Un nouvel identifiant est toujours genere pour eviter toute collision
// avec un classeur existant (par exemple si le classeur d'origine existe encore dans le carnet).
function applyRestoredClasseurJson(text, sourceName){
  let obj;
  try{
    obj = JSON.parse(text);
    if(!obj || !Array.isArray(obj.sections)) throw new Error('ce fichier ne contient pas un classeur valide');
  }catch(err){
    showInfoMessage('Fichier invalide' + (sourceName ? ` ("${sourceName}")` : '') + ' : ' + (err && err.message ? err.message : 'format non reconnu') + '.');
    return;
  }
  obj.id = uid();
  obj.archived = false;
  if(!obj.name) obj.name = 'Classeur restauré';
  data.classeurs.push(obj);
  activeClasseurId = obj.id;
  activeSectionId = obj.sections[0]?.id || null;
  activePageId = obj.sections[0]?.pages[0]?.id || null;
  activeSheetId = obj.sections[0]?.pages[0]?.sheets[0]?.id || null;
  save(); renderSidebar(); renderCanvasStack();
  showInfoMessage(`"${obj.name}" a été remis dans le carnet.`);
}
// showOpenFilePicker() DOIT rester le tout premier appel asynchrone de cette fonction, sans aucun
// await avant (meme raison que triggerImport plus haut) -- sinon repli silencieux sur l'input caché.
async function restoreClasseurFromFile(){
  if(!('showOpenFilePicker' in window)){
    document.getElementById('restore-classeur-input').click();
    return;
  }
  try{
    const [fileHandle] = await window.showOpenFilePicker({
      types: [{ description: 'Classeur (JSON)', accept: {'application/json': ['.json']} }],
      multiple: false
    });
    const file = await fileHandle.getFile();
    applyRestoredClasseurJson(await file.text(), fileHandle.name);
  }catch(err){
    if(err && err.name==='AbortError') return; // annule par la personne
    console.warn('Sélecteur de fichier impossible, retour au sélecteur classique.', err);
    document.getElementById('restore-classeur-input').click();
  }
}
function restoreClasseurFileChange(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=> applyRestoredClasseurJson(reader.result, file.name);
  reader.readAsText(file);
  e.target.value = '';
}

// Bouton archive (📦 dans #brand) : ouvre toujours les 3 mêmes choix, quel que soit l'état actuel
// du classeur -- "archiver et supprimer" (export JSON puis suppression définitive, cloud + local),
// "restaurer depuis un fichier" (réimporte un export precedent comme nouveau classeur actif), et
// "exporter ce classeur" (fichier JSON portable, SANS rien changer d'autre -- le classeur reste
// actif et continue d'être envoyé au cloud normalement ; sert à transférer un classeur vers un
// AUTRE carnet/personne). Demande explicite de l'utilisateur : la restauration passe toujours par
// un fichier, jamais par un simple bouton "désarchiver" -- donc ce menu ne depend plus de c.archived.
function openArchiveMenu(){
  const c = activeClasseur();
  if(!c) return;
  showActionMenu(`Classeur "${c.name}" :`, [
    {
      label: 'Archiver et supprimer',
      onPick: ()=>{
        if(data.classeurs.length<=1){ showInfoMessage('Il faut garder au moins un classeur.'); return; }
        // Double confirmation car cette option est irreversible et definitive (cloud + local),
        // contrairement a "archiver et conserver" -- demande explicite de l'utilisateur.
        showConfirmMessage(`⚠️ Supprimer DÉFINITIVEMENT le classeur "${c.name}" et tout son contenu, partout (cet appareil ET le cloud) ? Un fichier de sauvegarde JSON te sera d'abord demandé.`, ()=>{
          showConfirmMessage(`Dernière confirmation : après l'enregistrement du fichier, "${c.name}" sera retiré du carnet pour toujours. Continuer ?`, async ()=>{
            const ok = await exportClasseurToFile(c);
            if(!ok) return; // annulé ou échoué : on ne supprime rien
            performDeleteClasseur(c);
            showInfoMessage(`"${c.name}" a été exporté puis supprimé définitivement.`);
          });
        });
      }
    },
    {
      label: 'Restaurer depuis un fichier',
      onPick: ()=> restoreClasseurFromFile()
    },
    {
      // Ne touche PAS c.archived : le classeur reste un classeur normal, toujours envoyé au cloud
      // comme avant. Le but ici n'est pas de libérer de la place, mais d'obtenir un fichier JSON
      // portable du classeur pour pouvoir le transférer/importer dans un AUTRE carnet (autre
      // personne ou autre appareil) via "Restaurer depuis un fichier" là-bas — demande explicite
      // de l'utilisateur, qui a précisé vouloir garder la synchro cloud active pour ce classeur.
      label: 'Exporter ce classeur (JSON)',
      onPick: async ()=>{
        const ok = await exportClasseurToFile(c);
        if(ok) showInfoMessage(`"${c.name}" a été exporté. Le classeur reste inchangé ici et continue d'être envoyé au cloud normalement.`);
      }
    }
  ]);
}
document.getElementById('archive-classeur-btn').onclick = openArchiveMenu;

function renderSidebar(){
  renderClasseurBar();
  sectionsEl.innerHTML = '';
  const classeur = activeClasseur();
  if(!classeur) return;
  classeur.sections.forEach(section=>{
    const block = document.createElement('div');
    block.className = 'section-block';

    const head = document.createElement('div');
    head.className = 'section-head' + (collapsed[section.id] ? ' collapsed' : '');
    head.innerHTML = `
      <button class="icon-btn chev" data-action="toggle-collapse" title="Masquer / afficher les pages de cette section">▾</button>
      <span class="name">${escapeHtml(section.name)}</span>
      <div class="section-actions">
        <button class="icon-btn" data-action="rename-section" title="Renommer la section">✎</button>
        <button class="icon-btn" data-action="add-page" title="Ajouter une page">＋</button>
        <button class="icon-btn" data-action="move-section" title="Déplacer cette section vers un autre classeur">⇄</button>
        <button class="icon-btn danger" data-action="delete-section" title="Supprimer la section">✕</button>
      </div>`;
    head.querySelector('[data-action="toggle-collapse"]').onclick = (e)=>{ e.stopPropagation(); collapsed[section.id]=!collapsed[section.id]; renderSidebar(); };
    head.querySelector('[data-action="rename-section"]').onclick = (e)=>{
      e.stopPropagation();
      const name = prompt('Renommer la section :', section.name);
      if(name===null || !name.trim()) return;
      section.name = name.trim();
      // Range automatiquement par ordre alphabétique après un renommage (ex. "2025", "2026"...).
      activeClasseur().sections.sort((a,b)=> a.name.localeCompare(b.name, 'fr', {sensitivity:'base'}));
      save();
      document.querySelectorAll(`.sheet-page-header[data-section-id="${section.id}"] .header-section`)
        .forEach(el=>{ el.textContent = section.name; });
      renderSidebar();
    };
    head.querySelector('[data-action="add-page"]').onclick = (e)=>{ e.stopPropagation(); addPage(section.id); };
    head.querySelector('[data-action="move-section"]').onclick = (e)=>{
      e.stopPropagation();
      const others = data.classeurs.filter(c=>c.id!==activeClasseurId);
      openMoveMenu(e.currentTarget, 'Déplacer "' + section.name + '" vers…',
        others.map(c=>({ label: c.name, onPick: ()=> moveSectionToClasseur(section.id, c.id) })));
    };
    head.querySelector('[data-action="delete-section"]').onclick = (e)=>{ e.stopPropagation(); deleteSection(section.id); };
    head.onclick = ()=>{
      if(handlePotentialDoubleClick(section.id, head)) return; // double-clic : bascule juste les icônes
      if(section.id===activeSectionId) return;
      activeSectionId = section.id; activePageId = section.pages[0]?.id || null;
      activeSheetId = section.pages[0]?.sheets[0]?.id || null;
      renderSidebar(); renderCanvasStack();
    };
    block.appendChild(head);

    if(!collapsed[section.id]){
      const list = document.createElement('div');
      list.className = 'pages-list';
      section.pages.forEach(page=>{
        const item = document.createElement('div');
        item.className = 'page-item' + (page.id===activePageId && section.id===activeSectionId ? ' active' : '');
        item.dataset.pageId = page.id;
        item.dataset.sectionId = section.id;
        item.innerHTML = `
          <span style="opacity:.6">▤</span>
          <span class="name">${escapeHtml(page.name)}</span>
          <div class="page-actions">
            <button class="icon-btn" data-action="rename-page" title="Renommer la page">✎</button>
            <button class="icon-btn" data-action="export-page" title="Exporter cette page en PDF">⭳</button>
            <button class="icon-btn" data-action="move-page" title="Déplacer cette page vers une autre section">⇄</button>
            <button class="icon-btn danger" data-action="delete-page" title="Supprimer la page">✕</button>
          </div>`;
        item.onclick = ()=>{
          if(handlePotentialDoubleClick(page.id, item)) return; // double-clic : bascule juste les icônes
          if(page.id===activePageId && section.id===activeSectionId) return;
          activeSectionId = section.id; activePageId = page.id; activeSheetId = page.sheets[0]?.id; selectedElId = null;
          renderSidebar();
          renderCanvasStack();
        };
        item.querySelector('[data-action="rename-page"]').onclick = (e)=>{
          e.stopPropagation();
          const name = prompt('Renommer la page :', page.name);
          if(name===null || !name.trim()) return;
          page.name = name.trim();
          save();
          const label = document.querySelector(`.page-block[data-page-id="${page.id}"] .page-strip .name`);
          if(label) label.textContent = page.name;
          const hdrPage = document.querySelector(`.sheet-page-header[data-page-id="${page.id}"] .header-page`);
          if(hdrPage) hdrPage.textContent = page.name;
          renderSidebar();
        };
        item.querySelector('[data-action="export-page"]').onclick = (e)=>{ e.stopPropagation(); printSheets(page.sheets, page.orientation, `${section.name} - ${page.name}`, section.name, page.name); };
        item.querySelector('[data-action="move-page"]').onclick = (e)=>{
          e.stopPropagation();
          // Uniquement les autres sections DU MÊME CLASSEUR — une page ne peut plus être
          // déplacée vers un autre classeur (seule une section entière le peut, via ⇄ sur la
          // section elle-même).
          const items = classeur.sections
            .filter(s=>s.id!==section.id)
            .map(s=>({ label: s.name, onPick: ()=> movePageToSection(section.id, page.id, s.id) }));
          openMoveMenu(e.currentTarget, 'Déplacer "' + page.name + '" vers…', items);
        };
        item.querySelector('[data-action="delete-page"]').onclick = (e)=>{ e.stopPropagation(); deletePage(section.id, page.id); };
        list.appendChild(item);
      });
      block.appendChild(list);
    }
    sectionsEl.appendChild(block);
  });
}

function scrollToSheet(sheetId){
  const el = document.querySelector(`.page-canvas[data-sheet-id="${sheetId}"]`);
  if(el) el.scrollIntoView({ behavior:'smooth', block:'start' });
}
function scrollToPage(pageId){
  const p = getPage(activeSectionId, pageId);
  if(p && p.sheets[0]) scrollToSheet(p.sheets[0].id);
}

function escapeAttr(s){ return (s||'').replace(/"/g,'&quot;'); }
function escapeHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Icônes d'action d'une section/page (renommer/exporter/déplacer/supprimer) : révélées par un
// DOUBLE-clic/double-tap explicite, sur tout type de pointeur (souris, stylet, doigt) -- demande
// explicite de l'utilisateur suite à un affichage trop facile au survol (le stylet déclenche
// ":hover" dès qu'il approche l'écran sans le toucher, et le doigt aussi via un media hover:hover
// peu fiable sur cette tablette). Détection manuelle par horodatage (par id de section/page, PAS
// par référence à l'élément DOM) plutôt que l'événement natif "dblclick" : le premier clic d'une
// paire déclenche déjà une navigation qui appelle renderSidebar() et reconstruit tout le DOM, donc
// le 2e clic ne retomberait jamais sur LE MÊME élément DOM pour que "dblclick" se déclenche.
const lastActionsClickAt = {};
function handlePotentialDoubleClick(id, el){
  const now = Date.now();
  const last = lastActionsClickAt[id] || 0;
  lastActionsClickAt[id] = now;
  if(now - last < 400){
    document.querySelectorAll('.show-actions').forEach(x=>{ if(x!==el) x.classList.remove('show-actions'); });
    el.classList.toggle('show-actions');
    lastActionsClickAt[id] = 0; // évite qu'un 3e clic rapproché ne re-bascule tout de suite
    return true; // double-clic détecté : l'appelant ne doit PAS traiter ça comme une navigation normale
  }
  return false;
}
// Un appui ailleurs (sur une autre section/page, ou n'importe où hors du menu d'actions révélé)
// referme les icônes actuellement visibles.
document.addEventListener('pointerdown', (e)=>{
  if(e.target.closest('.section-head, .page-item, #brand')) return;
  document.querySelectorAll('.show-actions').forEach(x=> x.classList.remove('show-actions'));
}, true);
// La barre des classeurs (#brand) garde son propre mécanisme (survol souris + appui long tactile) :
// aucune plainte à son sujet, donc pas touchée par ce changement. Elle est statique (jamais
// reconstruite comme les sections/pages) : on branche donc l'appui long une seule fois ici.
setupLongPressReveal(document.getElementById('brand'));
// Toujours utilisée par #brand ci-dessus (voir juste au-dessus) — plus utilisée pour section/page
// depuis le passage au double-clic (voir handlePotentialDoubleClick).
function setupLongPressReveal(el){
  el.addEventListener('pointerdown', (e)=>{
    if(e.pointerType !== 'touch') return; // la souris a déjà le survol
    const startX = e.clientX, startY = e.clientY;
    let moved = false, fired = false;
    const timer = setTimeout(()=>{
      if(moved) return;
      document.querySelectorAll('.show-actions').forEach(x=>{ if(x!==el) x.classList.remove('show-actions'); });
      el.classList.add('show-actions');
      el._suppressNextClick = true;
      fired = true;
    }, 500);
    function move(ev){ if(Math.hypot(ev.clientX-startX, ev.clientY-startY) > 12){ moved = true; clearTimeout(timer); } }
    function up(){ clearTimeout(timer); el.removeEventListener('pointermove', move); el.removeEventListener('pointerup', up); el.removeEventListener('pointercancel', up); }
    el.addEventListener('pointermove', move);
    el.addEventListener('pointerup', up);
    el.addEventListener('pointercancel', up);
  });
}

function addSection(){
  const classeur = activeClasseur();
  if(!classeur) return;
  // Double confirmation avant creation -- demande explicite de l'utilisateur, suite a des clics
  // accidentels sur ce bouton (voir aussi l'espacement CSS de #add-section-icon-btn plus haut).
  showConfirmMessage(`Ajouter un nouveau chantier dans "${classeur.name}" ?`, ()=>{
    showConfirmMessage(`Confirmer la création de ce nouveau chantier ?`, ()=>{
      const s = { id: uid(), name: 'Nouvelle section', orientation: 'portrait', pages: [{ id: uid(), name: 'Page 1', orientation: 'portrait', createdAt: dateJour(), sheets: [{ id: uid(), elements: [] }] }] };
      classeur.sections.push(s);
      activeSectionId = s.id; activePageId = s.pages[0].id; activeSheetId = s.pages[0].sheets[0].id;
      save(); renderSidebar(); renderCanvasStack();
    });
  });
}

/* ============ CLASSEURS ============ */
// Un classeur regroupe plusieurs sections — c'est le niveau au-dessus, pour séparer
// des carnets totalement indépendants (ex: chantiers différents) sans les mélanger.
function switchClasseur(id){
  if(id===activeClasseurId) return;
  const c = getClasseur(id);
  if(!c) return;
  activeClasseurId = id;
  activeSectionId = c.sections[0]?.id || null;
  activePageId = c.sections[0]?.pages[0]?.id || null;
  activeSheetId = c.sections[0]?.pages[0]?.sheets[0]?.id || null;
  renderSidebar(); renderCanvasStack();
}
document.getElementById('classeur-select').onchange = (e)=> switchClasseur(e.target.value);

function addClasseur(){
  const name = prompt('Nom du nouveau classeur :', 'Nouveau classeur');
  if(name===null) return;
  const s = { id: uid(), name: 'Section 1', orientation: 'portrait', pages: [{ id: uid(), name: 'Page 1', orientation: 'portrait', createdAt: dateJour(), sheets: [{ id: uid(), elements: [] }] }] };
  const c = { id: uid(), name: name.trim() || 'Nouveau classeur', sections: [s], archived: false };
  data.classeurs.push(c);
  // Range automatiquement par ordre alphabétique.
  data.classeurs.sort((a,b)=> a.name.localeCompare(b.name, 'fr', {sensitivity:'base'}));
  activeClasseurId = c.id; activeSectionId = s.id; activePageId = s.pages[0].id; activeSheetId = s.pages[0].sheets[0].id;
  save(); renderSidebar(); renderCanvasStack();
}
document.getElementById('add-classeur-btn').onclick = addClasseur;

function renameClasseur(){
  const c = activeClasseur();
  if(!c) return;
  const name = prompt('Renommer le classeur :', c.name);
  if(name===null || !name.trim()) return;
  c.name = name.trim();
  data.classeurs.sort((a,b)=> a.name.localeCompare(b.name, 'fr', {sensitivity:'base'}));
  save(); renderSidebar();
}
document.getElementById('rename-classeur-btn').onclick = renameClasseur;

// Suppression definitive effective (retrait local + tombstone pour que le prochain "Envoyer"
// supprime aussi la copie cloud) -- partagee entre le bouton ✕ (confirmation simple, directe)
// et le menu d'archivage / "Archiver et supprimer" (voir openArchiveMenu, double confirmation car
// atteint via un chemin ou l'option non-destructive "archiver et conserver" est juste a cote).
function performDeleteClasseur(c){
  recordTombstone('classeur', c.id);
  data.classeurs = data.classeurs.filter(x=>x.id!==c.id);
  activeClasseurId = data.classeurs[0].id;
  activeSectionId = data.classeurs[0].sections[0]?.id || null;
  activePageId = data.classeurs[0].sections[0]?.pages[0]?.id || null;
  activeSheetId = data.classeurs[0].sections[0]?.pages[0]?.sheets[0]?.id || null;
  save(); renderSidebar(); renderCanvasStack();
}
function deleteClasseur(){
  if(data.classeurs.length<=1){ alert('Il faut garder au moins un classeur.'); return; }
  const c = activeClasseur();
  if(!c) return;
  if(!confirm(`Supprimer le classeur "${c.name}" et tout son contenu ?`)) return;
  performDeleteClasseur(c);
}
document.getElementById('delete-classeur-btn').onclick = deleteClasseur;

// Crée une NOUVELLE PAGE — un nouvel item dans la barre latérale — à l'index donné.
// Utilisé uniquement par les actions explicites de la barre latérale.
function insertPageAt(sectionId, index){
  const s = getSection(sectionId);
  if(!s) return;
  const inheritedOrientation = s.pages[s.pages.length-1]?.orientation || 'portrait';
  const p = { id: uid(), name: 'Page ' + (s.pages.length+1), orientation: inheritedOrientation, createdAt: dateJour(), sheets: [{ id: uid(), elements: [] }] };
  s.pages.splice(index, 0, p);
  activeSectionId = sectionId; activePageId = p.id; activeSheetId = p.sheets[0].id;
  save(); renderSidebar(); renderCanvasStack();
  requestAnimationFrame(()=> scrollToSheet(p.sheets[0].id) );
}

function addPage(sectionId){
  const s = getSection(sectionId);
  insertPageAt(sectionId, s.pages.length);
}

// Ajoute une feuille A4 à l'index donné, À L'INTÉRIEUR d'une page existante :
// aucun nouvel item n'apparaît dans la barre latérale, juste une feuille de plus sous la même page.
function addSheetAt(sectionId, pageId, index){
  const p = getPage(sectionId, pageId);
  if(!p) return;
  const sh = { id: uid(), elements: [] };
  p.sheets.splice(index, 0, sh);
  activeSectionId = sectionId; activePageId = pageId; activeSheetId = sh.id;
  save(); renderCanvasStack();
  requestAnimationFrame(()=> scrollToSheet(sh.id) );
}

// Utilisée par le bouton "+ Feuille" de la barre d'outils : ajoute une feuille A4
// juste après la feuille affichée, dans la même page — sans créer de nouvel item à gauche.
function addSheetAfterCurrent(){
  const p = activePage();
  if(!p) return;
  const idx = p.sheets.findIndex(sh=>sh.id===activeSheetId);
  addSheetAt(activeSectionId, p.id, idx===-1 ? p.sheets.length : idx+1);
}

// Supprime la dernière feuille insérée (ou une feuille donnée) sans toucher à la page elle-même.
function deleteSheet(sectionId, pageId, sheetId){
  const p = getPage(sectionId, pageId);
  if(!p) return;
  if(p.sheets.length<=1){
    alert("C'est la seule feuille de cette page. Pour la retirer, supprime plutôt la page depuis la barre latérale.");
    return;
  }
  if(!confirm('Supprimer cette feuille A4 ?')) return;
  recordTombstone('sheet', sheetId);
  p.sheets = p.sheets.filter(sh=>sh.id!==sheetId);
  if(activeSheetId===sheetId) activeSheetId = p.sheets[p.sheets.length-1].id;
  save(); renderCanvasStack();
}

function deleteSection(id){
  const classeur = activeClasseur();
  if(!classeur) return;
  if(classeur.sections.length <= 1){ alert("Il faut garder au moins une section par classeur."); return; }
  if(!confirm('Supprimer cette section et toutes ses pages ?')) return;
  recordTombstone('section', id);
  classeur.sections = classeur.sections.filter(s=>s.id!==id);
  if(activeSectionId===id){
    activeSectionId = classeur.sections[0].id;
    activePageId = classeur.sections[0].pages[0].id;
    activeSheetId = classeur.sections[0].pages[0].sheets[0].id;
  }
  save(); renderSidebar(); renderCanvasStack();
}

function deletePage(sectionId, pageId){
  const s = getSection(sectionId);
  if(s.pages.length<=1){ alert("Il faut garder au moins une page par section."); return; }
  if(!confirm('Supprimer cette page (et toutes ses feuilles) ?')) return;
  recordTombstone('page', pageId);
  s.pages = s.pages.filter(p=>p.id!==pageId);
  if(activePageId===pageId){
    activePageId = s.pages[0].id;
    activeSheetId = s.pages[0].sheets[0].id;
  }
  save(); renderSidebar(); renderCanvasStack();
}

/* ============ DÉPLACER SECTION / PAGE ============ */
// Petit menu flottant générique (liste de choix cliquables), utilisé pour choisir la
// destination d'un déplacement. Se ferme au choix ou au clic ailleurs.
let activeMoveMenu = null;
function closeMoveMenu(){
  if(activeMoveMenu){ activeMoveMenu.remove(); activeMoveMenu = null; }
  document.removeEventListener('pointerdown', onMoveMenuOutsideClick, true);
}
function onMoveMenuOutsideClick(e){
  if(activeMoveMenu && !activeMoveMenu.contains(e.target)) closeMoveMenu();
}
function openMoveMenu(anchorEl, title, items){
  closeMoveMenu();
  const menu = document.createElement('div');
  menu.className = 'move-menu';
  const head = document.createElement('div');
  head.className = 'move-menu-title';
  head.textContent = title;
  menu.appendChild(head);
  if(items.length===0){
    const empty = document.createElement('div');
    empty.className = 'move-menu-empty';
    empty.textContent = 'Aucune autre destination disponible.';
    menu.appendChild(empty);
  } else {
    items.forEach(it=>{
      const b = document.createElement('button');
      b.className = 'move-menu-item';
      b.textContent = it.label;
      b.onclick = ()=>{ closeMoveMenu(); it.onPick(); };
      menu.appendChild(b);
    });
  }
  document.body.appendChild(menu);
  const rect = anchorEl.getBoundingClientRect();
  const top = Math.min(rect.bottom+4, window.innerHeight - menu.offsetHeight - 8);
  const left = Math.min(rect.left, window.innerWidth - menu.offsetWidth - 8);
  menu.style.top = Math.max(8,top) + 'px';
  menu.style.left = Math.max(8,left) + 'px';
  activeMoveMenu = menu;
  setTimeout(()=> document.addEventListener('pointerdown', onMoveMenuOutsideClick, true), 0);
}

// Cherche une section par id dans TOUS les classeurs (pas seulement le classeur actif),
// nécessaire car une page peut être déplacée vers une section d'un autre classeur.
function findSectionAnywhere(sectionId){
  for(const c of data.classeurs){
    const s = c.sections.find(sec=>sec.id===sectionId);
    if(s) return { classeur:c, section:s };
  }
  return null;
}

// Déplace une section entière (avec toutes ses pages) vers un autre classeur.
function moveSectionToClasseur(sectionId, targetClasseurId){
  const classeur = activeClasseur();
  if(!classeur) return;
  if(classeur.sections.length<=1){
    alert("Il faut garder au moins une section par classeur. Crée d'abord une autre section ici avant de déplacer celle-ci.");
    return;
  }
  const target = getClasseur(targetClasseurId);
  if(!target) return;
  const idx = classeur.sections.findIndex(s=>s.id===sectionId);
  if(idx===-1) return;
  const [section] = classeur.sections.splice(idx,1);
  target.sections.push(section);
  target.sections.sort((a,b)=> a.name.localeCompare(b.name, 'fr', {sensitivity:'base'}));
  if(activeSectionId===sectionId){
    // On suit la section déplacée dans son nouveau classeur.
    activeClasseurId = target.id;
    activeSectionId = section.id;
    activePageId = section.pages[0]?.id || null;
    activeSheetId = section.pages[0]?.sheets[0]?.id || null;
  }
  save(); renderSidebar(); renderCanvasStack();
}

// Déplace une seule page vers une autre section (dans le même classeur ou un autre).
function movePageToSection(fromSectionId, pageId, targetSectionId){
  const fromSection = getSection(fromSectionId);
  if(!fromSection) return;
  if(fromSection.pages.length<=1){
    alert("Il faut garder au moins une page par section. Crée d'abord une autre page ici avant de déplacer celle-ci.");
    return;
  }
  const found = findSectionAnywhere(targetSectionId);
  if(!found) return;
  const idx = fromSection.pages.findIndex(p=>p.id===pageId);
  if(idx===-1) return;
  const [page] = fromSection.pages.splice(idx,1);
  found.section.pages.push(page);
  if(activeSectionId===fromSectionId && activePageId===pageId){
    // On suit la page déplacée dans sa nouvelle section (et son nouveau classeur si besoin).
    activeClasseurId = found.classeur.id;
    activeSectionId = found.section.id;
    activePageId = page.id;
    activeSheetId = page.sheets[0]?.id || null;
  }
  save(); renderSidebar(); renderCanvasStack();
}

/* ============ TOOLBAR ============ */
document.querySelectorAll('.tool-btn[data-tool]').forEach(btn=>{
  btn.onclick = ()=>{ setTool(btn.dataset.tool); };
});
function setTool(t){
  tool = t;
  document.querySelectorAll('.tool-btn[data-tool]').forEach(b=>b.classList.toggle('active', b.dataset.tool===t));
  document.querySelectorAll('.page-canvas').forEach(pc=>{
    pc.className = 'page-canvas tool-' + t;
  });
  if(t!=='select') deselectEl();
  document.getElementById('eraser-options').style.display = t==='eraser' ? 'flex' : 'none';
  document.getElementById('text-toolbar-options').style.display = t==='text' ? 'flex' : 'none';
  document.getElementById('width-select').style.display = t==='pen' ? 'flex' : 'none';
  document.getElementById('shape-select').style.display = t==='pen' ? 'flex' : 'none';
  document.getElementById('highlight-group').style.display = t==='pen' ? 'flex' : 'none';
  document.getElementById('toolbar-row2').style.display = (t==='pen' || t==='text' || t==='eraser' || t==='select') ? 'flex' : 'none';
  document.getElementById('selection-mode-group').style.display = t==='select' ? 'flex' : 'none';
  document.getElementById('colors').style.display = (t==='pen' || t==='text') ? 'flex' : 'none';
  if(t!=='eraser') document.getElementById('eraser-cursor').style.display = 'none';
  if(t!=='select'){
    document.querySelectorAll('.page-canvas').forEach(pc=>{
      if(pc._zoneRectEl){ pc._zoneRectEl.remove(); pc._zoneRectEl=null; }
      if(pc._zoneActionsEl){ pc._zoneActionsEl.remove(); pc._zoneActionsEl=null; }
      pc._zoneSelection = null;
      clearStrokeOptions(pc);
    });
  }
}

const colorsEl = document.getElementById('colors');
COLORS.forEach(c=>{
  const sw = document.createElement('div');
  sw.className = 'swatch' + (c===penColor?' active':'');
  sw.style.background = c;
  sw.onpointerdown = (e)=> e.preventDefault(); // ne pas voler le focus au texte en cours d'édition
  sw.onclick = ()=>{
    document.querySelectorAll('#colors .swatch').forEach(s=>s.classList.remove('active'));
    sw.classList.add('active');
    if(activeStrokeEdit){
      // Un trait est sélectionné : la couleur choisie ici change CE trait, pas la couleur par
      // défaut du stylo (voir aussi showStrokeColorWidthInToolbar).
      activeStrokeEdit.el.color = c;
      activeStrokeEdit.pathEl.setAttribute('stroke', c);
      save();
      return;
    }
    penColor=c;
    if(activeTextEdit){
      activeTextEdit.el.color = c;
      activeTextEdit.div.style.color = c;
      save();
    }
  };
  colorsEl.appendChild(sw);
});

const textSizeEl = document.getElementById('text-size-select');
FONT_SIZES.forEach(sz=>{
  const b = document.createElement('button');
  b.className = 'text-size-btn' + (sz===textFontSize?' active' : '');

/* ============ CANVAS (pile de pages empilées, façon carnet) ============ */
const canvasWrap = document.getElementById('canvas-wrap');

function pageSize(orientation){
  return orientation==='landscape' ? {w:PAGE_H,h:PAGE_W} : {w:PAGE_W,h:PAGE_H};
}

/* ---- Zoom (pincement 2 doigts sur écran tactile, pincement trackpad, ou boutons ＋/－) ---- */
let zoom = 0.88; // légèrement réduit à l'écran ; n'affecte pas la taille réelle A4 à l'impression
const MIN_ZOOM = 0.4, MAX_ZOOM = 2.5;
const touchPoints = new Map(); // pointerId -> {x,y}, uniquement pour pointerType 'touch'
let pinching = false;

function applyZoom(){
  const stack = document.getElementById('canvas-stack');
  if(stack) stack.style.zoom = zoom;
  const label = document.getElementById('zoom-level');
  if(label) label.textContent = Math.round(zoom*100) + '%';
}
function setZoom(z){ zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, z)); applyZoom(); }
function stepZoom(delta){ setZoom(zoom + delta); }

function touchDist(p1,p2){ return Math.hypot(p1.x-p2.x, p1.y-p2.y); }

// Capture phase : intercepte les touches AVANT qu'elles n'atteignent le dessin sur la feuille,
// pour distinguer "un doigt qui écrit/dessine" de "deux doigts qui zooment/déplacent".
canvasWrap.addEventListener('pointerdown', (e)=>{
  if(e.pointerType!=='touch') return;
  touchPoints.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if(touchPoints.size===2){
    pinching = true;
    document.dispatchEvent(new CustomEvent('pinch-start'));
    const pts = [...touchPoints.values()];
    canvasWrap._pinchStartDist = touchDist(pts[0], pts[1]);
    canvasWrap._pinchStartZoom = zoom;
    // Point du contenu (avant zoom/déplacement) situé sous le milieu des deux doigts —
    // on le garde fixe sous les doigts pendant tout le geste, que ce soit un zoom, un
    // déplacement, ou les deux en même temps (comme sur Google Maps).
    const midX = (pts[0].x+pts[1].x)/2, midY = (pts[0].y+pts[1].y)/2;
    const rect = canvasWrap.getBoundingClientRect();
    canvasWrap._pinchContentX = (midX - rect.left + canvasWrap.scrollLeft) / zoom;
    canvasWrap._pinchContentY = (midY - rect.top + canvasWrap.scrollTop) / zoom;
  }
}, {capture:true});

canvasWrap.addEventListener('pointermove', (e)=>{
  if(e.pointerType!=='touch' || !touchPoints.has(e.pointerId)) return;
  touchPoints.set(e.pointerId, {x:e.clientX, y:e.clientY});
  if(pinching && touchPoints.size===2){
    e.preventDefault();
    const pts = [...touchPoints.values()];
    const newDist = touchDist(pts[0], pts[1]);
    setZoom(canvasWrap._pinchStartZoom * (newDist / canvasWrap._pinchStartDist));
    const midX = (pts[0].x+pts[1].x)/2, midY = (pts[0].y+pts[1].y)/2;
    const rect = canvasWrap.getBoundingClientRect();
    canvasWrap.scrollLeft = canvasWrap._pinchContentX*zoom - (midX - rect.left);
    canvasWrap.scrollTop = canvasWrap._pinchContentY*zoom - (midY - rect.top);
  }
}, {capture:true, passive:false});

function endTouchPoint(e){
  if(e.pointerType!=='touch') return;
  touchPoints.delete(e.pointerId);
  if(touchPoints.size<2) pinching = false;
}
canvasWrap.addEventListener('pointerup', endTouchPoint, {capture:true});
canvasWrap.addEventListener('pointercancel', endTouchPoint, {capture:true});

// Pincement au trackpad (Chrome/Firefox/Safari envoient un événement wheel avec ctrlKey=true).
canvasWrap.addEventListener('wheel', (e)=>{
  if(!e.ctrlKey) return;
  e.preventDefault();
  setZoom(zoom - e.deltaY*0.01*zoom);
}, {passive:false});

// Affiche toutes les pages de la section active. Chaque page peut contenir plusieurs
// feuilles A4 empilées ; ajouter une feuille ne crée jamais de nouvel item dans la barre latérale.
// Affiche UNIQUEMENT la page active (avec toutes ses feuilles A4 empilées) —
// chaque page est indépendante, pas de concaténation avec les autres pages de la section.
function renderCanvasStack(){
  saveLastPosition();
  const section = activeSection();
  const page = activePage();
  canvasWrap.innerHTML = '';
  updateOrientationLabel();

  if(!section || !page){
    const empty = document.createElement('div');
    empty.id = 'empty-state';
    empty.textContent = 'Crée une page pour commencer.';
    canvasWrap.appendChild(empty);
    return;
  }

  // Filet de sécurité supplémentaire : une page ne devrait jamais avoir zéro feuille
  // (ça affichait un écran vide) — on lui en recrée une vierge automatiquement si besoin.
  if(page.sheets.length===0){
    const newSheet = { id: uid(), elements: [] };
    page.sheets.push(newSheet);
    activeSheetId = newSheet.id;
    save();
  }

  const stack = document.createElement('div');
  stack.id = 'canvas-stack';
  const {w,h} = pageSize(page.orientation);
  stack.style.width = w+'px';
  stack.style.zoom = zoom;

  stack.appendChild(buildPageGroup(section, page, w, h));

  canvasWrap.appendChild(stack);
  // Force un recalcul de mise en page immédiat après avoir reconstruit toute la pile de feuilles :
  // sur certains navigateurs tablette, une feuille tout juste ajoutée pouvait rester invisible
  // (repeinte seulement après une interaction, ex. changer de page puis revenir) — lire
  // offsetHeight juste ici oblige le navigateur à calculer la mise en page tout de suite, sans
  // attendre une interaction ultérieure pour s'en apercevoir.
  void canvasWrap.offsetHeight;
}

// Bouton discret entre deux feuilles (ou après la dernière) pour insérer une feuille A4
// À CET ENDROIT PRÉCIS, dans la même page — pas un nouvel item de la barre latérale.
// prevSheet (optionnel) : si fourni, ajoute un bouton pour supprimer la feuille juste au-dessus.
function sheetGap(sectionId, pageId, index, w, prevSheet, showDelete){
  const gap = document.createElement('div');
  gap.className = 'page-gap';
  gap.style.width = w+'px';

  // Le bouton "＋ Ajouter une feuille A4 ici" (visible au survol, entre/après les feuilles) a été
  // retiré à la demande — pour ajouter une feuille, le bouton "＋ Feuille" de la barre d'outils
  // reste disponible.
  if(prevSheet && showDelete){
    const del = document.createElement('button');
    del.className = 'insert-page-btn danger';
    del.textContent = '🗑 Supprimer cette feuille';
    del.onclick = ()=> deleteSheet(sectionId, pageId, prevSheet.id);
    gap.appendChild(del);
  }
  return gap;
}

function buildPageGroup(section, page, w, h){
  const group = document.createElement('div');
  group.className = 'page-block';
  group.dataset.pageId = page.id;

  group.appendChild(sheetGap(section.id, page.id, 0, w, null, false));
  page.sheets.forEach((sheet, idx)=>{
    group.appendChild(buildSheetCanvas(section, page, sheet, w, h));
    group.appendChild(sheetGap(section.id, page.id, idx+1, w, sheet, page.sheets.length>1));
  });

  return group;
}


function buildSheetCanvas(section, page, sheet, w, h){
  const canvas = document.createElement('div');
  canvas.className = 'page-canvas tool-' + tool;
  canvas.dataset.sheetId = sheet.id;
  canvas.style.width = w+'px';
  canvas.style.height = h+'px';

  const margin = document.createElement('div');
  margin.className = 'safe-margin';
  canvas.appendChild(margin);

  /* En-tête section / page — uniquement sur la première feuille */
  const idx0 = page.sheets.indexOf(sheet);
  if(idx0 === 0){
    const hdr = document.createElement('div');
    hdr.className = 'sheet-page-header';
    hdr.dataset.sectionId = section.id;
    hdr.dataset.pageId = page.id;

    const left = document.createElement('div');
    left.className = 'header-left';
    const sSpan = document.createElement('span');
    sSpan.className = 'header-section';
    sSpan.textContent = section.name;
    const pSpan = document.createElement('span');
    pSpan.className = 'header-page';
    pSpan.textContent = page.name;
    left.appendChild(sSpan);
    left.appendChild(pSpan);

    const dSpan = document.createElement('span');
    dSpan.className = 'header-date';
    dSpan.textContent = page.createdAt || '';

    hdr.appendChild(left);
    hdr.appendChild(dSpan);
    canvas.appendChild(hdr);
  }

  /* Images en arrière-plan : insérées avant le SVG et les textes */
  sheet.elements.filter(el=>el.type==='image').forEach(el=>{
    canvas.appendChild(imageElDom(el, sheet));
  });

  /* Blocs de bibliothèque (voir insertLibraryItem / groupElDom) : mêmes règles d'affichage
     qu'une image (plan avant/arrière compris), tant qu'ils n'ont pas été "explosés". */
  sheet.elements.filter(el=>el.type==='group').forEach(el=>{
    canvas.appendChild(groupElDom(el, sheet));
  });

  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('class', 'page-svg');
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  canvas.appendChild(svg);

  sheet.elements.filter(el=>el.type==='stroke').forEach(el=>{
    svg.appendChild(strokePathEl(el));
  });

  sheet.elements.filter(el=>el.type==='text').forEach(el=>{
    canvas.appendChild(textElDom(el, sheet));
  });

  bindCanvasEvents(canvas, svg, sheet, section.id, page.id);
  return canvas;
}

function strokePathEl(el){
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d', el.d);
  path.setAttribute('stroke', el.color);
  path.setAttribute('stroke-width', el.width);
  path.setAttribute('fill','none');
  path.setAttribute('stroke-linecap', el.highlight ? 'square' : 'round');
  path.setAttribute('stroke-linejoin','round');
  if(el.highlight) path.setAttribute('stroke-opacity','0.4');
  path.dataset.elId = el.id;
  path.style.pointerEvents = 'stroke';
  return path;
}

// Un trait est enregistré comme "M x y L x y L x y ..." (voir endStroke) : on peut donc
// le relire comme une simple liste de points pour la gomme "zone".
function strokeDToPoints(d){
  const nums = d.replace(/[ML]/g,' ').trim().split(/\s+/).filter(Boolean).map(Number);
  const pts = [];
  for(let i=0;i+1<nums.length;i+=2) pts.push([nums[i], nums[i+1]]);
  return pts;
}
function pointsToStrokeD(pts){
  return 'M ' + pts.map(p=>p[0]+' '+p[1]).join(' L ');
}

// Génère le tracé (au format M/L uniquement, compatible avec la sélection/déplacement/gomme
// existants) d'une forme tracée par glisser, entre le point de départ et le point actuel.
// Silhouette du nuage : une "bosse" de base (aplatie vers le bas) + plusieurs cercles qui
// débordent dessus, comme un vrai nuage de bande dessinée — beaucoup plus joli qu'une simple
// onde sinusoïdale. On prend, pour chaque angle autour du centre, le contour le plus éloigné
// parmi toutes ces formes (union), ce qui donne des bosses irrégulières et naturelles.
const CLOUD_BUMPS = [
  {cx:-0.22, cy:-0.20, r:0.32},
  {cx:-0.02, cy:-0.32, r:0.36},
  {cx: 0.20, cy:-0.28, r:0.38},
  {cx: 0.38, cy:-0.06, r:0.30},
  {cx:-0.36, cy:-0.02, r:0.26},
];
function cloudRawRadius(angle){
  const dirx = Math.cos(angle), diry = Math.sin(angle);
  const rxBase = 0.46, ryBase = 0.42 - 0.12*Math.max(0, diry); // plus plat vers le bas
  let best = 1/Math.sqrt((dirx/rxBase)**2 + (diry/ryBase)**2);
  CLOUD_BUMPS.forEach(b=>{
    const dot = dirx*b.cx + diry*b.cy;
    const distSq = b.cx*b.cx + b.cy*b.cy;
    const disc = dot*dot - (distSq - b.r*b.r);
    if(disc>=0){
      const t = dot + Math.sqrt(disc);
      if(t>best) best = t;
    }
  });
  return best;
}
function cloudRadiusAt(angle){ return cloudRawRadius(angle); }
const CLOUD_SCALE = (()=>{
  let maxR = 0;
  for(let i=0;i<128;i++){ maxR = Math.max(maxR, cloudRawRadius((i/128)*2*Math.PI)); }
  return 0.5/maxR;
})();

function shapePathD(mode, x0, y0, x1, y1){
  const minX=Math.min(x0,x1), maxX=Math.max(x0,x1), minY=Math.min(y0,y1), maxY=Math.max(y0,y1);
  const w = Math.max(1, maxX-minX), h = Math.max(1, maxY-minY);
  const cx = (minX+maxX)/2, cy = (minY+maxY)/2;

  if(mode==='rect'){
    return `M ${minX} ${minY} L ${maxX} ${minY} L ${maxX} ${maxY} L ${minX} ${maxY} L ${minX} ${minY}`;
  }
  if(mode==='circle' || mode==='ellipse'){
    let rx = w/2, ry = h/2;
    if(mode==='circle'){ const r = Math.max(rx,ry); rx = r; ry = r; }
    const N = 48, pts = [];
    for(let i=0;i<=N;i++){
      const a = (i/N)*2*Math.PI;
      pts.push((cx+rx*Math.cos(a)).toFixed(1)+' '+(cy+ry*Math.sin(a)).toFixed(1));
    }
    return 'M ' + pts.join(' L ');
  }
  if(mode==='cloud'){
    const N = 64, pts = [];
    for(let i=0;i<=N;i++){
      const a = (i/N)*2*Math.PI;
      const r = cloudRadiusAt(a) * CLOUD_SCALE;
      const nx = 0.5 + r*Math.cos(a);
      const ny = 0.5 + r*Math.sin(a);
      pts.push((minX+nx*w).toFixed(1)+' '+(minY+ny*h).toFixed(1));
    }
    return 'M ' + pts.join(' L ');
  }
  if(mode==='arrow'){
    const angle = Math.atan2(y1-y0, x1-x0);
    const len = Math.hypot(x1-x0, y1-y0);
    const headLen = Math.max(8, Math.min(18, len*0.2));
    const spread = Math.PI/8;
    const wx1 = x1 - headLen*Math.cos(angle-spread), wy1 = y1 - headLen*Math.sin(angle-spread);
    const wx2 = x1 - headLen*Math.cos(angle+spread), wy2 = y1 - headLen*Math.sin(angle+spread);
    return `M ${x0} ${y0} L ${x1} ${y1} L ${wx1.toFixed(1)} ${wy1.toFixed(1)} L ${wx2.toFixed(1)} ${wy2.toFixed(1)} L ${x1} ${y1}`;
  }
  return `M ${x0} ${y0} L ${x1} ${y1}`;
}

// Si une sélection de zone est active et que le clic tombe dedans, déplace TOUT son contenu
// (traits, textes, images) ensemble plutôt qu'un seul élément. Retourne true si pris en charge.
// Petite barre flottante (couleur + épaisseur) affichée au-dessus d'un trait/forme sélectionné,
// pour pouvoir changer sa couleur ou son épaisseur après coup — utile pour flèches, rectangles,
// cercles, ellipses, nuages, mais fonctionne pour n'importe quel trait.
function clearStrokeOptions(canvas){
  if(canvas._strokeOptionsEl){ canvas._strokeOptionsEl.remove(); canvas._strokeOptionsEl = null; }
  if(canvas._strokeResizeEls){ canvas._strokeResizeEls.forEach(h=>h.remove()); canvas._strokeResizeEls = null; }
  hideStrokeColorWidthFromToolbar();
}

// Affiche la couleur/épaisseur du trait sélectionné directement dans la barre d'outils (groupes
// #colors et #width-select, normalement réservés à l'outil Stylo) plutôt que dans une bulle
// flottante au-dessus du trait — demandé pour ne pas avoir une icône couleur qui surgit sur le
// dessin. Tant qu'un trait est ainsi "branché", les clics sur ces swatches/boutons modifient CE
// trait (voir activeStrokeEdit, utilisé dans les gestionnaires onclick définis plus haut).
function showStrokeColorWidthInToolbar(strokeEl, strokePath){
  activeStrokeEdit = { el: strokeEl, pathEl: strokePath };
  document.getElementById('colors').style.display = 'flex';
  document.getElementById('width-select').style.display = 'flex';
  document.getElementById('stroke-delete-group').style.display = 'flex';
  document.querySelectorAll('#colors .swatch').forEach(s=>{
    s.classList.toggle('active', s.style.background===strokeEl.color || rgbToHex(s.style.background)===strokeEl.color);
  });
  document.querySelectorAll('#width-select .w-btn').forEach((b,i)=>{
    b.classList.toggle('active', WIDTHS[i]===strokeEl.width);
  });
}
// Referme ce raccourci et remet la barre d'outils dans son état normal pour l'outil actif.
function hideStrokeColorWidthFromToolbar(){
  if(!activeStrokeEdit) return;
  activeStrokeEdit = null;
  document.getElementById('colors').style.display = (tool==='pen' || tool==='text') ? 'flex' : 'none';
  document.getElementById('width-select').style.display = tool==='pen' ? 'flex' : 'none';
  document.getElementById('stroke-delete-group').style.display = 'none';
  document.querySelectorAll('#colors .swatch').forEach(s=>{
    s.classList.toggle('active', s.style.background===penColor || rgbToHex(s.style.background)===penColor);
  });
  document.querySelectorAll('#width-select .w-btn').forEach((b,i)=>{
    b.classList.toggle('active', WIDTHS[i]===penWidth);
  });
}
// style.background renvoie souvent une valeur "rgb(r, g, b)" même quand on lui a assigné un
// hexadécimal — petit utilitaire pour comparer malgré tout avec les couleurs de COLORS (hex).
function rgbToHex(rgb){
  const m = /^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/.exec(rgb);
  if(!m) return rgb;
  return '#' + m.slice(1).map(n=> Number(n).toString(16).padStart(2,'0')).join('');
}
function showStrokeOptions(canvas, strokeEl, strokePath){
  clearStrokeOptions(canvas);
  let bbox;
  try{ bbox = strokePath.getBBox(); }catch(err){ return; }

  // Quatre poignées (une par coin) : chacune redimensionne depuis le coin OPPOSÉ,
  // comme dans un logiciel de dessin classique — fonctionne pour n'importe quelle forme.
  const origPts = strokeDToPoints(strokeEl.d);
  const xs = origPts.map(p=>p[0]), ys = origPts.map(p=>p[1]);
  const minX = Math.min(...xs), maxX = Math.max(...xs), minY = Math.min(...ys), maxY = Math.max(...ys);

  function makeCornerHandle(cornerX, cornerY, anchorX, anchorY, cursor){
    const handle = document.createElement('div');
    handle.className = 'stroke-resize-handle';
    handle.style.cursor = cursor;
    handle.title = 'Redimensionner';
    handle.style.left = (cornerX-4.5)+'px';
    handle.style.top = (cornerY-4.5)+'px';
    handle.onpointerdown = (e)=>{
      // Le survol du stylet à quelques mm de l'écran (sans contact réel) peut déclencher un
      // pointerdown avec une pression nulle sur certains stylets/Surface — on l'ignore, comme
      // pour le dessin au stylo : ne modifier ce point que lors d'un vrai contact avec l'écran.
      if(e.pointerType==='pen' && e.pressure===0) return;
      e.stopPropagation(); e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const scale = rect.width / canvas.offsetWidth || 1;
      const origDX = cornerX - anchorX, origDY = cornerY - anchorY;
      canvas.setPointerCapture(e.pointerId);
      function move(ev){
        if(ev.pointerType==='pen' && ev.pressure===0) return; // survol, pas de contact réel
        const curX = (ev.clientX-rect.left)/scale, curY = (ev.clientY-rect.top)/scale;
        const sx = Math.abs(origDX)<1e-6 ? 1 : (curX-anchorX)/origDX;
        const sy = Math.abs(origDY)<1e-6 ? 1 : (curY-anchorY)/origDY;
        const newPts = origPts.map(p=>[anchorX+(p[0]-anchorX)*sx, anchorY+(p[1]-anchorY)*sy]);
        const newD = pointsToStrokeD(newPts);
        strokePath.setAttribute('d', newD);
        strokeEl.d = newD;
        handle.style.left = (curX-4.5)+'px';
        handle.style.top = (curY-4.5)+'px';
      }
      function up(){
        canvas.removeEventListener('pointermove', move);
        canvas.removeEventListener('pointerup', up);
        save();
        showStrokeOptions(canvas, strokeEl, strokePath);
      }
      canvas.addEventListener('pointermove', move);
      canvas.addEventListener('pointerup', up);
    };
    canvas.appendChild(handle);
    return handle;
  }

  const handles = [
    makeCornerHandle(minX, minY, maxX, maxY, 'nwse-resize'),
    makeCornerHandle(maxX, minY, minX, maxY, 'nesw-resize'),
    makeCornerHandle(minX, maxY, maxX, minY, 'nesw-resize'),
    makeCornerHandle(maxX, maxY, minX, minY, 'nwse-resize'),
  ];
  canvas._strokeResizeEls = handles;

  // La couleur, l'épaisseur ET la suppression de ce trait se règlent désormais depuis la barre
  // d'outils en haut (comme pour le Stylo) plutôt que dans une bulle flottante ici — voir
  // showStrokeColorWidthInToolbar. Seules les 4 poignées de redimensionnement restent sur la feuille.
  showStrokeColorWidthInToolbar(strokeEl, strokePath);
}

function tryStartZoneGroupMove(canvas, sheet, e){
  if(e.pointerType==='pen' && e.pressure===0) return false; // survol du stylet, pas de contact réel
  const zsel = canvas._zoneSelection;
  if(!zsel) return false;
  const rect = canvas.getBoundingClientRect();
  const scale = rect.width / canvas.offsetWidth || 1;
  const zx = (e.clientX-rect.left)/scale, zy = (e.clientY-rect.top)/scale;
  if(!(zx>=zsel.x && zx<=zsel.x+zsel.w && zy>=zsel.y && zy<=zsel.y+zsel.h)) return false;

  // Un élément verrouillé (point rouge) est déjà protégé contre "Supprimer la zone" (voir plus
  // bas, actions.querySelector('[data-act="delete"]')) : il doit l'être tout autant contre le
  // glisser de la zone, sinon le verrou ne protège que la suppression et une image "verrouillée"
  // se fait quand même déplacer dès qu'elle se trouve dans une sélection — ce qui la rend, dans
  // les faits, jamais vraiment ancrée.
  const allZoneEls = getZoneElements(sheet, zsel);
  const lockedCount = allZoneEls.filter(el=>el.locked).length;
  const els = allZoneEls.filter(el=>!el.locked);
  if(els.length===0) return false;
  e.stopPropagation(); e.preventDefault();

  const snapshot = els.map(el=> el.type==='stroke'
    ? { el, pts: strokeDToPoints(el.d) }
    : { el, x: el.x, y: el.y });
  const startX = e.clientX, startY = e.clientY;
  let dx = 0, dy = 0, moved = false, lastClientX = startX, lastClientY = startY;
  canvas.setPointerCapture(e.pointerId);

  function applyDelta(){
    snapshot.forEach(s=>{
      if(s.el.type==='stroke'){
        s.el.d = pointsToStrokeD(s.pts.map(p=>[p[0]+dx, p[1]+dy]));
        const path = canvas.querySelector(`path[data-el-id="${s.el.id}"]`);
        if(path) path.setAttribute('d', s.el.d);
      } else {
        s.el.x = s.x+dx; s.el.y = s.y+dy;
        const dom = canvas.querySelector(`[data-el-id="${s.el.id}"]`);
        if(dom){ dom.style.left = s.el.x+'px'; dom.style.top = s.el.y+'px'; }
      }
    });
    if(canvas._zoneRectEl){
      canvas._zoneRectEl.style.left = (zsel.x+dx)+'px';
      canvas._zoneRectEl.style.top = (zsel.y+dy)+'px';
    }
    if(canvas._zoneActionsEl){
      canvas._zoneActionsEl.style.left = Math.max(0, Math.min(zsel.x+dx, canvas.offsetWidth-360))+'px';
      canvas._zoneActionsEl.style.top = Math.min(zsel.y+dy+zsel.h+6, canvas.offsetHeight-36)+'px';
    }
  }
  function move(ev){
    if(ev.pointerType==='pen' && ev.pressure===0) return; // survol du stylet, pas de contact réel
    moved = true;
    dx = (ev.clientX-startX)/scale; dy = (ev.clientY-startY)/scale;
    applyDelta();
    lastClientX = ev.clientX; lastClientY = ev.clientY;
    // Même besoin que pour glisser une image seule (voir imageElDom) : sans défilement auto, la
    // feuille voisine restait hors champ, donc inatteignable, dès qu'on n'était pas assez dézoomé
    // pour voir les deux feuilles à la fois.
    updateAutoScroll(ev.clientY);
  }
  function up(){
    canvas.removeEventListener('pointermove', move);
    canvas.removeEventListener('pointerup', up);
    stopAutoScroll();
    if(moved){
      zsel.x += dx; zsel.y += dy;
      if(lockedCount>0){
        showInfoMessage(lockedCount>1
          ? `${lockedCount} éléments verrouillés (point rouge) sont restés à leur place.`
          : "Un élément verrouillé (point rouge) est resté à sa place.");
      }
      // Relâchée au-dessus d'une AUTRE feuille (même page) : toute la sélection (traits, texte,
      // images...) déménage vraiment dans les données de cette nouvelle feuille, avec ses
      // coordonnées recalculées dans son repère à elle — même logique que pour une image seule
      // (voir retargetElementToSheetUnderPoint), généralisée ici à plusieurs éléments à la fois.
      const under = document.elementFromPoint(lastClientX, lastClientY);
      const newCanvas = (under && under.closest) ? under.closest('.page-canvas') : null;
      const pageBlock = canvas.closest('.page-block');
      const newSheet = (newCanvas && newCanvas!==canvas && pageBlock && pageBlock.contains(newCanvas))
        ? findSheetById(newCanvas.dataset.sheetId) : null;
      if(newSheet && newSheet!==sheet){
        const newRect = newCanvas.getBoundingClientRect();
        const newScale = newRect.width / newCanvas.offsetWidth || 1;
        const oldRect = canvas.getBoundingClientRect();
        // Le zoom est le même pour toute la pile de feuilles : le décalage entre feuilles se
        // réduit donc à la différence de position à l'écran de leurs deux coins haut-gauche.
        const offsetX = (oldRect.left - newRect.left) / newScale;
        const offsetY = (oldRect.top - newRect.top) / newScale;
        snapshot.forEach(s=>{
          if(s.el.type==='stroke'){
            const pts = strokeDToPoints(s.el.d).map(p=>[p[0]+offsetX, p[1]+offsetY]);
            s.el.d = pointsToStrokeD(pts);
          } else {
            s.el.x += offsetX; s.el.y += offsetY;
          }
        });
        sheet.elements = sheet.elements.filter(e2=> !els.includes(e2));
        els.forEach(e2=> newSheet.elements.push(e2));
        if(activeSheetId===sheet.id) activeSheetId = newSheet.id;
        if(canvas._zoneRectEl){ canvas._zoneRectEl.remove(); canvas._zoneRectEl=null; }
        if(canvas._zoneActionsEl){ canvas._zoneActionsEl.remove(); canvas._zoneActionsEl=null; }
        canvas._zoneSelection = null;
        save();
        renderCanvasStack();
        return;
      }
      save();
    }
  }
  canvas.addEventListener('pointermove', move);
  canvas.addEventListener('pointerup', up);
  return true;
}

function textElDom(el, page){
  const div = document.createElement('div');
  div.className = 'text-el' + (el.locked ? ' locked' : '');
  div.dataset.elId = el.id;
  div.style.left = el.x+'px';
  div.style.top = el.y+'px';
  if(el.wrap){
    div.style.width = el.w+'px';
    div.style.whiteSpace = 'pre-wrap';
    div.style.wordBreak = 'break-word';
  } else {
    div.style.width = 'auto';
    div.style.minWidth = '30px';
    div.style.whiteSpace = 'pre';
  }
  div.style.color = el.color || 'var(--ink)';
  div.style.fontSize = (el.fontSize || 16) + 'px';
  div.style.fontFamily = fontCss(el.fontFamily || 'sans');
  div.style.fontWeight = el.bold ? 'bold' : 'normal';
  div.style.fontStyle = el.italic ? 'italic' : 'normal';
  div.style.textDecoration = el.underline ? 'underline' : 'none';
  div.contentEditable = 'false';
  div.textContent = el.text || '';

  const lock = document.createElement('div');
  lock.className = 'el-lock' + (el.locked ? ' locked' : '');
  lock.contentEditable = 'false';
  lock.title = el.locked ? 'Verrouillé (point rouge) — clique pour déverrouiller' : 'Déverrouillé (point vert) — clique pour ancrer, empêche de le déplacer par erreur en faisant défiler au doigt';
  div.appendChild(lock);

  // Barre flottante : taille, couleur, police, style — visible quand ce texte est sélectionné.
  const opts = document.createElement('div');
  opts.className = 'text-options';
  opts.contentEditable = 'false';
  opts.innerHTML = `
    <div class="text-sizes"></div>
    <div class="sep"></div>
    <div class="text-colors"></div>
    <div class="sep"></div>
    <div class="text-fonts"></div>
    <div class="sep"></div>
    <div class="text-style-toggles">
      <button class="text-style-btn" data-style="bold" title="Gras"><b>G</b></button>
      <button class="text-style-btn" data-style="italic" title="Italique"><i>I</i></button>
      <button class="text-style-btn" data-style="underline" title="Souligné"><u>S</u></button>
    </div>
    <div class="sep"></div>
    <div class="text-highlight"></div>`;
  opts.onpointerdown = (e)=>e.stopPropagation();
  opts.onclick = (e)=>e.stopPropagation();

  const sizesEl = opts.querySelector('.text-sizes');
  FONT_SIZES.forEach(sz=>{
    const b = document.createElement('button');
    b.className = 'text-size-btn' + ((el.fontSize||16)===sz ? ' active' : '');
    b.textContent = 'A';
    b.style.fontSize = Math.min(16, 10+sz/6)+'px';
    b.title = sz+'px';
    b.onclick = ()=>{
      el.fontSize = sz; div.style.fontSize = sz+'px'; save();
      sizesEl.querySelectorAll('.text-size-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
    };
    sizesEl.appendChild(b);
  });

  const colorsEl2 = opts.querySelector('.text-colors');
  COLORS.forEach(c=>{
    const b = document.createElement('button');
    b.className = 'swatch' + ((el.color||COLORS[0])===c ? ' active' : '');
    b.style.background = c;
    b.onclick = ()=>{
      el.color = c; div.style.color = c; save();
      colorsEl2.querySelectorAll('.swatch').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
    };
    colorsEl2.appendChild(b);
  });

  const fontsEl = opts.querySelector('.text-fonts');
  FONTS.forEach(f=>{
    const b = document.createElement('button');
    b.className = 'text-font-btn' + ((el.fontFamily||'sans')===f.key ? ' active' : '');
    b.textContent = f.label;
    b.style.fontFamily = f.css;
    b.onclick = ()=>{
      el.fontFamily = f.key; div.style.fontFamily = f.css; save();
      fontsEl.querySelectorAll('.text-font-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
    };
    fontsEl.appendChild(b);
  });

  const styleToggles = opts.querySelectorAll('.text-style-btn');
  const styleMap = { bold:'bold', italic:'italic', underline:'underline' };
  styleToggles.forEach(b=>{
    const key = b.dataset.style;
    if(el[key]) b.classList.add('active');
    b.onclick = ()=>{
      el[key] = !el[key];
      b.classList.toggle('active', el[key]);
      if(key==='bold') div.style.fontWeight = el.bold ? 'bold' : 'normal';
      if(key==='italic') div.style.fontStyle = el.italic ? 'italic' : 'normal';
      if(key==='underline') div.style.textDecoration = el.underline ? 'underline' : 'none';
      save();
    };
  });

  if(el.highlightColor) div.style.backgroundColor = el.highlightColor;
