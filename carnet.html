        img.style.position='absolute'; img.style.left=el.x+'px'; img.style.top=el.y+'px';
        img.style.width=el.w+'px'; img.style.height=el.h+'px';
        div.appendChild(img);
      } else {
        // Bloc de bibliothèque ("Inser Biblio") : pas une simple image, mais un groupe reconstitué
        // en SVG (voir groupContentSVG, déjà utilisé à l'écran par groupElDom). Même géométrie
        // (rotation/symétrie centrées) que le rendu à l'écran, pour qu'un bloc pivoté/retourné
        // s'imprime identique à ce qu'on voit.
        const rot = el.rotation||0;
        const swapped = (rot===90 || rot===270);
        const cw = swapped ? el.h : el.w, ch = swapped ? el.w : el.h;
        const wrap = document.createElement('div');
        wrap.style.position='absolute'; wrap.style.left=el.x+'px'; wrap.style.top=el.y+'px';
        wrap.style.width=el.w+'px'; wrap.style.height=el.h+'px'; wrap.style.overflow='hidden';
        const inner = document.createElement('div');
        inner.style.position='absolute';
        inner.style.width=cw+'px'; inner.style.height=ch+'px';
        inner.style.left=((el.w-cw)/2)+'px'; inner.style.top=((el.h-ch)/2)+'px';
        inner.style.transform = `rotate(${rot}deg)${el.flip ? ' scaleX(-1)' : ''}`;
        inner.innerHTML = groupContentSVG(el);
        wrap.appendChild(inner);
        div.appendChild(wrap);
      }
    }

    const imageAndGroupEls = sheet.elements.filter(el=>el.type==='image' || el.type==='group');
    imageAndGroupEls.filter(el=>el.layer!=='front').forEach(appendImageOrGroupEl);

    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    svg.style.position='absolute'; svg.style.top='0'; svg.style.left='0'; svg.style.width='100%'; svg.style.height='100%';
    sheet.elements.filter(el=>el.type==='stroke').forEach(el=> svg.appendChild(strokePathEl(el)) );
    div.appendChild(svg);

    sheet.elements.filter(el=>el.type==='text').forEach(el=>{
      const t = document.createElement('div');
      t.style.position='absolute'; t.style.left=el.x+'px'; t.style.top=el.y+'px';
      if(el.wrap){ t.style.width=el.w+'px'; t.style.whiteSpace='pre-wrap'; t.style.wordBreak='break-word'; }
      else { t.style.whiteSpace='pre'; }
      t.style.fontFamily = fontCss(el.fontFamily || 'sans'); t.style.fontSize=(el.fontSize||16)+'px'; t.style.lineHeight='1.4';
      t.style.color = el.color || '#1d2b3a';
      t.style.fontWeight = el.bold ? 'bold' : 'normal';
      t.style.fontStyle = el.italic ? 'italic' : 'normal';
      t.style.textDecoration = el.underline ? 'underline' : 'none';
      if(el.highlightColor) t.style.backgroundColor = el.highlightColor;
      t.textContent = el.text || '';
      div.appendChild(t);
    });

    imageAndGroupEls.filter(el=>el.layer==='front').forEach(appendImageOrGroupEl);

    area.appendChild(div);
  });

  // Les <img> (photos, et maintenant blocs de bibliothèque contenant des <image> SVG) sont
  // chargées de façon asynchrone, même pour un data URI base64 déjà en mémoire — sans attendre
  // ici, window.print() pouvait capturer la page AVANT que certaines photos (surtout plusieurs à
  // la fois, sur une tablette moins puissante) aient fini de se décoder/peindre, ce qui les
  // faisait sortir vides à l'impression. On attend donc explicitement chaque image (avec un
  // filet de sécurité de 4s pour ne jamais bloquer indéfiniment si l'une d'elles échoue).
  const imgs = Array.from(area.querySelectorAll('img'));
  await Promise.all(imgs.map(img=> new Promise(resolve=>{
    if(img.complete) { resolve(); return; }
    img.addEventListener('load', resolve, {once:true});
    img.addEventListener('error', resolve, {once:true});
    setTimeout(resolve, 4000);
  })));

  if(title){
    const originalTitle = document.title;
    document.title = title;
    const restore = ()=>{ document.title = originalTitle; window.removeEventListener('afterprint', restore); };
    window.addEventListener('afterprint', restore);
    window.print();
    // Filet de sécurité : certains navigateurs ne déclenchent pas toujours 'afterprint' de façon fiable.
    setTimeout(restore, 3000);
  } else {
    window.print();
  }
}

/* ============ COLLER UNE IMAGE (presse-papier) ============ */
// Utilisée par l'icône "🖼 Image" de la barre d'outils : insère une image choisie depuis le
// disque, sur la feuille active. Se souvient du dernier dossier utilisé, comme Exporter/Importer.
async function insertImageFromPicker(){
  const sheet = activeSheet();
  if(!sheet){ alert("Sélectionne une page avant d'insérer une image."); return; }
  if(!('showOpenFilePicker' in window)){
    document.getElementById('image-input').click();
    return;
  }
  try{
    // showOpenFilePicker() doit être appelé en tout premier, sans AUCUN "await" avant — un
    // idbGet() avant lui fait perdre le geste de clic aux yeux de Chrome, qui refuse alors
    // d'ouvrir la fenêtre sans la moindre erreur (rien ne se passe au clic).
    const [fileHandle] = await window.showOpenFilePicker({
      types: [{ description: 'Image', accept: { 'image/*': ['.png','.jpg','.jpeg','.gif','.webp','.bmp'] } }],
      startIn: lastImageFileHandle || undefined
    });
    idbSet('lastImageFile', fileHandle).catch(()=>{});
    lastImageFileHandle = fileHandle;
    const file = await fileHandle.getFile();
    await insertImageBlob(file, sheet);
  }catch(err){
    if(err && err.name==='AbortError') return; // annulé par la personne
    console.warn('Sélecteur de fichier impossible, retour au sélecteur classique.', err);
    document.getElementById('image-input').click();
  }
}

function insertImageFromInput(e){
  const file = e.target.files[0];
  e.target.value = '';
  if(!file) return;
  const sheet = activeSheet();
  if(!sheet){ alert('Sélectionne une page avant d\'insérer une image.'); return; }
  insertImageBlob(file, sheet);
}

// Décale légèrement chaque collage successif (image ou élément) pour ne pas empiler les
// copies exactement au même endroit.
let pasteOffsetIndex = 0;
function insertImageBlob(blob, sheet, atX, atY, layer){
  return new Promise((resolve)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const src = reader.result;
      const probe = new Image();
      probe.onload = ()=>{
        const maxW = (794 - 80) / 2;  /* environ la moitié de la largeur utile de la page A4 */
        const maxH = (1123 - 180) / 2; /* environ la moitié de la hauteur utile */
        let startX = atX, startY = atY;
        if(startX==null || startY==null){
          // Décale chaque collage successif au même endroit par défaut (bouton "📋 Coller"
          // sans position précise) — sinon coller plusieurs fois la même image les empile
          // exactement au même endroit : la 2e, 3e... collent bien mais restent invisibles,
          // cachées sous la 1ère, ce qui donne l'impression que "coller" ne marche qu'une fois.
          startX = 60 + (pasteOffsetIndex%8)*18;
          startY = 90 + (pasteOffsetIndex%8)*18;
          pasteOffsetIndex++;
        }
        // Bug corrigé : si on colle assez bas sur une grande feuille (ex. via un appui long
        // près du bas), "maxH - (startY-90)" devenait négatif, ce qui rendait "scale" négatif —
        // et donc une image de largeur/hauteur négatives, invisible (juste son point de verrouillage
        // restait visible, ce qui donnait l'impression d'un collage "raté" alors que l'image était
        // bien là, juste réduite à une taille nulle). On impose maintenant un minimum de hauteur
        // disponible pour ne plus jamais tomber à zéro ni en négatif.
        const availableH = Math.max(80, maxH - Math.max(0, startY-90));
        const scale = Math.min(1, maxW/probe.width, availableH/probe.height);

        // Compression avant stockage : une photo d'appareil/tablette moderne peut peser plusieurs
        // Mo, et son encodage en base64 (~+33% de poids) peut vite remplir le stockage local du
        // navigateur, ralentir chaque "Envoyer"/"Récupérer" (voir syncTimeoutForSize), et occuper
        // inutilement de la place sur le serveur de synchro au fil du temps.
        // Réglage resserré (1280px / JPEG 0.72, au lieu de 1600px / 0.82) à la demande explicite de
        // l'utilisateur pour gagner encore de la place, quitte à perdre un peu de netteté sur les
        // photos — 1280px reste largement lisible pour des annotations manuscrites/documents.
        const MAX_DIM = 1280;
        let finalSrc = src;
        if(probe.width > MAX_DIM || probe.height > MAX_DIM){
          try{
            const ratio = Math.min(MAX_DIM/probe.width, MAX_DIM/probe.height);
            const cw = Math.max(1, Math.round(probe.width*ratio)), ch = Math.max(1, Math.round(probe.height*ratio));
            const off = document.createElement('canvas');
            off.width = cw; off.height = ch;
            const octx = off.getContext('2d');
            octx.drawImage(probe, 0, 0, cw, ch);
            finalSrc = off.toDataURL('image/jpeg', 0.72);
          }catch(err){
            console.warn('Compression image impossible, on garde le fichier original :', err);
            finalSrc = src;
          }
        }

        const el = {
          id: uid(), type:'image', x: startX, y: startY,
          w: Math.max(20, Math.round(probe.width*scale)), h: Math.max(20, Math.round(probe.height*scale)), src: finalSrc,
          layer: layer==='front' ? 'front' : 'back' // 'back' (défaut) = derrière les traits/textes, comme avant
        };
        sheet.elements.push(el);
        save();
        renderCanvasStack();
        resolve();
      };
      probe.src = src;
    };
    reader.readAsDataURL(blob);
  });
}

// Redessine la zone sélectionnée (traits, images, textes) sur un canvas hors-écran
// puis l'envoie au presse-papier sous forme d'image PNG.
async function copyZoneToClipboard(sheet, x, y, w, h){
  if(!navigator.clipboard || !window.ClipboardItem){
    throw new Error('Presse-papier image non supporté par ce navigateur.');
  }
  const scale = 2; // export en haute résolution
  const canvas = document.createElement('canvas');
  canvas.width = Math.max(1, Math.round(w*scale));
  canvas.height = Math.max(1, Math.round(h*scale));
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);
  ctx.fillStyle = '#fbf9f4';
  ctx.fillRect(0, 0, w, h);
  ctx.translate(-x, -y);

  // Images (arrière-plan)
  const imageEls = sheet.elements.filter(e=>e.type==='image');
  await Promise.all(imageEls.map(el=> new Promise(resolve=>{
    const img = new Image();
    img.onload = ()=>{ ctx.drawImage(img, el.x, el.y, el.w, el.h); resolve(); };
    img.onerror = resolve;
    img.src = el.src;
  })));

  // Traits de stylo
  sheet.elements.filter(e=>e.type==='stroke').forEach(el=>{
    const pts = strokeDToPoints(el.d);
    if(pts.length<2) return;
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.strokeStyle = el.color;
    ctx.lineWidth = el.width;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
  });

  // Textes
  ctx.font = "16px 'Inter', sans-serif";
  ctx.textBaseline = 'alphabetic';
  sheet.elements.filter(e=>e.type==='text').forEach(el=>{
    ctx.fillStyle = el.color || '#1d2b3a';
    const lines = (el.text||'').split('\n');
    lines.forEach((line,i)=> ctx.fillText(line, el.x+4, el.y+20+i*22));
  });

  const blob = await new Promise(resolve=> canvas.toBlob(resolve, 'image/png'));
  if(!blob) throw new Error('Échec de la génération de l\'image.');
  await navigator.clipboard.write([ new ClipboardItem({ 'image/png': blob }) ]);
}


// ---- Copie "éléments" : garde le texte et les traits modifiables, au lieu d'aplatir en image ----
function textBBox(el){
  const lines = Math.max(1, (el.text||'').split('\n').length);
  return { x: el.x, y: el.y, w: el.w, h: lines*22 + 8 };
}
// Vrai si (x,y) tombe sur une image ou un texte déjà présent sur la feuille — utilisé pour ne
// pas proposer de coller par-dessus un élément existant (voir l'appui long au doigt plus haut).
function pointHitsExistingElement(sheet, x, y){
  return sheet.elements.some(el=>{
    if(el.type==='image'){
      return x>=el.x && x<=el.x+el.w && y>=el.y && y<=el.y+el.h;
    }
    if(el.type==='text'){
      const b = textBBox(el);
      return x>=b.x && x<=b.x+b.w && y>=b.y && y<=b.y+b.h;
    }
    return false;
  });
}
// Comme pointHitsExistingElement, mais renvoie l'IMAGE elle-même (la dernière qui correspond,
// donc la plus proche du dessus) au lieu d'un simple booléen — utilisé pour permettre de déplacer
// une image au stylet par un appui long, même en outil ✎ Stylo (voir bindCanvasEvents).
function findImageAt(sheet, x, y){
  let found = null;
  sheet.elements.forEach(el=>{
    if(el.type==='image' && x>=el.x && x<=el.x+el.w && y>=el.y && y<=el.y+el.h) found = el;
  });
  return found;
}
function strokeBBox(el){
  const pts = strokeDToPoints(el.d);
  const xs = pts.map(p=>p[0]), ys = pts.map(p=>p[1]);
  return { x: Math.min(...xs), y: Math.min(...ys), w: Math.max(...xs)-Math.min(...xs), h: Math.max(...ys)-Math.min(...ys) };
}
function rectsOverlap(a,b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}
function pointInPolygon(px, py, points){
  let inside = false;
  for(let i=0, j=points.length-1; i<points.length; j=i++){
    const xi=points[i][0], yi=points[i][1], xj=points[j][0], yj=points[j][1];
    const intersect = ((yi>py) !== (yj>py)) && (px < (xj-xi)*(py-yi)/((yj-yi)||1e-9)+xi);
    if(intersect) inside = !inside;
  }
  return inside;
}
function elementsInZone(sheet, x, y, w, h){
  const zone = {x,y,w,h};
  return sheet.elements.filter(el=>{
    let bbox;
    if(el.type==='stroke') bbox = strokeBBox(el);
    else if(el.type==='text') bbox = textBBox(el);
    else if(el.type==='image' || el.type==='group') bbox = {x:el.x, y:el.y, w:el.w, h:el.h};
    else return false;
    return rectsOverlap(bbox, zone);
  });
}
function elementsInLasso(sheet, points){
  return sheet.elements.filter(el=>{
    let bbox;
    if(el.type==='stroke') bbox = strokeBBox(el);
    else if(el.type==='text') bbox = textBBox(el);
    else if(el.type==='image' || el.type==='group') bbox = {x:el.x, y:el.y, w:el.w, h:el.h};
    else return false;
    return pointInPolygon(bbox.x+bbox.w/2, bbox.y+bbox.h/2, points);
  });
}
// Point d'entrée unique : marche pour une sélection rectangulaire ou au lasso.
// Retrouve le canvas (feuille affichée) qui a actuellement une sélection de zone active — utilisé
// par les boutons Rotation/Symétrie de la barre Sélection (voir plus bas), qui ne sont pas liés à
// un canvas particulier comme le sont les actions du petit menu flottant "Copier/Image/...".
function findActiveZoneCanvas(){
  return Array.from(document.querySelectorAll('.page-canvas')).find(c=>c._zoneSelection) || null;
}
function findSheetById(sheetId){
  for(const classeur of data.classeurs){
    for(const section of classeur.sections){
      for(const page of section.pages){
        const sheet = page.sheets.find(s=>s.id===sheetId);
        if(sheet) return sheet;
      }
    }
  }
  return null;
}
// Referme une sélection de zone depuis l'extérieur de bindCanvasEvents (voir clearZoneSelection,
// sa version interne utilisée pour le reste de la logique de sélection) — nécessaire ici car
// rotateZoneSelection/flipZoneSelection ne connaissent pas le canvas à l'avance.
function clearZoneSelectionOn(canvas){
  if(canvas._zoneRectEl){ canvas._zoneRectEl.remove(); canvas._zoneRectEl=null; }
  if(canvas._zoneActionsEl){ canvas._zoneActionsEl.remove(); canvas._zoneActionsEl=null; }
  canvas._zoneSelection = null;
}
// n pas de 90° sens horaire (n peut être négatif pour l'anti-horaire) appliqués à un vecteur.
function rotateVector90ForZone(dx, dy, steps){
  let x=dx, y=dy;
  const n = ((steps%4)+4)%4;
  for(let i=0;i<n;i++){ const nx=-y, ny=x; x=nx; y=ny; }
  return [x,y];
}
// Pivote de 90° (dir=+1 horaire, dir=-1 anti-horaire) tout le contenu de la sélection de zone
// actuellement tracée, autour du centre de cette zone. Les traits pivotent réellement (chaque
// point tourne) ; les images et les blocs bibliothèque pivotent comme un tout (voir
// updateElContentBox dans imageElDom) ; le texte, lui, garde son orientation lisible et se
// contente de changer de position autour du centre — pivoter les lettres elles-mêmes les
// rendrait illisibles pour un gain visuel minime.
function rotateZoneSelection(dir){
  const canvas = findActiveZoneCanvas();
  if(!canvas){ alert("Trace d'abord une sélection de zone (▭ Zone ou ➰ Lasso) avant de faire pivoter."); return; }
  const zsel = canvas._zoneSelection;
  const sheet = findSheetById(canvas.dataset.sheetId);
  if(!sheet) return;
  const els = getZoneElements(sheet, zsel);
  if(els.length===0){ alert('Rien à faire pivoter dans cette zone.'); return; }
  const cx = zsel.x + zsel.w/2, cy = zsel.y + zsel.h/2;
  els.forEach(el=>{
    if(el.type==='stroke'){
      const pts = strokeDToPoints(el.d).map(([x,y])=>{
        const [rdx,rdy] = rotateVector90ForZone(x-cx, y-cy, dir);
        return [cx+rdx, cy+rdy];
      });
      el.d = pointsToStrokeD(pts);
    } else if(el.type==='text'){
      const b = textBBox(el);
      const [rdx,rdy] = rotateVector90ForZone((b.x+b.w/2)-cx, (b.y+b.h/2)-cy, dir);
      el.x = cx+rdx-b.w/2; el.y = cy+rdy-b.h/2;
    } else if(el.type==='image' || el.type==='group'){
      const [rdx,rdy] = rotateVector90ForZone((el.x+el.w/2)-cx, (el.y+el.h/2)-cy, dir);
      const oldW = el.w, oldH = el.h;
      el.w = oldH; el.h = oldW;
      el.rotation = ((el.rotation||0) + (dir>0?90:270)) % 360;
      el.x = cx+rdx-el.w/2; el.y = cy+rdy-el.h/2;
    }
  });
  clearZoneSelectionOn(canvas);
  save();
  renderCanvasStack();
}
// Symétrie (miroir) de la sélection actuellement tracée, autour de son axe horizontal ('h',
// gauche ↔ droite) ou vertical ('v', haut ↕ bas). Même principe que rotateZoneSelection : traits
// réellement inversés point par point, images/blocs inversés comme un tout, texte simplement
// repositionné (reste lisible).
function flipZoneSelection(axis){
  const canvas = findActiveZoneCanvas();
  if(!canvas){ alert("Trace d'abord une sélection de zone (▭ Zone ou ➰ Lasso) avant d'appliquer une symétrie."); return; }
  const zsel = canvas._zoneSelection;
  const sheet = findSheetById(canvas.dataset.sheetId);
  if(!sheet) return;
  const els = getZoneElements(sheet, zsel);
  if(els.length===0){ alert('Rien à symétriser dans cette zone.'); return; }
  const cx = zsel.x + zsel.w/2, cy = zsel.y + zsel.h/2;
  els.forEach(el=>{
    if(el.type==='stroke'){
      const pts = strokeDToPoints(el.d).map(([x,y])=> axis==='h' ? [2*cx-x, y] : [x, 2*cy-y]);
      el.d = pointsToStrokeD(pts);
    } else if(el.type==='text'){
      const b = textBBox(el);
      const ocx = b.x+b.w/2, ocy = b.y+b.h/2;
      const ncx = axis==='h' ? 2*cx-ocx : ocx;
      const ncy = axis==='v' ? 2*cy-ocy : ocy;
      el.x = ncx-b.w/2; el.y = ncy-b.h/2;
    } else if(el.type==='image' || el.type==='group'){
      const ocx = el.x+el.w/2, ocy = el.y+el.h/2;
      const ncx = axis==='h' ? 2*cx-ocx : ocx;
      const ncy = axis==='v' ? 2*cy-ocy : ocy;
      const rot = el.rotation||0;
      el.rotation = axis==='h' ? (360-rot)%360 : (180-rot+360)%360;
      el.flip = !el.flip;
      el.x = ncx-el.w/2; el.y = ncy-el.h/2;
    }
  });
  clearZoneSelectionOn(canvas);
  save();
  renderCanvasStack();
}
function openFlipMenu(){
  showActionMenu('Sens de la symétrie :', [
    { label:'⇋ Horizontale (gauche ↔ droite)', onPick: ()=> flipZoneSelection('h') },
    { label:'⇅ Verticale (haut ↕ bas)', onPick: ()=> flipZoneSelection('v') }
  ]);
}

function getZoneElements(sheet, zsel){
  return zsel.points ? elementsInLasso(sheet, zsel.points) : elementsInZone(sheet, zsel.x, zsel.y, zsel.w, zsel.h);
}

const ELEMENTS_CLIP_PREFIX = 'CARNET_ELEMENTS_V1::';

// Traits/textes/images d'une zone, convertis en coordonnées RELATIVES au coin de la zone (x,y) —
// utilisé à la fois pour le copier-coller (presse-papier) et pour la bibliothèque, afin qu'un
// élément enregistré se recolle correctement où qu'on le pose ensuite.
function serializeZoneElements(sheet, x, y, w, h, points){
  const els = getZoneElements(sheet, {x,y,w,h,points});
  return els.map(el=>{
    if(el.type==='stroke'){
      const pts = strokeDToPoints(el.d).map(p=>[p[0]-x, p[1]-y]);
      return { type:'stroke', color: el.color, width: el.width, d: pointsToStrokeD(pts) };
    }
    if(el.type==='text'){
      return { type:'text', x: el.x-x, y: el.y-y, w: el.w, color: el.color, text: el.text };
    }
    if(el.type==='group'){
      // Conservé tel quel (avec ses propres éléments imbriqués) : un bloc copié/enregistré reste
      // un bloc, il ne s'"explose" pas tout seul en le recollant ou en le renvoyant en bibliothèque.
      return { type:'group', x: el.x-x, y: el.y-y, w: el.w, h: el.h, origW: el.origW, origH: el.origH, elements: el.elements };
    }
    return { type:'image', x: el.x-x, y: el.y-y, w: el.w, h: el.h, src: el.src, rotation: el.rotation, flip: el.flip };
  });
}

// Enregistre la sélection actuelle dans data.library (persistée comme le reste : export, synchro,
// sauvegarde locale). Redemande un nom à chaque fois plutôt que de compliquer l'interface avec un
// champ dédié — cohérent avec renameSection/renameClasseur qui utilisent déjà prompt().
function saveZoneToLibrary(sheet, x, y, w, h, points){
  const elements = serializeZoneElements(sheet, x, y, w, h, points);
  if(elements.length===0){ alert('Rien à enregistrer dans cette zone.'); return; }
  const name = prompt('Nom de cet élément de bibliothèque :', '');
  if(name===null) return; // annulé
  data.library.push({ id: uid(), name: name.trim() || 'Sans nom', elements });
  save();
  alert('Enregistré dans la bibliothèque. Pour le réutiliser : appui long sur une feuille → 📚 Bibliothèque.');
}

async function copyZoneAsElements(sheet, x, y, w, h, points){
  const elements = serializeZoneElements(sheet, x, y, w, h, points);
  if(elements.length===0) throw new Error('Rien à copier dans cette zone.');
  const payload = {
    magic: 'CARNET_ELEMENTS_V1',
    elements
  };
  await navigator.clipboard.writeText(ELEMENTS_CLIP_PREFIX + JSON.stringify(payload));
}

// Construit et insère un unique bloc "group" (voir groupElDom) à partir d'un tableau d'éléments
// (traits/texte/images/blocs), à (atX,atY) — ou à la position de collage par défaut si non
// précisé. Partagée par le collage presse-papier d'une sélection copiée au stylo/lasso (voir
// pasteElementsPayload) ET par la bibliothèque (insertLibraryItem) : dans les deux cas, même s'il
// y a du texte mélangé à des traits, le contenu arrive comme UN SEUL bloc déplaçable /
// redimensionnable, qu'on peut ensuite "💥 Exploser" pour retrouver les éléments d'origine séparés
// et modifiables individuellement.
function insertElementsAsGroup(elements, sheet, atX, atY){
  if(!elements || elements.length===0) return false;

  let baseX, baseY;
  if(atX!=null && atY!=null){ baseX = atX; baseY = atY; }
  else { baseX = 90 + (pasteOffsetIndex%8)*18; baseY = 130 + (pasteOffsetIndex%8)*18; pasteOffsetIndex++; }

  // Cas particulier : un seul élément qui est DÉJÀ un bloc (ex. on a copié un bloc déjà posé) —
  // pas besoin de l'emballer dans un bloc supplémentaire, on le repose simplement tel quel.
  if(elements.length===1 && elements[0].type==='group'){
    const g = elements[0];
    sheet.elements.push({ id: uid(), type:'group', x: baseX, y: baseY, w: g.w, h: g.h, origW: g.origW, origH: g.origH, rotation: g.rotation, flip: g.flip, elements: g.elements });
    save();
    renderCanvasStack();
    return true;
  }

  // Bbox englobant de tous les éléments, pour connaître la taille d'origine du bloc (mêmes
  // fonctions que pour l'affichage sur la feuille elle-même).
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  let maxStrokeWidth = 0;
  elements.forEach(el=>{
    let b;
    if(el.type==='stroke'){
      const pts = strokeDToPoints(el.d);
      const xs = pts.map(p=>p[0]), ys = pts.map(p=>p[1]);
      b = { x:Math.min(...xs), y:Math.min(...ys), w:Math.max(...xs)-Math.min(...xs), h:Math.max(...ys)-Math.min(...ys) };
      maxStrokeWidth = Math.max(maxStrokeWidth, el.width||0);
    } else if(el.type==='text'){
      b = textBBox(el);
    } else {
      b = { x: el.x, y: el.y, w: el.w, h: el.h };
    }
    minX = Math.min(minX, b.x); minY = Math.min(minY, b.y);
    maxX = Math.max(maxX, b.x+b.w); maxY = Math.max(maxY, b.y+b.h);
  });
  if(!isFinite(minX)) return false;
  // La bbox ci-dessus ne suit que les POINTS du trait, pas l'encre réellement dessinée : avec
  // stroke-linecap/linejoin "round" (voir groupContentSVG), l'encre déborde du point de
  // stroke-width/2 dans toutes les directions, et le viewBox du SVG interne du bloc coupe tout ce
  // qui dépasse (0,0,origW,origH) — d'où les bords "mangés" visibles au collage. On ajoute donc
  // ici une marge basée sur le trait le plus épais de la sélection, pour que l'encre reste
  // entièrement à l'intérieur du bloc.
  const margin = maxStrokeWidth>0 ? Math.ceil(maxStrokeWidth/2) + 2 : 0;
  minX -= margin; minY -= margin; maxX += margin; maxY += margin;
  const origW = Math.max(1, maxX-minX), origH = Math.max(1, maxY-minY);

  // Éléments recalés relativement au coin (minX,minY) du bloc — c'est ce repère (0,0,origW,origH)
  // qu'utilise groupContentSVG pour les redessiner, et explodeGroup pour les reposer à l'identique.
  const relElements = elements.map(el=>{
    if(el.type==='stroke'){
      const pts = strokeDToPoints(el.d).map(p=>[p[0]-minX, p[1]-minY]);
      return { type:'stroke', color: el.color, width: el.width, highlight: el.highlight, d: pointsToStrokeD(pts) };
    }
    if(el.type==='text') return { type:'text', x: el.x-minX, y: el.y-minY, w: el.w, color: el.color, text: el.text };
    if(el.type==='group') return { type:'group', x: el.x-minX, y: el.y-minY, w: el.w, h: el.h, origW: el.origW, origH: el.origH, rotation: el.rotation, flip: el.flip, elements: el.elements };
    return { type:'image', x: el.x-minX, y: el.y-minY, w: el.w, h: el.h, src: el.src, layer: el.layer, rotation: el.rotation, flip: el.flip };
  });

  sheet.elements.push({
    id: uid(), type:'group', x: baseX, y: baseY, w: origW, h: origH,
    origW, origH, elements: relElements
  });
  save();
  renderCanvasStack();
  return true;
}

function pasteElementsPayload(jsonStr, sheet, atX, atY){
  let payload;
  try{ payload = JSON.parse(jsonStr); }catch(err){ return false; }
  if(!payload || payload.magic!=='CARNET_ELEMENTS_V1' || !Array.isArray(payload.elements)) return false;
  return insertElementsAsGroup(payload.elements, sheet, atX, atY);
}

// Insère un élément de bibliothèque (voir saveZoneToLibrary) sur la feuille active, à l'endroit
// de l'appui long ou du bouton "📚 Inser Biblio" — utilisé par le menu "📚 Bibliothèque" (voir
// pasteWithConfirm). Même mécanisme que le collage presse-papier ci-dessus (voir
// insertElementsAsGroup) : un seul bloc explosable, plutôt que des éléments épars.
function insertLibraryItem(item, atX, atY){
  const sheet = activeSheet();
  if(!sheet) return;
  insertElementsAsGroup(item.elements, sheet, atX, atY);
}

// Construit un aperçu SVG miniature d'un élément de bibliothèque (traits, texte, image), affiché
// à côté de son nom dans les menus ci-dessous — pour voir de quoi il s'agit sans avoir à
// l'insérer d'abord pour vérifier. Un simple viewBox centré sur l'ensemble des éléments suffit :
// pas besoin de recalculer une échelle nous-mêmes, le SVG s'en charge (preserveAspectRatio).
function libraryItemPreviewSVG(item){
  const els = (item && item.elements) || [];
  if(els.length===0) return '';
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  const bboxOf = (el)=>{
    if(el.type==='stroke'){
      const pts = strokeDToPoints(el.d);
      const xs = pts.map(p=>p[0]), ys = pts.map(p=>p[1]);
      return { x:Math.min(...xs), y:Math.min(...ys), w:Math.max(...xs)-Math.min(...xs), h:Math.max(...ys)-Math.min(...ys) };
    }
    if(el.type==='text') return textBBox(el);
    return { x:el.x, y:el.y, w:el.w, h:el.h };
  };
  els.forEach(el=>{
    const b = bboxOf(el);
    minX = Math.min(minX, b.x); minY = Math.min(minY, b.y);
    maxX = Math.max(maxX, b.x+b.w); maxY = Math.max(maxY, b.y+b.h);
  });
  if(!isFinite(minX)) return '';
  const pad = 6;
  const vx = minX-pad, vy = minY-pad, vw = Math.max(1,(maxX-minX)+pad*2), vh = Math.max(1,(maxY-minY)+pad*2);
  const parts = [];
  els.forEach(el=>{
    if(el.type==='stroke'){
      parts.push(`<path d="${escapeAttr(el.d)}" fill="none" stroke="${escapeAttr(el.color)}" stroke-width="${el.width}" stroke-linecap="round" stroke-linejoin="round"/>`);
    } else if(el.type==='image'){
      parts.push(`<image href="${escapeAttr(el.src)}" x="${el.x}" y="${el.y}" width="${el.w}" height="${el.h}" preserveAspectRatio="xMidYMid slice"/>`);
    } else if(el.type==='text'){
      const b = textBBox(el);
      const firstLine = (el.text||'').split('\n')[0].slice(0,40);
      parts.push(`<rect x="${b.x}" y="${b.y}" width="${b.w}" height="${b.h}" fill="rgba(255,255,255,.6)" stroke="#c8bfa8" stroke-width="1"/>`);
      parts.push(`<text x="${b.x+4}" y="${b.y+18}" font-size="15" font-family="monospace" fill="${escapeAttr(el.color||'#1d2b3a')}">${escapeHtml(firstLine)}</text>`);
    }
  });
  return `<svg viewBox="${vx} ${vy} ${vw} ${vh}" class="lib-preview-svg" preserveAspectRatio="xMidYMid meet">${parts.join('')}</svg>`;
}

// Menu "📚 Bibliothèque" : liste chaque élément enregistré (voir saveZoneToLibrary), avec une
// dernière option pour en supprimer si besoin. Utilise le même showActionMenu générique que le
// menu Coller/Insérer, donc fiable au clic même après un appui long (voir pasteWithConfirm).
function openLibraryMenu(atX, atY){
  if(!data.library || data.library.length===0){
    alert("La bibliothèque est vide. Pour y ajouter quelque chose : trace un rectangle ou un lasso de sélection (outil ▭ Zone), puis \"📚 Bibliothèque\".");
    return;
  }
  const options = data.library.map(item=>({
    label: item.name,
    previewHTML: libraryItemPreviewSVG(item),
    onPick: ()=> insertLibraryItem(item, atX, atY)
  }));
  options.push({ label: '🗑 Gérer / supprimer…', onPick: ()=> openLibraryManageMenu(atX, atY) });
  showActionMenu('Insérer depuis la bibliothèque :', options);
}
function openLibraryManageMenu(atX, atY){
  if(!data.library || data.library.length===0) return;
  const options = data.library.map(item=>({
    label: item.name,
    previewHTML: libraryItemPreviewSVG(item),
    onPick: ()=>{
      if(!confirm(`Supprimer "${item.name}" de la bibliothèque ?`)) return;
      data.library = data.library.filter(x=>x.id!==item.id);
      save();
    }
  }));
  showActionMenu('Supprimer quel élément ?', options);
}


// Petit menu générique (titre + boutons + "Annuler"), utilisé pour l'appui long au doigt —
// aussi bien pour proposer de coller/insérer une image sur une zone vide, que pour changer le
// plan (devant/derrière) d'une image déjà posée. Chaque bouton appelle son "onPick" en DIRECT
// depuis le clic réel (pas via une chaîne de promesses) : certaines actions (insérer une image)
// ouvrent un sélecteur de fichier qui exige un geste utilisateur tout frais — passer par un
// enchaînement de "await" avant risquerait de le faire échouer silencieusement (déjà vu ailleurs
// dans ce fichier avec le presse-papier et les sélecteurs de dossier).
function showActionMenu(title, options){
  const overlay = document.createElement('div');
  overlay.className = 'paste-confirm-overlay';
  const box = document.createElement('div');
  box.className = 'paste-confirm-box';
  const msg = document.createElement('p');
  msg.textContent = title;
  const actions = document.createElement('div');
  actions.className = 'paste-confirm-actions';

  function close(){ overlay.remove(); }

  options.forEach(opt=>{
    const b = document.createElement('button');
    // Aperçu miniature optionnel (voir libraryItemPreviewSVG) : image/traits/texte affichés à
    // côté du nom, plutôt qu'une simple liste de texte où on ne voit pas ce qu'on va insérer.
    if(opt.previewHTML){
      b.classList.add('has-preview');
      b.innerHTML = opt.previewHTML + '<span class="lib-preview-label"></span>';
      b.querySelector('.lib-preview-label').textContent = opt.label;
    } else {
      b.textContent = opt.label;
    }
    b.onclick = ()=>{ close(); opt.onPick(); };
    actions.appendChild(b);
  });
  const cancel = document.createElement('button');
  cancel.className = 'secondary';
  cancel.textContent = 'Annuler';
  cancel.onclick = ()=> close();
  actions.appendChild(cancel);

  box.append(msg, actions);
  overlay.appendChild(box);
  overlay.onclick = (e)=>{ if(e.target===overlay) close(); }; // clic en dehors = annuler
  document.body.appendChild(overlay);
}

// Message d'information simple (remplace alert()) : certains navigateurs en mode application
// (PWA ajoutée à l'écran d'accueil, notamment sur iPad/iPhone) suppriment purement et simplement
// alert()/confirm()/prompt() — l'action semble alors ne RIEN faire, sans le moindre message,
// aussi bien en cas de succès que d'erreur. Utilisé notamment par "Envoyer"/"Récupérer" (voir
// manualPushSync/manualPullSync) pour garantir un retour visuel fiable quoi qu'il arrive.
function showInfoMessage(text){
  const overlay = document.createElement('div');
  overlay.className = 'paste-confirm-overlay';
  const box = document.createElement('div');
  box.className = 'paste-confirm-box';
  const msg = document.createElement('p');
  msg.textContent = text;
  const actions = document.createElement('div');
  actions.className = 'paste-confirm-actions';
  const ok = document.createElement('button');
  ok.textContent = 'OK';
  function close(){ overlay.remove(); }
  ok.onclick = close;
  actions.appendChild(ok);
  box.append(msg, actions);
  overlay.appendChild(box);
  overlay.onclick = (e)=>{ if(e.target===overlay) close(); };
  document.body.appendChild(overlay);
}

// Confirmation avec Oui/Annuler (remplace confirm()) — même raison que showInfoMessage ci-dessus.
function showConfirmMessage(text, onConfirm){
  showActionMenu(text, [ { label:'Confirmer', onPick: onConfirm } ]);
}

// Petite saisie de texte avec valeur par défaut (remplace prompt()) — même raison que
// showInfoMessage ci-dessus. onSubmit reçoit la valeur tapée, ou n'est jamais appelé si annulé.
function showPromptDialog(message, defaultValue, onSubmit){
  const overlay = document.createElement('div');
  overlay.className = 'paste-confirm-overlay';
  const box = document.createElement('div');
  box.className = 'paste-confirm-box';
  const msg = document.createElement('p');
  msg.textContent = message;
  const input = document.createElement('input');
  input.type = 'text';
  input.value = defaultValue || '';
  input.style.cssText = 'width:100%;box-sizing:border-box;padding:10px;margin:0 0 14px 0;border-radius:8px;border:1px solid var(--bg-shop-lighter);background:var(--bg-shop-light);color:var(--text-light);font:inherit;font-size:14px;';
  const actions = document.createElement('div');
  actions.className = 'paste-confirm-actions';
  const ok = document.createElement('button');
  ok.textContent = 'Valider';
  const cancel = document.createElement('button');
  cancel.className = 'secondary';
  cancel.textContent = 'Annuler';
  function close(){ overlay.remove(); }
  ok.onclick = ()=>{ const v = input.value; close(); onSubmit(v); };
  cancel.onclick = close;
  input.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); ok.onclick(); } });
  actions.append(ok, cancel);
  box.append(msg, input, actions);
  overlay.appendChild(box);
  overlay.onclick = (e)=>{ if(e.target===overlay) close(); };
  document.body.appendChild(overlay);
  input.focus();
  input.select();
}

// Utilisée par l'appui long au doigt sur une zone VIDE de la feuille (voir plus haut). Propose
// toujours "Coller" et "Insérer une image", sans essayer de deviner à l'avance ce qu'il y a dans
// le presse-papier : cette vérification se fait UNIQUEMENT au moment du clic sur "Coller" (via
// pasteClipboard, déjà fiable), pas ici pendant le délai d'appui long — un appui long n'est pas
// un vrai "geste utilisateur" aux yeux du navigateur, donc lire le presse-papier à ce moment-là
// peut échouer silencieusement, et le bouton "Coller" disparaissait purement et simplement du menu.
function pasteWithConfirm(atX, atY){
  const sheet = activeSheet();
  if(!sheet) return;
  showActionMenu('Que faire ici ?', [
    { label:'📋 Coller', onPick: ()=> pasteClipboard(atX, atY) },
    { label:'🖼 Insérer une image…', onPick: ()=> insertImageFromPicker() },
    { label:'📚 Bibliothèque…', onPick: ()=> openLibraryMenu(atX, atY) }
  ]);
}

async function pasteClipboard(atX, atY){
  const sheet = activeSheet();
  if(!sheet){ alert('Sélectionne une page avant de coller.'); return; }
  // La lecture du presse-papier exige que le document ait le focus ; après une capture d'écran
  // (bascule vers l'outil de capture, une autre appli, une autre fenêtre…), ce focus n'est pas
  // toujours redonné à temps avant l'appel ci-dessous, ce qui déclenche justement le blocage de
  // 3s géré plus bas. On force donc explicitement le focus sur la fenêtre juste avant de lire,
  // avec une très courte pause pour lui laisser une chance de se rétablir.
  if(!document.hasFocus()){
    window.focus();
    await new Promise(r=> setTimeout(r, 60));
  }
  try{
    // Un seul appel au presse-papier (couvrant texte ET image) : enchaîner deux appels
    // séparés (readText() puis read()) faisait perdre le geste de clic entre les deux,
    // et Chrome bloquait silencieusement le second avec "Accès refusé".
    //
    // Filet de sécurité supplémentaire : sur certains Chrome, un 2e clic (ou un 2e appel
    // rapproché) sur "Coller" ne déclenche ni résultat ni erreur — la promesse reste bloquée
    // indéfiniment (bug connu du navigateur), ce qui donne l'impression que le bouton ne fait
    // plus rien du tout. On limite donc l'attente à 3s : passé ce délai, on prévient la
    // personne et on l'oriente vers Ctrl+V (clavier) ou vers l'appui long sur la feuille
    // (doigt ou stylet), qui utilisent un mécanisme de collage différent (événement navigateur
    // natif) non soumis à cette limitation.
    const items = await Promise.race([
      navigator.clipboard.read(),
      new Promise((_, reject)=> setTimeout(()=> reject(new Error('CLIPBOARD_TIMEOUT')), 3000))
    ]);
    for(const item of items){
      if(item.types.includes('text/plain')){
        const text = await (await item.getType('text/plain')).text();
        if(text && text.startsWith(ELEMENTS_CLIP_PREFIX)){
          if(pasteElementsPayload(text.slice(ELEMENTS_CLIP_PREFIX.length), sheet, atX, atY)) return;
        }
      }
    }
    for(const item of items){
      const type = item.types.find(t=>t.startsWith('image/'));
      if(type){ await insertImageBlob(await item.getType(type), sheet, atX, atY); return; }
    }
    alert('Rien à coller : ni image, ni élément copié depuis ce carnet, dans le presse-papier.');
  }catch(err){
    // Le presse-papier "rapide" (API asynchrone) n'a pas répondu à temps, ou l'accès a été
    // refusé — plutôt que de laisser la personne bloquée avec juste un message d'erreur, on
    // bascule automatiquement sur un collage "natif" garanti fiable (voir openNativePasteBox) :
    // il s'appuie sur EXACTEMENT le même mécanisme que Ctrl+V (déjà fiable à 100%, voir
    // l'écouteur 'paste' global plus bas), simplement déclenché depuis une case à l'écran au
    // lieu d'un raccourci clavier — utile sur tablette, sans clavier physique.
    openNativePasteBox(atX, atY);
  }
}

// Repli fiable à 100% quand le collage "rapide" (navigator.clipboard.read) ne répond pas : au
// lieu de dépendre de cette API asynchrone capricieuse, on affiche une case de texte bien réelle
// et on laisse le NAVIGATEUR gérer le collage lui-même (Ctrl+V, ou le bouton/bulle "Coller" que
// Windows affiche nativement sur une case de texte tenue appuyée) — exactement le mécanisme déjà
// utilisé par l'écouteur 'paste' global ci-dessous, qui a toujours fonctionné de façon fiable
// dans ce carnet, quel que soit le nombre de collages déjà faits.
let pendingPasteAt = null;
let activeNativePasteOverlay = null;
function closeNativePasteBox(){
  if(activeNativePasteOverlay){ activeNativePasteOverlay.remove(); activeNativePasteOverlay = null; }
  pendingPasteAt = null;
}
function openNativePasteBox(atX, atY){
  closeNativePasteBox();
  pendingPasteAt = (atX!=null && atY!=null) ? {x:atX, y:atY} : null;
  const overlay = document.createElement('div');
  overlay.className = 'paste-confirm-overlay';
  const box = document.createElement('div');
  box.className = 'paste-confirm-box';
  const msg = document.createElement('p');
  msg.textContent = 'Le collage rapide ne répond pas cette fois. Appuie dans la case ci-dessous, puis choisis "Coller" (ou fais Ctrl+V) :';
  const field = document.createElement('div');
  field.contentEditable = 'true';
  field.className = 'native-paste-field';
  field.setAttribute('data-placeholder', 'Zone de collage — appuie ici');
  const actions = document.createElement('div');
  actions.className = 'paste-confirm-actions';
  const cancel = document.createElement('button');
  cancel.className = 'secondary';
  cancel.textContent = 'Annuler';
  cancel.onclick = closeNativePasteBox;
  actions.appendChild(cancel);
  box.append(msg, field, actions);
  overlay.appendChild(box);
  overlay.onclick = (e)=>{ if(e.target===overlay) closeNativePasteBox(); };
  document.body.appendChild(overlay);
  activeNativePasteOverlay = overlay;
  field.focus();
}

document.addEventListener('paste', (e)=>{
  const sheet = activeSheet();
  if(!sheet) return;
  // Si ce collage vient de la case de secours (voir openNativePasteBox), on insère au même
  // endroit que ce qui avait été demandé au départ (appui long), au lieu du décalage par défaut.
  const atX = pendingPasteAt ? pendingPasteAt.x : undefined;
  const atY = pendingPasteAt ? pendingPasteAt.y : undefined;
  const text = e.clipboardData && e.clipboardData.getData('text/plain');
  if(text && text.startsWith(ELEMENTS_CLIP_PREFIX)){
    e.preventDefault();
    if(pasteElementsPayload(text.slice(ELEMENTS_CLIP_PREFIX.length), sheet, atX, atY)) closeNativePasteBox();
    return;
  }
  const items = e.clipboardData && e.clipboardData.items;
  if(!items) return;
  for(const item of items){
    if(item.type && item.type.startsWith('image/')){
      const blob = item.getAsFile();
      if(blob){ insertImageBlob(blob, sheet, atX, atY).then(closeNativePasteBox); e.preventDefault(); }
      break;
    }
  }
});

/* ============ EXPORT / IMPORT AUTOMATIQUE (dossier/fichier mémorisé) ============ */
// L'API File System Access permet de choisir un dossier ou fichier UNE fois ; le
// navigateur retient ensuite la permission pour y écrire/lire directement, sans
// repasser par une boîte de dialogue "Enregistrer sous" à chaque fois.
// Non supporté par Firefox/Safari — dans ce cas on retombe sur le comportement classique.
const HANDLE_DB = 'carnet_handles_v1';
function openHandleDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(HANDLE_DB, 1);
    req.onupgradeneeded = ()=> req.result.createObjectStore('handles');
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
}
async function idbSet(key, value){
  const db = await openHandleDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction('handles','readwrite');
    tx.objectStore('handles').put(value, key);
    tx.oncomplete = ()=>resolve();
    tx.onerror = ()=>reject(tx.error);
  });
}
async function idbGet(key){
  const db = await openHandleDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction('handles','readonly');
    const req = tx.objectStore('handles').get(key);
    req.onsuccess = ()=>resolve(req.result || null);
    req.onerror = ()=>reject(req.error);
  });
}

// Caches en mémoire des derniers fichiers choisis (image / export / import) : servent de
// "startIn" pour rouvrir le sélecteur directement dans le même dossier la fois suivante, au lieu
// de retomber sur le dossier par défaut à chaque fois. Chargés en tâche de fond au démarrage —
// pas besoin de geste utilisateur pour un simple idbGet — puis tenus à jour à chaque nouveau choix.
let lastImageFileHandle = null, lastExportFileHandle = null, lastImportFileHandle = null, exportDirHandle = null;
Promise.all([
  idbGet('lastImageFile').catch(()=>null),
  idbGet('lastExportFile').catch(()=>null),
  idbGet('lastImportFile').catch(()=>null),
  idbGet('exportDir').catch(()=>null)
]).then(([img, exp, imp, dir])=>{
  lastImageFileHandle = img; lastExportFileHandle = exp; lastImportFileHandle = imp; exportDirHandle = dir;
});
async function verifyHandlePermission(handle, mode){
  const opts = { mode };
  if((await handle.queryPermission(opts))==='granted') return true;
  if((await handle.requestPermission(opts))==='granted') return true;
  return false;
}
// Un seul dossier de sauvegarde, utilisé à la fois pour la sauvegarde auto (toutes les 10 min)
// et pour la copie de sécurité avant chaque "Récupérer" (voir backupBeforePull) — plus simple
// qu'avoir deux dossiers séparés à configurer.
async function updateFsStatus(){
  const exportEl = document.getElementById('export-path');
  if(!exportEl) return;
  const [autoDir, lastExport] = await Promise.all([
    idbGet('exportDir'), idbGet('lastExportFile')
  ]);
  const exportParts = [];
  if(autoDir) exportParts.push(autoDir.name);
  else if(lastExport) exportParts.push(lastExport.name);
  exportEl.textContent = exportParts.join(' · ');
}

  if(!('showDirectoryPicker' in window)){

    alert(`Dossier "${dirHandle.name}" enregistré. Il servira pour la sauvegarde automatique toutes les 10 min, la copie de sécurité avant chaque "Récupérer", ET maintenant pour "Exporter" (écrit directement dedans, 3 derniers gardés) et "Importer" (reprend automatiquement le plus récent) — plus besoin de choisir un fichier à chaque fois.`);
  }catch(err){

    alert("Le dossier a été choisi, mais je n'ai pas pu m'en souvenir (erreur : " + (err && err.message ? err.message : err) + "). Réessaie, et si ça persiste, dis-le moi avec ce message d'erreur.");

}

// Écrit directement dans le dossier configuré (bouton 📁) si disponible — nom horodaté
// "carnet_....json", même pool que la copie de sécurité avant "Récupérer" (voir
// backupBeforePullInner), gardé à 3 exemplaires (AUTO_BACKUP_KEEP). Sinon (pas de dossier
// configuré), repli sur l'ancien comportement (sélecteur "Enregistrer sous").
async function exportData(){
  if(exportDirHandle){
    try{
      if(!(await verifyHandlePermission(exportDirHandle, 'readwrite').catch(()=>false))){
        throw new Error("l'accès au dossier configuré a été perdu (autorisation à renouveler via 📁)");
      }
      const d = new Date();
      const pad = n=> String(n).padStart(2,'0');
      const stamp = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}_${pad(d.getHours())}h${pad(d.getMinutes())}m${pad(d.getSeconds())}`;
      const fileHandle = await exportDirHandle.getFileHandle(`carnet_${stamp}.json`, { create: true });
      const writable = await fileHandle.createWritable();
      await writable.write(JSON.stringify(data, null, 2));
      await writable.close();
      await pruneOldBackups(exportDirHandle, AUTO_BACKUP_KEEP);
      recordLastAction('export');
      const el = document.getElementById('export-path');
      if(el){ el.textContent = `✓ Exporté : carnet_${stamp}.json`; setTimeout(updateFsStatus, 2500); }
      return;
    }catch(err){

      return;
    }
  }
  // Pas de dossier configuré : ancien comportement (sélecteur manuel). showSaveFilePicker() DOIT
  // rester le tout premier appel asynchrone de cette branche, sans await avant (voir
  // insertImageFromPicker plus haut pour l'explication) — sinon la fenêtre ne s'ouvre pas,
  // silencieusement.
  if(!('showSaveFilePicker' in window)){
    // Solution de repli pour les navigateurs sans cette fonction (ex. Firefox, Safari) :
    // téléchargement classique, sans mémoire du dernier emplacement.
    const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'carnet-sauvegarde-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    recordLastAction('export');
    return;
  }
  try{
    const fileHandle = await window.showSaveFilePicker({
      suggestedName: 'carnet-sauvegarde.json',
      types: [{ description: 'Sauvegarde carnet (JSON)', accept: {'application/json': ['.json']} }],
      startIn: lastExportFileHandle || undefined
    });
    const writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify(data, null, 2));
    await writable.close();
    idbSet('lastExportFile', fileHandle).catch(()=>{});
    lastExportFileHandle = fileHandle;
    recordLastAction('export');
    const el = document.getElementById('export-path');
    if(el){ el.textContent = `✓ Exporté vers ${fileHandle.name}`; setTimeout(updateFsStatus, 2500); }
  }catch(err){
    if(err && err.name==='AbortError') return; // annulé par la personne

// Copie de sécurité de l'état ACTUEL avant de le remplacer par un import — même esprit que
// backupBeforePull, mais dans un pool de noms bien distinct ("carnet-avant-import_..."). Important :
// si cette copie utilisait le même nom que "carnet_...json" (celui qu'Exporter/Récupérer utilisent
// et que triggerImport reprend automatiquement comme "le plus récent"), elle deviendrait par erreur
// LE fichier le plus récent du dossier juste après avoir été écrite — et une tentative d'import
// suivante réimporterait alors cette copie de secours (l'ancien état LOCAL) au lieu du vrai fichier
// envoyé par un autre appareil. Un motif de nom séparé évite ce piège. Best-effort, jamais
// bloquant : si le dossier n'est pas configuré ou que l'écriture échoue, l'import continue quand
// même (juste sans ce filet de sécurité local).
const PRE_IMPORT_BACKUP_KEEP = 2;
const PRE_IMPORT_BACKUP_PATTERN = /^carnet-avant-import_\d{4}-\d{2}-\d{2}_\d{2}h\d{2}m\d{2}\.json$/;
async function backupBeforeImport(){
  if(!exportDirHandle) return false;
  try{
    if(!(await verifyHandlePermission(exportDirHandle, 'readwrite').catch(()=>false))) return false;
    const d = new Date();
    const pad = n=> String(n).padStart(2,'0');
    const stamp = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}_${pad(d.getHours())}h${pad(d.getMinutes())}m${pad(d.getSeconds())}`;
    const fileHandle = await exportDirHandle.getFileHandle(`carnet-avant-import_${stamp}.json`, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify(data));
    await writable.close();
    await pruneOldBackups(exportDirHandle, PRE_IMPORT_BACKUP_KEEP, PRE_IMPORT_BACKUP_PATTERN);
    return true;
  }catch(err){
    console.warn('Sauvegarde de sécurité avant import impossible :', err);
    return false;
  }
}

// Utilise showConfirmMessage/showInfoMessage (boîtes de dialogue maison) plutôt que
// confirm()/alert() natifs : ces derniers sont purement et simplement ignorés par certains
// navigateurs en mode application (PWA à l'écran d'accueil) — voir manualPushSync pour le même
// constat déjà fait ailleurs dans ce fichier. Avant, la confirmation d'import pouvait donc soit ne
// jamais s'afficher, soit se comporter de façon imprévisible sur la tablette.
function applyImportedJson(text, sourceName){
  let parsed;
  try{
    parsed = JSON.parse(text);
    if(!parsed.sections && !parsed.classeurs) throw new Error('format invalide');
  }catch(err){
    showInfoMessage('Fichier invalide' + (sourceName ? ` ("${sourceName}")` : '') + ' : ' + (err && err.message ? err.message : 'format non reconnu') + '.');
    return;
  }
  const label = sourceName ? ` ("${sourceName}")` : '';
  showConfirmMessage(`Importer ce fichier${label} ? Ça va REMPLACER TOUTES les notes actuelles sur cet appareil (une copie de sécurité de ce qu'il y a actuellement ici sera d'abord enregistrée sur ton disque, par précaution).`, async ()=>{
    await backupBeforeImport(); // best-effort, jamais bloquant — voir la fonction
    data = migrate(parsed);
    activeClasseurId = data.classeurs[0]?.id;
    activeSectionId = data.classeurs[0]?.sections[0]?.id;
    activePageId = data.classeurs[0]?.sections[0]?.pages[0]?.id;
    activeSheetId = data.classeurs[0]?.sections[0]?.pages[0]?.sheets[0]?.id;
    save(); renderSidebar(); renderCanvasStack();
    recordLastAction('import');
    showInfoMessage('✓ Import terminé.');
  });
}

// Si un dossier est configuré (📁), reprend AUTOMATIQUEMENT le fichier "carnet_...json" le plus
// récent qui s'y trouve (même tri chronologique par nom que pruneOldBackups) — plus besoin de
// sélectionner un fichier à la main. Sinon (pas de dossier configuré, ou aucune sauvegarde trouvée
// dedans), repli sur l'ancien comportement (sélecteur de fichier manuel).
async function triggerImport(){
  if(exportDirHandle){
    try{
      if(!(await verifyHandlePermission(exportDirHandle, 'readwrite').catch(()=>false))){
        throw new Error("l'accès au dossier configuré a été perdu (autorisation à renouveler via 📁)");
      }
      const names = [];
      for await (const [name, handle] of exportDirHandle.entries()){
        if(handle.kind==='file' && CARNET_BACKUP_PATTERN.test(name)) names.push(name);
      }
      if(names.length===0){
        alert('Aucune sauvegarde ("carnet_....json") trouvée dans le dossier configuré. Utilise d\'abord "⬆ Exporter" depuis l\'autre appareil, ou choisis un fichier manuellement.');
      } else {
        names.sort();
        const latestName = names[names.length-1];
        const fileHandle = await exportDirHandle.getFileHandle(latestName);
        const file = await fileHandle.getFile();
        const text = await file.text();
        applyImportedJson(text, latestName);
        updateFsStatus();
        return;
      }
    }catch(err){
      console.error('Import direct depuis le dossier configuré impossible :', err);
      alert("Impossible de lire le dossier configuré (" + (err && err.message ? err.message : 'erreur inconnue') + "). Reclique sur 📁 pour le reconfigurer si besoin, ou choisis un fichier manuellement.");
      return;
    }
  }
  // Pas de dossier configuré (ou aucune sauvegarde dedans) : ancien comportement (sélecteur
  // manuel). showOpenFilePicker() DOIT rester le tout premier appel asynchrone de CETTE branche,
  // sans await avant (même raison que insertImageFromPicker plus haut) — sinon la fenêtre ne
  // s'ouvre pas, silencieusement. C'est pour ça que cette branche est un chemin séparé plutôt
  // qu'un "repli" après l'échec de la tentative ci-dessus (qui a déjà fait plusieurs "await").
  if(!('showOpenFilePicker' in window)){
    document.getElementById('import-input').click();
    return;
  }
  try{
    const [fileHandle] = await window.showOpenFilePicker({
      types: [{ description: 'Sauvegarde carnet (JSON)', accept: {'application/json': ['.json']} }],
      startIn: lastImportFileHandle || undefined
    });
    idbSet('lastImportFile', fileHandle).catch(()=>{});
    lastImportFileHandle = fileHandle;
    const file = await fileHandle.getFile();
    applyImportedJson(await file.text(), fileHandle.name);
    updateFsStatus();
  }catch(err){
    if(err && err.name==='AbortError') return; // annulé par la personne
    console.warn('Sélecteur de fichier impossible, retour au sélecteur classique.', err);
    document.getElementById('import-input').click();
  }
}

function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=> applyImportedJson(reader.result, file.name);
  reader.readAsText(file);
  e.target.value = '';
}
