/* ============ SYNCHRO (serveur perso, remplace Firebase) ============ */
// Synchro vers un petit serveur auto-hébergé (voir carnet-sync-server/server.js, livré à part) au
// lieu de Firebase Realtime Database — plus aucune limite de taille imposée par un tiers, tout
// reste chez toi. Deux réglages au lieu d'un seul "code carnet" : l'adresse du serveur, et un code
// secret partagé avec lui (variable SYNC_TOKEN côté serveur) — voir le bouton 🔗.
let syncServerUrl = localStorage.getItem('carnet_sync_server_url') || '';
let syncToken = localStorage.getItem('carnet_sync_token') || '';
let lastSyncTs = Number(localStorage.getItem('carnet_last_sync_ts')) || 0;
function setLastSyncTs(ts){
  lastSyncTs = ts;
  localStorage.setItem('carnet_last_sync_ts', String(ts));
}

// mergeIncoming()/applyTombstones() ont été retirées : elles ne servaient qu'à la synchro
// automatique entre onglets via localStorage (voir syncFromLocalStorage, retirée elle aussi un
// peu plus bas) — ce mécanisme reposait sur l'événement 'storage', propre à localStorage, qui n'a
// pas d'équivalent pour IndexedDB (le stockage unique désormais utilisé). C'est justement ce
// mécanisme qui causait la disparition de contenu après une capture d'écran (voir l'historique) :
// le retirer plutôt que le rafistoler à nouveau simplifie durablement les choses, au prix de la
// synchro automatique entre onglets ouverts simultanément (cas rare pour un usage sur tablette) —
// recharger la page suffit à revoir le contenu à jour si jamais deux onglets sont ouverts à la fois.

function formatSyncTime(ts){
  if(!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('fr-FR') + ' ' + d.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
}
function updateSyncStatus(state, ts){
  const icon = document.getElementById('sync-mini-icon');
  const statusEl = document.getElementById('sync-mini-status');

  if(state==='off'){
    if(icon){ icon.className = ''; icon.title = 'Synchro : non connectée (clique pour configurer)'; }
    return;
  }

  if(icon){
    if(state==='off'){ icon.className = ''; icon.title = 'Synchro : non connectée (clique pour configurer ton serveur)'; }
    else if(state==='ready'){ icon.className = 'synced'; icon.title = 'Synchro prête — utilise "Envoyer" / "Récupérer"'; }
    else if(state==='busy'){ icon.className = 'connecting'; icon.title = '🔄 En cours…'; }
    else if(state==='synced'){ icon.className = 'synced'; icon.title = '✓ Envoyé ' + formatSyncTime(ts); }
    else if(state==='received'){ icon.className = 'synced'; icon.title = '↓ Récupéré ' + formatSyncTime(ts); }
    else if(state==='error'){ icon.className = 'error'; icon.title = '⚠ Échec de la dernière opération'; }
  }
  if(statusEl && (state==='synced' || state==='received')){
    statusEl.textContent = (state==='synced' ? 'Envoyé le ' : 'Récupéré le ') + formatSyncTime(ts);
  }
}

// Synchro 100% manuelle et explicite (deux boutons "Envoyer" / "Récupérer") — plus de synchro
// automatique en arrière-plan. C'est volontaire : l'ancienne version essayait de tout
// synchroniser en temps réel toute seule, ce qui provoquait des conflits difficiles à prévoir
// entre appareils (une version plus ancienne pouvait arriver au mauvais moment). Avec des
// boutons explicites, c'est toi qui décides quand envoyer ta version et quand aller chercher
// celle d'un autre appareil — plus prévisible, plus sûr.
function initSync(){
  if(!syncServerUrl || !syncToken){ updateSyncStatus('off'); return; }
  updateSyncStatus('ready');
}

// Avant un "Récupérer", on garde une copie de secours du carnet actuel sur le disque — au cas
// où la fusion ramènerait quelque chose d'inattendu, on peut toujours revenir en arrière
// manuellement en réimportant ce fichier. Utilise le même dossier que la sauvegarde automatique
// (bouton 📁), configuré une seule fois via chooseExportFolder(). Cette fonction ne fait QUE lire
// ce dossier déjà choisi (jamais d'appel à showDirectoryPicker ici) : l'ouvrir au milieu d'un
// enchaînement de "await" est justement ce qui empêchait la fenêtre de s'afficher auparavant.
// Nombre de sauvegardes automatiques ("carnet_AAAA-MM-JJ_HHhMMmSSs.json") à conserver dans le
// dossier choisi (bouton 📁) — au-delà, les plus anciennes sont supprimées automatiquement, pour
// ne pas accumuler indéfiniment un fichier à chaque "Récupérer".
const AUTO_BACKUP_KEEP = 3;
const CARNET_BACKUP_PATTERN = /^carnet_\d{4}-\d{2}-\d{2}_\d{2}h\d{2}m\d{2}\.json$/;
// "pattern" par défaut = les sauvegardes/transferts "carnet_...json" (Exporter, copie avant
// Récupérer) — paramétrable pour réutiliser cette même logique (listage, suppression, diagnostic)
// avec un AUTRE motif de nom, ex. les copies de sécurité avant Import (voir backupBeforeImport),
// qui doivent rester dans un pool à part pour ne jamais se faire passer pour "le fichier le plus
// récent à importer".
async function pruneOldBackups(dirHandle, keep, pattern){
  pattern = pattern || CARNET_BACKUP_PATTERN;
  // Diagnostic : le nettoyage échouait silencieusement chez au moins un utilisateur (les fichiers
  // carnet_AAAA-MM-JJ_HHhMMmSSs.json continuaient à s'accumuler au-delà de "keep") sans qu'aucune
  // erreur ne soit jamais visible, uniquement des console.warn perdus (une appli mobile n'a pas de
  // console ouverte). Le nettoyage lui-même n'est pas critique (voir l'appelant), donc on continue
  // à ne jamais bloquer "Récupérer" pour ça — mais on remonte maintenant l'erreur réelle via une
  // alerte visible plutôt que de la garder invisible, pour pouvoir enfin savoir POURQUOI ça échoue
  // au lieu de deviner.
  let names = [];
  try{
    for await (const [name, handle] of dirHandle.entries()){
      // Le format d'horodatage (année-mois-jour_heureMminuteSseconde) se trie correctement en
      // ordre alphabétique = ordre chronologique, pas besoin de parser les dates une à une.
      if(handle.kind==='file' && pattern.test(name)){
        names.push(name);
      }
    }
  }catch(err){
    console.warn('Listage des sauvegardes impossible :', err);
    alert(`⚠️ Diagnostic nettoyage sauvegardes : impossible de LISTER le contenu du dossier (${err.name || 'erreur'} : ${err.message || err}). Les anciennes sauvegardes n'ont donc pas pu être identifiées ni supprimées cette fois-ci.`);
    return;
  }
  names.sort();
  const toDelete = names.slice(0, Math.max(0, names.length - keep));
  if(toDelete.length===0) return;
  const failed = [];
  for(const name of toDelete){
    try{ await dirHandle.removeEntry(name); }
    catch(err){
      console.warn('Suppression ancienne sauvegarde impossible :', name, err);
      failed.push(`${name} (${err.name || 'erreur'} : ${err.message || err})`);
    }
  }
  if(failed.length>0){
    alert(`⚠️ Diagnostic nettoyage sauvegardes : ${failed.length} ancienne(s) sauvegarde(s) trouvée(s) mais PAS supprimée(s) :\n${failed.join('\n')}\n\nElles s'accumuleront tant que ça échoue — dis-moi le message exact affiché ici pour que je corrige.`);
  }
}
// backupBeforePull réel (voir le verrou juste en dessous qui l'appelle en file d'attente).
// Root cause d'une accumulation observée en usage réel : appeler "Récupérer" deux fois de suite
// avant que la première copie de sécurité + nettoyage soit terminée fait tourner DEUX
// pruneOldBackups en même temps, chacun listant le dossier à un instant légèrement différent et
// décidant "les 3 derniers" à partir de sa propre photo — ni l'un ni l'autre ne plante, mais le
// résultat final peut dépasser "keep". Le verrou ci-dessous empêche ces deux passages de se
// chevaucher, quelle qu'en soit la cause (appui répété, tests rapprochés, futur appel
// programmatique...).
async function backupBeforePullInner(){
  if(!('showDirectoryPicker' in window)) return false; // Firefox / Safari : pas de copie de secours automatique possible
  try{
    let dirHandle = await idbGet('exportDir');
    if(!dirHandle){
      alert('Choisis d\'abord un dossier de sauvegarde avec le bouton 📁 (par exemple un dossier "Sauv carnet" sur ton disque C:), puis réessaie "Récupérer".');
      return false;
    }
    if(!(await verifyHandlePermission(dirHandle, 'readwrite').catch(()=>false))){
      alert('L\'accès au dossier de sauvegarde a été perdu (autorisation à renouveler). Reclique sur le bouton 📁 pour le reconfigurer, puis réessaie.');
      return false;
    }
    const d = new Date();
    const pad = n=> String(n).padStart(2,'0');
    const stamp = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}_${pad(d.getHours())}h${pad(d.getMinutes())}m${pad(d.getSeconds())}`;
    const fileHandle = await dirHandle.getFileHandle(`carnet_${stamp}.json`, { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify(data));
    await writable.close();
    await pruneOldBackups(dirHandle, AUTO_BACKUP_KEEP);
    return true;
  }catch(err){
    console.warn('Copie de sauvegarde avant récupération impossible :', err);
    return false;
  }
}
// Verrou : chaque appel attend que le précédent soit COMPLÈTEMENT terminé (backup + nettoyage)
// avant de démarrer, au lieu de s'exécuter en parallèle — voir commentaire ci-dessus.
let backupBeforePullChain = Promise.resolve();
function backupBeforePull(){
  const run = backupBeforePullChain.then(()=> backupBeforePullInner());
  backupBeforePullChain = run.catch(()=>false); // une erreur ne doit pas bloquer les appels suivants
  return run;
}

// Envoie une requête HTTP vers le serveur de synchro perso (voir carnet-sync-server/server.js),
// avec le code secret dans l'en-tête et une VRAIE annulation de la requête au bout de "timeoutMs"
// (via AbortController) — contrairement à l'ancien Promise.race utilisé avec Firebase, qui
// laissait la requête continuer en arrière-plan même après avoir "abandonné" côté interface : ici,
// passé le délai, la requête est réellement annulée, pas juste ignorée.
async function syncFetch(pathname, options, timeoutMs){
  const controller = new AbortController();
  const timer = setTimeout(()=> controller.abort(), timeoutMs || 15000);
  const url = syncServerUrl.replace(/\/$/, '') + pathname;
  // 'ngrok-skip-browser-warning' : sans cet en-tête, ngrok (utilisé si ton serveur est exposé via
  // un tunnel ngrok gratuit) insère une page d'avertissement HTML à la place de la vraie réponse,
  // ce qui casserait la synchro (réponse non-JSON). Inoffensif si le serveur n'est pas derrière
  // ngrok — l'en-tête est simplement ignoré.
  const headers = Object.assign({ 'X-Sync-Token': syncToken, 'ngrok-skip-browser-warning': 'true' }, (options && options.headers) || {});
  try{
    const res = await fetch(url, Object.assign({}, options, { signal: controller.signal, headers }));
    if(!res.ok){
      let msg = 'HTTP ' + res.status;
      try{ const j = await res.json(); if(j && j.error) msg = j.error; }catch(e){}
      const err = new Error(msg);
      err.status = res.status;
      throw err;
    }
    return res;
  }catch(err){
    if(err.name === 'AbortError') throw new Error('TIMEOUT');
    throw err;
  }finally{
    clearTimeout(timer);
  }
}
// Estime un délai raisonnable pour un envoi/réception de "bytes" octets : 15s de base (petite
// requête, aller-retour au serveur) + le temps qu'il faudrait à une connexion lente mais valide
// (~200 Ko/s) pour transférer ce volume, plafonné à 90s pour qu'une connexion vraiment en panne
// échoue quand même dans un délai raisonnable plutôt que d'attendre indéfiniment.
function syncTimeoutForSize(bytes){
  return Math.min(90000, 15000 + Math.ceil((bytes/1024) / 200) * 1000);
}

// Nettoie les valeurs "undefined" (le serveur reçoit du JSON strict) — factorisé ici car réutilisé
// pour chaque classeur ET pour les métadonnées.
function cleanForSync(obj){ return JSON.parse(JSON.stringify(obj)); }

// Envoie UN classeur vers son propre fichier ("classeurs/{id}.json" côté serveur), avec un délai
// adapté à SA taille à lui (voir syncTimeoutForSize). Retourne le résultat (jamais de rejet) pour
// que manualPushSync puisse continuer avec les autres classeurs même si celui-ci échoue, et
// rapporter un échec PARTIEL plutôt que de tout arrêter au premier problème.
async function pushClasseurToCloud(c, ts){
  const cleanClasseur = cleanForSync(c);
  const rawStr = JSON.stringify(cleanClasseur);
  const timeoutMs = syncTimeoutForSize(rawStr.length);
  try{
    await syncFetch('/classeurs/' + encodeURIComponent(c.id), {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ classeur: cleanClasseur, updatedAt: ts })
    }, timeoutMs);
    return { ok:true, bytes: rawStr.length };
  }catch(err){
    return { ok:false, bytes: rawStr.length, timeoutMs, err };
  }
}

// Bouton "⬆ Envoyer" : remplace la version sur ton serveur par le contenu local actuel — classeur
// par classeur (voir pushClasseurToCloud), chacun dans son propre fichier, pas un seul gros bloc.
// Les classeurs archivés (voir toggleArchiveClasseur) ne sont PAS envoyés, et leur copie existante
// est supprimée ici — c'est ce nettoyage, déclenché depuis ce bouton, qui libère vraiment la place
// (l'archivage lui-même est instantané et 100% local, voir toggleArchiveClasseur). Les classeurs
// supprimés localement (tombstones, voir recordTombstone — jusqu'ici jamais consommées) sont
// nettoyés du serveur de la même façon, pour ne pas y laisser une copie orpheline pour toujours.
// Utilise showConfirmMessage/showInfoMessage (boîtes de dialogue maison) plutôt que
// confirm()/alert() natifs : ces derniers sont purement et simplement ignorés par certains
// navigateurs en mode application (PWA à l'écran d'accueil), ce qui donnait l'impression que
// rien ne se passait, aussi bien en cas de succès que d'erreur.
function manualPushSync(){
  if(!syncServerUrl || !syncToken){ showInfoMessage("Configure d'abord l'adresse de ton serveur et le code secret (icône 🔗) avant d'envoyer."); return; }
  showConfirmMessage("Envoyer ce carnet vers ton serveur ? Chaque classeur non archivé va REMPLACER sa version en ligne actuelle (celle des autres appareils). Les classeurs archivés ne sont pas envoyés (leur copie en ligne, si elle existe, sera supprimée pour libérer de la place).", async ()=>{
    const pushBtn = document.getElementById('sync-push-btn');
    if(pushBtn) pushBtn.disabled = true;
    updateSyncStatus('busy');
    const ts = Date.now();
    const activeClasseurs = data.classeurs.filter(c=>!c.archived);
    const archivedIds = data.classeurs.filter(c=>c.archived).map(c=>c.id);
    const deletedIds = data.tombstones.filter(t=>t.kind==='classeur').map(t=>t.id);
    const errors = [];
    let sentCount = 0;
    try{
      for(const c of activeClasseurs){
        const result = await pushClasseurToCloud(c, ts);
        if(result.ok){ sentCount++; continue; }
        console.error('Erreur serveur (envoi classeur "'+c.name+'") :', result.err);
        const sizeMB = (result.bytes/(1024*1024)).toFixed(1);
        let reason;
        if(result.err && result.err.message==='TIMEOUT'){
          reason = `ne répond pas depuis ${Math.round(result.timeoutMs/1000)}s (${sizeMB} Mo — connexion trop lente, serveur éteint/injoignable, ou ce classeur est trop volumineux)`;
        } else if(result.err && result.err.status===401){
          reason = 'code secret incorrect (401) — vérifie-le via l\'icône 🔗';
        } else {
          reason = (result.err && result.err.message) || 'erreur inconnue';
        }
        errors.push(`"${c.name}" : ${reason}`);
      }
      // Nettoyage serveur : classeurs archivés + classeurs supprimés localement (tombstones) —
      // sans ça, leur copie continuerait à occuper de la place indéfiniment, à l'encontre même de
      // ce que l'archivage est censé apporter.
      for(const id of [...archivedIds, ...deletedIds]){
        try{ await syncFetch('/classeurs/' + encodeURIComponent(id), { method:'DELETE' }); }
        catch(err){ console.warn('Suppression serveur impossible pour le classeur', id, err); }
      }
      if(deletedIds.length>0){
        data.tombstones = data.tombstones.filter(t=> t.kind!=='classeur');
        save();
      }
      // Métadonnées globales (bibliothèque + ordre des classeurs) : un petit fichier séparé, à
      // part des classeurs eux-mêmes qui portent l'essentiel du poids (les photos).
      const cleanMeta = cleanForSync({ library: data.library, classeurOrder: activeClasseurs.map(c=>c.id), updatedAt: ts });
      try{
        await syncFetch('/meta', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(cleanMeta) });
      }catch(err){
        console.warn('Écriture des métadonnées (bibliothèque/ordre) impossible :', err);
        errors.push('métadonnées (bibliothèque/ordre des classeurs) : ' + (err && err.message ? err.message : 'erreur inconnue'));
      }
      setLastSyncTs(ts);
      if(errors.length===0){
        updateSyncStatus('synced', ts);
        showInfoMessage(`✓ ${sentCount} classeur(s) envoyé(s) vers ton serveur (${formatSyncTime(ts)})` + (archivedIds.length>0 ? `. ${archivedIds.length} classeur(s) archivé(s) retiré(s) du serveur.` : '.'));
      } else {
        updateSyncStatus('error');
        showInfoMessage(`⚠ Envoi partiel : ${sentCount} classeur(s) envoyé(s) avec succès, mais échec pour : ${errors.join(' · ')}. Réessaie "⬆ Envoyer" — les classeurs déjà envoyés ne seront pas renvoyés inutilement en double, juste remplacés à nouveau.`);
      }
    }catch(err){
      // Filet de sécurité : capture aussi toute erreur SYNCHRONE inattendue, pour ne plus jamais
      // échouer en silence.
      console.error('Erreur immédiate lors de la préparation de l\'envoi :', err);
      updateSyncStatus('error');
      showInfoMessage("Échec de l'envoi (" + (err && err.message ? err.message : 'erreur inconnue') + "). Vérifie ta connexion et réessaie.");
    }
    if(pushBtn) pushBtn.disabled = false;
  });
}

// Bouton "⬇ Récupérer" : va chercher la version sur ton serveur UNE fois et REMPLACE ENTIÈREMENT
// le carnet local par celle-ci (choix assumé : plus simple et plus prévisible qu'une fusion, quitte
// à perdre du contenu local pas encore envoyé — d'où la copie de sauvegarde automatique juste
// avant, voir backupBeforePull, qui permet de tout récupérer manuellement si besoin).
// Voir manualPushSync ci-dessus pour la raison du passage à showConfirmMessage/showInfoMessage.
function manualPullSync(){
  if(!syncServerUrl || !syncToken){ showInfoMessage("Configure d'abord l'adresse de ton serveur et le code secret (icône 🔗) avant de récupérer."); return; }
  showConfirmMessage("Récupérer la version en ligne ? Elle va REMPLACER ENTIÈREMENT ton carnet actuel (tout ce qui n'a pas encore été envoyé sera perdu ici, mais une copie de sauvegarde de ton carnet actuel sera d'abord enregistrée sur ton disque, par précaution).", async ()=>{
    // Désactivé pour toute la durée de l'opération, ré-activé sur CHAQUE chemin de sortie
    // ci-dessous : un appui répété avant la fin d'une récupération précédente pouvait déclencher
    // des copies de sécurité en parallèle (voir le verrou dans backupBeforePull).
    const pullBtn = document.getElementById('sync-pull-btn');
    if(pullBtn) pullBtn.disabled = true;
    const reenable = ()=>{ if(pullBtn) pullBtn.disabled = false; };
    updateSyncStatus('busy');
    await backupBeforePull(); // on continue même si la sauvegarde échoue ou est annulée — c'est une sécurité en plus, pas un blocage
    try{
      const listRes = await syncFetch('/classeurs', {}, 20000);
      const list = await listRes.json();
      const metaRes = await syncFetch('/meta', {}, 20000);
      const meta = await metaRes.json();
      if(!list || list.length===0){
        showInfoMessage("Aucune donnée trouvée sur ton serveur (personne n'a encore envoyé de carnet).");
        updateSyncStatus('ready');
        reenable();
        return;
      }
      const before = JSON.stringify(data);
      suspendHistory = true;

      // Ordre d'origine des classeurs (voir meta.classeurOrder, écrit à chaque "Envoyer"), avec un
      // filet de sécurité pour ne jamais perdre silencieusement un classeur présent sur le serveur
      // mais absent de cet ordre.
      const order = Array.isArray(meta.classeurOrder) ? meta.classeurOrder.slice() : list.map(x=>x.id);
      list.forEach(x=>{ if(!order.includes(x.id)) order.push(x.id); });

      // Télécharge chaque classeur en parallèle (une requête par classeur) — un échec isolé ne
      // bloque pas les autres, il est juste ignoré (avec un avertissement en console) plutôt que de
      // faire échouer toute la récupération.
      const fetched = await Promise.all(order.map(async (id)=>{
        try{
          const r = await syncFetch('/classeurs/' + encodeURIComponent(id), {}, 45000);
          const j = await r.json();
          return j && j.classeur ? j.classeur : null;
        }catch(err){
          console.warn('Téléchargement du classeur', id, 'impossible :', err);
          return null;
        }
      }));
      const incomingClasseurs = fetched.filter(Boolean);
      const incomingLibrary = Array.isArray(meta.library) ? meta.library : [];
      const incomingUpdatedAt = meta.updatedAt || Date.now();

      // Les classeurs archivés localement (voir toggleArchiveClasseur) sont volontairement
      // absents du serveur : on les conserve tels quels au lieu de les traiter comme "supprimés en
      // ligne" — seuls les classeurs NON archivés suivent le remplacement complet habituel de
      // "Récupérer". Si jamais le serveur contenait malgré tout un classeur archivé ici (ne
      // devrait pas arriver, voir manualPushSync qui le supprime du serveur), la version locale
      // archivée gagne toujours : un classeur archivé n'est plus jamais modifié par la synchro.
      const archivedLocal = data.classeurs.filter(c=>c.archived);
      const archivedIds = new Set(archivedLocal.map(c=>c.id));
      const filteredIncoming = incomingClasseurs.filter(c=> !archivedIds.has(c.id));

      data = migrate({ classeurs: [...filteredIncoming, ...archivedLocal], library: incomingLibrary, tombstones: [] });
      suspendHistory = false;
      lastSavedRaw = JSON.stringify(data);
      // trySetStorage retombe désormais automatiquement sur IndexedDB (bien plus grande capacité,
      // voir plus haut) si localStorage est plein — donc "savedOk" reste vrai dans l'immense
      // majorité des cas ; seul un échec très rare des DEUX (traité de façon asynchrone par
      // trySetStorage lui-même) laisserait vraiment le carnet non sauvegardé.
      trySetStorage(lastSavedRaw, {silent:true});
      selectedElId = null;
      clampActiveRefs();
      renderSidebar(); renderCanvasStack();
      setLastSyncTs(incomingUpdatedAt);
      updateSyncStatus('received', incomingUpdatedAt);
      // Confirmation explicite, avec une précision utile : si le contenu récupéré était déjà
      // identique au tien (rien de nouveau à fusionner), le dire clairement plutôt que de laisser
      // croire que la récupération n'a rien fait.
      showInfoMessage(lastSavedRaw===before
        ? 'Récupéré — mais ton carnet était déjà identique à la version en ligne.'
        : '✓ Carnet remplacé par la version en ligne.' + (archivedLocal.length>0 ? ` (${archivedLocal.length} classeur(s) archivé(s) conservé(s) tel quel, non touché(s) par la récupération.)` : ''));
      reenable();
    }catch(err){
      console.error('Erreur serveur (récupération) :', err);
      updateSyncStatus('error');
      if(err && err.message==='TIMEOUT'){
        showInfoMessage("La récupération ne répond pas (délai dépassé — connexion trop lente, serveur éteint/injoignable, ou carnet volumineux). Vérifie ta connexion et réessaie — si ça persiste avec un gros carnet, demande à ce qu'il soit compacté (\"🗜 Compacter\") avant le prochain envoi.");
      } else if(err && err.status===401){
        showInfoMessage("Échec de la récupération : code secret incorrect (401). Vérifie-le via l'icône 🔗.");
      } else {
        showInfoMessage('Échec de la récupération depuis ton serveur (' + (err && err.message ? err.message : 'erreur inconnue') + '). Vérifie ta connexion (adresse du serveur correcte ? serveur allumé ?) et réessaie.');
      }
      reenable();
    }
  });
}

document.getElementById('sync-push-btn').onclick = manualPushSync;
document.getElementById('sync-pull-btn').onclick = manualPullSync;

// Recompresse une image déjà enregistrée (base64) : ne fait rien si elle est déjà assez petite.
// Réutilise la même limite (1280px / JPEG 0.72) que l'insertion d'une nouvelle photo — voir
// insertImageBlob — pour rester cohérent avec ce qu'on obtiendrait en la collant à nouveau.
// NOTE : ce réglage a été resserré (c'était 1600px/0.82) — sans ça, relancer "🗜 Compacter" sur des
// photos déjà compactées à l'ancien réglage ne changeait plus rien du tout (la vérification ne
// porte que sur les DIMENSIONS déjà décodées, impossible de savoir "à quelle qualité JPEG" une
// image a été enregistrée) : il fallait baisser le seuil pour qu'un nouveau passage ait un effet.
function compressDataUrl(src, maxDim, quality){
  return new Promise((resolve)=>{
    const img = new Image();
    img.onload = ()=>{
      if(img.width<=maxDim && img.height<=maxDim){ resolve(null); return; } // déjà assez petite
      try{
        const ratio = Math.min(maxDim/img.width, maxDim/img.height);
        const cw = Math.max(1, Math.round(img.width*ratio)), ch = Math.max(1, Math.round(img.height*ratio));
        const off = document.createElement('canvas');
        off.width = cw; off.height = ch;
        off.getContext('2d').drawImage(img, 0, 0, cw, ch);
        resolve(off.toDataURL('image/jpeg', quality));
      }catch(err){ resolve(null); }
    };
    img.onerror = ()=> resolve(null);
    img.src = src;
  });
}

// Outil "🗜 Compacter" : recompresse TOUTES les photos déjà présentes dans le carnet (y compris
// celles insérées avant l'ajout de la compression automatique à l'insertion — voir insertImageBlob),
// pour libérer de la place dans le stockage local du navigateur. Sert en particulier quand
// "Récupérer" a réussi à charger la version en ligne mais échoue à la sauvegarder localement
// faute de place (voir trySetStorage/manualPullSync) : compacter puis réessayer d'enregistrer.
async function compactAllImages(){
  const targets = [];
  data.classeurs.forEach(c=> (c.sections||[]).forEach(s=> (s.pages||[]).forEach(p=> (p.sheets||[]).forEach(sh=>{
    (sh.elements||[]).forEach(el=>{
      if(el.type==='image') targets.push(el);
      if(el.type==='group') (el.elements||[]).forEach(child=>{ if(child.type==='image') targets.push(child); });
    });
  }))));
  if(targets.length===0){ showInfoMessage("Ce carnet ne contient aucune photo à compacter."); return; }
  const btn = document.getElementById('compact-images-btn');
  const originalLabel = btn ? btn.textContent : null;
  if(btn){ btn.disabled = true; btn.textContent = '…'; }
  const beforeLen = JSON.stringify(data).length;
  let changed = 0;
  for(const el of targets){
    const compressed = await compressDataUrl(el.src, 1280, 0.72);
    if(compressed && compressed.length < el.src.length){ el.src = compressed; changed++; }
  }
  const afterLen = JSON.stringify(data).length;
  if(btn){ btn.disabled = false; btn.textContent = originalLabel; }
  if(changed===0){
    showInfoMessage("Toutes les photos de ce carnet sont déjà compactes — rien à réduire de plus.");
    return;
  }
  save();
  renderCanvasStack();
  const savedMB = Math.max(0, (beforeLen-afterLen)/1024/1024).toFixed(1);
  showInfoMessage(`✓ ${changed} photo(s) recompressée(s), environ ${savedMB} Mo libérés. Pense à "⬆ Envoyer" si tu veux que les autres appareils profitent aussi de cette réduction.`);
}
document.getElementById('compact-images-btn').onclick = compactAllImages;

// Configuration en deux temps (adresse du serveur, puis code secret) — un seul champ ne suffit
// plus depuis le passage à un serveur perso (voir carnet-sync-server/server.js) au lieu d'un
// simple "code carnet" Firebase.
document.getElementById('sync-mini-icon').onclick = ()=>{
  const urlMessage = syncServerUrl
    ? `Adresse du serveur actuelle : "${syncServerUrl}". Tape une nouvelle adresse pour changer, laisse tel quel pour ne rien changer, ou efface tout pour désactiver la synchro.`
    : "Adresse de ton serveur de synchro perso (ex: https://mon-serveur.exemple.com) — voir carnet-sync-server/server.js. Laisse vide pour ne pas activer la synchro.";
  showPromptDialog(urlMessage, syncServerUrl, (urlVal)=>{
    const trimmedUrl = (urlVal||'').trim().replace(/\/$/, '');
    if(!trimmedUrl){
      syncServerUrl = ''; syncToken = '';
      localStorage.removeItem('carnet_sync_server_url');
      localStorage.removeItem('carnet_sync_token');
      updateSyncStatus('off');
      return;
    }
    const tokenMessage = syncToken
      ? 'Code secret actuel conservé si tu laisses tel quel. Tape un nouveau code pour le changer (le même que SYNC_TOKEN côté serveur).'
      : 'Code secret partagé avec ton serveur (le même que la variable SYNC_TOKEN côté serveur) — protège l\'accès à tes données.';
    showPromptDialog(tokenMessage, syncToken, (tokenVal)=>{
      const trimmedToken = (tokenVal||'').trim();
      syncServerUrl = trimmedUrl;
      syncToken = trimmedToken;
      localStorage.setItem('carnet_sync_server_url', syncServerUrl);
      localStorage.setItem('carnet_sync_token', syncToken);
      initSync();
    });
  });
};
if(syncServerUrl && syncToken) initSync();

/* ============ SAUVEGARDE AUTOMATIQUE (toutes les 10 minutes) ============ */
// Discrète, silencieuse : ne fait rien tant qu'un dossier d'export n'a pas été choisi (icône 📁
// à côté d'Exporter), pour éviter de faire apparaître une fenêtre "Enregistrer sous" toute seule.
// Écrit dans un fichier séparé ("carnet-sauvegarde-auto.json") pour ne jamais toucher à tes exports manuels.
const AUTO_BACKUP_INTERVAL = 10 * 60 * 1000;
let lastAutoBackupSnapshot = null;

async function autoBackup(){
  const dirHandle = await idbGet('exportDir').catch(()=>null);
  if(!dirHandle) return;
  const ok = await verifyHandlePermission(dirHandle, 'readwrite').catch(()=>false);
  if(!ok) return;
  const snapshot = JSON.stringify(data);
  if(snapshot === lastAutoBackupSnapshot) return; // rien de nouveau depuis la dernière sauvegarde auto
  try{
    const fileHandle = await dirHandle.getFileHandle('carnet-sauvegarde-auto.json', { create: true });
    const writable = await fileHandle.createWritable();
    await writable.write(snapshot);
    await writable.close();
    lastAutoBackupSnapshot = snapshot;
    const el = document.getElementById('export-path');
    if(el){
      const prevText = el.textContent;
      el.textContent = `✓ Sauvegarde auto ${new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}`;
      setTimeout(()=>{ if(el.isConnected) updateFsStatus(); }, 2500);
    }
  }catch(err){
    console.warn('Sauvegarde automatique impossible :', err);
  }
}
setInterval(autoBackup, AUTO_BACKUP_INTERVAL);

// La coordination automatique entre onglets (syncFromLocalStorage et les écouteurs
// storage/visibilitychange/focus/pageshow) a été retirée avec le passage à IndexedDB comme
// stockage unique — voir le commentaire au-dessus de mergeIncoming (juste plus haut) pour le
// détail de ce choix.

/* ============ INIT ============ */
// Chargement UNIQUE depuis IndexedDB (asynchrone, forcément) avant le tout premier rendu — rien
// n'est encore affiché à ce stade (voir le classeur temporaire vide en tout début de fichier,
// section STATE), donc aucun clignotement à craindre en attendant ce chargement, qui ne prend de
// toute façon que quelques millisecondes en pratique.
(async function initNotebook(){
  let loaded = null;
  try{
    const idbRaw = await notebookIdbGet();
    if(idbRaw){
      loaded = JSON.parse(idbRaw);
      lastSavedRaw = idbRaw;
    } else {
      // Rien encore dans IndexedDB : reprise UNIQUE de l'ancien contenu de localStorage (mise à
      // jour depuis une version antérieure du carnet, où tout vivait encore là) — pour ne rien
      // perdre à la mise à jour. localStorage n'est plus jamais relu ensuite.
      const legacy = loadLegacyLocalStorage();
      if(legacy){
        loaded = legacy;
        lastSavedRaw = JSON.stringify(legacy);
      }
    }
  }catch(err){
    console.error('Lecture IndexedDB au démarrage impossible :', err);
  }
  data = migrate(loaded || seedData());
  if(lastSavedRaw === null) lastSavedRaw = JSON.stringify(data);
  activeClasseurId = data.classeurs[0]?.id || null;
  activeSectionId = data.classeurs[0]?.sections[0]?.id || null;
  activePageId = data.classeurs[0]?.sections[0]?.pages[0]?.id || null;
  activeSheetId = data.classeurs[0]?.sections[0]?.pages[0]?.sheets[0]?.id || null;
  restoreLastPosition();
  clampActiveRefs();
  // Toutes les sections démarrent repliées (pages masquées dans la barre latérale) à l'ouverture
  // de l'appli -- demande explicite de l'utilisateur. Non persisté exprès : une section dépliée à
  // la main pendant la session le reste jusqu'à la fermeture de l'appli, où tout repart replié au
  // prochain démarrage (même logique que collapse-all-btn, juste appliqué à TOUS les classeurs).
  data.classeurs.forEach(c=> c.sections.forEach(s=>{ collapsed[s.id] = true; }));
  // Écrit tout de suite dans IndexedDB — utile en particulier juste après une migration depuis
  // l'ancien localStorage (ci-dessus), pour ne plus jamais avoir à y retoucher ensuite.
  trySetStorage(lastSavedRaw, {silent:true});

  setTool('select');
  renderSidebar();
  renderCanvasStack();
  updateUndoRedoButtons();
  // Ramène la feuille restaurée (voir restoreLastPosition) dans la vue, sans animation (behavior:
  // 'auto') pour ne pas voir un défilement se dérouler à chaque ouverture de l'appli.
  if(activeSheetId){
    requestAnimationFrame(()=>{
      const el = document.querySelector(`.page-canvas[data-sheet-id="${activeSheetId}"]`);
      if(el) el.scrollIntoView({ behavior:'auto', block:'start' });
    });
  }
})();
</script>
<script>
// Active le mode hors-ligne (voir sw.js) : une fois ce script exécuté au moins une fois avec une
// connexion, le carnet reste utilisable sans internet ensuite — et surtout, ça permet de garder
// un accès fiable au presse-papier même hors-ligne (voir le commentaire détaillé dans sw.js).
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

// Bouton "🔄" de la barre du haut : demande au service worker d'aller chercher la toute
// dernière version de carnet.html sur GitHub et d'écraser celle en cache, puis recharge la
// page. Contrairement à la mise à jour automatique en tâche de fond, celle-ci est déclenchée
// explicitement par un clic, et ne dépend pas d'un numéro de version à changer à chaque publication.
(function(){
  const btn = document.getElementById('update-app-btn');
  if(!btn) return;
  btn.onclick = ()=>{
    if(!('serviceWorker' in navigator) || !navigator.serviceWorker.controller){
      // Pas de service worker actif (première visite, ou hors-ligne) : un simple rechargement suffit.
      location.reload();
      return;
    }
    btn.disabled = true;
    btn.classList.add('checking');
    const channel = new MessageChannel();
    const timeout = setTimeout(()=>{
      btn.disabled = false;
      btn.classList.remove('checking');
      alert("Pas de réponse du service worker — vérifie ta connexion et réessaie.");
    }, 12000);
    channel.port1.onmessage = (e)=>{
      clearTimeout(timeout);
      if(e.data && e.data.ok){
        // location.reload() vide immédiatement la page (plus de DOM, plus de "data" en mémoire) :
        // impossible d'afficher un message de confirmation AVANT de recharger. On pose donc un
        // petit repère dans localStorage, lu et affiché juste après le rechargement (voir plus bas)
        // — avec l'horodatage du moment de la mise à jour (même format AAAA-MM-JJ_HHhMMmSS que les
        // sauvegardes, voir backupBeforePullInner) pour que le message affiché soit daté.
        try{
          const d = new Date();
          const pad = n=> String(n).padStart(2,'0');
          const stamp = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}_${pad(d.getHours())}h${pad(d.getMinutes())}m${pad(d.getSeconds())}`;
          localStorage.setItem('carnet_update_success_flag', stamp);
        }catch(err){}
        location.reload();
      } else {
        btn.disabled = false;
        btn.classList.remove('checking');
        alert("Impossible de vérifier une mise à jour (pas de connexion ?). La version actuelle reste utilisable hors-ligne.");
      }
    };
    navigator.serviceWorker.controller.postMessage('FORCE_UPDATE', [channel.port2]);
  };
})();

// Confirmation visible juste après un rechargement déclenché par le bouton "🔄" ci-dessus (voir
// le repère posé avant location.reload()) — sans ça, une mise à jour réussie ne se voyait qu'au
// fait que la page clignote, sans aucune confirmation explicite.
(function(){
  let updateStamp = null;
  try{
    updateStamp = localStorage.getItem('carnet_update_success_flag');
    if(updateStamp) localStorage.removeItem('carnet_update_success_flag');
  }catch(err){}
  if(updateStamp) showInfoMessage('✓ Mise à jour réussie ' + updateStamp + ' — tu as la dernière version.');
})();
</script>
